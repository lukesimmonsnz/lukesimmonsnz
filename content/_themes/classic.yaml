# classic preset — current site's tokens.
#
# This preset reflects the values currently hard-coded in
# static/css/main.css (the personal-blog aesthetic — sans-serif,
# single column, Fraunces display, Inter body). It is the default
# preset on first install so v1 state is preserved exactly.

typography:
  scale:                 1.25
  font-family-body:      "'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif"
  font-family-heading:   "'Fraunces', 'Cormorant Garamond', Georgia, serif"
  font-family-mono:      "ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
  line-height-body:      1.65
  line-height-heading:   1.15
  weight-body:           400
  weight-bold:           500
  weight-heading:        500

spacing:
  unit:                  "8px"

color:
  primary:               "#8a5a2a"          # accent-ink in main.css
  primary-fg:            "#fbf8f0"          # surface
  bg:                    "#f5f1e8"          # main.css --bg
  fg:                    "#1a1613"          # main.css --ink
  muted:                 "#4b3f30"          # main.css --muted
  accent:                "#c4956a"          # main.css --accent
  danger:                "#a04030"
  success:               "#3a7050"
  surface-1:             "#fbf8f0"          # main.css --surface
  surface-2:             "#ece5d4"          # main.css --surface-2
  border:                "#d9d0bf"          # main.css --rule

radius:
  sm:                    "2px"
  md:                    "2px"              # current site is sharp-cornered
  lg:                    "4px"
  full:                  "9999px"

shadow:
  sm:                    "0 1px 2px rgba(26,22,19,0.04)"
  md:                    "0 2px 6px rgba(26,22,19,0.08)"
  lg:                    "0 8px 24px rgba(26,22,19,0.12)"

motion:
  duration-fast:         "120ms"
  duration-base:         "200ms"
  easing-standard:       "cubic-bezier(0.2, 0, 0, 1)"
  easing-emphasised:     "cubic-bezier(0.3, 0, 0, 1)"

layout:
  max-width:             "72rem"            # main.css --maxw-page
  gutter:                "2rem"
  breakpoint-sm:         "40rem"
  breakpoint-md:         "48rem"
  breakpoint-lg:         "64rem"
