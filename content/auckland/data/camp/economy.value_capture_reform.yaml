id: camp.auckland.economy.value_capture_reform
name: "Value Capture and New Fiscal Instruments"
theme: economy
core_claim: >
  Infrastructure funding sustainability in Auckland requires new
  instruments that capture the land value uplift created by public
  investment. Betterment levies on properties benefiting from
  new rapid transit, tax increment financing, and a land value tax
  replacing some portion of general rates would align fiscal incentives
  with efficient land use and fund infrastructure from the value it
  creates rather than from general taxation.
flagship_moves:
  - "Legislate betterment levies on properties within 1km of new rapid transit stations in Auckland."
  - "Pilot a tax increment financing district in the City Rail Link catchment to fund connected infrastructure."
  - "Commission an independent review of land value tax as a partial replacement for general rates in Auckland."
tensions:
  - >
    Land value tax and betterment levies require significant
    valuation infrastructure and political will to implement;
    property-owning voters who benefit from value uplift without
    betterment levies resist reform.
  - >
    Tax increment financing captures future value to fund present
    infrastructure; if development does not materialise, the TIF
    district cannot service its debt obligations.
addresses:
  - problem.auckland.economy.fiscal_sustainability
interventions:
  - description: >
      Introduce a betterment levy of 50% of assessed land value
      uplift on properties within 800m of new rapid transit stations
      in Auckland, phased over 5 years.
    state_variable: "infrastructure_value_capture_rate"
    constraint_relaxed: "Land value uplift not captured by infrastructure investor"
    expected_sign: "+"
  - description: >
      Establish a tax increment financing district in the CRL catchment
      to fund the second stage of Auckland's rapid transit network.
    state_variable: "council_infrastructure_fiscal_gap"
    expected_sign: "-"
tensions_with:
  - camp.auckland.economy.fiscal_consolidation
applicable_in:
  - auckland
