id: camp.auckland.health.acute_mh_infrastructure
name: "Acute Mental Health Infrastructure and Inpatient Capacity"
theme: health
core_claim: >
  Auckland's acute mental health system is dangerously under-capacity;
  the shortage of psychiatric inpatient beds forces premature discharge
  and re-presentation cycles. Building new acute and sub-acute mental
  health facilities, and expanding forensic psychiatric capacity, is
  the priority — community expansion cannot safely substitute for
  inpatient care for severe illness.
flagship_moves:
  - "Fund 100 additional adult acute psychiatric inpatient beds in Auckland by 2028."
  - "Build a dedicated child and adolescent mental health inpatient facility for the Auckland region."
  - "Expand forensic psychiatric capacity to reduce the transfer backlog from corrections to health."
tensions:
  - >
    Inpatient psychiatric facilities are the highest-cost mental health
    investment; the same capital would fund many more community
    interventions, with better evidence for mild-to-moderate presentations.
  - >
    A focus on acute infrastructure does not address the prevention
    and early intervention gap; building beds for a crisis that could
    have been prevented upstream is a symptom not a solution.
addresses:
  - problem.auckland.health.mental_health
interventions:
  - description: >
      Fund a new 80-bed CAMHS inpatient and day programme facility in
      the Auckland region with 2028 opening target.
    state_variable: "youth_mh_acute_waitlist"
    constraint_relaxed: "CAMHS inpatient bed deficit"
    expected_sign: "-"
  - description: >
      Increase adult acute psychiatric bed count in Auckland by 100
      through a combination of new build and repurposed ward conversion.
    state_variable: "psychiatric_boarding_rate"
    expected_sign: "-"
tensions_with:
  - camp.auckland.health.community_mental_health_expansion
applicable_in:
  - auckland
