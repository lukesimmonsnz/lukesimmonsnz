id: camp.polycentric
name: Polycentric / satellite growth
core_claim: >
  Neither centralised intensification nor unbounded edge sprawl is optimal; growth
  should be concentrated in defined nodes such as Warkworth, Kumeu, Pukekohe, and Drury.
flagship_moves:
  - Structure plans directed to named growth centres.
  - Rapid-transit investment linking nodes to the core.
  - Hold rural land between nodes in semi-rural use.
  - Cluster employment, services, and density at node cores.
tensions:
  - High infrastructure cost of building up multiple centres in parallel.
  - Risk of low-density sprawl filling gaps between nodes if boundaries are not held.
  - Transit capital cost and timing.
  - Employment follows density imperfectly on decadal timescales.
addresses:
  - problem.housing.land
interventions:
  - description: "Concentrate growth at defined nodes with rapid-transit connectivity."
    state_variable: zoned_capacity_dwellings
    expected_sign: "+"
    side_effects:
      - transit_capital_demand
      - risk_of_inter_node_sprawl
  - description: "Hold agricultural and ecological land between nodes through zoning."
    constraint_relaxed: resource_management_statutory_regime
    state_variable: developable_area_hectares
    expected_sign: "0"
    side_effects:
      - preserves_inter_node_open_space
advocates:
  - Some regional planners
  - Auckland Council Future Development Strategy authors over time
tensions_with:
  - camp.conservation_first
