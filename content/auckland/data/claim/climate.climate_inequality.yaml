id: claim.auckland.climate.climate_inequality
statement: >
  Climate risk in Auckland is inequitably distributed; low-income
  communities in South Auckland, including Maori and Pacific households
  in flood-prone areas, have lower adaptive capacity (insurance rates,
  ability to move, home modification resources) than high-income areas
  facing comparable physical exposure. Climate adaptation that proceeds
  without equity consideration will deepen existing disadvantage.
