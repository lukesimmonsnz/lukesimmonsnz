id: claim.auckland.climate.climate_inequality
statement: Climate risk in Auckland is inequitably distributed; low-income communities
  in South Auckland, in flood-prone areas, have lower adaptive capacity — lower insurance
  rates, less ability to move, fewer resources for home modification — than higher-income
  areas facing comparable physical exposure. Climate adaptation that proceeds without
  equity consideration will deepen existing geographic and socioeconomic disadvantage.
