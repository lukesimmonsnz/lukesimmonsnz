id: claim.auckland.climate.ev_transition_equity
statement: >
  Electric vehicle uptake in Auckland is concentrated in high-income
  households; the upfront cost premium over internal combustion vehicles
  means that low-income households continue to bear higher fuel cost
  exposure and older, more polluting vehicles. Carbon pricing revenues
  have not been recycled into EV access programmes for low-income
  Aucklanders at the scale needed to equalise transition costs.
