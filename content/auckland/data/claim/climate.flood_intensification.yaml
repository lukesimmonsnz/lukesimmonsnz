id: claim.auckland.climate.flood_intensification
statement: >
  Auckland's January 2023 flooding event — a 1-in-200-year rainfall
  in a single day — caused over $200M in damage and demonstrated
  the vulnerability of Auckland's stormwater infrastructure to
  intensified precipitation; climate models project increasing
  frequency and intensity of extreme rainfall events in Auckland
  under all emissions scenarios.
