id: claim.auckland.climate.flood_intensification
statement: 'Auckland''s January 2023 flooding event — a 1-in-200-year or greater rainfall
  intensity in a single day — caused approximately $2 billion in direct economic losses,
  with insured losses alone reaching approximately NZD 1.5 billion (Insurance Council
  of NZ 2023). The event demonstrated acute vulnerability in Auckland''s stormwater
  infrastructure, which was designed to handle substantially lower peak rainfall intensities
  than those now projected under mid-century climate scenarios. intensified precipitation;
  climate models project increasing frequency and intensity of extreme rainfall events
  in Auckland under all emissions scenarios.

  '
