id: claim.auckland.climate.insurance_withdrawal_risk
statement: >
  New Zealand insurers are beginning to price climate risk into
  premiums in Auckland's highest-exposure areas; projections suggest
  that 10-15% of Auckland properties currently insured may face
  insurance withdrawal or prohibitive premium increases by 2050,
  creating a future uninsurable housing stock in flood and coastal
  risk zones.
