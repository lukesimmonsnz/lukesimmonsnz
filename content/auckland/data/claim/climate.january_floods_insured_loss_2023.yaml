id: claim.auckland.climate.january_floods_insured_loss_2023
statement: >
  The January 2023 Auckland Anniversary Weekend floods produced
  approximately NZD 1.78 billion of insured losses according to
  Insurance Council of New Zealand industry-aggregated figures,
  making it the most expensive insured weather event in Auckland's
  history at time of publication and the second-most expensive
  insured weather event in New Zealand history (surpassed only by
  Cyclone Gabrielle's NZD 2.1 billion later that year).
