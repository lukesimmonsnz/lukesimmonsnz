id: claim.auckland.climate.managed_retreat_necessity
statement: 'Some Auckland coastal properties will become uninhabitable under even
  moderate sea level rise scenarios; managed retreat — the planned relocation of residents
  and structures from high-risk areas — is technically necessary at scale but has
  not been implemented due to legal, financial, and political barriers around property
  rights and Crown liability.

