id: claim.auckland.climate.transition_jobs_risk
statement: 'Auckland''s fossil fuel-dependent sectors (transport, logistics, construction
  with petrol/diesel machinery) employ approximately 80,000 workers who face transition
  risk as decarbonisation proceeds; without just transition investment, the economic
  disruption of decarbonisation falls disproportionately on lower-skilled workers
  in these sectors.

  '
