id: claim.auckland.climate.urban_heat_island
statement: 'Auckland''s urban core is 2-4 degrees Celsius warmer than surrounding
  rural areas due to the urban heat island effect; impervious surfaces, reduced tree
  canopy, and waste heat from buildings and transport amplify ambient temperature.
  Increasing ambient temperatures are projected to increase heat-related mortality
  by 30-50% by 2050, with elderly, outdoor workers, and South Auckland residents in
  lower- quality housing most exposed.

  '
