id: claim.auckland.crime.fv_intergenerational_cycle
statement: >
  Children who witness family violence are at substantially elevated risk
  of becoming either perpetrators or victims of family violence as adults;
  the intergenerational transmission effect means that interventions
  which protect children from exposure have both immediate safety and
  long-run crime reduction value.
