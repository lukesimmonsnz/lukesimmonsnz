id: claim.auckland.crime.fv_police_call_rate
statement: 'New Zealand has one of the highest family violence police call rates in
  the OECD; Auckland police receive approximately 150,000 family harm calls per year
  (calls received by police, including calls not resulting in attendance), representing
  roughly 40% of all Auckland police calls. Attended family harm events are a subset
  of this figure; the majority of incidents involve repeat addresses, reflecting the
  chronic and cyclical nature of family violence.

  '
value: 150000
unit: family harm calls received/year (incl. unattended)
time_period: 2022-2023
