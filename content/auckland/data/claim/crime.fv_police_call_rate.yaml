id: claim.auckland.crime.fv_police_call_rate
statement: >
  New Zealand has one of the highest family violence police call rates
  in the OECD; Auckland police receive approximately 150,000 family
  harm calls per year, representing roughly 40% of all Auckland police
  calls. The majority of incidents involve repeat addresses.
