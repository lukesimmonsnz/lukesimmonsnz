id: claim.auckland.crime.gang_membership_deprivation
statement: >
  Gang membership in Auckland is heavily concentrated in high-deprivation
  areas; gangs provide economic opportunity, social belonging, and
  protection in contexts where legitimate alternatives are scarce.
  Suppression-only approaches historically increase gang cohesion rather
  than reduce membership.
