id: claim.auckland.crime.maori_youth_overrepresentation
statement: >
  Maori youth make up approximately 65-70% of youth justice proceedings
  nationally despite being approximately 26% of the youth population;
  in Auckland's South and West districts, Maori and Pacific youth
  account for over 80% of family group conference referrals.
