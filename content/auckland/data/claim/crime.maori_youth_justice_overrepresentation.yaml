id: claim.auckland.crime.maori_youth_overrepresentation
statement: Auckland's youth justice system serves disproportionately high shares of
  young people from concentrated high-deprivation areas; in South and West Auckland
  family group conference referrals, over 80% are from these high-poverty communities.
  This concentration reflects structural drivers — poverty, school disengagement,
  limited employment pathways — that concentrate most heavily in areas with high Māori
  and Pacific youth populations.
