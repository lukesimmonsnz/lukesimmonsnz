id: claim.auckland.economy.ai_capture_distributional_risk_2024
statement: >
  Where productivity gains from AI accrue depends on capital ownership,
  contractual structure, and the elasticity of substitution between AI
  and labour. In economies with high firm-level dispersion (such as
  New Zealand) and weak diffusion mechanisms, the static prediction
  is that gains accrue disproportionately to a small group of capital-
  intensive frontier firms and their owners, with limited wage
  pass-through unless complementary labour-market and skills policy
  intervenes.
