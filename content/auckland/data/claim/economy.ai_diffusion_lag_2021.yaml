id: claim.auckland.economy.ai_diffusion_lag_2021
statement: >
  New Zealand's productivity gap with the OECD frontier reflects a
  long-tail problem: a small group of frontier firms operate at or
  near the international frontier, but the gap to the median NZ firm
  is unusually large by OECD standards. Diffusion of advanced
  technologies — including AI tooling — through the long tail is the
  binding constraint on aggregate productivity, not frontier
  performance.
