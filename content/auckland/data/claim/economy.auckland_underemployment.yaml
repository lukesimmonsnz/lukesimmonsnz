id: claim.auckland.economy.auckland_underemployment
statement: >
  Auckland underemployment (workers employed part-time who want full-
  time work) runs at approximately 8-10% of the labour force,
  substantially above the headline unemployment rate; underemployment
  is concentrated in South and West Auckland, among youth, and in
  service sectors where casual and variable-hours contracts are common.
