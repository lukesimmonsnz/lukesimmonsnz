id: claim.auckland.economy.congestion_productivity_cost
statement: 'Auckland''s transport congestion costs the economy approximately $1.3
  billion per year in lost productivity through delayed freight, missed appointments,
  and worker commute time; agglomeration productivity benefits of Auckland''s city-scale
  are partially negated by the friction cost of a car-dependent, congested transport
  network.

  '
