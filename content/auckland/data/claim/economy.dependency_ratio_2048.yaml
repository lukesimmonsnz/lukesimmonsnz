notes: >
  Treasury Long-Term Insights Briefing uses Stats NZ projections as
  the demographic input to its fiscal sustainability modelling. This
  claim is the demographic primitive; the fiscal flow-through is
  treated under the existing nz_public_debt_trajectory claim.
