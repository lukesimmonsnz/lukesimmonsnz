id: claim.auckland.economy.dependency_ratio_2048
statement: >
  The old-age dependency ratio (population aged 65+ per 100 of
  working-age 15-64) is projected to rise from approximately 26 in
  2023 to 40-45 by 2048 under Stats NZ's medium projection, depending
  on net migration assumptions. The fiscal implications — superannuation,
  health and long-term care — are the central long-run pressure on the
  Crown balance sheet identified in successive Long-Term Insights
  Briefings.
value: 42
unit: old-age dependency ratio (mid-point of medium projection range)
time_period: 2023-2048
confidence: medium
