id: claim.auckland.economy.frontier_firm_productivity_gap_2021
statement: >
  New Zealand's frontier firms — the top 10% by labour productivity in
  each industry — are roughly four times more productive than the
  median firm in the same industry. The within-industry dispersion is
  larger than in most OECD comparators, indicating that the productivity
  gains from new technologies (including AI) are concentrated in a
  narrow top tier rather than diffusing through the economy.
value: 4
unit: ratio of frontier-firm to median-firm labour productivity
time_period: '2021'
confidence: high
verification_status: cited_only
