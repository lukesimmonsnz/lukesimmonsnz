id: claim.auckland.economy.gig_precarity
statement: 'Gig and platform economy employment in Auckland has grown substantially;
  workers classified as independent contractors lack employment protections (sick
  leave, holiday pay, minimum hours guarantees), creating a two-tier labour market
  where a growing share of Auckland workers bear income volatility risk without social
  insurance coverage.

