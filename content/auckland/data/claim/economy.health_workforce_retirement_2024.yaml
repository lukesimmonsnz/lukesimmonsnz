id: claim.auckland.economy.health_workforce_retirement_2024
statement: >
  Te Whatu Ora's national health workforce plan reports persistent
  vacancy rates in nursing, GP, and senior medical roles, with a
  significant share of the existing workforce (particularly senior
  nurses and GPs) within ten years of retirement. The same demographic
  trend that is increasing demand for health services is removing
  capacity from the workforce that supplies them.
