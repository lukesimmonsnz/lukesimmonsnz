id: claim.auckland.economy.infrastructure_funding_model_failure
statement: 'Auckland''s infrastructure funding model (general rates plus Crown grants)
  does not efficiently capture the land value uplift created by public infrastructure
  investment; property owners adjacent to new rapid transit capture large capital
  gains funded by general ratepayers and taxpayers, while the infrastructure investor
  receives no direct return on the value created.

  '
