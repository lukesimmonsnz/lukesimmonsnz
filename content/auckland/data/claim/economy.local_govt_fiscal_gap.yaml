id: claim.auckland.economy.local_govt_fiscal_gap
statement: 'Auckland Council faces a structural fiscal gap between its infrastructure
  obligations and its rating revenue base; the combination of growth-driven capital
  expenditure requirements, interest cost increases, and constraints on rates increases
  (legislated and political) is projected to require either significant service reductions
  or new revenue instruments.

