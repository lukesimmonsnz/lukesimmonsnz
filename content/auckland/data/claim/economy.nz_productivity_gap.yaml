id: claim.auckland.economy.nz_productivity_gap
statement: >
  New Zealand's labour productivity is approximately 30-35% below
  the OECD frontier (measured by GDP per hour worked); Auckland, as
  the primary economic engine, has not closed this gap over two decades
  despite periods of strong GDP growth. The gap is largest in traded
  goods sectors and reflects low business R&D investment and slow
  technology adoption.
