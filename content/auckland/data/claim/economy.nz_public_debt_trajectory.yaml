id: claim.auckland.economy.nz_public_debt_trajectory
statement: 'New Zealand''s net Crown debt has increased from approximately 20% to
  35-40% of GDP following COVID fiscal responses; the trajectory over 10 years under
  current settings projects continued growth, constraining the Crown''s ability to
  fund capital investment in Auckland infrastructure, health, and education without
  new revenue instruments or significant spending reprioritisation.

