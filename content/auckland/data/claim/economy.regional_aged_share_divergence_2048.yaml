id: claim.auckland.economy.regional_aged_share_divergence_2048
statement: >
  Stats NZ's subnational projections show the share of the population
  aged 65+ rising fastest in regions that already have older
  age-structures: West Coast, Tasman, Marlborough, Northland, and
  parts of Hawke's Bay are projected to have 30-35% of their
  population aged 65+ by 2048, compared to roughly 20% in Auckland.
  The ageing burden is regionally uneven and inversely correlated
  with workforce capacity to support it.
