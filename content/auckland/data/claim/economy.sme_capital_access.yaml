id: claim.auckland.economy.sme_capital_access
statement: >
  Auckland SMEs have limited access to growth capital; New Zealand's
  venture capital market is small, bank lending is secured primarily
  against property rather than business assets, and the NZX is thin
  for small-company equity raising. High-growth SMEs face a
  valley-of-death funding gap between angel investment and institutional
  capital.
