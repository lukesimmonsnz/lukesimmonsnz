id: claim.auckland.education.ece_cost_barrier
statement: >
  ECE cost is the primary barrier to participation for low-income
  Auckland families; the 20 hours free ECE subsidy does not cover
  full-time attendance, and top-up fees in Auckland average $5-8 per
  hour above the subsidy rate. Transport and availability constraints
  in South and West Auckland compound the cost barrier.
