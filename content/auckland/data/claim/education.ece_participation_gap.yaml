id: claim.auckland.education.ece_participation_gap
statement: >
  ECE participation rates for Maori and Pacific children in Auckland
  are approximately 10-15 percentage points below NZ European; children
  who do not attend quality ECE enter primary school with measurably
  lower language, numeracy, and social-emotional readiness, compounding
  the achievement gap that persists through secondary school.
