id: claim.auckland.education.ece_participation_gap
statement: ECE participation in Auckland varies sharply by cost and transport accessibility;
  low-income families in high-deprivation areas face the highest barriers to enrollment
  due to unaffordable fees (average $300–400/week) and limited provision. ECE participation
  rates are lowest in South and West Auckland, where the majority of children are
  from Māori and Pacific households that face severe housing cost burden.
