id: claim.auckland.education.ece_quality_gradient
statement: 'ECE quality in South and West Auckland is lower on average than in high-income
  Auckland suburbs; qualified teacher ratios, teacher turnover, and physical environment
  quality all show a deprivation gradient. Low-income families are more likely to
  use lower-quality ECE, undermining the developmental benefit of participation alone.

