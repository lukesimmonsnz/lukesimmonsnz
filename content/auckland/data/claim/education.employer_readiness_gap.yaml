id: claim.auckland.education.employer_readiness_gap
statement: >
  Auckland employers consistently report that school leavers lack
  foundational literacy, numeracy, and workplace readiness skills;
  the gap is largest for Maori and Pacific school leavers from South
  and West Auckland, reflecting both lower NCEA attainment and
  thinner networks connecting school to employer opportunity.
