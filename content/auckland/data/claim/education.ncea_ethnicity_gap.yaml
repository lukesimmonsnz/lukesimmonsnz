id: claim.auckland.education.ncea_ethnicity_gap
statement: 'NCEA Level 2 attainment in Auckland shows steep deprivation gradients:
  students in low-income, high-school-decile areas achieve Level 2 at substantially
  lower rates than those in high-income catchments. This pattern is particularly pronounced
  in South and West Auckland, where schools serving high proportions of Māori and
  Pacific students face chronic underfunding, higher teacher turnover, and concentrated
  disadvantage.'
