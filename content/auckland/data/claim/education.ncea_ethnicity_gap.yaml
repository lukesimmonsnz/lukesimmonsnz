id: claim.auckland.education.ncea_ethnicity_gap
statement: >
  NCEA Level 2 attainment rates for Maori and Pacific students in
  Auckland are approximately 15-20 percentage points below those for
  NZ European students; in decile 1-3 South and West Auckland schools
  the gap widens further, with some schools reporting Maori and Pacific
  attainment rates below 60%.
