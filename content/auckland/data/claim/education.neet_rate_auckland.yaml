id: claim.auckland.education.neet_rate_auckland
statement: >
  Approximately 12-15% of Auckland 15-24 year olds are not in
  employment, education, or training (NEET); the rate is substantially
  higher for Maori and Pacific youth in South and West Auckland.
  NEET status at 18-20 is the strongest predictor of long-run
  disadvantage in income, health, and housing outcomes.
