id: claim.auckland.education.neet_rate_auckland
statement: Approximately 12-15% of Auckland 15-24 year olds are not in employment,
  education, or training (NEET); rates are highest in high-deprivation suburbs of
  South and West Auckland, where barriers to further study and entry-level employment
  are most acute. NEET status at 18-20 is the strongest predictor of long-run disadvantage
  in income, health, and housing outcomes.
