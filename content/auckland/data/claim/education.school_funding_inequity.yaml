id: claim.auckland.education.school_funding_inequity
statement: >
  Auckland decile 1-3 schools have higher proportions of students with
  learning needs, English language challenges, and socioeconomic
  disadvantage, yet per-pupil operational resourcing differences between
  decile bands are insufficient to equalise effective educational inputs;
  high-deprivation schools face higher staff turnover and find specialist
  teacher recruitment more difficult.
