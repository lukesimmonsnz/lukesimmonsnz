id: claim.auckland.education.skills_mismatch
statement: >
  Auckland faces simultaneous tertiary graduate oversupply in some
  fields and acute skilled worker shortages in construction, health,
  engineering, and trades; the mismatch reflects tertiary enrolment
  patterns that do not track labour market signals, partly because
  student choice is not well-informed by wage and employment outcome
  data.
