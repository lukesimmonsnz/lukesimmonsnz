id: claim.auckland.education.student_loan_housing_barrier
statement: 'Auckland housing costs consume a disproportionate share of student allowances
  and loan living costs; students from low-income families studying in Auckland face
  a structural deficit between Crown-funded living support and actual Auckland rental
  costs, forcing paid work that competes with study time and increases dropout risk.

  '
