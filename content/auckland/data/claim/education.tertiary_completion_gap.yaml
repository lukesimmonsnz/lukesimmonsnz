id: claim.auckland.education.tertiary_completion_gap
statement: 'Tertiary completion in Auckland is sharply correlated with secondary school
  decile and student income. Students from low-income families entering tertiary study
  face barriers to completion: housing cost burden, part-time work, inadequate student
  support. Completion rates are lowest among students from high-deprivation neighborhoods
  and low-decile schools; Māori and Pacific students are concentrated in these cohorts,
  producing gaps in credentials and long-term income outcomes.'
