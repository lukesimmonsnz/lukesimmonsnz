id: claim.auckland.education.vocational_pathway_deficit
statement: 'Auckland''s secondary curriculum is dominated by academic NCEA pathways;
  vocational and trades pathways are underresourced and carry lower social status
  despite offering viable labour market entry for students not pursuing university.
  The result is that students who are not university-bound receive less support and
  fewer structured options at the school-to-work transition.

  '
