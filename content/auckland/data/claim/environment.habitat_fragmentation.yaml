id: claim.auckland.environment.habitat_fragmentation
statement: 'Auckland''s remaining native bush is highly fragmented: the Waitākere
  Ranges, Hunua Ranges, and scattered urban remnants are ecologically isolated by
  roads, development, and pastoral land. Kauri dieback disease (Phytophthora agathidicida)
  has spread to the Waitākere Ranges, threatening the region''s largest remaining
  kauri forests and requiring extensive track closures. Connectivity between habitat
  fragments is critical for genetic diversity and population viability of mobile native
  species.

  '
