id: claim.auckland.environment.harbour_contamination
statement: 'Both the Waitematā and Manukau Harbours experience chronic contamination
  from stormwater and wastewater overflows, causing regular beach closures particularly
  after heavy rainfall. Shellfish gathering is prohibited in most Auckland harbour
  areas due to persistent E. coli levels above safe harvest thresholds. The contamination
  is primarily anthropogenic — driven by combined sewer overflows, stormwater, and
  failing septic systems at the urban fringe.

  '
