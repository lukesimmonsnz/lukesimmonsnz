id: claim.auckland.environment.native_species_decline
statement: >
  Auckland's native biodiversity has experienced severe decline since
  European settlement. More than 40 native bird species that were present
  in the Auckland region in 1840 are now locally extinct or functionally
  absent from the mainland. The main driver is predation by introduced
  mammals — rats, stoats, and possums — combined with habitat loss from
  urban development. Predator-free programmes on offshore islands and in
  fenced sanctuaries (Tāwharanui, Shakespear) demonstrate that native
  species recovery is achievable with sustained predator control.
