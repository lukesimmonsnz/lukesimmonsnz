id: claim.auckland.environment.rural_stream_nutrient_loading
statement: 'Rural and peri-urban streams in Auckland''s Rodney and Franklin areas
  show elevated nutrient loads (nitrate and phosphorus) from pastoral farming, with
  levels that contribute to freshwater algal blooms and degraded macroinvertebrate
  communities. While less visible than urban stormwater contamination, diffuse agricultural
  runoff is the dominant nutrient source in catchments that are not yet fully urbanised.

  '
