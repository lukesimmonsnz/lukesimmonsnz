id: claim.auckland.environment.tree_canopy_inequity
statement: 'Urban tree canopy cover in Auckland varies from above 40% in affluent
  suburbs (Remuera, Epsom, Howick) to below 10% in high-deprivation areas (Māngere,
  Ōtara, Flat Bush). This canopy inequity maps closely onto socioeconomic deprivation
  and is associated with urban heat island effects: canopy-poor areas experience peak
  summer temperatures 3–5°C above canopy-rich areas, increasing heat stress risk for
  the households least able to afford air conditioning.

  '
