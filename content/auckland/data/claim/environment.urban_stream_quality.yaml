id: claim.auckland.environment.urban_stream_quality
statement: 'The majority of Auckland''s urban streams are in poor or very poor ecological
  health, with high E. coli counts, elevated nutrients from stormwater runoff, and
  degraded riparian margins. Fewer than 20% of urban stream monitoring sites regularly
  achieve a "good" Water Quality Index rating. The primary stressors are urban stormwater
  carrying sediment, hydrocarbons, metals, and faecal contamination from roads and
  lawns into waterways with insufficient natural filtration.

  '
