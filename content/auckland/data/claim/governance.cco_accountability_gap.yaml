id: claim.auckland.governance.cco_accountability_gap
statement: 'Auckland''s seven CCOs (AT, Watercare, Eke Panuku, ATEED, etc.) operate
  with significant autonomy; board appointments, executive remuneration, and strategic
  decisions are made at arm''s length from elected members. Public scrutiny of CCO
  performance is limited by commercial sensitivity provisions; loss-making CCO operations
  have persisted without triggering democratic accountability mechanisms.

  '
