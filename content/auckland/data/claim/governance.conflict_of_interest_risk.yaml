id: claim.auckland.governance.conflict_of_interest_risk
statement: >
  Auckland's development and infrastructure sector is characterised
  by recurrent conflict of interest concerns; the concentration of
  large contracts with a small number of suppliers, and the revolving
  door between council staff, CCO management, and private development
  consultancies, creates procurement integrity risks that have been
  identified in multiple audit reports.
