id: claim.auckland.governance.council_complexity
statement: >
  Auckland Council's governance structure — a governing body, 21 local
  boards, 7 CCOs, and multiple special purpose bodies — is one of the
  most complex in the OECD for a city of its size; the complexity
  fragments accountability, duplicates management functions, and
  creates coordination failures between infrastructure, transport, and
  housing decisions.
