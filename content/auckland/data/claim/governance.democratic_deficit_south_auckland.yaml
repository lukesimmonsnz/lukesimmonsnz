id: claim.auckland.governance.democratic_deficit_south_auckland
statement: >
  The communities most affected by Auckland Council decisions on
  housing, transport, and infrastructure — South and West Auckland's
  Maori and Pacific populations — have the lowest rates of local
  electoral participation; the decisions that shape their neighbourhoods
  are made disproportionately by voters from high-income, high-turnout
  areas of North Shore and Epsom.
