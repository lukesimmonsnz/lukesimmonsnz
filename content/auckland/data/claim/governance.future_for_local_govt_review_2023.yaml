id: claim.auckland.governance.future_for_local_govt_review_2023
statement: >
  The Future for Local Government Review (final report June 2023, "He Piki
  Turanga, He Piki Kotuku") delivered 17 substantive recommendations,
  including a structural shift to Te Tiriti-based partnership in local
  government, expanded local-government revenue tools beyond property
  rates, and a reframing of local government's purpose. Auckland's CCO
  governance model and post-amalgamation accountability gaps were
  referenced as a working example. Subsequent governments have implemented
  the recommendations only partially as of 2026.
