id: claim.auckland.governance.iwi_auckland_governance_role
statement: >
  Auckland's mana whenua iwi (Ngati Whatua Orakei, Te Kawerau a Maki,
  and others) have statutory roles in Auckland Council decision-making
  through the Independent Maori Statutory Board and various RMA
  processes; these roles have not consistently translated into
  substantive influence over decisions affecting Maori communities,
  particularly in South Auckland where many Maori are urban migrants
  disconnected from their rohe.
