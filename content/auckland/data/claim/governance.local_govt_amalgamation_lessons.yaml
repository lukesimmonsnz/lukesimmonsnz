id: claim.auckland.governance.local_govt_amalgamation_lessons
statement: 'Auckland''s 2010 super-city amalgamation reduced council numbers from
  8 to 1 and was projected to deliver $2.9 billion in efficiency savings; independent
  reviews have found that savings have not materialised at projected scale, coordination
  costs increased, and community representation in local decision-making has diminished,
  particularly outside the urban core.

  '
