id: claim.auckland.governance.maori_population_urban_shift
statement: Urban migration of low-income households seeking employment, education,
  and housing has reshaped New Zealand's demographic geography; approximately 70%
  of the population now lives in urban areas, with Auckland attracting the largest
  migration inflow. These urban populations are concentrated in high-deprivation urban
  wards with limited local decision-making power, amplifying the democratic deficit
  for residents of South and West Auckland, who are disproportionately Māori and Pacific.
