id: claim.auckland.governance.public_trust_decline
statement: Public trust in Auckland Council has declined across the amalgamation period;
  survey data consistently shows that majorities of Aucklanders do not believe the
  Council listens to them, spends their money well, or makes decisions in their interests.
  Trust is lowest in high-deprivation areas of South and West Auckland, where infrastructure
  underinvestment is most visible.
