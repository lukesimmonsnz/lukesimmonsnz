id: claim.auckland.governance.three_waters_centralisation
statement: >
  The three waters (drinking water, wastewater, stormwater) reform
  debate exposed fundamental tensions in New Zealand local government
  about the appropriate scale of infrastructure entities; the Crown's
  proposed centralisation was rejected partly on democratic
  accountability grounds, with councils and Maori arguing that
  community ownership and iwi co-governance rights were extinguished
  by national entity proposals.
