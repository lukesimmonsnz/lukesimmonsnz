id: claim.auckland.governance.treaty_co_governance_debate
statement: >
  Treaty of Waitangi co-governance arrangements — where Crown and Maori
  exercise joint decision-making authority over natural resources,
  public services, or geographical areas — have expanded significantly
  since the 2017 Whanganui River and 2021 Three Waters reform
  proposals; the model is contested, with supporters arguing it
  fulfils Treaty obligations and critics arguing it creates a parallel
  governance structure inconsistent with democratic equality.
