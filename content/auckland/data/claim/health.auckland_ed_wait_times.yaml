id: claim.auckland.health.auckland_ed_wait_times
statement: >
  Auckland City Hospital and Middlemore Hospital consistently fail the
  six-hour ED departure target; Middlemore in particular operates at
  120-130% occupancy during winter peaks, with ambulance ramping
  regularly exceeding two hours. Primary care access deficits drive
  a significant share of avoidable ED presentations.
