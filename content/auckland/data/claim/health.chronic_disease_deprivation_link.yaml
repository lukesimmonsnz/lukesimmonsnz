id: claim.auckland.health.chronic_disease_deprivation_link
statement: >
  Chronic disease burden in Auckland (diabetes, cardiovascular disease,
  respiratory disease) tracks the NZDep deprivation index closely;
  high-deprivation areas have chronic disease hospitalisation rates
  two to four times those in low-deprivation areas, driven by housing
  quality, diet, physical inactivity, and delayed diagnosis.
