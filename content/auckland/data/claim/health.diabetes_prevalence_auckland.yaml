id: claim.auckland.health.diabetes_prevalence_auckland
statement: >
  Type 2 diabetes prevalence in Auckland's Pacific communities is
  approximately three times the national average; Pacific and Maori
  Aucklanders have substantially higher rates of diabetes-related
  hospitalisation and amputation than NZ Europeans, reflecting both
  higher prevalence and later-stage diagnosis due to primary care
  access barriers.
