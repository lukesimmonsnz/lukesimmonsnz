id: claim.auckland.health.diabetes_prevalence_auckland
statement: Type 2 diabetes prevalence in Auckland's high-deprivation communities is
  substantially elevated due to food environment (high fast-food density, low fresh-produce
  access), barriers to physical activity (high-density rental housing, limited parks),
  and chronic stress (housing cost burden). Diabetes prevalence is highest in South
  and West Auckland, where Māori and Pacific populations are concentrated and where
  these structural risk factors intersect most severely.
