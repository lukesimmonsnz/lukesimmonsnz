id: claim.auckland.health.first_1000_days
statement: 'The first 1,000 days from conception to age two are the period of greatest
  neurological development and the highest return on investment for public health;
  nutritional deficiency, maternal stress, and housing instability during this window
  have documented long-run consequences for cognitive development, mental health,
  and chronic disease risk.

