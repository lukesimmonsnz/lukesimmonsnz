id: claim.auckland.health.food_environment_inequality
statement: >
  South and West Auckland neighbourhoods have a higher density of fast
  food outlets and a lower density of fresh food retailers per capita
  than affluent suburbs; the obesogenic food environment is a structural
  driver of chronic disease that operates independently of individual
  dietary choices.
