id: claim.auckland.health.maori_pacific_amenable_mortality
statement: Amenable mortality — deaths from conditions treatable by the health system
  — is concentrated in Auckland's high-deprivation communities and shows a steep deprivation
  gradient. Mortality from chronic conditions, infectious diseases, and other preventable
  causes is substantially elevated in South and West Auckland neighborhoods with limited
  primary care access and high housing cost burden. Māori and Pacific populations
  carry disproportionate shares of this burden due to their concentration in these
  high-deprivation areas.
