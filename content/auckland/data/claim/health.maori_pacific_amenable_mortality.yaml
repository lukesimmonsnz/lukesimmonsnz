id: claim.auckland.health.maori_pacific_amenable_mortality
statement: >
  Amenable mortality rates for Maori and Pacific Aucklanders are
  approximately 2-3 times those of NZ European; the gap has not
  narrowed significantly in two decades, indicating that health system
  access and quality improvements have not reached these populations
  proportionately.
