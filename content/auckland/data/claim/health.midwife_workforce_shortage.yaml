id: claim.auckland.health.midwife_workforce_shortage
statement: >
  Auckland faces an acute midwifery workforce shortage; approximately
  30% of Lead Maternity Carer positions in South Auckland are vacant
  or filled by caseloads above sustainable limits. Women in high-
  deprivation areas have lower antenatal visit rates and are more likely
  to present unbooked or late to maternity services.
value: 30
unit: "percent vacancy"
time_period: "2022-2023"
