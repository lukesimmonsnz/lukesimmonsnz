id: claim.auckland.health.preterm_birth_disparity
statement: Preterm birth rates in South Auckland are approximately 1.5-2 times those
  in lower-deprivation Auckland suburbs; preterm birth is a primary predictor of long-run
  developmental disadvantage and generates disproportionate neonatal intensive care
  costs. The gap tracks deprivation and antenatal care access rather than any factor
  specific to population group.
