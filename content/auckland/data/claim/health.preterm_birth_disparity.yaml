id: claim.auckland.health.preterm_birth_disparity
statement: >
  Preterm birth rates for Maori and Pacific mothers in Auckland are
  approximately 1.5-2 times those of NZ European mothers; preterm birth
  is a primary predictor of long-run developmental disadvantage and
  generates disproportionate neonatal intensive care costs.
