id: claim.auckland.health.primary_care_cost_barrier
statement: Cost is the primary barrier to primary care access in Auckland; GP fees
  average $40-60 per visit for non-enrolled adults, and approximately 20% of Aucklanders
  report forgoing a GP visit in the past year due to cost. The barrier is highest
  for low-income households and communities in South and West Auckland with the greatest
  unmet chronic disease burden.
