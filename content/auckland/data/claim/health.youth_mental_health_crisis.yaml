id: claim.auckland.health.youth_mental_health_crisis
statement: 'Youth mental health presentations to Auckland EDs have increased by approximately
  50% since 2018; youth (15-24) are the fastest growing group presenting to acute
  mental health services, yet specialist child and adolescent mental health service
  (CAMHS) waitlists in Auckland exceed 12 months for non-acute referrals.

