id: claim.auckland.housing.annual_consents_recent_decade
statement: 'Auckland has consented roughly 10,000–20,000 new dwellings per year over
  the past decade, with a peak around 2022 driven by the NPS-UD pipeline and material
  contraction since. Completions lag consents by 12–24 months and are typically 10–20%
  lower due to cancellations and project delays.

