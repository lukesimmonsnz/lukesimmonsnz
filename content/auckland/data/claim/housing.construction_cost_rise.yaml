id: claim.auckland.housing.construction_cost_rise
statement: 'Construction costs in New Zealand rose approximately 30–40% between 2020
  and 2023 on the Capital Goods Price Index for construction, driven by materials
  and labour cost inflation following COVID-19 supply disruptions. The rise has only
  partially unwound since, compressing developer margins and reducing the viability
  of new housing projects.

  '
