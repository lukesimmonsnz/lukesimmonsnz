id: claim.auckland.housing.deposit_gap_expansion
statement: 'The deposit gap — the number of years of median saving required to assemble
  a 20% deposit on a median Auckland dwelling — expanded from roughly 2–3 years in
  the 1990s to roughly 8–12 years at peak in the early 2020s. This shift means the
  entry barrier to ownership has become a multi-decade savings project for households
  without parental equity transfer, structurally decoupling ownership access from
  income trajectory.

  '
