id: claim.auckland.housing.emergency_housing_cost
statement: >
  Emergency housing special needs grants in New Zealand — predominantly
  funding motel accommodation for households in acute housing need —
  cost the Crown over NZD 300 million annually at peak usage, representing
  a high-cost, low-outcome substitute for permanent public housing supply.
