id: claim.auckland.housing.emergency_housing_cost
statement: 'The New Zealand government''s emergency housing expenditure peaked at
  approximately NZD 300 million per year in 2021-2023, funding motel and transitional
  accommodation for households unable to access public housing or sustain private
  rentals. Auckland accounts for the largest share of emergency housing placements
  nationally, reflecting the city''s compressed public housing waitlist and the absence
  of affordable private-market alternatives for the lowest-income households. Emergency
  housing is a fiscally costly substitute for the social housing stock not built.

  '
value: 300
