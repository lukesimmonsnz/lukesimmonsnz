id: claim.auckland.housing.infill_greenfield_split
statement: >
  Auckland Council's Future Development Strategy projects that the majority of
  Auckland's 30-year housing growth — approximately two-thirds — will occur
  through intensification within the existing urban area rather than greenfield
  expansion at the fringe, reflecting both zoned capacity distribution and
  infrastructure investment priorities.
