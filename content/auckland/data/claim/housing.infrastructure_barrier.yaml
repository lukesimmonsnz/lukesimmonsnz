id: claim.auckland.housing.infrastructure_barrier
statement: >
  Development contribution levies and the cost of upgrading reticulated
  infrastructure (water, wastewater, stormwater) represent a material barrier
  to infill and medium-density development in Auckland, with per-dwelling
  infrastructure charges in some catchments exceeding the margin available to
  developers at current sale prices.
