id: claim.auckland.housing.npc_planning_recommendation_2017
statement: >
  The New Zealand Productivity Commission's 2017 Better Urban Planning
  inquiry recommended replacing the Resource Management Act's land-use
  provisions with a more permissive, goal-based urban-planning framework,
  separating environmental protection from urban development decisions,
  and broadening infrastructure funding tools (including targeted rates
  and value capture) to enable Auckland and other high-growth cities
  to fund growth-supporting infrastructure. The 2017 report has been
  widely cited as the analytical foundation for subsequent NPS-UD and
  RMA reform debates affecting Auckland.
