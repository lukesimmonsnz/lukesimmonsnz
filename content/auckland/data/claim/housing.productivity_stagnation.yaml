id: claim.auckland.housing.productivity_stagnation
statement: >
  New Zealand construction-sector labour productivity growth has been close
  to flat for decades — among the lowest in the OECD. Output per worker
  in residential construction has not improved materially since the 1990s,
  meaning that rising dwelling costs reflect real resource inputs rather than
  speculative margin, and that supply-side cost reduction requires structural
  change to the production model, not incremental reform.
