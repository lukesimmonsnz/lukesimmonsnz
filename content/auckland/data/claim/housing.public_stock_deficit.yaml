id: claim.auckland.housing.public_stock_deficit
statement: 'New Zealand''s public housing stock as a proportion of total dwellings
  declined sharply following the 1990s sell-off and has not been restored to the level
  required to house the lowest-income households unable to access the private rental
  market; Kainga Ora''s build programme has added stock but has not closed the structural
  deficit against the scale of need.

