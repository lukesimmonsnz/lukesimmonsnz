id: claim.auckland.housing.real_price_wage_divergence
statement: 'Between 1985 and 2022, Auckland dwelling prices rose roughly fivefold
  in real terms while real median wages roughly doubled. The affordability deterioration
  over this period is primarily a price phenomenon rather than a wage phenomenon:
  income growth has not stagnated but has been systematically outpaced by dwelling
  price inflation driven by land scarcity, tax advantage, and credit expansion.

  '
