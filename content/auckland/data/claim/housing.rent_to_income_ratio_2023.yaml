id: claim.auckland.housing.rent_to_income_ratio_2023
statement: >
  Auckland renter households paid approximately 33 percent of median gross
  household income in rent in 2023, placing the median renter household
  above the 30 percent affordability threshold and indicating widespread
  rental cost burden across the income distribution of renters.
value: 33
unit: "percent of median renter household income"
time_period: "2023"
confidence: medium
verification_status: cited_only
last_verified: null
source_ids:
