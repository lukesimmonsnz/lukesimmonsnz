methodology_tag: methodology.rent_to_income_v1
notes: >
  Figure is an estimate from available MBIE indicators; the exact ratio
  depends on the income denominator (renter-household income is lower than
  general median). confidence: medium because renter-specific income data
  requires combining two datasets. PI should verify against the MBIE
  affordability indicator publication directly.
