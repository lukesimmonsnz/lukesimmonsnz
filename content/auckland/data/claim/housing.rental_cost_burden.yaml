id: claim.auckland.housing.rental_cost_burden
statement: >
  A significant proportion of Auckland renter households in the lower two
  income quintiles spend more than 40 percent of gross income on rent,
  indicating severe rental cost burden concentrated among those least able
  to absorb it — households who earn too much for income-related rent
  subsidy but too little to sustain market rents without financial stress.
