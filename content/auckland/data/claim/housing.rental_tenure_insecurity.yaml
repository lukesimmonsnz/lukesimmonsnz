id: claim.auckland.housing.rental_tenure_insecurity
statement: 'New Zealand renters have historically had weaker tenure security than
  renters in comparable OECD countries: short fixed-term tenancies of 6-12 months
  were the norm, landlords could terminate periodic tenancies without cause, and tenants
  faced structural barriers to personalising or stabilising their home. The Residential
  Tenancies Amendment Act 2020 removed no-cause termination for periodic tenancies
  but did not introduce rent stabilisation, meaningful minimum tenancy lengths, or
  a right to renew fixed-term tenancies. Auckland renters — who make up a larger and
  growing share of the city''s households — retain materially weaker security of tenure
  than counterparts in Germany, the Netherlands, France, or Vienna''s regulated rental
  sector, sustaining a structural asymmetry between landlord and tenant that compounds
  affordability stress. stabilising their home. The Residential Tenancies Amendment
  Act 2020 removed no-cause termination for periodic tenancies but did not introduce
  rent stabilisation.

  '
