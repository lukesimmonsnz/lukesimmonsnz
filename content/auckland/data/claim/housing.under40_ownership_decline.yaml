id: claim.auckland.housing.under40_ownership_decline
statement: 'The homeownership rate among Auckland residents aged under 40 has fallen
  from roughly 60% in 1986 to roughly 40% in the mid-2020s — a 20 percentage point
  contraction over four decades. On a cohort view, this is the most consequential
  affordability metric: it represents a structural shift in who accumulates housing
  wealth across a lifetime, with compounding intergenerational consequences.

  '
