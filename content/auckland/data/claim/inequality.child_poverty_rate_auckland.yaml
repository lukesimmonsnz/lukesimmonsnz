id: claim.auckland.inequality.child_poverty_rate_auckland
statement: >
  Auckland has approximately 20–24% of children living in households
  below the 60% median income threshold after housing costs — among the
  highest child poverty rates of any major OECD city in an otherwise
  high-income country. Child poverty in Auckland is concentrated in
  South and West Auckland, with Māngere, Ōtara, Papakura, and Henderson
  showing material hardship rates substantially above the Auckland
  average. Pacific and Māori children are overrepresented at rates
  roughly double those of Pākehā children.
