id: claim.auckland.inequality.colonial_land_loss
statement: >
  Historical Crown land confiscations and purchasing policies in the
  Auckland region removed the majority of the Maori land base, establishing
  a structural wealth deficit that compounds across generations through
  differential property wealth accumulation.
