id: claim.auckland.inequality.colonial_land_loss
statement: Historical Crown land confiscations and purchasing policies in the Auckland
  region, concentrated between the 1840s and early twentieth century, systematically
  removed the property asset base from pre-colonial landholders. The resulting structural
  wealth deficit — through exclusion from the primary vehicle of intergenerational
  wealth accumulation — compounds across generations through differential property
  wealth trajectories.
