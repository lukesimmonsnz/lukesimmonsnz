id: claim.auckland.inequality.ethnic_pay_gap
statement: Workers concentrated in high-deprivation communities of South and West
  Auckland earn median wages approximately 20-25% below the regional average, reflecting
  occupational segregation, credential gaps, and concentration in lower-wage retail,
  hospitality, and care-sector roles.
