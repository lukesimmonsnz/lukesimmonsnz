id: claim.auckland.inequality.income_decile_gap
statement: 'The gap between the top and bottom income deciles in Auckland has widened
  over the past three decades. Households in the top income decile have seen real
  income growth substantially above those in the bottom two deciles, where real incomes
  (after housing costs) have been largely stagnant. Housing costs are the primary
  driver of widening after-housing-cost inequality: rental cost increases have absorbed
  a growing share of lower-income household budgets.

  '
