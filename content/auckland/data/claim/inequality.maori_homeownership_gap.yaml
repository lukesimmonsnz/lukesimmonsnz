id: claim.auckland.inequality.maori_homeownership_gap
statement: Homeownership in Auckland is sharply stratified by income and housing cost
  burden. Households in high-deprivation communities — areas with 50+ NZDep decile
  9-10 meshblocks in South and West Auckland — achieve homeownership at approximately
  28%, compared to 50%+ in high-income North Shore and central suburbs. This gap reflects
  occupational income segregation and generational wealth differences; Māori and Pacific
  households, concentrated in these high-deprivation rental markets, bear the consequences
  most acutely.
