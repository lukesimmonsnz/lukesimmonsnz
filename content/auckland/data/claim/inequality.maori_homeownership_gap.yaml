id: claim.auckland.inequality.maori_homeownership_gap
statement: >
  Maori homeownership in Auckland (approximately 28%) is roughly half
  the Pakeha rate (approximately 55%), a gap that has widened since the
  1980s as house price appreciation compounded the effects of the
  colonial land base deficit.
