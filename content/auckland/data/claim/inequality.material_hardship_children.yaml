id: claim.auckland.inequality.material_hardship_children
statement: >
  Approximately 12–14% of Auckland children experience material hardship —
  lacking at least six of seventeen basic necessities including adequate
  food, clothing, and ability to see a doctor when needed. Material
  hardship is more concentrated than income poverty and maps closely onto
  large family size, single-parent households, and recent arrival in
  New Zealand. It is most prevalent in Māngere, Ōtara, and Papakura.
