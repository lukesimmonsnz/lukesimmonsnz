id: claim.auckland.inequality.rural_population_decline_2048
statement: >
  Stats NZ subnational projections show population decline (under the
  medium variant) over 2023-2048 for several rural and small-population
  regions including West Coast, Gisborne, and parts of Manawatu-Whanganui
  and Southland, while metropolitan regions (Auckland, Wellington,
  Canterbury) continue to grow. The divergence widens the population
  gap between metropolitan and provincial New Zealand and concentrates
  fiscal capacity, labour markets, and amenities in the larger centres.
