id: claim.auckland.inequality.wealth_concentration
statement: >
  Wealth concentration in New Zealand — and Auckland — is substantially
  higher than income concentration. The top 10% of households own
  approximately 60% of net household wealth, with housing equity being
  the primary wealth-building vehicle for the top half and largely
  inaccessible to the bottom half. The intergenerational transfer of
  housing equity is compounding this concentration: households with
  owning parents have access to deposit assistance unavailable to those
  without.
