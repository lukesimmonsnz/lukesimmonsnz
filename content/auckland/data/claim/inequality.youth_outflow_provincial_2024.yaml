id: claim.auckland.inequality.youth_outflow_provincial_2024
statement: >
  Stats NZ inter-regional migration data show net outflow of working-
  age population (particularly 18-29) from provincial and small
  regions to Auckland and Wellington over the last decade. The flow
  removes both the demographic dividend (working-age peak earnings
  and tax) and the social infrastructure (school enrolments, sports
  clubs, community organisations) from the regions that lose the
  cohort.
