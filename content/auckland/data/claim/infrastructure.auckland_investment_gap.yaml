id: claim.auckland.infrastructure.auckland_investment_gap
statement: >
  Auckland faces a multi-billion-dollar infrastructure investment gap
  across water, wastewater, stormwater, transport, and digital networks.
  The gap reflects decades of deferred renewal, growth-driven capacity
  requirements, and a local government funding model that relies on
  property rates and development contributions — tools structurally
  insufficient to fund the scale of investment required for a rapidly
  growing city.
