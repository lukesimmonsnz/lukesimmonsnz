id: claim.auckland.infrastructure.digital_divide_income
statement: 'Broadband uptake in Auckland''s lowest-income decile households is substantially
  below the city average. Cost is the primary barrier: entry-level fibre plans require
  $60–80/month, representing 3–5% of gross income for a household on the minimum wage.
  The digital divide compounds other disadvantage: households without internet access
  face barriers to online job applications, telehealth, school homework, and government
  services that have shifted predominantly online.

  '
