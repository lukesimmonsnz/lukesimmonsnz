id: claim.auckland.infrastructure.ev_and_electrification_demand
statement: >
  Electrification of Auckland's transport fleet and household heating
  will materially increase electricity demand over the next 20 years.
  If Auckland's ~700,000 vehicles are predominantly electric by 2040,
  charging demand alone could require 1–2 GW of additional generation
  and transmission capacity serving the region — roughly 20–40% above
  current peak demand. Managing the coincident-charging risk and funding
  the grid upgrades required is a material infrastructure planning
  challenge beginning now.
