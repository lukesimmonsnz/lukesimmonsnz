id: claim.auckland.infrastructure.fibre_coverage_gap
statement: 'While fibre broadband reaches the majority of urban Auckland households,
  significant coverage gaps remain in rural and peri-urban areas (Rodney, Franklin,
  Waitākere Ranges townships), and uptake among low-income urban households is substantially
  below the population average due to cost barriers. Approximately 15–20% of Auckland
  households lack access to or cannot afford reliable high-speed broadband, creating
  a digital divide that disadvantages educational participation, remote work, and
  access to digital government services.

  '
