id: claim.auckland.infrastructure.local_govt_funding_constraint
statement: 'New Zealand local authorities are constitutionally limited to rating,
  development contributions, debt, and user charges as primary revenue tools. Auckland
  Council cannot levy income tax, GST, or other growth- linked taxes, meaning infrastructure
  investment capacity grows more slowly than the population and economic activity
  it serves. The mismatch between funding tools and investment need is structural,
  not a product of mismanagement.

  '
