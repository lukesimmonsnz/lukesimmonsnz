id: claim.auckland.infrastructure.renewal_backlog
statement: 'A significant share of Auckland''s three-waters infrastructure — water
  mains, wastewater pipes, and stormwater drains — has exceeded or is approaching
  its design life. Deferred renewal accumulates exponentially: pipe failures increase
  sharply as assets age past their replacement threshold, and emergency repair costs
  typically exceed planned renewal costs by a factor of 3–5.

  '
