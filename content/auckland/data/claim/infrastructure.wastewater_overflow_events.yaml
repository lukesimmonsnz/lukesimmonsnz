id: claim.auckland.infrastructure.wastewater_overflow_events
statement: 'Auckland''s combined wastewater and stormwater network experiences hundreds
  of overflow events annually during heavy rainfall, discharging partially treated
  or untreated wastewater to waterways and harbours. The Waitemata Harbour and Manukau
  Harbour both receive chronic stormwater and wastewater contamination that causes
  persistent beach closures and ecological damage. Overflow events are a direct consequence
  of undersized network capacity relative to current rainfall intensity and impervious
  surface coverage.

  '
