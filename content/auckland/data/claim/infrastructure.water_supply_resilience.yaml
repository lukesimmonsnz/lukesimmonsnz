id: claim.auckland.infrastructure.water_supply_resilience
statement: >
  Auckland's water supply relies primarily on the Waitākere and Hunua
  reservoir systems, which are vulnerable to drought, contamination events,
  and climate-driven changes in catchment hydrology. The 2020–21 drought
  required restrictions when storage fell to 40% of capacity, exposing
  the absence of sufficient secondary or emergency supply. The planned
  Central Interceptor project and additional storage will improve
  resilience but will not be complete until the late 2020s.
