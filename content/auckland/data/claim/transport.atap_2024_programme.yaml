id: claim.auckland.transport.atap_2024_programme
statement: >
  The Auckland Transport Alignment Project (ATAP) is the Crown-Auckland
  Council joint planning vehicle that publishes a 10-year indicative
  strategic transport programme for Auckland; the programme sequences
  Crown and Council co-funded investment across road, rail, public
  transport, walking, and cycling. ATAP is the alignment instrument that
  reconciles Auckland Council's Long Term Plan with the National Land
  Transport Programme.
