id: claim.auckland.transport.car_mode_share_2023
statement: >
  In Auckland, private vehicles account for approximately 78–82% of all
  person-trips, one of the highest car mode shares among comparable OECD
  cities. Public transport accounts for roughly 5–8% of trips, with active
  modes (walking and cycling combined) at approximately 10–15%, most of which
  is short walking trips. The car-dominant mode split reflects four decades
  of motorway-first investment and low-density car-oriented urban development.
value: 80
unit: "percent of person-trips by private vehicle"
