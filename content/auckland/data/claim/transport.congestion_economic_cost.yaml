id: claim.auckland.transport.congestion_economic_cost
statement: >
  Auckland road congestion costs the regional economy an estimated
  $1.3–2.0 billion per year in lost productivity, delayed freight, and
  vehicle operating costs. Auckland consistently ranks among the most
  congested cities in the OECD relative to its population size, with
  peak-hour travel times on key corridors running 50–80% above free-flow
  speeds during morning and evening peaks.
