id: claim.auckland.transport.congestion_economic_cost
statement: 'Auckland road congestion costs the regional economy an estimated $1.3–2.0
  billion per year in lost productivity, delayed freight, and vehicle operating costs.
  In the TomTom Traffic Index Auckland consistently appears in the top quartile of
  congested cities worldwide relative to its population of approximately 1.7 million,
  with peak-hour travel times on key corridors running 50–80% above free-flow speeds.
  This severity is unusual for a city of this size and reflects compounded car-oriented
  urban form and an incomplete rapid transit network.

  '
