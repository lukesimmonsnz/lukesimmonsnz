id: claim.auckland.transport.congestion_rank_international
statement: >
  Auckland consistently ranks among the most congested cities globally
  relative to its population size. In the TomTom Traffic Index, Auckland
  typically appears in the top quartile of congested cities worldwide,
  with peak-hour travel times on key corridors running 50–80% above
  free-flow speeds. This severity is unusual for a city of approximately
  1.7 million people and reflects the compounded effect of car-oriented
  urban form and an incomplete rapid transit network.
