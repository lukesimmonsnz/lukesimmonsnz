id: claim.auckland.transport.cycling_mode_share_low
statement: 'Cycling accounts for approximately 1–2% of Auckland person-trips — among
  the lowest cycling mode shares of any comparable OECD city with a mild climate.
  In Dutch cities of comparable topography, cycling accounts for 25–35% of trips.
  The gap is not primarily climatic or topographic: it reflects the absence of a safe,
  connected cycling network. Where protected cycleways have been built — the Lightpath,
  the Northwestern cycleway, the Beach Road corridor — usage has grown faster than
  AT projections, demonstrating latent demand.

  '
value: 2
unit: percent of person-trips by bicycle
