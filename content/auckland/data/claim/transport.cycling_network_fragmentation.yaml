id: claim.auckland.transport.cycling_network_fragmentation
statement: 'Auckland''s cycling network consists of a series of disconnected high-quality
  segments — the Northwestern cycleway, the Lightpath, Beach Road, the Waitemata Harbour
  shared path — separated by gaps on high-speed arterials where cyclists must ride
  in traffic with vehicles travelling at 50–80km/h. The absence of a connected network
  means most cycling trips require on-road segments that the majority of potential
  cyclists identify as too dangerous to attempt, confining cycling to a small self-selecting
  group of confident riders.

  '
