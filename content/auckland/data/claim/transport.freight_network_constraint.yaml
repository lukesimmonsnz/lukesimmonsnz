id: claim.auckland.transport.freight_network_constraint
statement: 'Auckland''s freight network faces compounding constraints: the Ports of
  Auckland occupy prime CBD-adjacent waterfront, creating truck-heavy freight movements
  through inner-city streets; there is no dedicated freight rail connection from the
  Port to the inland distribution network; and the Southern and Western motorway corridors
  carry a mix of commuter and freight traffic, with no grade-separated freight alternative.
  These constraints impose recurring delay costs on freight operators and contribute
  to peak-hour congestion on shared corridors.

  '
