id: claim.auckland.transport.induced_demand_evidence
statement: >
  Successive expansions of Auckland's motorway network have not reduced
  congestion to below pre-expansion levels over the medium term. The
  fundamental law of road congestion — that adding capacity generates
  new vehicle trips until the network returns to a congested equilibrium
  — is well established in international transport economics and is
  consistent with the Auckland experience, where congestion has
  progressively worsened despite significant motorway investment since
  the 1950s.
