notes: 'Sunk cost figure ($300M+) circulated in media reports and parliamentary debates;
  the precise committed/spent breakdown depends on what is counted (Crown payments
  to preferred-bidder consortium vs internal planning costs). The directional claim
  (large sunk cost, cancelled at preferred-bidder stage) is well-evidenced. Dominion
  Road was the primary surface corridor; the airport branch was a secondary spine.

