id: claim.auckland.transport.light_rail_cancellation
statement: 'The National-led government cancelled Auckland''s light rail programme
  in late 2023, terminating both the Dominion Road/City-to-Mangere corridor and the
  City-to-Airport route. The project had received over $300 million in planning, design,
  and preliminary works expenditure under the Labour government before cancellation.
  The decision reversed a decade-long process that included two separate business
  cases and a competitive procurement process reaching preferred-bidder stage. Auckland
  Transport and Waka Kotahi estimate the cancellation leaves the Northwest and southern
  isthmus corridors without a rapid transit upgrade pathway for at least a generation,
  given the capital and political cycle required to restart any equivalent project.

  '
