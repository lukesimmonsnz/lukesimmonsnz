id: claim.auckland.transport.low_density_car_dependency
statement: 'Auckland''s urban area has an average residential density well below the
  threshold typically required for frequent, high-patronage public transport — approximately
  35–40 dwellings per hectare. The majority of Auckland''s land area is zoned at densities
  that make bus headways under 15 minutes economically unviable without substantial
  subsidy, structurally embedding car dependency into trip behaviour regardless of
  service quality improvements.

  '
