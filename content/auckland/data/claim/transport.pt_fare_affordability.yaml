id: claim.auckland.transport.pt_fare_affordability
statement: 'Auckland public transport fares impose a structurally regressive burden
  on outer-suburban, lower-income households. An AT HOP return trip from Papakura
  or Manukau to the CBD costs approximately $10-14 per day (2023 fares); for a minimum-wage
  worker earning approximately $22.70/hr gross, that represents roughly 7-9% of gross
  daily earnings consumed by commuting alone before food, housing, or childcare. The
  Ministry of Transport Household Travel Survey consistently shows lower-income households
  in outer Auckland are more PT-dependent yet face the highest absolute fares. Following
  the lapse of the half-price public transport subsidy in 2023, outer-zone AT HOP
  fares reverted to pre-subsidy levels, disproportionately affecting the Papakura,
  Manukau, Henderson-Massey, and Pukekohe corridors where car ownership rates are
  lowest relative to population.

  '
