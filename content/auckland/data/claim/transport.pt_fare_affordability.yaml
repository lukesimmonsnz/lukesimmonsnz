id: claim.auckland.transport.pt_fare_affordability
statement: >
  Public transport fares in Auckland consume a higher proportion of
  low-income household budgets than in comparable cities with fully
  integrated fare systems. The introduction of AT HOP and integrated
  ticketing has improved convenience, but flat or near-flat fare
  structures mean longer trips — disproportionately made by lower-income
  households in outer suburbs — are more expensive in absolute terms,
  creating a regressivity that penalises the households most dependent
  on PT.
