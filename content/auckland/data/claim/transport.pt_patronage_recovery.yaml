id: claim.auckland.transport.pt_patronage_recovery
statement: >
  Auckland public transport patronage reached approximately 100 million
  annual boardings in 2019 before collapsing during COVID-19 lockdowns.
  By 2023 patronage had recovered to roughly 80–85% of pre-COVID levels,
  representing approximately 85–90 million annual boardings. Rail and
  Northern Busway services have recovered fastest; inner-city bus services
  more slowly. The City Rail Link, when open, is expected to at least
  double rail capacity and materially increase rail's share of total PT trips.
