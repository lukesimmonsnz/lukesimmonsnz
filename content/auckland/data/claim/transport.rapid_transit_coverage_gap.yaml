id: claim.auckland.transport.rapid_transit_coverage_gap
statement: 'Auckland''s rapid transit network — rail, the Northern Busway, and the
  Eastern Busway under construction — serves the CBD, Eastern, Southern, and Western
  rail corridors, and the North Shore via the Northern Busway. It does not yet reach
  the Northwest (Westgate/Kumeu corridor), the majority of the North Shore beyond
  Albany, or the rapidly-growing outer South. More than half of Auckland''s residential
  land area lies more than 800m from any rapid transit stop.

  '
