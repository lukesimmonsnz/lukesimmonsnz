id: claim.auckland.transport.road_pricing
statement: 'The previous Labour-led government developed a comprehensive road pricing
  scheme for Auckland through the Auckland Transport Alignment Project (ATAP), intended
  to introduce variable charges on the motorway network and major arterials calibrated
  to peak demand. The scheme — developed with AT and Waka Kotahi across 2021–2023
  — was shelved by the incoming National government in late 2023 before implementation.
  Auckland remains without any demand-responsive road pricing, meaning congestion
  is rationed entirely by time cost, with no price signal to shift trips in time or
  mode and no revenue stream from peak road use to cross-subsidise public transport
  investment.

  '
