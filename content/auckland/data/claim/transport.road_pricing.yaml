notes: 'Road pricing was a ratified element of the Auckland Transport Alignment Project
  (ATAP 2021 update) and the Auckland Council Future Development Strategy. The incoming
  National government''s cancellation was announced as part of its 100-day transport
  plan in late 2023. The economic case for road pricing in Auckland (Eddington-style)
  remains uncontested in the transport economics literature; the decision was political
  rather than analytical.

  '
