id: driver.auckland.economy.revenue_instrument_gap
name: "Revenue Instrument Gap for Infrastructure Funding"
description: >
  Auckland Council and the Crown lack instruments to capture the
  land value uplift generated by public infrastructure investment.
  This creates an investment disincentive: the full social return
  to infrastructure is not captured by the investor, so
  infrastructure is under-provided relative to its social optimum.
  Value capture instruments (betterment levies, targeted rates,
  tax increment financing) are underused in New Zealand.
theme: economy
consensus: consensus
category: regulatory
timescale: long
scope: national
problem_ids:
