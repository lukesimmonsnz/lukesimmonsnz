id: driver.auckland.education.credential_inflation
name: "Credential Inflation and Network Exclusion"
description: >
  Credential inflation (employers requiring degrees for roles that
  do not require them) closes off legitimate employment pathways for
  school leavers without tertiary qualifications; network exclusion
  (jobs filled through personal connections) disadvantages young people
  from South and West Auckland who lack the employer networks that
  ease transition for high-decile school graduates.
theme: education
consensus: contested
category: economic
timescale: long
scope: national
problem_ids:
  - problem.auckland.education.secondary_transition
claim_ids:
  - claim.auckland.education.employer_readiness_gap
