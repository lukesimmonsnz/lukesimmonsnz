id: driver.auckland.education.ece_access_gap
name: ECE Access Gap in High-Deprivation Areas
description: Cost, geographic availability, and quality gaps in ECE access in high-deprivation Auckland
  communities mean that children who would benefit most from early childhood education are least likely
  to receive it at adequate quality. Centres in South and West Auckland have lower qualified teacher ratios
  and higher staff turnover. The resulting school-entry disadvantage cannot be overcome by primary school
  interventions alone.
theme: education
consensus: consensus
category: institutional
timescale: long
scope: regional
