id: driver.auckland.health.late_diagnosis_driver
name: Late Diagnosis from Access Barriers
description: Primary care cost barriers in high-deprivation communities mean that chronic conditions are
  diagnosed later than in areas where out-of-pocket GP costs are not a deterrent. Diabetes, cardiovascular
  disease, and cancer diagnosed at advanced stages require higher-acuity treatment and generate worse
  long-run outcomes. Screening programmes do not reach high-risk populations at rates sufficient to close
  the gap.
theme: health
consensus: consensus
category: institutional
timescale: medium
scope: regional
