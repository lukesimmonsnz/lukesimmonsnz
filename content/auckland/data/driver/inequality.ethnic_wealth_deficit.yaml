id: driver.auckland.inequality.ethnic_wealth_deficit
name: Ethnic Wealth Deficit from Colonial Land Loss
description: Crown land alienation policies from the 1840s onward systematically excluded pre-colonial
  landholders from the primary asset class during the formative period of New Zealand wealth accumulation.
  The resulting property wealth gap — absence of inherited equity, lower deposit capacity, exclusion from
  compounding property appreciation — persists into the present as a structural driver of Auckland's homeownership
  inequality.
theme: inequality
consensus: consensus
category: institutional
timescale: long
scope: national
