id: evidence.auckland_deposit_gap_expansion
statement: "The 'deposit gap' — the number of years of median saving required to assemble a typical 20% deposit on a median Auckland dwelling — expanded from roughly 2–3 years in the 1990s to roughly 8–12 years at peak in the early 2020s. The entry barrier to ownership has risen more sharply than the running cost of owning."
