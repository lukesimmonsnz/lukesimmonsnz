id: evidence.native_land_court_year
statement: "The Native Land Court began operating in 1865, individualising Māori customary title into freehold. Over the subsequent century, piecemeal sale of individualised titles became the single largest mechanism of Māori land loss in the Auckland region, larger than direct confiscation."
