id: problem.auckland.climate.flood_resilience
title: "Flood Resilience and Stormwater Infrastructure"
theme: climate-adaptation
section: climate
subpage: flood-resilience
parent: problem.auckland.climate.sea_level_rise
order: 2
updated: "2026-04-26"
summary: >
  Auckland's January 2023 flooding caused over $200M in damage and
  exposed stormwater infrastructure designed to historical standards
  that intensifying precipitation is already exceeding. Full upgrade
  to future-climate design standards is estimated at $3-5 billion.
  Insurers are beginning to withdraw from highest-risk Auckland areas.
  Repetitive flood loss is concentrated in a small number of properties.
  The debate centres on infrastructure investment versus risk disclosure
  and market-led adaptation.
manifests_in:
  - auckland
systems_model:
  state_variables:
    - "flood_event_frequency"
    - "repetitive_flood_loss_property_count"
    - "climate_risk_disclosure_coverage"
    - "stormwater_investment_efficiency"
  inputs:
    - "stormwater_upgrade_capital"
    - "repetitive_flood_buyout_programme"
    - "climate_risk_lim_mandate"
    - "managed_retreat_category_allocation"
  constraints:
    - "Capital constraint: $3-5B stormwater upgrade competes with all other Council capital needs"
    - "Stranded asset risk: infrastructure investment in long-run retreat areas wastes capital"
    - "Disclosure without support: risk disclosure alone is regressive without managed retreat funding"
  feedback_loops:
    - "Repeated flooding → insurance withdrawal → value collapse → unmanaged retreat → higher social cost"
    - "Infrastructure underinvestment → flood damage → emergency repairs → less capital for systematic upgrade"
narrative:
  - heading: "The January 2023 event as a stress test"
    body: >
      The 2023 flooding was the most expensive natural disaster in
      Auckland's history. It was not a black swan; NIWA and Auckland
      Council had been modelling events of this severity for years.
      What the event revealed was not just infrastructure failure —
      it revealed that Auckland had chosen not to act on the
      projections. The stormwater system was not upgraded because the
      upgrade was expensive and the projected event was not imminent
      enough to force political attention. The event made the cost
      visible; the question now is whether that visibility is
      sustained long enough to drive the capital programme.
  - heading: "Insurance as the leading indicator"
    body: >
      When insurers withdraw from a market, they are not being
      politically or ethically irresponsible; they are pricing risk
      that public policy has not yet acknowledged. Insurance withdrawal
      in Auckland's flood zones is the leading indicator of which
      properties will eventually need managed retreat. Public policy
      that waits until after insurance withdrawal will face a more
      politically difficult situation — owners whose properties have
      already lost value demanding full replacement compensation.
      Acting before insurance withdrawal is cheaper and more just.
