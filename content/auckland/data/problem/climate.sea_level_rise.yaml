id: problem.auckland.climate.sea_level_rise
title: "Sea Level Rise and Coastal Risk"
theme: climate-adaptation
section: climate
subpage: sea-level-rise
parent: null
order: 0
updated: "2026-04-26"
summary: >
  Auckland faces projected sea level rise of 0.3-0.5m by 2070 under
  intermediate emissions scenarios; approximately 12,000 coastal
  properties face material flood risk at the 0.5m threshold. Climate
  risk falls inequitably on low-income and Maori/Pacific households
  with lower adaptive capacity. Managed retreat is technically necessary
  at scale but faces legal, financial, and political barriers. The
  core debate is between managed retreat (proactive relocation) and
  protection in place (seawalls, living shorelines).
manifests_in:
  - auckland
systems_model:
  state_variables:
    - "high_risk_coastal_property_count"
    - "coastal_risk_disclosure_coverage"
    - "coastal_flood_damage_events"
    - "critical_infrastructure_coastal_exposure"
  inputs:
    - "managed_retreat_fund_size"
    - "voluntary_buyout_programme"
    - "coastal_protection_investment"
    - "nature_based_solution_coverage"
  constraints:
    - "Crown liability: risk disclosure may trigger compensation obligations that exceed programme budget"
    - "Property rights: managed retreat without full compensation faces legal challenge"
    - "Timing: deferral increases total cost; but early disclosure suppresses values and creates hardship"
  feedback_loops:
    - "Insurance withdrawal → property value collapse → community abandonment → unmanaged retreat"
    - "Protection in place → continued development → higher exposure → larger future retreat cost"
narrative:
  - heading: "The liability trap"
    body: >
      The primary reason New Zealand has not implemented managed retreat
      at scale is Crown liability: if the government maps a property
      as high risk, it may be obligated to compensate the owner at
      full value. This creates an incentive to delay mapping, which
      delays disclosure, which allows continued development in high-risk
      areas, which increases the ultimate cost. The liability trap is
      a legal design problem, not a physical one; it requires
      legislation that defines Crown disclosure obligations and
      compensation limits.
  - heading: "Equity in the path of risk"
    body: >
      High flood risk in Auckland is concentrated in areas where
      Maori and Pacific families live in older, lower-value housing.
      These households have lower insurance coverage, fewer financial
      resources to adapt, and less political leverage to demand
      protection investment. Climate adaptation without explicit
      equity provisions will relocate the risk rather than address
      it; managed retreat programmes that offer full market value
      compensation in low-value areas may also offer lower absolute
      payments than in high-value areas, reproducing the inequality
      of the exposure itself.
