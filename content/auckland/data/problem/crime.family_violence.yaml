id: problem.auckland.crime.family_violence
title: "Family Violence"
theme: crime
section: crime
subpage: family-violence
parent: problem.auckland.crime.victimisation
order: 2
updated: "2026-04-26"
summary: >
  Auckland police receive approximately 150,000 family harm calls per
  year — roughly 40% of all police calls. Family violence is strongly
  correlated with housing stress and overcrowding. The intergenerational
  transmission cycle means that children exposed to violence have elevated
  risk of perpetrating or experiencing it as adults. System response is
  fragmented across police, social services, and housing agencies, with
  poor handoffs that leave victims in danger between contacts.
manifests_in:
  - auckland
systems_model:
  state_variables:
    - "fv_repeat_call_rate"
    - "victim_safe_exit_rate"
    - "protection_order_breach_rate"
    - "intergenerational_transmission_rate"
  inputs:
    - "co_responder_unit_coverage"
    - "refuge_capacity"
    - "perpetrator_programme_capacity"
    - "electronic_monitoring_coverage"
  constraints:
    - "Housing dependency: victim cannot leave without safe housing alternative"
    - "Programme waitlists: perpetrator programme capacity insufficient for mandated referrals"
    - "Agency fragmentation: police, MSD, housing, and child protection operate separate systems"
  feedback_loops:
    - "Repeat incidents at same address → escalating severity → eventual homicide or serious injury"
    - "Children exposed → intergenerational transmission → next generation of perpetrators and victims"
narrative:
  - heading: "Scale and concentration"
    body: >
      One in three police calls in Auckland is a family harm event.
      This is not a niche social problem — it is the single largest
      category of police demand in New Zealand's largest city. The
      concentration in South and West Auckland reflects both the
      housing stress-violence link and the resource gap: suburbs with
      the highest call rates have the fewest support services per capita.
  - heading: "The housing trap"
    body: >
      Victims who want to leave cannot, because there is nowhere to go.
      Auckland's emergency refuge capacity is chronically below demand;
      transitional housing waitlists stretch months. The result is that
      safety planning by social workers is undermined by physical
      housing reality: victims return because return is the only viable
      short-run option.
claim_ids:
  - claim.auckland.crime.fv_police_call_rate
  - claim.auckland.crime.fv_intergenerational_cycle
  - claim.auckland.crime.fv_housing_stress_link
