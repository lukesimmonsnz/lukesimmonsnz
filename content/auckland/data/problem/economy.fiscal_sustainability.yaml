id: problem.auckland.economy.fiscal_sustainability
title: "Fiscal Sustainability and Infrastructure Funding"
theme: economy
section: economy
subpage: fiscal-sustainability
parent: problem.auckland.economy.productivity
order: 3
updated: "2026-04-26"
summary: >
  Auckland faces a structural gap between infrastructure obligations
  and revenue instruments. Crown net debt has grown from 20% to 35-40%
  of GDP post-COVID. Auckland Council's capital programme exceeds its
  rating capacity. The existing funding model does not capture land
  value uplift from public infrastructure investment. The debate is
  between value capture reform and fiscal consolidation as the primary
  response.
manifests_in:
  - auckland
systems_model:
  state_variables:
    - "council_infrastructure_fiscal_gap"
    - "infrastructure_value_capture_rate"
    - "council_debt_to_revenue_ratio"
    - "deferred_infrastructure_backlog"
  inputs:
    - "betterment_levy_coverage"
    - "tif_district_establishment"
    - "discretionary_spending_review"
    - "debt_ceiling_level"
  constraints:
    - "Political economy: property owners resist betterment levies that capture their windfall gains"
    - "TIF risk: tax increment financing requires development materialisation to service debt"
    - "Deferral cost: deferred infrastructure compounds; long-run cost of deferral exceeds front-loaded investment"
  feedback_loops:
    - "Infrastructure gap → capacity constraint → lower productivity → lower rates base → wider fiscal gap"
    - "Debt growth → interest cost → less capital for infrastructure → deferred maintenance → higher future cost"
narrative:
  - heading: "The funding model failure"
    body: >
      Auckland builds a $4 billion light rail line; the land within
      800m of the new stations increases in value by billions of dollars.
      The infrastructure investor (ratepayers and taxpayers) receives
      none of that appreciation; the landowners — who did nothing —
      receive it all. This is not a market failure in the conventional
      sense; it is a policy failure, the absence of a value capture
      instrument that every major city in Europe and North America uses
      as standard. Without it, Auckland will perpetually under-invest
      in the public infrastructure that generates the value it cannot
      capture.
  - heading: "The consolidation versus investment tension"
    body: >
      Fiscal consolidation advocates are not wrong that Auckland Council
      has a debt problem. They are wrong that the answer is deferral
      rather than revenue reform. Deferred infrastructure is not a
      saving; it is a transfer of cost to future ratepayers who will
      pay more for the same infrastructure plus the compounding
      maintenance deficit. The fiscally responsible path is new
      instruments — betterment levies, TIF, land value tax — not
      deferred investment.
