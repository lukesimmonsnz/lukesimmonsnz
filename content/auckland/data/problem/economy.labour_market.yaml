id: problem.auckland.economy.labour_market
title: "Labour Market Inequality and Precarious Work"
theme: economy
section: economy
subpage: labour-market
parent: problem.auckland.economy.productivity
order: 1
updated: "2026-04-26"
summary: >
  Real wage growth in Auckland has lagged productivity growth for two
  decades. Underemployment runs at 8-10% of the labour force, concentrated
  in South and West Auckland. Gig and platform economy growth has created
  a precarious tier of workers without sick leave, guaranteed hours, or
  ACC coverage. The debate centres on whether extending employment
  protections to all workers or maintaining labour market flexibility
  is the higher-return intervention.
manifests_in:
  - auckland
systems_model:
  state_variables:
    - "precarious_worker_coverage_rate"
    - "real_minimum_wage_median_ratio"
    - "small_business_employment_cost_index"
    - "underemployment_rate"
  inputs:
    - "minimum_hours_guarantee_threshold"
    - "minimum_wage_indexation_method"
    - "gig_worker_acc_coverage"
    - "employer_conversion_incentives"
  constraints:
    - "Employment effect: labour protection mandates may reduce total employment at margin; evidence is mixed"
    - "Platform power: large gig platforms have monopsonistic wage-setting power that flexibility arguments do not address"
    - "Social insurance gap: welfare system partly compensates for precarious income volatility but not completely"
  feedback_loops:
    - "Precarious income → consumption volatility → weaker domestic demand → lower employment stability"
    - "Wage growth below productivity → rising profit share → reduced worker spending → growth dependent on credit"
narrative:
  - heading: "The two-tier market"
    body: >
      Auckland's labour market is functionally two markets: a primary
      market of permanent employment with full protections and a secondary
      market of casual, gig, and variable-hours employment without social
      insurance. The secondary market is not confined to teenagers and
      students — it includes adult heads of household in South and West
      Auckland working multiple casual jobs to cover rent. The income
      volatility of the secondary market is absorbed partly by families,
      partly by community, and partly by the welfare system; the platform
      companies that profit from it bear none of the risk.
  - heading: "Wage growth as a distributional choice"
    body: >
      Wages growing below productivity is not a market outcome; it is a
      consequence of the balance of power between workers and employers
      in wage-setting. Low union density, no sectoral bargaining, and
      a minimum wage set by annual political decision rather than automatic
      formula have produced a structural bias. The fact that profit share
      has risen while labour share has fallen is a measurement of this
      bias, not a natural law.
