id: problem.auckland.environment.biodiversity
title: "Native biodiversity loss and ecological fragmentation"
theme: environment
section: environment
subpage: biodiversity
parent: problem.auckland.environment.ecological_health
order: 2
updated: "2026-04-26"
summary: >
  Auckland has lost more than 40 native bird species from its mainland
  since 1840, primarily due to introduced predators and habitat loss.
  Remaining native bush is highly fragmented between the Waitākere and
  Hunua Ranges and scattered urban remnants, with limited ecological
  connectivity between patches. Kauri dieback disease threatens the
  Waitākere Ranges' dominant canopy species. Predator-free sanctuaries
  demonstrate that recovery is achievable — the challenge is extending
  that recovery across a landscape that cannot be physically fenced.
manifests_in:
  - auckland
systems_model:
  state_variables:
    - "native_species_population_index"
    - "predator_density"
    - "native_regeneration_rate"
    - "waitakere_kauri_forest_area"
  inputs:
    - "predator_control_effort"
    - "habitat_connectivity"
    - "invasive_weed_coverage"
    - "kauri_dieback_spread_rate"
  constraints:
    - "Mainland predator eradication not currently feasible without physical barriers or biocontrol technology"
    - "Fragmented habitat prevents species recovery from spreading beyond managed sites"
    - "Kauri dieback has no effective treatment; management is prevention of spread only"
  feedback_loops:
    - "Predator removal → native bird recovery → seed dispersal → native vegetation regeneration → more habitat"
    - "Habitat fragmentation → small population size → genetic inbreeding → reduced viability → local extinction"
narrative:
  - heading: "What was lost"
    body: >
      The pre-human Auckland region was home to a diverse avifauna
      including huia, laughing owl, giant eagle, and dozens of other
      species now gone from the mainland. More than 40 species that
      were present when Māori first arrived — and present still in
      1840 — are now locally extinct or functionally absent. The pace
      of loss has slowed with predator control efforts, but populations
      of many surviving species remain at risk in the absence of
      sustained management.
  - heading: "Kauri dieback: an existential threat"
    body: >
      Phytophthora agathidicida, the pathogen causing kauri dieback,
      spreads through soil movement and has no effective treatment.
      Once established in a kauri root zone, the disease is fatal.
      The Waitākere Ranges hold some of Auckland's most significant
      remaining kauri forests, and containment depends entirely on
      preventing infected soil from reaching uninfected areas.
      Track closures are the primary management tool — a significant
      constraint on public access to a beloved landscape.
