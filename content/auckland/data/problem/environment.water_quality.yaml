id: problem.auckland.environment.water_quality
title: "Freshwater and coastal water quality"
theme: environment
section: environment
subpage: water-quality
parent: problem.auckland.environment.ecological_health
order: 1
updated: "2026-04-26"
summary: >
  Auckland's freshwater and coastal water quality is predominantly poor
  in urban areas and impaired in many rural catchments. Urban streams
  receive stormwater laden with hydrocarbons, heavy metals, and faecal
  bacteria from Auckland's extensive impervious surfaces. Both the
  Waitematā and Manukau Harbours experience chronic contamination from
  stormwater and wastewater overflows, causing regular beach closures
  and shellfish harvest prohibitions. Rural and peri-urban catchments
  face diffuse nutrient loading from pastoral farming.
manifests_in:
  - auckland
systems_model:
  state_variables:
    - "urban_stream_quality_index"
    - "harbour_water_quality_index"
    - "rural_stream_nutrient_index"
  inputs:
    - "impervious_surface_area"
    - "stormwater_treatment_coverage"
    - "wastewater_overflow_frequency"
    - "riparian_margin_quality"
  constraints:
    - "Existing urban stormwater infrastructure largely untreated at source"
    - "Rural catchment land use changes take years to register in receiving environments"
  feedback_loops:
    - "Urban development → impervious surface increase → stormwater volume and contaminant load increase → harbour contamination"
narrative:
  - heading: "Urban streams and harbours"
    body: >
      Fewer than 20% of Auckland's monitored urban stream sites regularly
      achieve good water quality. The primary stressors are urban stormwater
      carrying hydrocarbons, zinc, copper, and faecal bacteria from roads
      and lawns. This contamination flows to the Waitematā and Manukau
      Harbours, causing regular beach closures after rainfall and permanent
      shellfish harvest prohibitions across most harbour areas.
  - heading: "Rural water quality"
    body: >
      Auckland's rural catchments in Rodney and Franklin face diffuse
      nutrient loading from pastoral farming. Elevated nitrate and
      phosphorus levels degrade macroinvertebrate communities and
      contribute to algal blooms. Stock exclusion from waterways and
      riparian planting are the primary management tools available.
