    - "Political contestation → implementation instability → relationship breakdown → less effective partnership"
narrative:
  - heading: "The urban Maori gap"
    body: >
      The Treaty co-governance debate focuses primarily on mana whenua
      iwi and their relationship with the Crown over land and natural
      resources. This is important, but it does not address the
      governance needs of the majority of Auckland's Maori population —
      urban Maori who are not primarily connected to their rohe and
      whose relationship with governance is through general democratic
      channels that systematically under-represent them. Any serious
      Treaty partnership framework for Auckland must address both
      dimensions.
  - heading: "The constitutional tension"
    body: >
      The debate between Treaty partnership and equal citizenship is
      not resolvable through evidence; it is a values dispute about
      the constitutional foundations of New Zealand governance.
      New Zealand has not chosen to resolve it legislatively; the
      result is ongoing political conflict that consumes governance
      bandwidth without producing clarity. Both camps present genuine
      arguments; neither can be dismissed as simply wrong.
