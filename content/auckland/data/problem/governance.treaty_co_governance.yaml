id: problem.auckland.governance.treaty_co_governance
title: "Treaty Co-Governance and Maori Participation"
theme: governance
section: governance
subpage: treaty-co-governance
parent: problem.auckland.governance.democratic_participation
order: 2
updated: "2026-04-26"
summary: >
  Treaty co-governance arrangements have expanded but remain politically
  contested. Auckland's mana whenua have statutory roles that have not
  consistently translated into substantive influence. 70% of New Zealand
  Maori are urban; urban Maori governance bodies lack the formal status
  of mana whenua iwi. The core debate is whether Treaty obligations
  require structural co-governance or can be fulfilled through equal
  citizenship frameworks and economic settlements.
manifests_in:
  - auckland
