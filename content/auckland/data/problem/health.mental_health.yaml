id: problem.auckland.health.mental_health
title: "Mental Health Access and Capacity"
theme: health
section: health
subpage: mental-health
parent: problem.auckland.health.system_access
order: 1
updated: "2026-04-26"
summary: >
  Approximately 80% of Aucklanders seeking mental health referral for
  moderate conditions are declined or waitlisted. Youth (15-24) mental
  health ED presentations have increased 50% since 2018; CAMHS waitlists
  exceed 12 months. The mental health workforce vacancy rate exceeds 20%
  for clinical psychology and psychiatry. The debate is whether community
  stepped-care expansion or acute inpatient infrastructure investment
  is the priority.
manifests_in:
  - auckland
systems_model:
  state_variables:
    - "mh_unmet_moderate_need_rate"
    - "youth_mh_acute_waitlist"
    - "maori_pacific_mh_access_rate"
    - "psychiatric_boarding_rate"
  inputs:
    - "community_mental_health_team_count"
    - "inpatient_bed_count"
    - "primary_care_psychology_sessions"
    - "workforce_vacancy_rate"
  constraints:
    - "Training pipeline: psychology and psychiatry training takes 7+ years; no short-run workforce fix"
    - "Capital constraint: inpatient facilities require multi-year capital projects"
    - "Rationing: acute threshold rationing excludes moderate need and worsens long-run outcomes"
  feedback_loops:
    - "Unmet moderate need → crisis → acute presentation → inpatient admission → premature discharge → re-presentation"
    - "Youth social isolation → anxiety/depression → school disengagement → youth justice contact"
narrative:
  - heading: "The rationing trap"
    body: >
      New Zealand's mental health system is rationed to severe and
      enduring illness by resource constraint; moderate-need presentations
      are declined or placed on waitlists that exceed the window of
      effective early intervention. The consequence is that mild
      presentations that could be resolved in six community sessions
      escalate to acute crises requiring inpatient admission at ten
      times the cost. The system is spending on the wrong end of the
      treatment cascade.
  - heading: "Youth as the acute pressure point"
    body: >
      The 50% rise in youth ED mental health presentations since 2018
      is concentrated in self-harm and suicidal ideation. CAMHS is not
      resourced to see these young people within a clinically meaningful
      timeframe; families wait 12 months on a waitlist for a 15-year-old
      in acute distress. This is not a borderline resource allocation
      problem — it is a clinical safety issue.
claim_ids:
