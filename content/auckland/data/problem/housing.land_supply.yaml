id: problem.auckland.housing.land_supply
title: "Land supply and infrastructure constraints on Auckland housing"
theme: housing
section: housing
subpage: land-supply
parent: problem.auckland.housing.affordability
order: 2
updated: "2026-04-26"
summary: >
  Despite significant upzoning under the Auckland Unitary Plan (2016) and
  the NPS-UD (2021), the conversion of zoned capacity into completed dwellings
  remains constrained by infrastructure funding gaps, development contribution
  costs, and residual character and heritage protections. The theoretical
  zoned capacity far exceeds 30-year demand, but the feasible supply pipeline
  does not. The active debate is between intensification-led and greenfield-
  expansion-led models for closing the delivery gap.
manifests_in:
  - auckland
systems_model:
  state_variables:
    - "zoned_residential_land_area"
    - "feasible_development_sites"
    - "consent_pipeline"
  inputs:
    - "planning_rule_changes"
    - "infrastructure_capacity_extension"
    - "developer_appetite"
  constraints:
    - "development_contribution_costs"
    - "heritage_and_character_protections"
    - "infrastructure_staging"
  feedback_loops:
    - >
      Upzoning-to-feasibility: increased zoning density raises land values,
      which can offset the cost advantage of intensification by increasing
      land acquisition costs for developers.
    - >
      Infrastructure-consent lag: new reticulated infrastructure must be
      consented and built before most intensification sites become feasible,
      creating a multi-year lag between zoning and completion.
narrative:
  - heading: "Zoned capacity versus delivered supply"
    body: >
      The NPS-UD upzoning created theoretical capacity for approximately
      900,000 additional dwellings in Auckland — roughly three times the
      city's projected 30-year demand (claim.auckland.housing.nps_ud_capacity_yield).
      The gap between theoretical capacity and the delivery pipeline is the
      operative problem: planning permission does not translate automatically
      into buildable sites. Infrastructure readiness, development economics,
      and residual planning protections all act as filters between zoned
      capacity and consented, constructed dwellings.
  - heading: "The infrastructure funding barrier"
    body: >
      Development contribution levies and the cost of upgrading ageing
      reticulated networks represent the primary non-planning barrier to
      intensification in Auckland's inner suburbs
      (claim.auckland.housing.infrastructure_barrier). Auckland Council's
      capital programme is insufficient to fund the network upgrades required
      by the consent volumes now being sought, creating a queue effect and
      pricing marginal infill sites out of feasibility.
  - heading: "Intensification versus expansion: the urban form debate"
    body: >
      Auckland Council's Future Development Strategy projects approximately
      two-thirds of the city's 30-year growth will occur through infill
      intensification and one-third through greenfield expansion
      (claim.auckland.housing.infill_greenfield_split). The compact-
      intensification camp argues this split is economically and
      environmentally rational; the urban-expansion camp contests that the
      infrastructure cost and delivery pace of inner-city intensification
      makes greenfield release necessary to hit the required volumes.
claim_ids:
  - claim.auckland.housing.nps_ud_capacity_yield
