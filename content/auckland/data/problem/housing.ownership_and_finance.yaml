id: problem.auckland.housing.ownership_and_finance
title: "Ownership access and financial barriers"
theme: housing
section: housing
subpage: ownership-and-finance
parent: problem.auckland.housing.affordability
order: 6
updated: "2026-04-26"
summary: >
  The pathway from renting to ownership has become structurally inaccessible
  for median-income Auckland households without parental equity transfer.
  The deposit gap has expanded from 2–3 years of saving in the 1990s to
  8–12 years at peak, while the under-40 homeownership rate has fallen from
  ~60% to ~40% over four decades. The tax-advantaged treatment of housing
  as an asset class directs savings toward property rather than productive
  investment and capitalises speculative value into land prices. Credit-cycle
  dynamics mean prices can surge or fall 20–30% independent of supply or
  income fundamentals, making ownership timing a matter of luck for
  first-home buyers.
manifests_in:
  - auckland
systems_model:
  state_variables:
    - "housing_price_to_income_ratio"
    - "first_home_access_rate"
    - "renter_net_housing_cost"
    - "social_housing_affordability_gap"
  inputs:
    - "ocr_and_lending_rates"
    - "tax_treatment_of_housing_gains"
    - "deposit_assistance_availability"
    - "wage_growth_rate"
    - "investor_demand"
  constraints:
    - "No capital gains tax on owner-occupied dwellings — housing gains are tax-free"
    - "Deposit requirement (20% LVR) requires 8–12 years of saving at median income"
    - "Credit-cycle amplification: OCR movements translate to 20–30% price swings faster than supply can respond"
    - "Accommodation Supplement rates frozen below current market rents"
  feedback_loops:
    - "Rising housing_price_to_income_ratio → widening deposit gap → reduced first_home_access_rate → rising renter demand → sustained price pressure"
    - "Tax-free capital gains → investor demand directed to housing → price uplift → further tax-free gains (self-reinforcing)"
    - "Falling first_home_access_rate → intergenerational wealth concentration → parental equity transfer required → disadvantages households from non-owning families (compounding)"
narrative:
  - heading: "The deposit gap as a structural barrier"
    body: >
      The defining metric of ownership inaccessibility is the deposit gap:
      the number of years of median household saving required to assemble
      a 20% deposit on a median Auckland dwelling. In the 1990s this was
      2–3 years — a realistic savings project within a single working decade.
      By the early 2020s it had expanded to 8–12 years. For a household
      starting to save at age 25, this means first-home purchase in their
      mid-to-late 30s at best, and only if prices do not continue to rise
      faster than saving accumulates. Households without parental equity
      transfer — the "bank of mum and dad" — face a structurally different
      entry barrier than those with it, producing a compounding
      intergenerational inequality in wealth accumulation.
  - heading: "Tax advantage and price capitalisation"
    body: >
      The tax-free treatment of capital gains on owner-occupied property,
      the effective exemption of imputed rent from income tax, and the
      historical deductibility of rental-property expenses together make
      residential property the most tax-advantaged asset class available
      to New Zealand households. This advantage capitalises into prices:
      investors and owner-occupiers rationally pay more for a dwelling
      than its rental income yield would justify, because the after-tax
      return on housing exceeds competing assets. Between 1985 and 2022,
      Auckland dwelling prices rose roughly fivefold in real terms while
      real wages roughly doubled — the gap is not explainable by supply
      alone.
  - heading: "Credit cycles and price volatility"
    body: >
      Auckland house prices are more sensitive to short-run credit
      conditions than to supply fundamentals. The 2021 surge and 2022–23
      correction tracked the RBNZ OCR cycle, not changes in dwelling
      stock. This credit-cycle dominance means that even well-designed
      supply reforms operate on a 5–10 year lag while prices can move
      20–30% in 12–24 months — creating ownership timing risk that
      falls disproportionately on first-home buyers with less equity
      buffer.
