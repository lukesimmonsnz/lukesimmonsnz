id: problem.auckland.housing.social_housing
title: "Public and social housing deficit in Tāmaki Makaurau Auckland"
theme: housing
section: housing
subpage: social-housing
parent: problem.auckland.housing.affordability
order: 3
updated: "2026-04-26"
summary: >
  A structural deficit in public housing stock relative to need, combined
  with rents that are unaffordable for the lowest-income households, has
  produced a chronic public housing waitlist and a large-scale emergency
  housing programme that substitutes expensive motel accommodation for
  permanent tenancies. The debate is between scaling up direct Crown
  delivery through Kāinga Ora and diversifying provision through community
  housing providers and iwi housing entities.
manifests_in:
  - auckland
systems_model:
  state_variables:
    - "public_housing_stock"
    - "housing_register_size"
    - "emergency_housing_placements"
  inputs:
    - "crown_capital_programme"
    - "community_housing_provider_capacity"
    - "income_related_rent_subsidy_budget"
  constraints:
    - "crown_capital_programme_cap"
    - "construction_sector_capacity"
    - "land_availability_for_public_housing"
  feedback_loops:
    - >
      Waitlist-to-emergency: households unable to secure a public tenancy
      flow into emergency housing, increasing fiscal pressure and creating
      chronic instability that deepens housing need over time.
    - >
      Stock-sell-off legacy: the 1990s privatisation of state housing stock
      removed units from the public portfolio permanently; restoring stock
      requires new-build capital rather than retrieval of existing assets,
      making the deficit expensive to close.
narrative:
  - heading: "Scale of the waitlist"
    body: >
      Approximately 24,000 households were on the national public housing
      register as of June 2023, with Auckland carrying the largest regional
      share (claim.auckland.housing.waitlist_size_2023). The register
      predominantly comprises households in priority need — those experiencing
      homelessness, severe overcrowding, or family violence — for whom the
      private market is either inaccessible or unsafe.
  - heading: "The emergency housing pressure valve"
    body: >
      In the absence of sufficient public tenancies, households in acute
      need are placed in emergency housing — predominantly motel accommodation
      funded by MSD special needs grants. The Crown spent over NZD 300 million
      annually at peak on this substitute (claim.auckland.housing.emergency_housing_cost),
      a high-cost, low-stability outcome that does not resolve underlying
      housing need and generates significant harm for children and families
      in long-term motel placements.
  - heading: "Structural stock deficit and the delivery debate"
    body: >
      New Zealand's public housing stock as a share of total dwellings has
      not recovered to the level needed since the 1990s sell-off
      (claim.auckland.housing.public_stock_deficit). Kāinga Ora's build
      programme has added stock but has not closed the gap. The active debate
      is between direct Crown expansion of Kāinga Ora's programme and
      diversification to community housing providers and iwi housing entities,
      each of which has distinct financing, cultural, and accountability
      trade-offs.
