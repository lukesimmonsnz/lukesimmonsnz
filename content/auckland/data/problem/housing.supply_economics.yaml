narrative:
  - heading: "The productivity floor"
    body: >
      Dwelling construction in New Zealand has not meaningfully improved in
      labour productivity since the 1990s — an outcome the NZ Productivity
      Commission identified in 2012 and that remains largely unremedied.
      Post-COVID, construction costs rose approximately 30–40% on the Capital
      Goods Price Index, compressing developer margins and rendering marginal
      projects unviable even at elevated market prices. Rising nominal costs
      are a real resource problem, not a speculative artefact: they reflect
      the cost of labour, materials, and consenting delay that site-based
      craft construction cannot reduce without structural change to the
      production model.
  - heading: "Cyclicality and hysteresis"
    body: >
      Auckland's consent volumes swung from roughly 10,000 to 20,000 per year
      across the 2015–2024 decade, tracking credit conditions and buyer
      confidence more closely than underlying demand. Each contractionary
      phase destroys firms and workforce skills that are slow to rebuild —
      hysteresis means that supply capacity in each recovery starts below
      the previous peak. The pre-sales finance model amplifies this: because
      50–70% of units must be pre-sold before banks will fund construction,
      supply is structurally unable to maintain output through a confidence
      trough, regardless of whether underlying affordability metrics indicate
      that new supply is needed.
  - heading: "Infrastructure as a binding gate"
    body: >
      Even consented, zoned, and financially viable projects cannot proceed
      where trunk infrastructure — water, wastewater, stormwater, transport
      — lacks headroom. Auckland Council's infrastructure funding gap, driven
      by the mismatch between growth-related capital requirements and the
      revenue tools available to a local authority, means that infrastructure
      investment has lagged the pace required to unlock the supply potential
      of the NPS-UD upzoning. Trunk capacity is a necessary condition for
      the consent-and-build pipeline to function.
