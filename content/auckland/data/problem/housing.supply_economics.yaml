id: problem.auckland.housing.supply_economics
title: "Supply economics — construction costs and delivery capacity"
theme: housing
section: housing
subpage: supply-economics
parent: problem.auckland.housing.affordability
order: 5
updated: "2026-04-26"
summary: >
  Even where land is available and zoning permits, dwellings are expensive
  to build and slow to deliver in Auckland. Construction-sector labour
  productivity has been flat for decades, post-COVID cost inflation eroded
  developer margins, and the pre-sales finance model means supply contracts
  precisely when affordability pressure is highest. A fragmented builder
  ecosystem of mostly small firms amplifies cyclical workforce losses and
  prevents the scale economies that could change the cost structure.
  Infrastructure capacity acts as an additional gate: trunk water,
  wastewater, and transport networks constrain where and how fast consented
  land can be built out.
manifests_in:
