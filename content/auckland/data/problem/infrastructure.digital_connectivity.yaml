id: problem.auckland.infrastructure.digital_connectivity
title: "Digital connectivity and inclusion"
theme: infrastructure
section: infrastructure
subpage: digital-connectivity
parent: problem.auckland.infrastructure.access
order: 2
updated: "2026-04-26"
summary: >
  While urban Auckland has high fibre coverage, approximately 15–20% of
  households lack reliable high-speed internet access due to cost barriers
  in urban areas and physical coverage gaps in rural and peri-urban areas.
  The digital divide compounds educational, employment, and health
  disadvantage: households without broadband face growing barriers to
  services that have shifted online. Cost — not infrastructure — is
  the primary barrier in most of Auckland; rural coverage gaps are the
  secondary problem, concentrated in Rodney, Franklin, and Waitākere
  Ranges townships.
manifests_in:
  - auckland
systems_model:
  state_variables:
    - "digital_access_rate"
    - "fibre_coverage_rate"
    - "broadband_affordability_index"
  inputs:
    - "retail_broadband_pricing"
    - "household_income_distribution"
    - "crown_subsidy_programmes"
    - "commercial_build_out_decisions"
  constraints:
    - "Commercial viability: rural fibre build-out is uneconomic without subsidy"
    - "Affordability: $60–80/month entry-level plans represent 3–5% of minimum wage income"
    - "No social tariff: no subsidised plan for income-support households"
  feedback_loops:
    - "Digital exclusion → reduced employment and education outcomes → lower household income → continued cost barrier to digital access"
narrative:
  - heading: "Two different problems"
    body: >
      Auckland's digital divide has two distinct components that require
      different interventions. In urban areas, fibre reaches the majority
      of premises but uptake among low-income households is substantially
      below average — the problem is cost, not coverage. In rural and
      peri-urban areas, fibre simply does not reach many properties —
      the problem is infrastructure. Conflating these two problems leads
      to policy mismatches: building rural fibre does not help South
      Auckland families who cannot afford a monthly plan, and social
      tariff subsidies do not help Helensville households where no
      fibre passes.
  - heading: "Digital access as essential infrastructure"
    body: >
      Broadband has shifted from a discretionary service to essential
      infrastructure over the past decade. Government services are
      predominantly online; job applications, benefit management,
      health appointments, and school homework all require reliable
      internet access. Households without it face a growing participation
      penalty that compounds other disadvantage. The cost of closing
      the digital divide is modest relative to its social return.
