id: problem.auckland.infrastructure.energy_resilience
title: "Energy infrastructure resilience and electrification"
theme: infrastructure
section: infrastructure
subpage: energy-resilience
parent: problem.auckland.infrastructure.access
order: 3
updated: "2026-04-26"
summary: >
  Auckland's electricity supply is transmission-dependent, relying on
  long lines from Waikato and Northland to serve a city that generates
  relatively little power locally. The 1998 CBD blackout demonstrated
  the consequences of transmission failure; resilience has improved but
  N-1 and N-2 risk remains. Simultaneously, electrification of transport
  and heating will add 1–2 GW of new demand by 2040, requiring proactive
  grid investment and demand management to avoid supply security risks.
  The window to invest ahead of demand is now.
manifests_in:
  - auckland
systems_model:
  state_variables:
    - "grid_resilience_hours"
    - "local_generation_share"
    - "peak_electricity_demand"
  inputs:
    - "ev_fleet_size"
    - "renewable_generation_investment"
    - "transmission_reinforcement"
    - "smart_charging_deployment"
  constraints:
    - "Transmission dependency: most Auckland electricity sourced from outside the region"
    - "Aging CBD cable infrastructure with limited N-1 redundancy on some feeders"
    - "Electrification demand growth will outpace current grid capacity without investment"
  feedback_loops:
    - "EV adoption → peak charging demand → grid stress → outage risk → investment need"
    - "Distributed generation → reduced transmission dependency → lower outage risk (resilience dividend)"
narrative:
  - heading: "Transmission dependency"
    body: >
      Auckland is an electricity consumer, not a generator. Its power
      comes via long transmission lines from Waikato geothermal and
      hydro, and Northland gas peakers. The 1998 Auckland CBD power
      crisis — when four underground cables failed within weeks of each
      other, leaving the city centre without power for five weeks —
      remains the reference event for what transmission failure looks
      like for a major city. Infrastructure investment since 1998 has
      improved resilience, but N-1 and N-2 scenarios on the main
      transmission corridors still pose significant risk to Auckland's
      electricity supply.
  - heading: "The electrification challenge"
    body: >
      Decarbonising transport and heating is both a policy objective
      and an accelerating market trend. If Auckland's vehicle fleet is
      predominantly electric by 2040, charging demand alone could
      require 1–2 GW of additional capacity serving the region.
      This is a known planning challenge with a known lead time: grid
      investment decisions made now determine the resilience and cost
      of the electricity system in 2035–2040. Acting ahead of demand
      is substantially cheaper than reacting to it.
