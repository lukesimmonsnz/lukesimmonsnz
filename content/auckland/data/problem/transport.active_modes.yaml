id: problem.auckland.transport.active_modes
title: "Active mode infrastructure and cycling adoption"
theme: transport
section: transport
subpage: active-modes
parent: problem.auckland.transport.accessibility
order: 3
updated: "2026-04-26"
summary: >
  Cycling accounts for roughly 1–2% of Auckland person-trips — among the
  lowest shares of any comparable OECD city with a mild climate. The
  primary barrier is not distance, weather, or topography: it is the
  absence of a safe, connected network. Auckland has high-quality cycling
  infrastructure in isolated segments separated by gaps on arterial roads
  where cyclists must share lanes with vehicles travelling at 50–80km/h.
  Where protected infrastructure has been built, usage has exceeded
  projections. The "interested but concerned" majority — approximately
  60–70% of non-cyclists who would cycle if roads felt safe — represents
  the accessible latent demand that connected infrastructure would release.
manifests_in:
  - auckland
systems_model:
  state_variables:
    - "cycling_mode_share"
    - "cycling_network_km"
    - "active_mode_safety_perception"
    - "child_active_travel_rate"
  inputs:
    - "protected_cycleway_connectivity"
    - "arterial_speed_and_volume"
    - "school_streets_coverage"
    - "cycling_investment_per_capita"
  constraints:
    - "Network connectivity: gaps between protected segments force on-road cycling on dangerous arterials"
    - "Road design standard: arterial lanes at 50–80km/h without physical separation"
    - "Investment level: cycling capital spend per capita well below cities achieving 10%+ mode share"
    - "Political friction: parking and lane removal required for protected infrastructure generates organised opposition"
  feedback_loops:
    - "Low cycling_mode_share → few cyclists visible → cycling perceived as dangerous → lower cycling_mode_share (invisibility trap)"
    - "Connected protected network → more cyclists → normalisation → more cyclists (safety in numbers)"
    - "School streets → children cycle → parents observe safety → adult cycling increases in same neighbourhoods"
narrative:
  - heading: "The connectivity problem"
    body: >
      A cycling network where 80% of routes are excellent but 20% require
      riding in 50km/h traffic is functionally unusable for most potential
      cyclists. Network connectivity is a multiplicative property: each gap
      degrades the utility of every connected segment by making it impossible
      to complete a trip without an on-road section. Auckland's cycling
      infrastructure — the Northwestern cycleway, the Lightpath, Beach Road,
      the Waitemata Harbour shared path — is high-quality within each
      segment but not connected into a system. The result is infrastructure
      used by confident cyclists who would cycle anyway, not by the
      "interested but concerned" majority who would cycle if they felt safe.
  - heading: "Where infrastructure has been built, people have cycled"
    body: >
      Auckland's own evidence refutes the claim that the city is too hilly,
      too spread out, or too car-oriented to support cycling. Every protected
      cycleway built in Auckland has exceeded AT's patronage projections:
      the Lightpath, the Northwestern cycleway extensions, and Beach Road
      all attracted more cyclists than modelled. The latent demand exists.
      The constraint is safety perception, not desire, and safety perception
      is determined by physical infrastructure design — specifically, whether
      a cyclist is physically separated from motor traffic or merely
      painted-lane adjacent to it.
  - heading: "Children and the school trip"
    body: >
      In 1990 approximately 50% of Auckland children walked or cycled to
      school; by the 2020s this proportion had fallen to roughly 20–25%.
      The school trip is both a major source of peak-hour congestion and
      the entry point for lifelong active travel habit. School streets
      programmes — closing streets immediately outside schools to private
      vehicles during drop-off and pick-up — have demonstrated dramatic
      increases in walking and cycling rates in cities from London to
      Melbourne. They are also among the cheapest and fastest-deployable
      interventions available, requiring temporary signs rather than
      capital construction.
