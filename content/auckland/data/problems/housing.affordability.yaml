id: problem.housing.affordability
title: "Affordability — What Aucklanders Pay for Housing, and What They Earn"
section: housing
subpage: affordability
parent: problem.housing
order: 3
updated: "2026-04-23"
summary: >
  Affordability is the outcome: what Aucklanders actually pay for housing
  and how that compares with what they earn. Land is the stock, Supply
  Economics is the flow, and this page is the ratio — measured across
  several complementary indicators, broken down by the cohorts and
  tenures who bear the cost, and addressed by three camps of
  intervention that act on the outcome rather than on stock or flow.
status: draft-v0

