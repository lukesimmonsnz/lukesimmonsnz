id: problem.housing.land
title: "Land — Auckland's Physical, Legal, and Cultural Substrate"
section: housing
subpage: land
parent: problem.housing
order: 1
updated: "2026-04-22"
summary: >
  Land is the foundation of Auckland's housing question — the physical
  geography, the history of ownership, the regulatory regimes layered on
  top, and the features that persist whoever is in government. This page
  describes what is durable and sets out the long-run questions the rest
  of the Housing section tries to answer.
