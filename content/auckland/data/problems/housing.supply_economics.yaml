id: problem.housing.supply_economics
title: "Supply Economics — How Auckland's Housing Gets Built"
section: housing
subpage: supply-economics
parent: problem.housing
order: 2
updated: "2026-04-23"
summary: >
  Land is the stock. Supply Economics is the flow. This page describes the
  system that produces dwellings on top of the land substrate: who builds,
  at what cost, under what constraints, and in response to what signals.
  International archetypes (Tokyo, Vienna, Houston, London, Singapore)
  anchor what different supply regimes look like in practice.
status: draft-v0

