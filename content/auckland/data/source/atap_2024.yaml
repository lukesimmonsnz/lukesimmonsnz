notes: >
  ATAP is the joint Crown-Auckland Council strategic alignment exercise that
  publishes a 10-year indicative transport investment package for Auckland.
  Used widely in Auckland transport policy debates; the 2024 update set
  programme parameters used by NZTA/Waka Kotahi and Auckland Transport for
  delivery sequencing.
