notes: >
  The Productivity Commission's frontier-firms inquiry. Examines the
  productivity gap between New Zealand's most productive firms and the
  long tail, the absence of agglomeration in NZ outside Auckland, and the
  policy implications for industrial strategy. Foundational reference for
  any AI-productivity capture and economic-diversification analysis. The
  Commission was disestablished in 2024; the report remains the
  authoritative published source.
