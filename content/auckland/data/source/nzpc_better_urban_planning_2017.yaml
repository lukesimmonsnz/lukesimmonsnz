notes: >
  The Productivity Commission's flagship inquiry into NZ urban planning;
  Auckland is treated as the central case. Recommended significant relaxation
  of land-use regulation, infrastructure financing reform, and improved
  responsiveness of urban planning to demand. Hosted on Treasury after the
  Commission was disestablished in 2024.
