notes: >
  City Rail Link Limited is the Crown entity delivering the CRL project.
  Public information pages document the 3.45km tunnel between Britomart and
  Mt Eden, expected opening (2026) and capacity (estimated to enable Auckland
  rail to carry 54,000 passengers per peak hour at full system build-out).
  Project budget last reset to NZD 5.493 billion in 2021 with cost-share
  Crown 50% / Auckland Council 50%.
