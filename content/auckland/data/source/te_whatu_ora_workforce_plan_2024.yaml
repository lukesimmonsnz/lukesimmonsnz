notes: >
  Te Whatu Ora's national health workforce plan. Sets out current
  vacancies across the medical, nursing, and allied health workforce,
  the share of the workforce nearing retirement, and projected demand
  growth driven by the ageing of the New Zealand population. The
  source backing the ageing-workforce-shortage pattern: ageing both
  raises demand on the health system and removes capacity from it as
  long-tenured staff retire.
