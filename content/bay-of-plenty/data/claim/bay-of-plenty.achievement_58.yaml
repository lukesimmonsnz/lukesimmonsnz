id: claim.bay_of_plenty.education.achievement_58
statement: Educational achievement in Bay of Plenty shows regional disparities, with
  NCEA Level 2 attainment at 82% in Tauranga and 72% in rural areas. Tauranga, as
  NZ's fastest-growing city (pop 165K+, growing 3-4% annually), has younger population
  skew; rural areas struggle with teacher recruitment and school resourcing.
