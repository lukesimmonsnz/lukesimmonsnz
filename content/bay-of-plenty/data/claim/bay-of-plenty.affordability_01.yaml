id: claim.bay_of_plenty.housing.affordability_01
statement: Housing affordability crisis in Bay of Plenty, particularly Tauranga, reflects
  NZ's fastest-growing city status. Median house prices in Tauranga reached $750K+
  by 2024, up 120% from 2015, driving essential worker shortages (nurses, teachers)
  and forcing commuting from rural areas.
