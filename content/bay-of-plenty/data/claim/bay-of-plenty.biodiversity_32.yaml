id: claim.bay_of_plenty.environment.biodiversity_32
statement: Biodiversity loss from habitat conversion in Bay of Plenty (particularly
  coastal zones and Rotorua geothermal areas) has been substantial. Native forest
  conversion to dairy (30%+ of land use) and urban sprawl in Tauranga have fragmented
  habitat, threatening endemic species and geothermal ecosystem integrity.
