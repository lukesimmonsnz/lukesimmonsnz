statement: Climate change impacts in Bay Of Plenty include increased temperatures,
  altered precipitation patterns, sea-level rise, and intensified extreme weather
  events. These changes threaten agriculture, water supply, infrastructure, and human
  health, requiring proactive adaptation and mitigation strategies across all sectors.
