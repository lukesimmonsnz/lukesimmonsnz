statement: Median household income in the Bay of Plenty's high-deprivation communities
  — concentrated in Ōpōtiki, Whakatāne, and parts of Rotorua — is approximately 25-30%
  below the regional average, reflecting occupational concentration in seasonal horticulture,
  limited tertiary access, and geographic isolation from higher-wage employment.
