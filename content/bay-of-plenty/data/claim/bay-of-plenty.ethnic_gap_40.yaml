id: claim.bay_of_plenty.inequality.ethnic_gap_40
statement: Employment rates and median incomes in the eastern Bay of Plenty are among
  the lowest in New Zealand; primary-sector dependence and geographic remoteness create
  structural barriers to higher-wage employment. Youth not in employment, education,
  or training (NEET) rates in high-deprivation communities are substantially above
  the national average.
