id: claim.bay_of_plenty.governance.governance_74
statement: Governance structures in Bay Of Plenty are fragmented across multiple councils
  and agencies, creating coordination challenges. Limited council capacity constrains
  strategic planning, infrastructure delivery, and climate adaptation; funding gaps
  prevent implementation of identified priorities.
