id: claim.bay_of_plenty.transport.public_transport_16
statement: Transport connectivity in Bay Of Plenty is limited outside major urban
  centers, forcing private vehicle dependence. Public transit is sparse; road freight
  reliance increases logistics costs; geographic isolation constrains workforce mobility
