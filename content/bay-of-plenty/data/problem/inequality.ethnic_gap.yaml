summary: The Bay of Plenty has significant intraregional income inequality. High-deprivation communities
  — concentrated in the eastern Bay (Ōpōtiki, Whakatāne) and parts of Rotorua — have median household
  incomes 25-30% below the regional average, high rates of material hardship, and limited access to the
  regional economy's higher-wage sectors. The primary structural drivers are geographic isolation, seasonal
  labour market dependence, and limited tertiary infrastructure in affected areas.
