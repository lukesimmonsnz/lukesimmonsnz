notes: 'NZDep2018 is the current deprivation index (NZDep2023 not yet released as of 2024). Eight census-derived variables
  combined into a deprivation score for every meshblock and area unit. Used by health, social, and education researchers as
  the standard NZ small-area deprivation measure.'
