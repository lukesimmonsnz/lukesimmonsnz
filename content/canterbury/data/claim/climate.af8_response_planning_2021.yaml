id: claim.canterbury.climate.af8_response_planning_2021
statement: >
  Project AF8 is a multi-agency South Island civil-defence planning
  programme that prepares for the response to an anticipated
  magnitude-8 Alpine Fault earthquake. The project models a multi-day
  to multi-week disruption of South Island critical infrastructure -
  road and rail corridors (especially SH73 / TranzAlpine), Lyttelton
  Port, electricity and telecommunications networks - with Christchurch
  as the major population centre most exposed to ground-shaking and
  cascading service-disruption effects.
value: 8
unit: moment magnitude (anticipated rupture)
