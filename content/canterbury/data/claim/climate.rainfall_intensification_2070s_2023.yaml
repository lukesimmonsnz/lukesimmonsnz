id: claim.canterbury.climate.rainfall_intensification_2070s_2023
statement: Climate projections for Canterbury show 10-30% increase in extreme rainfall
  intensity by 2070 (RCP 6.0). Canterbury Plain stormwater systems were designed for
  1950s-era rainfall; updated design standards are being implemented but require $800M+
  investment to manage intensified 1-in-50-year storm events.
