id: claim.canterbury.climate.summer_rainfall_trend_2070s_2023
statement: Canterbury's climate projections indicate a 15% reduction in summer rainfall
  by 2070 under moderate emissions scenarios. This trend threatens agricultural productivity
  across the Canterbury Plains, where irrigation-dependent dairy, arable crops, and
  sheep farming represent the regional economy's largest sector. Declining rainfall
  compounds groundwater stress already evident in nitrate contamination of shallow
  aquifers, necessitating adaptation in irrigation management and land use planning.
