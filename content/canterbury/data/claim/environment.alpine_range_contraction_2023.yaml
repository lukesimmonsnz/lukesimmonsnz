id: claim.canterbury.environment.alpine_range_contraction_2023
statement: Alpine glaciers in the Southern Alps (Tasman, Franz Josef, Fox) are retreating
  at an accelerated pace, with elevation contraction reaching approximately 50 metres
  per decade. Tasman Glacier, visible from Lake Pukaki, has receded >3 km since the
  1970s. This contraction threatens alpine water storage, hydroelectric generation
  (Manapouri, Waitaki scheme, Pukaki), and the ecological viability of braided river
  systems dependent on glacial melt runoff (Rakaia, Rangitata, Waitaki).
