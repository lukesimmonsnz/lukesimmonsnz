id: claim.canterbury.environment.aquifer_nitrate_2023
statement: 'Median groundwater nitrate in Canterbury''s dairy-intensive zones reaches
  11 mg/L, at the WHO drinking water standard threshold. This concentration stems
  from intensive dairy intensification since the 1990s—Canterbury now operates ~650,000
  dairy cattle—coupled with the region''s vulnerability: shallow, unconfined aquifer
  systems with short residence times in some zones, particularly in the Waimakariri,
  Selwyn, and Hinds plains. ECan projections show continued increase in some zones
  through 2050 even under best-practice land management.'
