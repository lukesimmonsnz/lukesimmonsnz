id: claim.canterbury.environment.cwms_zone_allocation_2024
statement: 'Water allocation in Canterbury''s Canterbury Water Management Strategy
  (CWMS) zones operates at 95% utilization across irrigation-dependent plains. This
  high allocation reflects the region''s status as NZ''s most productive agricultural
  zone: dairy farming (peak 650,000 head), arable crops (wheat, barley, canola), and
  irrigated pasture dominate land use. Future drought vulnerability is acute; ECan''s
  water demand model projects continued pressure on allocation headroom as population
  and irrigation demand grow in Selwyn and Waimakariri districts.'
