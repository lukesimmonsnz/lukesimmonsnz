id: claim.canterbury.environment.dairy_intensification_2023
statement: 'Canterbury dairy herd reached 650,000 head by 2023, representing the largest
  concentration of dairy cattle in any NZ region. This intensification, accelerated
  by irrigation expansion since 1995 (Central Plains Water, Rakaia, Rangitata schemes),
  has driven sustained agricultural GDP but created corresponding nitrogen loading:
  70% of Canterbury''s regional nitrogen load derives from dairy grazing and effluent.
  Milk production now constitutes ~35% of Canterbury''s agricultural output by value.'
