id: claim.canterbury.environment.groundwater_mav_threshold_2023
statement: >
  Environment Canterbury's regional groundwater quality monitoring
  programme reports the proportion of monitored bores in the Canterbury
  Plains aquifer system that exceed the 11.3 mg/L NO3-N Maximum
  Acceptable Value (MAV) for nitrate-nitrogen in drinking water,
  established under the Drinking Water Standards for New Zealand. A
  significant minority of bores in dairy-intensified subzones exceed
  the MAV, with concentrations correlated to upstream land-use
  intensity and aquifer transit time.
value: 11.3
unit: mg/L NO3-N (MAV threshold)
