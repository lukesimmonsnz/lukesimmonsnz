id: claim.canterbury.environment.invasive_predator_expansion_2023
statement: 'Invasive predator populations (stoats, rats, possums) in Canterbury''s
  braided river and alpine ecosystems have expanded, with stoat densities in some
  braided river zones reaching 2 per hectare. This expansion threatens critically
  endangered species endemic to Canterbury braided rivers: black stilts (kakī, ~150
  remaining globally, 80% in Canterbury braided rivers), plovers, and oystercatchers.
  Predator control efforts by DOC and community groups remain insufficient to reverse
  population trends.'
