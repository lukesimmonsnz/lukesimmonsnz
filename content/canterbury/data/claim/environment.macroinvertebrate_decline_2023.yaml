id: claim.canterbury.environment.macroinvertebrate_decline_2023
statement: Macroinvertebrate populations in Canterbury's lowland streams and rivers
  have declined by 35% over the past decade, primarily in dairy-intensive zones (Waimakariri,
  Selwyn, Hinds plains). Decline drivers include elevated nitrate (reducing plant
  growth and shading), reduced flow during irrigation season (particularly Rangitata
  and Rakaia), and fine sediment from pastoral erosion. This decline cascades to fish
  populations and aquatic food webs supporting native birds (shags, herons, kakī).
