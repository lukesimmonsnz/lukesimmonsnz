id: claim.canterbury.environment.stream_flow_reduction_2023
statement: Canterbury's lowland rivers (Waimakariri, Selwyn, Rangitata, Waitaki) experience
  flow reductions during irrigation season (November–March) that leave only 35% of
  ecological demand unmet. Irrigation takes (Central Plains Water, Rangitata Diversion
  Race, Rakaia scheme) divert water during peak growing season when ecological flows
  are most critical for native fish migration and braided river ecosystem function.
  Cumulative take across all schemes now totals ~1,400 GL/year in dry years.
