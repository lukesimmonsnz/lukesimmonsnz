id: claim.canterbury.housing.earthquake_prone_stock_2023
statement: Approximately 3,200 buildings in Canterbury (primarily Christchurch CBD
  and outlying suburbs) are classified as earthquake-prone under the Building Act.
  Unreinforced masonry, pre-1970s construction, and soft-storey buildings present
  ongoing seismic risk; remediation timelines are constrained by cost and contractor
  capacity.
