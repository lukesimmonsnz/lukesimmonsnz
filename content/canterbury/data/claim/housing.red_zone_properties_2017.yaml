id: claim.canterbury.housing.red_zone_properties_2017
statement: >
  Following the 2010-2011 Canterbury earthquake sequence, the Crown
  offered to purchase approximately 8,000 residential properties on
  flat land within Christchurch where ground conditions were judged
  not economically viable to repair (the residential red zone). The
  red-zone offer programme transferred land ownership to the Crown,
  with subsequent stewardship moving to Otakaro Limited following
  CERA's disestablishment in 2016. Decisions on long-term reuse of
  red-zone land (recreation, conservation, residential redevelopment)
  remain a contested local-governance question.
