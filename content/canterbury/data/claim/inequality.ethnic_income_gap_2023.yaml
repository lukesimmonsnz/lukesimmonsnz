id: claim.canterbury.inequality.ethnic_income_gap_2023
statement: Median household income in Canterbury's high-deprivation communities is
  approximately 27-32% below the regional average (2023), reflecting occupational
  concentration in lower-wage manufacturing, food processing, and service roles. The
  income gap is most pronounced in Christchurch's eastern suburbs, which absorbed
  a disproportionate share of lower-income households following earthquake displacement
  in 2010-2011.
