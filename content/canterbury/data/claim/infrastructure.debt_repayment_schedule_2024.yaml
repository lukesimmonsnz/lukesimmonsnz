id: claim.canterbury.infrastructure.debt_repayment_schedule_2024
statement: Christchurch City Council's earthquake-rebuild debt burden projects debt
  repayment completion by 2040, 29 years post-2011 earthquakes. The Crown contributed
  ~NZD 15 billion to the ~NZD 40 billion total rebuild; the Council funded the balance
  through rates, insurance, and borrowing. Current debt service consumes ~8% of rates
  revenue. Asset renewal backlogs in Three Waters, roading, and community facilities
  post-rebuild now trigger additional capital expenditure waves, delaying debt reduction.
