id: claim.canterbury.infrastructure.earthquake_debt_2024
statement: Christchurch City Council earthquake recovery debt stands at approximately
  NZD 1.1B (2024), related to infrastructure repairs from the 2010-2011 earthquake
  sequence. Debt servicing constrains council's capital spending capacity for unrelated
  projects (three-waters, transport, housing development); full repayment timeline
  extends beyond 2030.
