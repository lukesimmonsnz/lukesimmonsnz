id: claim.canterbury.infrastructure.fibre_coverage_rural_2023
statement: Rural fibre coverage in Canterbury reaches 55% of premises outside Christchurch
  metro, with significant gaps in Mackenzie Basin, inland Selwyn, and high-country
  Aoraki zones. UFB (Ultra-Fast Broadband) rollout prioritized urban areas; rural
  Canterbury remains dependent on aging copper lines and limited wireless coverage.
  This gap constrains agribusiness digitalization, remote work, and service delivery
  to farming communities, particularly in the fastest-growing districts (Selwyn, Waimakariri)
  where commuter demand exceeds infrastructure.
