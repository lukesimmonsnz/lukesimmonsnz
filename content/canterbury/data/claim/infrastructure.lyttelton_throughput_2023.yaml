id: claim.canterbury.infrastructure.lyttelton_throughput_2023
statement: Lyttelton Port of Christchurch handled 2.1 million TEU (Twenty-foot Equivalent
  Units) in 2023, serving South Island import/export traffic. The port is South Island's
  busiest, handling ~40% of South Island container traffic and serving as the primary
  gateway for Canterbury's $40 billion rebuild, dairy exports (milk powder, cheese),
  and wine shipments (Waipara region). Post-COVID recovery to 2.1M TEU represents
  85% of pre-2020 peak; seasonal fluctuation is pronounced due to agricultural export
  concentration.
