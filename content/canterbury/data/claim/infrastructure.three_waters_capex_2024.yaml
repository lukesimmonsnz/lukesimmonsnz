id: claim.canterbury.infrastructure.three_waters_capex_2024
statement: Christchurch City Council's Three Waters capital expenditure programme
  budgets NZD 6 billion through 2054 for water supply, wastewater, and stormwater
  renewal. This programme targets replacement of aging water mains (50+ years old),
  wastewater capacity expansion (to accommodate Selwyn/Waimakariri growth), and stormwater
  resilience (flood mitigation post-2021 events and future climate extremes). Local
  Water Done Well replaces the failed Three Waters Reform; Council retains asset ownership
  but faces funding constraints that may delay renewal schedules.
