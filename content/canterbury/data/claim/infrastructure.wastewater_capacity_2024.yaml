id: claim.canterbury.infrastructure.wastewater_capacity_2024
statement: Christchurch's main wastewater treatment plants (Bromley, Kingsford Terrace,
  Pūrāngī) operate at 85% capacity utilization, with peak wet-weather flows occasionally
  exceeding design. Projected growth in Selwyn and Waimakariri districts (fastest-growing
  regions in NZ, +3–4% annually) will exceed current capacity by 2035 without investment.
  Overflows to the Avon-Heathcote estuary remain a compliance risk in extreme rainfall
  events; stormwater separation in key drainage zones is an emerging priority.
