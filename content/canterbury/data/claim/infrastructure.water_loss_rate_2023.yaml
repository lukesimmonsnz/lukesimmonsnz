id: claim.canterbury.infrastructure.water_loss_rate_2023
statement: Christchurch's water supply distribution network loses approximately 25%
  of treated water to leaks, pipe breaks, and theft. This loss rate is above the national
  urban average (23%) and reflects aging water mains (many 50+ years old installed
  post-1960s rapid suburban expansion). Network age, corrosive soils in some zones,
  and deferred maintenance from earthquake rebuild prioritization are primary drivers.
  Council's pipe replacement programme targets a reduction to 18% by 2035, requiring
  NZD 1.2 billion capital investment.
