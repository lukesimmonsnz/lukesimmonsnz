narrative:
- heading: Historic hazard, modern risk
  body: '1717 Alpine Fault rupture caused widespread damage (documented in oral histories,
    geological evidence). Modern Christchurch (1.4M population, $200B+ assets) is
    far more vulnerable. Hospital, airport, water systems, port are not seismically
    resilient to M7+. Post-2011 earthquake improvements help but are incomplete. Insurance
    for Alpine Fault risk is increasingly expensive or unavailable.

    '
