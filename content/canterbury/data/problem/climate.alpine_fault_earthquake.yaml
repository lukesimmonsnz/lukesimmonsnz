updated: '2026-04-26'
summary: 'The Alpine Fault has ruptured in M7+ earthquakes every 200-350 years; last
  rupture was ~1717. Seismic science (GNS 2022) estimates ~15% probability of M7+
  rupture in next 50 years. Canterbury lies in the rupture zone; ground shaking, landslides,
  liquefaction, and possible tsunami are severe. Critical infrastructure (Lyttelton
  Port, Christchurch Hospital, transport corridors) would be severely disrupted for
  months. Preparedness and resilience planning is incomplete.

  '
