narrative:
- heading: Cascading climate and seismic risks
  body: 'Alpine Fault rupture (expected this century) could trigger M7.0+ earthquake,
    causing devastation exceeding 2011. Simultaneously, rainfall intensification (10-30%
    increase by 2070s) increases flood and storm surge risk in Christchurch and coastal
    areas. Adaptation requires integrated planning; siloed responses (water strategy,
    transport strategy, climate plan) are insufficient.

    '
