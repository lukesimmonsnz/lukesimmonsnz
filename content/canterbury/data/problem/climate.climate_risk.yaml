updated: '2026-04-26'
summary: 'Canterbury faces compounding climate risks: Alpine Fault rupture (M7+, ~15%
  in 50yr window), increased rainfall intensity and drought frequency, sea level rise
  (affecting Lyttelton, coastal regions), and warming temperatures pressuring alpine
  ecosystems and agricultural systems. Adaptation planning is sector-siloed; integrated
  risk frameworks are nascent. Critical infrastructure (port, water, transport) is
  vulnerable.

  '
