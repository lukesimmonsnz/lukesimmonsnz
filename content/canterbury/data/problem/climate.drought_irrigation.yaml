narrative:
- heading: Water stress in the breadbasket
  body: 'Canterbury''s dairy and arable farming depends on summer irrigation. 2022-2023
    drought forced water rationing; farm gross margins fell 25-40%. Farmers invested
    in more efficient systems (pivot to drip, soil moisture monitoring) but adaptation
    lags demand. Projected climate change increases irrigation shortfall frequency
    2-3x by 2050s.

    '
