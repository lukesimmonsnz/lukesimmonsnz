updated: '2026-04-26'
summary: 'Canterbury Plains rely on irrigation for dairy and arable farming. Recent
  droughts (2022-2023, 2020) stressed both water supply and farmer financial viability.
  Climate projections show 10-20% reduction in summer rainfall by 2070s. Irrigation
  infrastructure is aging; aquifer-fed schemes face recharge uncertainty. Frequency
  of irrigation shortages (current 1-in-10-years, projected 1-in-5-years by 2050s)
  creates farm economic risk and threatens regional productivity.

  '
