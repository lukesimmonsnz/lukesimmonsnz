  - design_standard_lag_climate_change
  feedback_loops:
  - Dynamic feedback mechanisms drive flooding risk & stormwater infrastructure adequacy.
narrative:
- heading: Infrastructure design lag
  body: 'Stormwater systems were designed to 100-year storm standards (~50mm/24hr);
    climate change is pushing these storms toward 50-year frequency. Christchurch
    and growth suburbs face increasing urban flooding (basement inundation, street
    ponding, park/reserve overflow). Stormwater upgrades require $billions; funding
    is constrained by earthquake debt service.

    '
