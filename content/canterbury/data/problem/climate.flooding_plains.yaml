  state_variables:
  - hundred_year_rainfall_intensity_design_standard
  - stormwater_system_capacity_utilization
  - urban_flooding_event_frequency
  - flood_affected_property_count
  inputs:
  - rainfall_intensity_increase
  - urbanization_impervious_surface_increase
  - stormwater_investment_rate
  constraints:
