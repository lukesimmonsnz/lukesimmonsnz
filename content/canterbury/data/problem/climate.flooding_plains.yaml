id: problem.canterbury.climate.flooding_plains
title: Flooding Risk & Stormwater Infrastructure Adequacy
theme: climate-adaptation
section: climate
subpage: flooding_plains
parent: problem.canterbury.climate.climate_risk
order: 3
updated: '2026-04-26'
summary: 'Christchurch plains are low-lying and subject to flooding from riverine
  (Waimakariri, Ōtukaikino) and urban stormwater sources. Design standards assume
  100-year rainfall events of ~50mm/24hr; climate projections indicate 60-70mm by
  2070s (20-40% increase). Stormwater systems in Christchurch and growth suburbs are
  running near saturation. Recent urban flooding (2022-2023) has exceeded design standards,
  causing property damage and service disruption.

  '
manifests_in:
- canterbury
