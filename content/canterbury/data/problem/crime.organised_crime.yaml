id: problem.canterbury.crime.organised_crime
title: Organized Crime & Methamphetamine Distribution
theme: crime
section: crime
subpage: organised_crime
parent: problem.canterbury.crime.safety
order: 3
updated: '2026-04-26'
summary: 'Organized crime groups are active in Canterbury, particularly in methamphetamine
  distribution (manufacturing and supply). Street-level dealing correlates with gang
  affiliations; violence (turf disputes) is increasing. Police Operations continue;
  community reporting and intelligence remain limited in high-prevalence areas.

  '
manifests_in:
- canterbury
