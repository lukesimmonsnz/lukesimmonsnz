  state_variables:
  - methamphetamine_seizure_kg_annual
  - organized_crime_violence_incidents
  - gang_affiliated_population_estimate
  inputs:
  - drug_market_demand
  - gangs_membership_recruitment
  - police_enforcement_intensity
  constraints:
  - supply_chain_disruption_difficulty
  - treatment_programme_capacity
  feedback_loops:
  - Dynamic feedback mechanisms drive organized crime & methamphetamine distribution.
narrative:
- heading: Methamphetamine as structural problem
  body: 'Methamphetamine distribution networks operate across Canterbury, with manufacturing
    facilities in Selwyn/Waimakariri. Community harm (overdose, crime victimization)
    is acute. Police seizure operations are reactive; supply-side disruption remains
    elusive.

    '
