  - assault_recorded_rate
  - youth_offending_rate
  - organized_retail_crime_incidents
  - methamphetamine_seizure_volume
  inputs:
  - deprivation_concentration
  - housing_stress_levels
  - substance_abuse_prevalence
  constraints:
  - police_staffing_levels
  - mental_health_service_capacity
  - community_trust_in_police
  feedback_loops:
  - Dynamic feedback mechanisms drive canterbury community safety & crime prevention.
narrative:
- heading: Earthquake-driven social stress
  body: 'Post-quake, family violence increased 25% (2011-2013) as housing displacement,
    financial stress, and psychological trauma compounded pre-existing risk factors.
    While overall violence has stabilized, concentrations in high-deprivation areas
    remain acute.

    '
