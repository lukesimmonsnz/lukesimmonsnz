id: problem.canterbury.crime.safety
title: Canterbury Community Safety & Crime Prevention
theme: crime
section: crime
subpage: safety
parent: null
order: 1
updated: '2026-04-26'
summary: 'Canterbury recorded crime rates exceed NZ averages in family violence, assault,
  and youth offending categories. Family violence (32% of police call-outs) correlates
  with housing stress and deprivation. Organized retail crime and methamphetamine
  distribution are growing. Community cohesion impacts are acute in East Christchurch
  and outer growth districts (Selwyn).

  '
manifests_in:
- canterbury
