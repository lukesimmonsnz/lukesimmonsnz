id: problem.canterbury.crime.youth_offending
title: Youth Offending & Justice System Diversion
theme: crime
section: crime
subpage: youth_offending
parent: problem.canterbury.crime.safety
order: 2
updated: '2026-04-26'
summary: 'Youth (10-16) offending rates in Canterbury are above NZ average, particularly
  for burglary, vehicle theft, and assault. Overrepresentation of Māori and Pacific
  youth in the justice system reflects both offending concentration and disparate
  policing/prosecution. Diversion and therapeutic intervention capacity is limited.

  '
