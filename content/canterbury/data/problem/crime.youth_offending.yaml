narrative:
- heading: Justice system concentration in deprived areas
  body: 'Youth offending hotspots align with high-deprivation suburbs (East Christchurch,
    Selwyn outer). Offenders often have prior family violence exposure, school truancy,
    and substance abuse histories. Diversion programmes (YJCs, Oranga Tamariki therapeutic
    responses) have waitlists; police apprehensions continue at high rates.

    '
