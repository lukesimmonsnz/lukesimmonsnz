id: problem.canterbury.economy.economic_structure
title: Canterbury Economic Diversification & Resilience
theme: economy
section: economy
subpage: economic_structure
parent: null
order: 1
updated: '2026-04-26'
summary: 'Canterbury''s economy remains heavily dependent on primary production (dairy,
  arable) and construction (post-earthquake rebuild). High-value-added sectors (tech,
  professional services, biotech) are emerging but remain small. Earthquake rebuild
  stimulus is waning; labor productivity growth is slower than national average. Regional
  economic resilience to commodity price shocks and climate stress is questionable.

  '
