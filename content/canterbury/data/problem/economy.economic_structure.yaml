narrative:
- heading: Rebuild boost fading
  body: 'Post-2011, earthquake rebuild spending ($40B over 15 years) sustained construction
    employment and related sectors. That stimulus is ending (2024). Canterbury must
    transition to organic growth; tech/innovation sectors are nascent (Lincoln, UC,
    EPIC Innovation Precinct).

    '
