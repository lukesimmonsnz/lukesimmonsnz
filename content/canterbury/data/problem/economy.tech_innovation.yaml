narrative:
- heading: EPIC Precinct early stage
  body: 'EPIC (2022-onwards) brings UC, Lincoln, city council, and private firms into
    shared innovation space. Early outcomes include agritech startups, cleantech spinouts
    from university research. But funding remains limited; skilled talent is scarce
    (brain drain to larger metros).

    '
