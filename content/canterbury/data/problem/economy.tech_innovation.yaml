updated: '2026-04-26'
summary: 'Christchurch''s tech and innovation ecosystem is nascent. EPIC Innovation
  Precinct (UC, Lincoln, private sector collaboration) aims to grow high-tech startups,
  but venture capital, skilled workforce, and corporate R&D are limited compared to
  Auckland/Wellington. Tech sector employment is <2% of regional employment vs 4-5%
  nationally.

  '
