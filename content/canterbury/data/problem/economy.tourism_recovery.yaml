narrative:
- heading: Recovery with sustainability questions
  body: 'Christchurch hotel occupancy is back above 80%; Akaroa, Akaroa region are
    facing overtourism issues (capacity, parking, environmental). Sustainability framework
    for tourism is under development (CCC).

    '
