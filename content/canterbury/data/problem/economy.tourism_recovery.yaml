parent: problem.canterbury.economy.economic_structure
order: 3
updated: '2026-04-26'
summary: 'Canterbury''s tourism sector (Christchurch, Arthur''s Pass, Akaroa, Mount
  Cook access) was disrupted by earthquakes and COVID-19 but is recovering (2022-2024).
  International visitor arrivals are 60-70% of pre-COVID levels. Accommodation and
  attractions show strong margin recovery. However, sustainability concerns (trampling,
  crowding, environmental impact) are emerging in popular areas.

  '
