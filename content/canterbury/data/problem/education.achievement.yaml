narrative:
- heading: Equity gaps from early years
  body: 'Language and numeracy assessments at age 5 show 2-3 year lags in high-deprivation
    schools. By NCEA, cumulative disadvantage is entrenched. Tertiary enrollment in
    decile 9-10 areas is <30%; in decile 1-3 areas, >70%.

    '
