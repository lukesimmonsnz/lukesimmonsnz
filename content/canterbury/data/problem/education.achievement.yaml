updated: '2026-04-26'
summary: 'Canterbury''s education system shows significant equity gaps. NCEA Level
  2 pass rates in decile 1-3 schools exceed 90%; in decile 9-10 schools, they fall
  to 55-65%. Early childhood participation is correlated with deprivation. Tertiary
  pathways (especially from South Canterbury) are narrower. Lincoln University provides
  agricultural research but faces funding pressure.

  '
