id: problem.canterbury.education.early_childhood
title: Early Childhood Education Access & Quality
theme: education
section: education
subpage: early_childhood
parent: problem.canterbury.education.achievement
order: 1
updated: '2026-04-26'
summary: ECE participation in Canterbury is 85% overall but drops to 60-65% in high-deprivation areas,
  where cost (averaging NZD 150-200 per week), transport barriers, and limited community-responsive provision
  constrain access. Quality variance is significant; higher-deprivation ECE services often lack specialist
  staff and stable funding. The participation gap in high-deprivation communities creates a school-entry
  disadvantage that compounds across the education system.
manifests_in:
- canterbury
