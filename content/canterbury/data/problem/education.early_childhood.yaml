narrative:
- heading: Affordability barriers in high-need areas
  body: 'ECE fees absorb 20-30% of household income in deprived single-income families. Culturally responsive
    Māori-led services (kōhanga reo, Māori playcentres) are underrepresented and have waitlists in Canterbury.

    '
