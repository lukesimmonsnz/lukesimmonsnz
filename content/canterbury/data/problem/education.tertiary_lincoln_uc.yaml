updated: '2026-04-26'
summary: 'Lincoln University (Ōtautahi) is the region''s primary tertiary institution,
  specialized in agricultural, land-based, and environmental sciences. Enrollment
  is stable (~3,500 students) but concentrated from high-decile schools. UC Christchurch
  has limited capacity. Tertiary participation from Canterbury grows <2% annually;
  degree completion rates are above NZ average but equity gaps remain.

  '
