narrative:
- heading: Lincoln as agricultural hub
  body: 'Lincoln''s reputation in agricultural sciences and agribusiness creates strong
    recruitment from farming families and farming-interested students. However, program
    diversity is limited; non-agricultural studies are less well resourced. Enrollment
    from East Christchurch and South Canterbury remains low.

    '
