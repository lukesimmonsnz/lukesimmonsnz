id: problem.canterbury.environment.freshwater_stress
title: Canterbury Freshwater Stress & Aquifer Pressure
theme: environment
section: environment
subpage: freshwater_stress
parent: null
order: 1
updated: '2026-04-26'
summary: 'Canterbury''s freshwater systems are under intense pressure from irrigated
  agriculture (dairy, arable), particularly the Canterbury Plains aquifer complex.
  Nitrogen contamination, aquifer depletion, and reduced summer stream flows threaten
  water security and aquatic ecosystem health. The Canterbury Water Management Strategy
  (CWMS) sets allocation limits, but compliance and enforcement remain contested.

  '
manifests_in:
- canterbury
