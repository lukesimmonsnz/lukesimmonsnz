  - aquifer_recharge_rate
  - ecological_water_demand
  feedback_loops:
  - 'Irrigation-intensification loop: high milk prices incentivize irrigation expansion,
    increasing N leaching and aquifer stress, which in turn triggers regulatory tightening
    (CWMS reviews).'
narrative:
- heading: Agricultural nitrogen crisis
  body: 'Canterbury''s aquifer nitrogen concentrations have risen from <5 mg/L (1990s)
    to 10-15 mg/L in many zones (2023), approaching the 11.3 mg/L drinking water standard.
    Dairy farming accounts for ~70% of N loading. Spatial concentration in intensively
    farmed zones (mid-Canterbury) creates localized exceedances requiring expensive
    treatment.

    '
