  state_variables:
  - aquifer_level_by_subzone
  - nitrate_concentration_groundwater
  - lowland_stream_flow_summer
  - irrigation_water_allocation_utilization
  inputs:
  - rainfall_seasonality
  - dairy_stocking_density
  - irrigation_system_efficiency
  - urban_nitrogen_input
  constraints:
