id: problem.canterbury.governance.earthquake_debt_recovery
title: Earthquake Debt & Long-Term Financial Recovery
theme: governance
section: governance
subpage: earthquake_debt_recovery
parent: problem.canterbury.governance.governance
order: 1
updated: '2026-04-26'
summary: 'CCC''s earthquake debt ($1.1B, 2024) constrains long-term capital investment
  in climate adaptation, housing, and transport. Debt repayment extends to 2040+.
  Rate base is strained (rates rising faster than inflation). Central government support
  ($5.5B total, recovered 2011-2024) has ended. Future capital projects (light rail,
  major cycling, green infrastructure) compete with debt service for limited resources.

  '
