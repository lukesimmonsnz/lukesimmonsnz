narrative:
- heading: Debt service crowding out climate & growth investment
  body: 'CCC rates have risen 30% since 2011 as debt service consumes ~NZD 100M/year.
    Climate adaptation infrastructure (stormwater, flood management) and growth infrastructure
    (water, wastewater) compete for funding against debt repayment. Light rail, for
    example, is not fundable without central govt grants that are uncertain.

    '
