id: problem.canterbury.governance.governance
title: Canterbury Regional Governance & Policy Coordination
theme: governance
section: governance
subpage: governance
parent: null
order: 1
updated: '2026-04-26'
summary: 'Canterbury regional governance is fragmented across CCC (Christchurch),
  three territorial authorities (Waimakariri, Selwyn, Ashburton) plus South Canterbury
  (Timaru, Oamaru). Environment Canterbury (ECan) coordinates water and resource management.
  No formal regional strategic coordination mechanism exists; water strategy (CWMS),
  transport strategy, and climate responses are sectoral. Ngāi Tahu as iwi has statutory
  consultation roles but co-governance is contested. Inter-council coordination on
  growth infrastructure is weak.

  '
