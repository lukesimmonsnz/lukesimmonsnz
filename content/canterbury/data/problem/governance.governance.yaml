narrative:
- heading: Fragmentation without coordination
  body: 'Each council pursues growth, but planning is siloed. Water strategy (CWMS)
    is decided by ECan with contested farmer/environmental interests. Transport is
    city-centric. No unified regional economic strategy exists. Ngāi Tahu consultation
    occurs but power asymmetries limit influence on major decisions.

    '
