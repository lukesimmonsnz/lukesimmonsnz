narrative:
- heading: Settlement assets without guarantee of benefit
  body: 'Ngāi Tahu Holdings operates successful commercial entities (farming, tourism,
    energy). However, benefit flows to iwi membership vary; some argue holdings prioritize
    shareholder returns over community benefit. Water allocation to iwi is contested
    (CWMS allows for allocation but magnitude disputed). Co-governance proposals (e.g.,
    mayoralty co-election with iwi representative) face political opposition.

    '
