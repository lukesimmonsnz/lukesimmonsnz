updated: '2026-04-26'
summary: 'Ngāi Tahu (Te Rūnanga o Ngāi Tahu) is Canterbury''s major iwi with significant
  Treaty settlement assets (land, cash, commercial entities). Co-governance arrangements
  exist in some areas (e.g., Water Council, CCC Mayoralty election co-design proposals)
  but are contested politically. Iwi land rights, water rights (especially under CWMS),
  and cultural site protection remain contentious. Iwi economic development (tourism,
  farming, energy) is growing but benefit distribution to community is debated.

  '
