narrative:
- heading: Allocation strategy under pressure
  body: 'CWMS zones allocation but water use often exceeds allocation (farm use, urban
    leakage). Environmental flow targets are not always met in low-flow summers. Farmers
    argue allocation limits are too tight; environmental groups argue they are too
    loose. Governance conflicts are frequent; mediation and arbitration processes
    are slow.

    '
