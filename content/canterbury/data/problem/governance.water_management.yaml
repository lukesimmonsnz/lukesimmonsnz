updated: '2026-04-26'
summary: 'The Canterbury Water Management Strategy (CWMS) is the regional governance
  instrument for water allocation, environmental flows, and quality targets. Approved
  2016, under review 2024. CWMS sets regional annual allocation limits but zone-level
  allocations are contested (farmers, environmental groups, iwi). Compliance with
  allocation limits is weak; enforcement is reactive. Climate change impacts (drought,
  extreme rainfall) are testing CWMS adequacy.

  '
