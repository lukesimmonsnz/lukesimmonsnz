id: problem.canterbury.health.chronic_disease
title: Chronic Disease Prevention & Management
theme: health
section: health
subpage: chronic_disease
parent: problem.canterbury.health.health_outcomes
order: 2
updated: '2026-04-26'
summary: Type 2 diabetes prevalence in Canterbury is 8-10% overall, rising to 15% in high-deprivation
  communities; obesity rates are approximately 33% overall and 41% in high-deprivation areas; cardiovascular
  disease hospitalisations are rising. Primary prevention is underfunded relative to demand. Chronic disease
  outcomes track strongly with deprivation and healthcare access, with the largest gaps in Christchurch's
  eastern suburbs and rural communities.
