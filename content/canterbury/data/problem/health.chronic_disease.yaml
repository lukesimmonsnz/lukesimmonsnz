narrative:
- heading: Lifestyle disease epidemiology
  body: 'Canterbury''s chronic disease profile reflects both NZ-wide trends (obesity, sedentary work)
    and local factors (post-quake stress, deprivation concentration). Preventive services (diabetes education,
    cardiac rehabilitation) have long waitlists.

    '
