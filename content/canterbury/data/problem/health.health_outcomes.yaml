updated: '2026-04-26'
summary: 'Canterbury''s health outcomes are mixed: life expectancy is near NZ average
  overall but varies 7+ years by deprivation decile. Chronic disease prevalence (type
  2 diabetes, obesity, cardiovascular) is rising. Primary care is fragmented; secondary
  care (especially mental health) has significant waitlists. Rural and provincial
  areas face recruitment and retention challenges.

  '
