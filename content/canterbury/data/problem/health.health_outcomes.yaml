narrative:
- heading: Deprivation-driven health inequities
  body: 'Life expectancy in East Christchurch (decile 9-10) is 70-72 years; in Merivale/Fendalton
    (decile 1-3), it exceeds 81 years. Type 2 diabetes prevalence is 2.5x higher in
    Māori/Pacific populations. Mental health service access times are 8-12 weeks for
    counseling (specialist 16+ weeks).

    '
