  feedback_loops:
  - 'Post-earthquake greenfield release: large suburban land release post-2011 temporarily
    dampened prices but growth management infrastructure costs now feedback into outer-district
    affordability.'
  - 'Rebuild momentum attenuation: strong construction sector capacity from earthquake
    rebuild sustains supply response but labour cost inflation erodes gains.'
narrative:
- heading: The Canterbury earthquake dislocation
  body: 'The 2010-2011 Canterbury earthquakes destroyed or damaged significant portions
    of the residential stock, with CERA demolishing over 8,000 red-zone homes. The
    rebuild phase (2012-2020) created one of NZ''s strongest construction booms, but
    concentrated replacement housing in suburban greenfields (Waimakariri, Selwyn)
    rather than CBD intensification, raising long-run infrastructure servicing costs
    and suburban sprawl dependencies.

    '
- heading: Current affordability pressure
  body: 'Despite earthquake-driven supply expansion, Christchurch''s median multiple
    reached 7.1 in 2023 (claim.canterbury.housing.median_multiple_2023). Waimakariri
    and Selwyn face sharper affordability crises—first-time buyer deposits require
    8-12 years of combined household savings—as in-migration from higher-cost centres
    (Auckland, Wellington) sustains demand while greenfield development runs ahead
    of infrastructure capacity (claim.canterbury.housing.infrastructure_gap_2024).

    '
