id: problem.canterbury.housing.market
title: Canterbury Housing Market Dysfunction
theme: housing
section: housing
subpage: market
parent: null
order: 1
updated: '2026-04-26'
summary: 'Canterbury''s housing market exhibits chronic unaffordability across Christchurch,
  Waimakariri, and Selwyn districts, driven by post-earthquake rebuild dynamics, rapid
  greenfield-led growth in outer districts, and constrained density development in
  Christchurch CBD. Median multiples have stabilized around 6.5-7.0 regionally while
  local pressure zones (Selwyn, Waimakariri) face affordability crises for first-time
  buyers.

  '
