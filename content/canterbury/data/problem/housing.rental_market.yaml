summary: 'Canterbury''s rental vacancy rate fell below 2% in 2023 (claim.canterbury.housing.rental_vacancy_2023),
  driving rent increases and displacement pressure on low-income households. Earthquake-displaced
  renters, coupled with migration inflows, sustain tight rental markets across Christchurch
  metro.

  '
