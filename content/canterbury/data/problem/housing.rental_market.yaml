narrative:
- heading: Post-earthquake rental squeeze
  body: 'The earthquakes destroyed rental stock while displacing thousands of renters.
    Though insurers rebuilt many damaged rentals, investor confidence remained shaken,
    slowing new supply. Today, Christchurch''s rental vacancy sits near 1.5%, pushing
    median rent above $420/week and displacing vulnerable households into outer suburbs
    or out of the region entirely.

    '
