narrative:
- heading: Growth outpacing infrastructure
  body: 'Waimakariri and Selwyn released large greenfield zones post-2015, but three
    waters infrastructure (water supply, wastewater, stormwater) struggles to keep
    pace with residential density increases. Councils now face demand for developer
    contributions to front-fund expansion while managing affordability impact on land
    prices.

    '
