updated: '2026-04-26'
summary: 'Selwyn and Waimakariri districts are among NZ''s fastest-growing councils
  (3-4% annual growth), driven by affordable greenfield housing and dormitory proximity
  to Christchurch. Rapid growth strains water, wastewater, and transportation infrastructure;
  councils struggle to front-fund expansion while managing rural character preservation
  and iwi consultation.

  '
