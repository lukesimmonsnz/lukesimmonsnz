id: problem.canterbury.inequality.child_poverty
title: Child Poverty & Educational Disadvantage
theme: inequality
section: inequality
subpage: child_poverty
parent: problem.canterbury.inequality.inequality
order: 2
updated: '2026-04-26'
summary: 'Canterbury child poverty (measured by material hardship) affects 25-30%
  of children in high-deprivation suburbs. Educational attainment gaps emerge by age
  5 (language development); NCEA pass rates in East Christchurch schools are 30% below
  city average. Food insecurity, substandard housing, and crowding compound educational
  disadvantage.

  '
