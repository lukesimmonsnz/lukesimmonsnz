narrative:
- heading: From age 5, the gap opens
  body: 'Language and numeracy assessments at age 5 show 2-3 year development lags
    in high-deprivation areas. By NCEA, cumulative disadvantage is entrenched. Schools
    in East Christchurch face student-teacher ratios and social-emotional needs that
    exceed their funding capacity.

    '
