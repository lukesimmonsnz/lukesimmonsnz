id: problem.canterbury.inequality.east_christchurch_deprivation
title: East Christchurch Deprivation Concentration
theme: inequality
section: inequality
subpage: east_christchurch_deprivation
parent: problem.canterbury.inequality.inequality
order: 1
updated: '2026-04-26'
summary: 'East Christchurch suburbs (Aranui, Ranui, Shirley, Avondale, Linwood) are
  concentrated in NZDep decile 9-10 (most deprived), with 35%+ child poverty, unemployment
  2x city average, and life expectancy 5-7 years below western suburbs. Housing quality
  remains poor despite earthquake rebuild promises.

  '
manifests_in:
- canterbury
