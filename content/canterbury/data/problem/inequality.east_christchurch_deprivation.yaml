  state_variables:
  - nzdep_decile_concentration
  - unemployment_rate
  - child_poverty_rate
  - life_expectancy
  - housing_quality_score
  inputs:
  - employment_centre_accessibility
  - education_service_quality
  - health_service_density
  constraints:
  - historical_low_property_values
  - landlord_underinvestment_in_rentals
  feedback_loops:
  - Dynamic feedback mechanisms drive east christchurch deprivation concentration.
narrative:
- heading: Earthquake recovery bypass
  body: 'East Christchurch residents (predominantly Pacific Islander, Māori) were
    more likely to be renters in red zones. When rebuild housing was offered, many
    were priced out or relocated out of their communities. Today, East Christchurch
    remains the most deprived urban area in Canterbury.

    '
