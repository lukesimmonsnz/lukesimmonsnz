narrative:
- heading: Intersecting disparities
  body: 'Māori and Pacific populations are overrepresented in East Christchurch deprivation clusters.
    They experience health inequities, lower education attainment, and lower incomes. Ngāi Tahu as the
    region''s iwi has significant economic assets but community-level benefit concentration is contested.

    '
