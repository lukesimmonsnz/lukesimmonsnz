id: problem.canterbury.inequality.ethnic_gap
title: Ethnic Health & Income Equity Gaps
theme: inequality
section: inequality
subpage: ethnic_gap
parent: problem.canterbury.inequality.inequality
order: 3
updated: '2026-04-26'
summary: Canterbury has a significant income and health inequality gap between high-deprivation and lower-deprivation
  communities. Median household income in the most affected communities is 25-30% below the Canterbury
  average; chronic disease rates are substantially higher; arrest rates are elevated. These disparities
  are geographically concentrated in Christchurch's eastern suburbs and in rural Canterbury, reflecting
  occupational concentration and limited public service access.
