updated: '2026-04-26'
summary: 'Rural and provincial Canterbury (Ashburton, Timaru, Kaikōura districts)
  lag broadband deployment; fibre coverage in provincial towns remains patchy. Digital
  divide correlates with deprivation in East Christchurch and outer suburbs, impacting
  remote work access and digital service uptake.

  '
manifests_in:
- canterbury
