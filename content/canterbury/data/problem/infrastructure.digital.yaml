  - nbnz_capex_allocation
  - private_isp_investment
  constraints:
  - rural_deployment_cost_per_line
  - service_provider_profit_margin
  feedback_loops:
  - Dynamic feedback mechanisms drive digital infrastructure coverage & uptake.
narrative:
- heading: Rural connectivity remains incomplete
  body: 'Rural Canterbury south of Ashburton has <60% fibre coverage; service providers
    deprioritize low-density areas. Digital literacy and affordability barriers in
    East Christchurch and South Canterbury limit remote work adoption and e-learning
    access.

    '
