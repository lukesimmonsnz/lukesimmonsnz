summary: 'Lyttelton Port (Eastland) is Canterbury''s primary import-export gateway,
  handling ~30% of NZ''s container traffic. Post-earthquake damage (2011) and ongoing
  seismic vulnerability create operational risk; port company faces capital constraints
  for berth modernization and earthquake-resilience upgrades.

  '
