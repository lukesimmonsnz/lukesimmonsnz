narrative:
- heading: Critical infrastructure at seismic risk
  body: 'Lyttelton Port survived the 2011 quakes with significant damage and downtime.
    Port Company faces aging berth infrastructure and constrained capital for modernization.
    An Alpine Fault rupture (M7.0+) could disable the port for 6-12 months, disrupting
    NZ''s container supply chain.

    '
