narrative:
- heading: Post-earthquake transport default
  body: 'The 2011 earthquake damaged significant stretches of Christchurch''s road
    network. Rebuild prioritized vehicle capacity restoration over modal shift, embedding
    car dependency into the new spatial layout. Meanwhile, bus network redesigns (2017-2023)
    have not reversed declining patronage, and light rail planning stalled through
    multiple business case iterations.

    '
