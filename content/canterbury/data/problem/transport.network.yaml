id: problem.canterbury.transport.network
title: Canterbury Transport Network Dysfunction
theme: transport
section: transport
subpage: network
parent: null
order: 1
updated: '2026-04-26'
summary: 'Canterbury''s transport system is dominated by private vehicle dependency,
  with Christchurch metro lacking rapid transit, bus network efficiency declining,
  and active transport infrastructure fragmented. Light rail remains in pre-business-case
  phase; congestion in key corridors (Johns Ave, Riccarton Rd) is worsening as growth
  outpaces network investment.

  '
