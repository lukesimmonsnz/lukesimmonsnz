notes: >
  CERA's final report and the legislative wind-up of the recovery authority
  (CER Act 2011 expired April 2016; functions transferred to DPMC, Otakaro
  Limited, and Regenerate Christchurch). Documents the five-year statutory
  recovery period after the 2010-2011 Canterbury earthquake sequence and
  provides the official accounting of the Crown's recovery programme.
