id: source.mbie_residential_red_zone_2017
title: "Canterbury Residential Red Zone - Programme Closure and Land Future Use"
author: "Otakaro Limited (Crown company)"
publisher: "New Zealand Government"
year: 2017
url: "https://www.otakaroltd.co.nz/"
type: government-report
credibility: official
geo_granularity:
  - canterbury
notes: >
  Documents the Crown's red-zone offer programme following the 2010-2011
  earthquakes - approximately 8,000 residential properties zoned for
  Crown purchase across Christchurch flat land. Otakaro Limited took
  over CERA's central-city anchor projects on disestablishment in 2016
  and remains the holder of programme records on land disposition,
  rebuild status, and future use.
