notes: >
  QuakeCoRE is New Zealand's Centre of Research Excellence for earthquake
  resilience, hosted at the University of Canterbury. Its annual reports
  cite peer-reviewed Christchurch-rebuild research, post-2011 building
  performance studies (including unreinforced masonry, multi-storey
  reinforced concrete, geotechnical liquefaction), and Cordon-Sanitary
  red-zone reuse studies. Foundational source for NZ seismic engineering
  practice debates.
