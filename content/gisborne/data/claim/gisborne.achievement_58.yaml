id: claim.gisborne.education.achievement_58
statement: Educational achievement in Gisborne (Tairāwhiti) is significantly below
  national averages, with NCEA Level 2 attainment at 65-68%. The region's 80%+ Māori
  population and high socioeconomic deprivation create compounding barriers; teacher
  recruitment and school resourcing constraints are acute in rural schools.
