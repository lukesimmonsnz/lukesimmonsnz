id: claim.gisborne.housing.affordability_04
statement: Housing affordability in Gisborne paradoxically coexists with high homelessness
  and housing stress. Median house prices ($300-350K) are lower than national averages,
  but median household incomes are 30-40% below national average, creating relative
  unaffordability and forcing multi-family occupancy.
