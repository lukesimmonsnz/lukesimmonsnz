id: claim.gisborne.environment.biodiversity_loss_32
statement: Biodiversity loss in Gisborne (NZ's most geologically active region) is
  driven by forestry conversion, pastoral farming, and erosion from steep terrain.
  Cyclone Gabrielle (February 2023) caused catastrophic erosion and forestry slash
  debris flows, destroying habitat and requiring accelerated catchment management.
