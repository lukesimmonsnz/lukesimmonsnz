id: claim.gisborne.transport.cyclone_damage_13
statement: Cyclone Gabrielle (February 2023) damaged infrastructure across Gisborne,
  destroying water supply lines, roading, and power systems. Wairoa district experienced
  most severe damage; infrastructure recovery cost $300-400M; climate resilience of
  rebuilt systems remains questionable without enhanced design standards.
