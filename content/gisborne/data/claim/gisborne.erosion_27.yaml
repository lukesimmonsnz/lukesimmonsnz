id: claim.gisborne.environment.erosion_27
statement: Soil erosion in Gisborne is extensive due to steep terrain, forestry harvest
  practices, and rainfall intensity. Erosion damages productive land at 200-300 hectares
  annually; sedimentation of waterways reduces fishery productivity and water quality,
  affecting downstream users.
