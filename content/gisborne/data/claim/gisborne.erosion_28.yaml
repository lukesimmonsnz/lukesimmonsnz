id: claim.gisborne.environment.erosion_28
statement: Erosion pressures in Gisborne are driven by forestry slash, pastoral conversion,
  and intense rainfall on steep slopes. Catchment sediment loads have increased 30-40%
  since 1990; community-scale erosion control projects are underfunded; regional coordination
  on forestry practices is inadequate.
