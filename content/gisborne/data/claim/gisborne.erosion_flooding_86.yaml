id: claim.gisborne.climate.erosion_flooding_86
statement: Gisborne communities face cascading erosion-flooding-debris hazards that
  intensify under extreme rainfall. Waiotahi, Uawa, and coastal communities experience
  recurrent flooding; debris flows from forestry erosion compound damage; adaptive
  management requires catchment-scale coordination and long-term funding.
