id: claim.gisborne.inequality.ethnic_gap_38
statement: Youth NEET rates in Gisborne are substantially above the national average;
  structural barriers — geographic isolation, limited vocational training, and seasonal
  labour market dependence — combine to limit transitions from secondary schooling
  into stable employment or further education for young people in high-deprivation
  communities.
