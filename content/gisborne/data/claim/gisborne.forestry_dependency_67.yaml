id: claim.gisborne.economy.forestry_dependency_67
statement: Gisborne's forestry sector (radiata pine, 35-40% of land use) creates landscape
  vulnerabilities including erosion risk and fire hazard. Slash management during
  harvest is inadequate; transition toward native forestry is limited by economic
  pressures; regional policy coordination is weak.
