id: claim.gisborne.economy.forestry_dependency_68
statement: Economic dependency on forestry in Gisborne creates environmental trade-offs
  including erosion, reduced biodiversity, and slash hazards. Sustainable forestry
  practices (longer rotation, native admixture, riparian buffers) remain limited due
  to financial pressures and limited market demand for alternative products.
