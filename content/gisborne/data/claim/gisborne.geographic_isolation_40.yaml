id: claim.gisborne.inequality.geographic_isolation_40
statement: Gisborne's geographic isolation creates structural economic disadvantages
  and service-delivery challenges. Distance from Auckland limits supply-chain efficiency;
  air freight costs are 2-3x ground freight; isolation contributes to 2-3% population
  outmigration annually, particularly young professionals.
