id: claim.gisborne.governance.governance_74
statement: Governance coordination in Gisborne is fragmented across multiple councils
  and central government agencies, creating inefficiencies in infrastructure planning
  and service delivery. Capacity constraints in smaller councils limit strategic foresight
  and project delivery speed.
