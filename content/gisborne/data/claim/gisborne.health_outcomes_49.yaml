id: claim.gisborne.health.health_outcomes_49
statement: Health service accessibility in Gisborne is severely constrained by workforce
  shortage and geographic isolation. Hauora Tairāwhiti faces GP shortages, nursing
  vacancies above 20%, and mental health service gaps; specialist services require
  2-4 hour travel to Rotorua or Whanganui.
