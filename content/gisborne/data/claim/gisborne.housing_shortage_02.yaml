id: claim.gisborne.housing.housing_shortage_02
statement: Housing quality and affordability pressures co-exist in Gisborne, with
  rental vacancies below 1-2% in urban areas. Essential workers (nurses, teachers,
  farm laborers) face housing stress, forcing commuting from more distant affordable
  areas or out-migration.
