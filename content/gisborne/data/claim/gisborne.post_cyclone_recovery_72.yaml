id: claim.gisborne.economy.post_cyclone_recovery_72
statement: Gisborne recovery from Cyclone Gabrielle faces coordination challenges
  across central government, local government, and affected communities. Layered impacts
  (housing, farming, infrastructure) require integrated response; funding debates
  between regions slow decision-making; recovery timelines are 5-10 years.
