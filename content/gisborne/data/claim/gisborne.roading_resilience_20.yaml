id: claim.gisborne.infrastructure.roading_resilience_20
statement: Gisborne roading system lacks redundancy and climate resilience, creating
  supply-chain and emergency-response vulnerabilities. Coastal roading is exposed
  to sea-level rise; inland routes face landslide/washout risk; alternative routes
  require major capital investment, estimated at $300-500M.
