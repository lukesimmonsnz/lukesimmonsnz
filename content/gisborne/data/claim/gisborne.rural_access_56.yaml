id: claim.gisborne.health.rural_access_56
statement: Health service access in Gisborne is constrained by workforce shortage
  and geographic isolation. Nursing vacancies and GP shortages are acute in rural
  areas; specialist services require travel, delaying diagnoses and treatment for
  chronic and acute conditions.
