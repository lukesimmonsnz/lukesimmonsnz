id: claim.gisborne.transport.sh35_roading_12
statement: 'SH35 roading corridor faces cascading hazards: coastal erosion, inland
  landslides, and river flooding. Maintenance funding remains inadequate; seismic
  risk (alpine fault proximity) is significant; system upgrade to four-lane standard
  is not feasible; managed retreat planning is necessary.'
