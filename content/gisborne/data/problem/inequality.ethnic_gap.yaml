summary: Gisborne — Te Tairāwhiti has persistent and deep socioeconomic disadvantage. The region has among
  the highest deprivation index scores in New Zealand; median household income in high-deprivation communities
  is 30-35% below the national median. The primary structural drivers are geographic isolation from major
  labour markets, a primary-sector economy with limited diversification, and chronically underfunded health
  and education infrastructure relative to need.
