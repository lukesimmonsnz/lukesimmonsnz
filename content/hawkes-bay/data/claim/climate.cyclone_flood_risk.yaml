id: claim.hawkes_bay.climate.flood_damage_2_3_billion
statement: Cyclone Gabrielle (February 2023) caused estimated flood damage of $3-5
  billion to Hawke's Bay — the largest civil defence emergency in New Zealand history
  — devastating Wairoa, Heretaunga Plains, Napier, and rural orchards. The event exposed
  critical gaps in surface water management and accelerated watershed-scale stormwater
  infrastructure planning across the region.
