id: claim.hawkes_bay.climate.drought_frequency_increase_1_in_4_years
statement: Dry years are projected to increase from 1-in-7 years (historical, 1960-2020)
  to 1-in-4 years under RCP 6.0 by 2070 in Hawke's Bay. Horticulture (apples, wine
  grapes in Gimblett Gravels) and dairy face heightened irrigation demand and aquifer
  depletion risk.
