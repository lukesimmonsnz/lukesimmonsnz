id: claim.hawkes_bay.climate.rainfall_intensity_15_20_percent_increase
statement: Climate projections indicate a 15-20% increase in extreme rainfall intensity
  (1-in-50-year storm magnitude) in Hawke's Bay by 2070. Cyclone Gabrielle (2023)
  demonstrated region's vulnerability; stormwater infrastructure across Napier, Hastings
  requires upgrade to manage 5-10cm rainfall events.
