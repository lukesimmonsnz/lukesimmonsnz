id: claim.hawkes_bay.crime.crime_rate_7200_per_100k
statement: Hawke's Bay crime rates (7,200 offences per 100,000 population annually)
  reflect geographic, economic, and social vulnerabilities. Property crime, family
  violence, and drug-related offenses impact community safety; police response capacity
  is constrained in rural and remote areas like Wairoa, limiting prevention effectiveness
  and victim support services.
