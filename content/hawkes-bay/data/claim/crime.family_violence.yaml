id: claim.hawkes_bay.crime.family_violence_2100_2400_incidents
statement: Family violence incidents in Hawke's Bay total approximately 2,250 per
  annum, with calls to NZ Police exceeding 3,000 annually due to repeat victimisation.
  Socioeconomic deprivation (particularly in Hastings and Wairoa) correlates with
  elevated family violence rates; prevention services and survivor support remain
  under-resourced relative to demand.
