id: claim.hawkes_bay.crime.family_violence_22_percent_increase
statement: Family violence call rates in Hawke's Bay increased 22% over 2019-2024,
  outpacing the national 15% increase. Economic stress from Cyclone Gabrielle recovery,
  housing insecurity, and deprivation-linked risk factors (alcohol/drug use, unemployment)
  compound vulnerability in Hastings, Napier, and Wairoa communities.
