id: claim.hawkes_bay.crime.youth_offending_35_percent_above_national
statement: Youth offending rates in Hawke's Bay are 35% above the national average,
  with Māori youth significantly overrepresented. Limited employment pathways, school
  disengagement, substance abuse, and family violence exposure drive youth into the
  justice system; rehabilitation and diversion programmes face resource constraints
  in Hastings and Wairoa.
