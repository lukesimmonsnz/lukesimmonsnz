id: claim.hawkes_bay.economy.cyclone_damage_6_8_billion
statement: Cyclone Gabrielle (February 2023) caused estimated economic damage of approximately
  $7 billion to Hawke's Bay, devastating agriculture, horticulture, and infrastructure.
  Recovery will strain regional budgets and business cash flow for 3-5 years; agricultural
  replanting costs, orchard restructuring, and soil remediation delay farm income
  recovery.
