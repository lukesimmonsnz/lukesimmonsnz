id: claim.hawkes_bay.economy.services_48_percent_employment
statement: Services sector employment in Hawke's Bay accounts for 48% of total employment,
  indicating modest diversification beyond agriculture and horticulture. Wholesale
  and retail, hospitality, and healthcare are growing; however, commodity price exposure
  (wine, fruit, dairy) remains dominant in gross regional income, limiting economic
  resilience to market shocks.
