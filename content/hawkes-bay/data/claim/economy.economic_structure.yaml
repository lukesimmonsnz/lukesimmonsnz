id: claim.hawkes_bay.economy.agriculture_22_percent_gdp
statement: Agriculture and horticulture generate approximately 22% of Hawke's Bay's
  gross regional product, compared to the national average of 6%. This concentration
  spanning wine (Gimblett Gravels, Dartmoor), apples, and kiwifruit creates vulnerability
  to commodity price fluctuations, climatic shocks (drought, flooding), and trade
  policy disruptions. The wine sector contributes NZD 220M+ to regional income annually.
