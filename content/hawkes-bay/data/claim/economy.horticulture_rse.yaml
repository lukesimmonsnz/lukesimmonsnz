id: claim.hawkes_bay.economy.rse_workers_2500_3500
statement: Horticultural production in Hawke's Bay (apples, kiwifruit, stone fruit,
  wine grapes) relies on approximately 3,000 seasonal workers via the Recognised Seasonal
  Employer (RSE) scheme, primarily from Pacific nations. RSE dependency creates labour
  market rigidity; post-harvest automation gaps and unfamiliarity with workplace rights
  expose workers to exploitation and wage undercutting.
