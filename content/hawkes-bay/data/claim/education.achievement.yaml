id: claim.hawkes_bay.education.maori_ncea_65_percent
statement: NCEA Level 3 attainment in Hawke's Bay is below national averages and shows
  steep school-deprivation gradients. Hastings and Wairoa schools in high-deprivation
  areas report elevated absenteeism and teacher recruitment shortages in rural areas,
  compounding curriculum delivery gaps in mathematics and science. Socioeconomic deprivation,
  family stress, and housing instability correlate with lower qualification rates
  and limited career pathways. Māori students are disproportionately concentrated
  in schools facing these barriers, producing gaps in credential attainment and long-term
  employment outcomes.
