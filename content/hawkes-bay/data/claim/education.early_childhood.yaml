id: claim.hawkes_bay.education.ece_participation_76_percent
statement: Early childhood education (ECE) participation in Hawke's Bay is 76%, slightly
  below the national average (80%). Rural areas including Wairoa and northern Hawke's
  Bay have limited ECE services; families in deprived communities face cost barriers
  and transport constraints. Inadequate ECE access widens achievement gaps before
  school entry.
