id: claim.hawkes_bay.education.ncea_l2_78_percent
statement: NCEA Level 2 attainment in Hawke's Bay stands at 78%, below the national
  average (84%), with widest gaps in Hastings and Wairoa. Curriculum delivery constraints
  (teacher shortages, limited STEM provision) and socioeconomic stress (food insecurity,
  housing instability, family violence) directly correlate with lower Level 2 completion
  rates, particularly among Māori and Pasifika students.
