id: claim.hawkes_bay.education.secondary_completion_81_percent
statement: Secondary school completion in Hawke's Bay is 81%, below the national average
  (86%). Hastings and Wairoa schools struggle with student absenteeism (25-30% chronic
  absence in some schools); school-to-employment transitions are weak, with limited
  youth apprenticeship pathways. Cyclone Gabrielle disruptions (2023) delayed school
  operations and assessment schedules in rural areas.
