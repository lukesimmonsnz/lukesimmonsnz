id: claim.hawkes_bay.education.tertiary_participation_35_percent
statement: Tertiary education participation in Hawke's Bay (age 18-25) is 35%, substantially
  below the national average (48%). Cost barriers, limited tertiary provision beyond
  Wairarapa Institute of Technology, and geographic remoteness (especially Wairoa)
  restrict access. School-leavers often migrate to Wellington/Auckland for tertiary
  study, creating brain drain and limited return migration to regional jobs.
