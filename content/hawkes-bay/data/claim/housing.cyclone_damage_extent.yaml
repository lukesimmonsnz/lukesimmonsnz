id: claim.hawkes_bay.housing.cyclone_damage_extent
statement: Cyclone Gabrielle (February 2023) damaged approximately 3,600 dwellings
  in Hawke's Bay, with Heretaunga Plains hit hardest (Napier, Hastings, surrounding
  rural areas). Damage severity ranged from minor slips to total loss; emergency housing
  shortages persisted 6-12 months post-event. Repair timeline stretches to 3-5 years,
  straining insurance, building contractor capacity, and displacement impacts on vulnerable
  families.
