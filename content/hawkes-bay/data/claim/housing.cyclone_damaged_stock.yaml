id: claim.hawkes_bay.housing.damaged_dwellings_3600
statement: Cyclone Gabrielle damaged stock remains estimated at 3,600 dwellings; 12
  months post-event (Feb 2024) approximately 40% were still in repair or temporary
  accommodation. Rental market tightness intensified post-Cyclone as insurers moved
  repairs out-of-scope and landlords deferred reinstatement. Repair cost inflation
  (labour, materials) and supply chain constraints extended timelines, deepening housing
  crisis for displaced low-income households.
