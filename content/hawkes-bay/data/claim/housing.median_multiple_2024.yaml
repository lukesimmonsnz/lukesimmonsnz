id: claim.hawkes_bay.housing.median_multiple_2024
statement: Housing affordability in Hawke's Bay has deteriorated; median house price-to-income
  ratio reached 6.8× in 2024 (up from 5.2× in 2019), entering severely-unaffordable
  territory (Demographia threshold > 6.0). Napier and Hastings see investor-driven
  demand; construction lags population growth; rental yields attract offshore capital,
  reducing owner-occupier access for young families and essential workers.
