id: claim.hawkes_bay.housing.median_rent_550_2026
statement: Median weekly rent in Hawke's Bay reached NZD 550 by 2024, with Napier
  CBD and Hastings inner suburbs commanding NZD 600-700 per week. The median rent-to-income
  ratio is 26% (versus the national figure of 23%), indicating elevated rental burden.
  Cyclone Gabrielle damage reduced available rental stock by an estimated 3-5%, pushing
  landlords toward rapid rent escalation; low-income families face displacement into
  emergency housing or informal arrangements.
