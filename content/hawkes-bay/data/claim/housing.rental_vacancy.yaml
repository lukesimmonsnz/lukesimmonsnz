id: claim.hawkes_bay.housing.rental_vacancy_1_5_percent
statement: Rental vacancy rates in Hawke's Bay stand at 1.5%, well below the 2.0%
  functional vacancy threshold. Napier and Hastings city centers report near-zero
  vacancy (< 0.5%), constraining search time for renters and shifting bargaining power
  entirely to landlords. Post-Cyclone Gabrielle scarcity has locked in higher rents;
  investors have deferred repairs to new-build properties, further restricting supply
  and affordability.
