id: claim.hawkes_bay.inequality.child_poverty_28_percent
statement: Child poverty (living in households below 50% of median income) affects
  28% of Hawke's Bay children, above the national average of 20%. Hastings and Wairoa
  report the highest rates at 35%+; Flaxmere schools serve predominantly below-threshold
  families. Food insecurity, inadequate housing, and parental underemployment (RSE,
  seasonal work) chain disadvantage across educational, health, and wellbeing outcomes.
