id: claim.hawkes_bay.inequality.deprivation_35_percent_households
statement: NZDep2018 analysis shows 35% of Hawke's Bay households (circa 28,000) in
  the most deprived quintile (Q5), concentrated in Hastings suburbs (Flaxmere, Maraenui,
  Central), Wairoa urban areas, and peripheral Napier. Deprivation deciles 9-10 cluster
  in Flaxmere (one of NZ's most deprived suburbs) and Wairoa; constrained primary
  care access, lower life expectancy, and chronic disease prevalence correlate with
  deprivation geography.
