id: claim.hawkes_bay.infrastructure.aquifer_stress_indices
statement: Aquifer stress indices in Hawke's Bay (Heretaunga Plains, central basin)
  indicate elevated groundwater extraction relative to recharge, exacerbated by drought
  (1-in-7 historical → 1-in-4 projected by 2070). Wine grapes and apple orchards in
  Gimblett Gravels draw heavily on confined aquifers; irrigation intensification risks
  long-term aquifer depletion and saline intrusion in coastal zones near Napier/Ahuriri.
