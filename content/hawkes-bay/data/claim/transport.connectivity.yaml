id: claim.hawkes_bay.transport.sh2_closure_duration
statement: State Highway 2 closures due to slips, flooding, or earthquakes isolate
  Wairoa from Napier/Hastings for average 3.5 weeks per major event cycle. Cyclone
  Gabrielle (Feb 2023) closed SH2 and SH5 for 8+ weeks, stranding Wairoa and cutting
  agricultural supply chains. Single-road dependency creates critical business continuity
  and emergency response vulnerabilities; rail infrastructure is freight-only (KiwiRail),
  lacking passenger resilience alternatives.
