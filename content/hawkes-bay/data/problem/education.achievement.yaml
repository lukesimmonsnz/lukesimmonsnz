narrative:
- heading: NCEA Attainment
  body: NCEA Level 2 attainment in Hawke's Bay is approximately 78%, compared to 85% nationally. Māori
    attainment is 65%.
- heading: Tertiary Entry
  body: University entrance qualification rates in Hawke's Bay are approximately 32%, compared to 42%
    nationally. Pacific student entry rates are particularly low at 15%.
