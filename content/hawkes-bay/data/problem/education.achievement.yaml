id: problem.hawkes_bay.education.achievement
title: Education achievement and attainment gaps
theme: education
section: education
subpage: achievement
parent: null
order: 1
updated: '2026-04-26'
summary: Hawke's Bay students achieve NCEA levels and tertiary entry at rates below the national average.
  Significant gaps exist between high-deprivation and more affluent schools, reflecting resource differentials,
  teacher turnover, and the compounding effect of household poverty on study conditions. Cyclone Gabrielle
  disrupted schooling in 2023, with high-deprivation communities sustaining the most prolonged disruption.
