  feedback_loops:
    - 'Habitat loss reduces ecosystem services; water quality declines; recreational value drops; investment in restoration shrinks.'
narrative:
  - heading: Biodiversity Decline
    body: "Native forest cover in Hawke's Bay is approximately 24% of the region, down from 60% pre-European settlement. Many endemic species are endangered."
  - heading: Estuary Degradation
    body: 'Ahuriri Estuary near Napier is polluted by stormwater and agricultural runoff. Fish diversity has declined; recreational value is compromised.'
