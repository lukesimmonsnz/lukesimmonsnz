    - 'Slow recovery demoralizes communities; out-migration accelerates; population base shrinks; tax revenues fall; council capacity further constrained.'
narrative:
  - heading: Coordination Gaps
    body: 'Recovery responsibility is unclear between councils, Health NZ, and central govt. Some households have received conflicting advice on support eligibility.'
  - heading: Decision Speed
    body: 'Average recovery support application processing takes 60-90 days. Meanwhile, households remain displaced or in damaged homes.'
