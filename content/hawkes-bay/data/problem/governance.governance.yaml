narrative:
  - heading: Fragmentation
    body: "Three territorial authorities (Napier, Hastings, Wairoa) operate independently with limited formal coordination mechanisms. Hawke's Bay Regional Council has limited direct service delivery powers."
  - heading: Cyclone Coordination
    body: 'Cyclone Gabrielle recovery has been hampered by unclear responsibility division. Some recovery initiatives overlap; others have gaps. Residents report confusion about which council to approach.'
