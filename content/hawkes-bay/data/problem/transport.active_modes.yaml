id: problem.hawkes_bay.transport.active_modes
title: Active transport mode accessibility and uptake
theme: transport
section: transport
subpage: active-modes
parent: problem.hawkes_bay.transport.connectivity
order: 2
updated: '2026-04-26'
summary: 'Cycling and walking infrastructure is fragmented and unsafe. Pedestrian and cycle networks in Napier and Hastings do not connect efficiently to schools, shops, or workplaces. Low mode share reflects lack of investment and suburban sprawl.'
manifests_in:
  - hawkes-bay
systems_model:
  state_variables:
    - active_mode_share_percent
    - cycle_network_km_connected
  inputs:
    - suburban_land_use_patterns
    - pedestrian_safety_perception
  constraints:
    - hilly_terrain_cycle_barriers
    - weather_rainfall_days
  feedback_loops:
    - 'Low uptake justifies lower investment; poor network deters new users; car dependence entrenches.'
narrative:
  - heading: Low Mode Share
    body: "Walking and cycling account for less than 5% of commute trips in Hawke's Bay, well below national averages."
  - heading: Network Fragmentation
    body: 'Cycling routes in Napier CBD are disconnected from suburban residential areas and schools, making it impractical for families.'
claim_ids:
  - claim.hawkes_bay.transport.active_mode_share_5_percent
status: draft
time_horizons: [decade, generation]
