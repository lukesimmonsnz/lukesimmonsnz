id: claim.manawatu_whanganui.climate.climate_risk_placeholder
statement: Cyclone Gabrielle (February 2023) caused flooding across Manawatū-Whanganui,
  with Whanganui city and surrounding districts experiencing significant inundation.
  The region faces compound flood risk from high rainfall, river overtopping, and
  coastal surge, particularly in low-lying areas of Horowhenua and Whanganui districts.
