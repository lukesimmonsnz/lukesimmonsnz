id: claim.manawatu_whanganui.climate.flood_risk_placeholder
statement: The Manawatū River is one of NZ's most flood-prone waterways, with major
  flood events in 1993, 2002, and recurring smaller floods. Whanganui River faces
  similar flood risk. Both rivers' catchments are heavily cultivated; sediment and
  runoff exacerbate downstream impacts. Regional flood management is core to Horizons'
  One Plan strategy.
