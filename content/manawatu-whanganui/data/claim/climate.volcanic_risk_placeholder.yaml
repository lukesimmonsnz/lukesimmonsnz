id: claim.manawatu_whanganui.climate.volcanic_risk_placeholder
statement: Mount Ruapehu (active volcano) last erupted 1995-1996 and 2007, generating
  lahars that threaten the Rangitikei and other catchments. Ruapehu district's ski
  fields (Whakapapa, Turoa) and infrastructure lie downslope. Volcanic ash and lahar
  hazard mitigation is critical to regional resilience planning and Ruapehu DC emergency
  management.
