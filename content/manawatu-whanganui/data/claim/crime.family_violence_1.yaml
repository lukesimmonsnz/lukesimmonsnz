id: claim.manawatu_whanganui.crime.family_violence_1
statement: Family violence (partner and child abuse) accounts for approximately 35-40%
  of reported violence-related offences in the Manawatū-Whanganui region. Whanganui
  city, with higher deprivation indices, records disproportionately higher family
  violence notification rates than Palmerston North or rural areas, correlating with
  socioeconomic stress factors.
