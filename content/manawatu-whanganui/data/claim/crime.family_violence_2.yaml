id: claim.manawatu_whanganui.crime.family_violence_2
statement: Manawatū-Whanganui has 3-4 domestic violence shelters operating at full
  or near-full capacity (Whanganui Women's Refuge, Palmerston North community services).
  Long waitlists and limited emergency accommodation gaps indicate unmet demand. Rural
  areas (Rangitikei, Tararua, Ruapehu) face significant access barriers to specialist
  support services.
