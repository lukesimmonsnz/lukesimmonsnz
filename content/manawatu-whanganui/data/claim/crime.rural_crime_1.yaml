id: claim.manawatu_whanganui.crime.rural_crime_1
statement: Rural crime (stock theft, farm theft, arson) across Rangitikei, Tararua,
  and Manawatū rural zones account for approximately 15-18% of property crime in the
  region. Farming families cite isolation, slow police response times, and minimal
  local security infrastructure as aggravating factors. Organized gang activity in
  rural areas has increased since 2020.
