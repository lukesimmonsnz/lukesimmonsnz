id: claim.manawatu_whanganui.crime.rural_crime_2
statement: Methamphetamine manufacturing and distribution has proliferated in rural
  Manawatū-Whanganui, particularly in Taihape, Waiouru, and isolated farm areas. Increased
  rural meth lab discoveries correlate with gang presence expansion and property crime
  spikes. Rural communities report reduced sense of safety and increased burglary
  targeting farm equipment and stored goods.
