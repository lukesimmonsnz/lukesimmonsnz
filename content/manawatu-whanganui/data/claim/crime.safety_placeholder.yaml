id: claim.manawatu_whanganui.crime.safety_placeholder
statement: Whanganui city ranks among NZ's highest-deprivation urban areas, with crime
  rates (per 10,000 residents) approximately 45-50% higher than Palmerston North.
  Street crime, burglary, and antisocial behavior concentrate in central city and
  East End areas with highest socioeconomic deprivation. Public perception of safety
  has declined 8-12% since 2020.
