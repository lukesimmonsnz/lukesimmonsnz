id: claim.manawatu_whanganui.crime.youth_offending_1
statement: Youth offending (ages 10-16) in Manawatū-Whanganui has risen approximately
  12% from 2019 to 2023. Whanganui city and Palmerston North's high-deprivation suburbs
  account for 60-65% of youth justice referrals. Risk factors include school disengagement,
  intergenerational poverty, family instability, and limited youth employment pathways.
