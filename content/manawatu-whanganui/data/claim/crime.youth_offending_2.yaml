id: claim.manawatu_whanganui.crime.youth_offending_2
statement: Youth gang recruitment and involvement have escalated in Manawatū-Whanganui
  since 2019, with gang presence in Whanganui, Palmerston North, and Waiouru. Youth
  programmes addressing offending (Massey University community outreach, youth employment
  initiatives, mentoring) remain under-funded relative to demand, with waiting lists
  for preventative intervention exceeding 6 months.
