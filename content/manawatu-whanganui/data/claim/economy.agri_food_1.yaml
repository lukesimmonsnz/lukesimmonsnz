id: claim.manawatu_whanganui.economy.agri_food_1
statement: Manawatū-Whanganui is one of New Zealand's most productive agricultural
  regions, with dairy farming dominating. Approximately 8,000 dairy farms and supporting
  pastoral operations generate NZ$4.2-4.8 billion in annual farm-gate value. Palmerston
  North serves as a regional agricultural services and logistics hub for processing
  and distribution networks.
