id: claim.manawatu_whanganui.economy.agri_food_2
statement: Fonterra (dairy processing) and Silver Fern Farms (meat processing) operate
  major plants in the region (Linton, Feilding, Whanganui areas), employing approximately
  2,200-2,500 direct workers. These anchor tenants generate significant downstream
  employment in transport, logistics, and food manufacturing. Food manufacturing is
  the region's second-largest employment sector after agriculture.
