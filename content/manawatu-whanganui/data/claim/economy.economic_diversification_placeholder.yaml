id: claim.manawatu_whanganui.economy.economic_diversification_placeholder
statement: Economic diversification remains limited in Manawatū-Whanganui; 45-48%
  of regional employment concentrates in agriculture, food processing, and logistics.
  Palmerston North's knowledge economy (Massey University, AgResearch, NZ Food Innovation
  Network, tech startups) employs approximately 4,500 workers and contributes NZ$800-900
  million to regional GDP, but growth is constrained by urban sprawl and talent retention
  challenges.
