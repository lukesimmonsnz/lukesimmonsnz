id: claim.manawatu_whanganui.economy.economic_structure_placeholder
statement: Palmerston North functions as a regional logistics and administrative hub,
  with major employers including Massey University (6,000+ students, 2,200+ staff),
  regional council offices, and freight/distribution companies. SH1, SH56, and SH57
  intersect at Palmerston North, making it NZ's central inland hub for road freight.
  Rail connections via Wellington Line support supply chains to Auckland, Christchurch,
  and Napier.
