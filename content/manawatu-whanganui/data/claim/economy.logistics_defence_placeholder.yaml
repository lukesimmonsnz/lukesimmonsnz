id: claim.manawatu_whanganui.economy.logistics_defence_placeholder
statement: 'The New Zealand Defence Force operates two major installations: Linton
  Military Camp (Palmerston North, approximately 2,500 personnel) and Waiouru Army
  Camp (approximately 1,000+ personnel). These bases employ approx. 3,500 direct military
  and civilian staff, generate significant regional spending, and anchor the economy
  of Waiouru (population approx. 1,000, entirely military-dependent). Annual NZDF
  spending in the region exceeds NZ$450 million.'
