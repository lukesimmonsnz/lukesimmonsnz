id: claim.manawatu_whanganui.education.achievement_placeholder
statement: 'Educational achievement in Manawatū-Whanganui shows regional disparity:
  Palmerston North schools report NZEA Level 2 attainment of approximately 72-75%,
  while Whanganui schools average 58-62%, and rural schools (Taihape, Ohakune, Taumarunui)
  60-65%. Socioeconomic deprivation and rurality correlate with lower attainment.
  Palmerston North''s proximity to Massey University supports higher tertiary participation
  rates.'
