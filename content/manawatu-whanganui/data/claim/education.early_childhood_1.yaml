id: claim.manawatu_whanganui.education.early_childhood_1
statement: Early Childhood Education (ECE) participation in Manawatū-Whanganui averages
  92-94% for ages 3-4, comparable to national levels. However, rural areas (Rangitikei,
  Tararua, Ruapehu) experience lower participation (86-88%) due to limited centre
  availability and transport barriers. Childcare costs in Palmerston North and Whanganui
  range NZ$65-85/day, affecting low-income family access.
