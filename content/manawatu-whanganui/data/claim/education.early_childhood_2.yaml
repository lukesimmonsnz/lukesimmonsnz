id: claim.manawatu_whanganui.education.early_childhood_2
statement: Whanganui city faces ECE workforce shortages; only 3-4 qualified early
  childhood teachers per 100 children served (below the recommended 1:6-8 ratio).
  Rural Manawatū-Whanganui has only 12-14 ECE services across 7 territorial authorities,
  creating significant gaps in Tararua, Rangitikei, and Ruapehu districts where some
  communities are served by single centres or none.
