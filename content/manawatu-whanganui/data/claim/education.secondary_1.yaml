id: claim.manawatu_whanganui.education.secondary_1
statement: Secondary schools in Manawatū-Whanganui serve approximately 28,000 students
  across 42 schools. Palmerston North (Palmerston North Boys' High, Palmerston North
  Girls' High) and Whanganui (Whanganui High School) are the region's largest secondary
  schools (each approx. 800-1,000 students). Rural areas have smaller, sometimes combined
  schools (e.g., Taihape Area School, Ohakune Community College) with limited subject
  choices and specialist services.
