id: claim.manawatu_whanganui.education.secondary_2
statement: School disengagement and truancy rates in Manawatū-Whanganui are elevated
  in high-deprivation areas. Whanganui reports 18-22% chronic absenteeism (>50 days/year
  absent), compared to 8-10% in Palmerston North and 10-15% rural. Secondary retention
  to Year 13 is 71-75% regionally, below the national average of 78-80%. Socioeconomic
  stress and limited post-secondary employment pathways drive early school leaving.
