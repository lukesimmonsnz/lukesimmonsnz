statement: Massey University Palmerston North campus enrolls approximately 6,000 students
  (regional and national), with strong programmes in agriculture, engineering, applied
  sciences, and business. AgResearch and the NZ Food Innovation Network operate research
  partnerships with Massey. University generates approximately NZ$1.2-1.3 billion
  in direct and indirect economic activity (salaries, student spending, local procurement)
  and attracts international students and researchers.
