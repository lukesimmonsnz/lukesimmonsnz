id: claim.manawatu_whanganui.education.tertiary_2
statement: Tertiary education access beyond university is limited in Manawatū-Whanganui;
  polytechnic and wānanga options are concentrated in Palmerston North (UCOL courses
  in business, health, trades). Whanganui and rural areas lack dedicated polytechnic
  facilities, forcing students to travel to Hamilton, Wellington, or Christchurch
  for vocational pathways. Youth from low-income families in Whanganui and rural areas
  have 15-20% lower tertiary participation than Palmerston North counterparts.
