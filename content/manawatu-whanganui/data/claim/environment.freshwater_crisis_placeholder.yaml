id: claim.manawatu_whanganui.environment.freshwater_crisis_placeholder
statement: The Manawatū River is one of New Zealand's most polluted riverways, with
  consistently high nitrate (15-20 mg/L, exceeding safe drinking water standards)
  and sediment loads. Agricultural runoff from intensive dairy farming is the primary
  contaminant source. Freshwater quality degradation threatens downstream wetland
  ecosystems, native fish populations, and aquatic biodiversity. Horizons' One Plan
  addresses river restoration but implementation lags behind targets.
