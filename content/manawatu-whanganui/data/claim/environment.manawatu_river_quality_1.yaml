id: claim.manawatu_whanganui.environment.manawatu_river_quality_1
statement: 'Manawatū River water quality has deteriorated 40-50% over the past 30
  years due to agricultural intensification and urban runoff. Sediment yield from
  the catchment exceeds 400 tonnes/km2/year, among NZ''s highest. Dissolved oxygen
  levels drop below 4 mg/L in summer months (hypoxia threshold), limiting native fish
  habitat. Horizons'' target: restore nitrate to <10 mg/L by 2050, requiring significant
  farm management changes.'
