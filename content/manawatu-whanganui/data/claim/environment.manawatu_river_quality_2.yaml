id: claim.manawatu_whanganui.environment.manawatu_river_quality_2
statement: E. coli contamination in the Manawatū River varies seasonally but frequently
  exceeds safe recreation thresholds (260 CFU/100mL guideline). Urban treatment plants
  in Palmerston North and Feilding contribute to point-source pollution; non-point
  agricultural runoff dominates. Maori health advisories and recreational swimming
  bans are common in summer. River restoration projects (riparian planting, constructed
  wetlands) involve Horizons, Rangitāne iwi, and local farmers but cover <10% of the
  catchment.
