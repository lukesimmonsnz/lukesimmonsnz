id: claim.manawatu_whanganui.environment.soil_erosion_1
statement: Soil erosion in Manawatū-Whanganui affects approximately 15-18% of productive
  farmland, particularly in hill-country areas (Tararua, Ruapehu, Rangitikei). Intensive
  dairy grazing, winter pugging (animal hoof damage), and deforestation of native
  bush have accelerated erosion and sediment loss. Eroded soil reduces farm productivity
  and contributes to river siltation. Conservation regimes (contour planting, riparian
  buffers) are adopted by approx. 25-30% of affected farmers.
