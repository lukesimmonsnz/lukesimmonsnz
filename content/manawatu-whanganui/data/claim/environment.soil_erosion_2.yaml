id: claim.manawatu_whanganui.environment.soil_erosion_2
statement: Soil carbon stocks in Manawatū-Whanganui agricultural soils have declined
  approximately 20-25% since 1990 due to intensive tillage, monoculture cropping,
  and reduced organic matter inputs. This loss reduces soil health, productivity,
  and carbon sequestration capacity. Regenerative agriculture adoption (cover crops,
  minimal tillage, rotational grazing) has increased from approx. 5% (2015) to approx.
  15% (2024), but scaling remains slow due to cost and knowledge barriers.
