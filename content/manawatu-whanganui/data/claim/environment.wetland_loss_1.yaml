id: claim.manawatu_whanganui.environment.wetland_loss_1
statement: Manawatū-Whanganui has lost approximately 85-90% of its pre-European wetland
  area (from approx. 18,000 hectares to approx. 2,000 hectares). Drainage for agriculture,
  urban development, and transport infrastructure (SH1, rail) destroyed critical wetland
  habitat. Remaining wetlands are fragmented and degraded. The region retains only
  2-3 major intact wetland systems (Himatangi Beach, Upper Manawatū, Whanganui estuary),
  all threatened by nutrient pollution and climate impacts.
