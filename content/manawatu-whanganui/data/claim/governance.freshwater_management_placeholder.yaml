id: claim.manawatu_whanganui.governance.freshwater_management_placeholder
statement: Horizons Regional Council's One Plan (2024 update) is New Zealand's first
  integrated regional resource management strategy, combining land, water, and air
  policy. It mandates riparian protection, nitrogen-loss reduction targets (10% by
  2030), and farm environment planning for all intensive farms. One Plan governs freshwater
  over the entire Manawatū-Whanganui region; compliance monitoring involves farmer
  consent orders and enforcement actions by regional rangers.
