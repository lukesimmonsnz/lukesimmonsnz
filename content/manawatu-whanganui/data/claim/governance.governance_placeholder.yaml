id: claim.manawatu_whanganui.governance.governance_placeholder
statement: Manawatū-Whanganui is governed by seven territorial authorities (Palmerston
  North CC, Whanganui DC, Manawatū DC, Rangitikei DC, Ruapehu DC, Tararua DC, Horowhenua
  DC) and one regional council (Horizons). This fragmented structure creates coordination
  challenges in land-use planning, social services, and infrastructure investment.
  Central government initiatives to merge councils (2024 proposal) face local resistance;
  governance complexity is identified as a constraint on economic development and
  service delivery efficiency.
