id: claim.manawatu_whanganui.governance.treaty_river_placeholder
statement: The Whanganui River was granted legal personhood in 2017 under the Te Awa
  Tupua Act, becoming the world's first river with this legal status. Whanganui Iwi
  hold joint stewardship with Crown. The river has its own governance board and dedicated
  funding for restoration. This precedent recognizes Māori cultural and spiritual
  values and has influenced freshwater governance nationally. Wider implementation
  of iwi co-governance in Manawatū-Whanganui remains uneven; Rangitāne involvement
  in Manawatū River management is growing but formal structures are still developing.
