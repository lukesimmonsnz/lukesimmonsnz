id: claim.manawatu_whanganui.health.chronic_disease_1
statement: Chronic diseases (type 2 diabetes, hypertension, cardiovascular disease)
  account for approximately 65-70% of mortality and 60-65% of disability in Manawatū-Whanganui.
  Diabetes prevalence is approximately 8-10% of the population, above national average
  (7-8%). Whanganui city and rural areas have higher prevalence and mortality rates
  than Palmerston North. Risk factors include high rates of obesity (approx. 35-38%
  of adults), smoking (18-22%), and sedentary lifestyles, correlating with socioeconomic
  deprivation.
