id: claim.manawatu_whanganui.health.chronic_disease_2
statement: Cardiovascular disease mortality in Manawatū-Whanganui is 18-22% above
  the national average, driven by high prevalence of risk factors (hypertension, high
  cholesterol, obesity, smoking). Whanganui city district records the highest district-level
  cardiovascular mortality rate in the region. Access to cardiac rehabilitation and
  preventive services is limited in rural areas (Tararua, Rangitikei, Ruapehu); patients
  often travel to Palmerston North or Wellington for specialist cardiology and interventional
  procedures.
