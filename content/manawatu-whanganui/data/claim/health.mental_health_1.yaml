id: claim.manawatu_whanganui.health.mental_health_1
statement: Mental health and psychological distress affect approximately 15-18% of
  the adult population in Manawatū-Whanganui, with anxiety and depression being the
  most prevalent conditions. Whanganui city and rural areas record higher rates of
  mental health service utilization and hospital admissions for mental health crisis
  than Palmerston North. Suicide rate in the region is approximately 13-15 per 100,000
  per year, slightly above national average (12-13), with elevated rates in rural
  areas (Rangitikei, Tararua, Ruapehu).
