id: claim.manawatu_whanganui.health.mental_health_2
statement: Mental health service capacity in Manawatū-Whanganui is constrained; approximately
  25-30% of people seeking support face waitlists exceeding 3 months. Rural areas
  (Tararua, Ruapehu, parts of Rangitikei) have minimal local mental health services,
  forcing patients to travel to Palmerston North or Whanganui. Community mental health
  teams operate in major towns but are under-resourced. Peer support and iwi-led mental
  health services (e.g., Rangitāne kaupapa Māori health) provide crucial gaps but
  remain underfunded relative to need.
