id: claim.manawatu_whanganui.health.rural_workforce_1
statement: Rural health workforce shortages affect Manawatū-Whanganui significantly.
  Approximately 40-50% of rural general practices lack a full-time GP; locum cover
  is common. Rural areas (Tararua, Rangitikei, Ruapehu, parts of Horowhenua) have
  nurse-led clinics, aged care gaps, and limited allied health (physiotherapy, psychology,
  dentistry) services. Recruitment and retention of rural health professionals is
  challenging; remuneration and lifestyle factors drive migration to urban centres.
  Health NZ is piloting rural workforce development programmes (2023-2024) to improve
  rural staffing.
