id: claim.manawatu_whanganui.health.rural_workforce_2
statement: Aged care workforce in Manawatū-Whanganui faces critical shortages as the
  population ages. Approximately 18-22% of the region's population is aged 65+; rural
  districts (Ruapehu, Rangitikei, Tararua) have even higher proportions (25-28%).
  Residential aged care facilities operate at capacity; home and community care provider
  networks are fragmented and underfunded. Rural areas struggle to attract care workers
  due to low wages, poor conditions, and limited housing. Recruitment costs and staff
  turnover (25-30% annually) strain aged care budgets.
