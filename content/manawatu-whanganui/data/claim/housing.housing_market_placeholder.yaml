id: claim.manawatu_whanganui.housing.housing_market_placeholder
statement: 'Manawatū-Whanganui''s housing market is bifurcated: Palmerston North median
  house prices increased from NZ$400,000 (2019) to NZ$520,000 (2024), reflecting strong
  demand from Massey students and urban migrants. Whanganui and rural areas saw more
  modest gains (NZ$250,000 to NZ$310,000), with lower investor demand. Owner-occupancy
  rates are 65-68% regionally, below the national average (70%+). Rental vacancy is
  tight (2-3%); rental affordability is under stress in Palmerston North, with median
  rents at 35-40% of median household income.'
