id: claim.manawatu_whanganui.housing.palmerston_north_growth_2
statement: Palmerston North's rental market is strained; student housing demand from
  Massey University drives competition for limited supply. Council-funded affordable
  housing initiatives (approximately 150-200 social housing units planned 2024-2028)
  aim to address needs of low-income and vulnerable households. Private rental stock
  averaged NZ$420-480/week (1-2 bedroom units) in 2024, up 30-35% from 2019. Rental
  affordability is most acute for families earning <NZ$50,000 p.a. and beneficiaries;
  ratios exceed 50% of household income.
