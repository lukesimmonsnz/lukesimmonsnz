id: claim.manawatu_whanganui.housing.rural_housing_1
statement: Rural housing in Manawatū-Whanganui is often in poor condition or owner-lacking
  maintenance investment. Approximately 12-15% of rural dwellings (particularly in
  Rangitikei, Tararua, Ruapehu) are substandard or lack adequate water, heating, or
  sanitation. Farm viability pressures (climatic stress, commodity price volatility)
  constrain household income for housing maintenance and improvements. Rural housing
  availability for agricultural workers and service professionals is constrained;
  limited new construction in small towns (Taihape, Ohakune, Levin) restricts options.
