id: claim.manawatu_whanganui.housing.rural_housing_2
statement: Rural housing in Manawatū-Whanganui faces climate and infrastructure challenges.
  Flooding risk (Manawatū River, tributary overtopping) affects properties in Foxton,
  Levin, and scattered rural homes; flood insurance has become prohibitively expensive
  or unavailable. Rural broadband and mobile coverage gaps affect housing attractiveness;
  high-speed internet access is available in <40% of rural properties, limiting remote
  work options for young families. Wastewater and water supply infrastructure in small
  communities is aging; capacity for new development is constrained by network limitations.
