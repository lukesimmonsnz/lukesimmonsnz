id: claim.manawatu_whanganui.housing.whanganui_deprivation_1
statement: Whanganui city has one of the highest housing deprivation rates in New
  Zealand (NZ Deprivation Index Quintile 5, most deprived). Approximately 30-35% of
  households live in housing classified as overcrowded, unheated, damp, or lacking
  access to adequate washing facilities. Public housing stock managed by Housing New
  Zealand / Kāinga Ora covers approximately 8-10% of the city's population, but demand
  far exceeds supply. Private rental stock is concentrated in older, low-quality buildings;
  median rents are lower than Palmerston North (NZ$300-350/week) but represent 45-50%
  of median household income due to low incomes.
