id: claim.manawatu_whanganui.housing.whanganui_deprivation_2
statement: Whanganui city council is implementing a housing revival strategy (2024-2034)
  targeting 500-600 new residential dwellings, renovation of existing housing stock,
  and incentives for residential conversion of vacant commercial buildings. Heritage
  preservation overlays and inner-city revitalization aim to improve housing quality
  and affordability. However, funding constraints, low development returns, and population
  decline (Whanganui population has declined approx. 3% since 2013) limit private
  investment. Council-led and community initiatives (Ngāti Toa Rangatira housing co-ops,
  Whanganui iwi housing partnerships) are expanding but remain under-resourced.
