id: claim.manawatu_whanganui.inequality.child_poverty_1
statement: Child poverty (0-17 years) in Manawatū-Whanganui affects approximately
  20-24% of children, above the national average (approx. 17-19%). Whanganui city
  has the highest rate (28-32%), followed by rural areas with dispersed poverty. Child
  poverty correlates strongly with parental unemployment, single-parent households,
  and benefit dependency. Food insecurity, educational underachievement, and health
  disparities (dental neglect, respiratory illness, obesity) are associated. School
  holiday and weekend meal programmes operate in Whanganui and Palmerston North disadvantaged
  zones to address gaps.
