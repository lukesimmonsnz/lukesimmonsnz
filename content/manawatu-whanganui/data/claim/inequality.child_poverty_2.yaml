id: claim.manawatu_whanganui.inequality.child_poverty_2
statement: Child nutrition support in Manawatū-Whanganui is provided through school
  lunch programmes (Whanganui District Schools, Palmerston North East End schools)
  and community food banks, but coverage is patchy. Approximately 35-40% of children
  in high-deprivation areas experience food insecurity (skipping meals, reduced portion
  sizes, poor diet quality). Cost-of-living crisis (2022-2024) has exacerbated childhood
  nutritional vulnerability. Community organisations (Feeding our Whānau, Gleaning
  networks, iwi-led food security projects) provide supplementary support but are
  under-resourced relative to demand.
