id: claim.manawatu_whanganui.inequality.deprivation_placeholder
statement: Manawatū-Whanganui ranks 6th-7th regionally for overall socioeconomic deprivation
  (Stats NZ 2018 Index). Whanganui city is Quintile 5 (most deprived nationally);
  Palmerston North is mixed (Quintiles 2-3); rural areas vary (Rangitikei, Tararua,
  Ruapehu mostly Quintiles 3-4). Deprivation correlates with unemployment (rural unemployment
  5-7%, urban 4-6%), household income (Whanganui median NZ$48,000 vs Palmerston North
  NZ$62,000), and access to services (health, education, transport). Cross-cutting
  deprivation reduction is a strategic priority across multiple councils.
