id: claim.manawatu_whanganui.inequality.rural_isolation_1
statement: Rural isolation in Manawatū-Whanganui affects approximately 15,000-18,000
  people living in dispersed settlements (Taihape, Ohakune, Raurimu, Taumarunui, Waiouru,
  rural Rangitikei). Limited public transport, high vehicle dependency, and geographic
  distance from services create structural isolation. Rural youth (ages 15-24) face
  limited employment and education opportunities; out-migration to Palmerston North
  or Wellington is significant (net outflow approx. 2-3% p.a.). Broadband gaps and
  mobile coverage dead zones exacerbate isolation by limiting digital access to employment,
  education, and social connection.
