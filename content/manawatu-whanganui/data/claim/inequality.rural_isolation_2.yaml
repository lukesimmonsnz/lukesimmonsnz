id: claim.manawatu_whanganui.inequality.rural_isolation_2
statement: Rural service access in Manawatū-Whanganui is constrained. Primary healthcare,
  secondary education, and specialist services concentrate in Palmerston North and
  Whanganui; rural areas require travel (30-90 minutes) for non-routine care. Rural
  schools are small (Taihape Area School, Ohakune Community College) with limited
  subject choice and staff; secondary students travel or board in larger towns. Community
  transport services (dial-a-ride, volunteer networks) operate sporadically; funding
  is insecure. Older people and those without vehicle access face compounding isolation
  and delayed healthcare access.
