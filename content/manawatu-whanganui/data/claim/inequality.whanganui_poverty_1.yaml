id: claim.manawatu_whanganui.inequality.whanganui_poverty_1
statement: Whanganui city has a poverty rate (below 60% of median household income)
  of approximately 32-36%, among the highest in New Zealand. Median household income
  is approximately NZ$48,000 (versus national median NZ$58,000). Benefit dependency
  is high (approximately 18-22% of working-age population on main benefits, vs national
  12-14%). Long-term unemployment and underemployment are persistent; unemployment
  rate in Whanganui averages 6-7%, versus Palmerston North 4-5%. Youth unemployment
  is even higher (12-15%), contributing to intergenerational poverty and limited economic
  mobility.
