id: claim.manawatu_whanganui.inequality.whanganui_poverty_2
statement: Whanganui's economy struggles to generate sufficient employment; dominant
  sectors (arts/culture, tourism, small retail) offer limited full-time, well-paid
  positions. Manufacturing and processing jobs have declined significantly (2010-2024).
  Benefit-to-employment transitions are slow; approximately 30-40% of working-age
  benefit recipients are classified as long-term jobseekers. Wage growth and job quality
  lag regional averages. Community employment initiatives (NZDF Waiouru proximity,
  heritage tourism, arts economy) are under-developed. Poverty reduction requires
  sustained multi-sector investment (education, mental health, employment support,
  housing) beyond current funding levels.
