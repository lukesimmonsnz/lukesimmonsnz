id: claim.manawatu_whanganui.infrastructure.digital_rural_1
statement: Rural digital infrastructure in Manawatū-Whanganui is fragmented. Broadband
  availability (10 Mbps or higher) covers approximately 65-70% of rural areas; the
  remaining 30-35% have unreliable 4G mobile or satellite-only options. Deployment
  costs for fibre and fixed wireless access are high in dispersed communities; uptake
  has been slower than urban areas. The National Broadband Initiative (2019-2028)
  targets 99%+ coverage, but rural implementation lags. Digital divide disadvantages
  rural businesses (agritech adoption, precision farming), remote workers, and education
  access.
