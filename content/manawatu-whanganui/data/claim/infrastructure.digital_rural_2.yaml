id: claim.manawatu_whanganui.infrastructure.digital_rural_2
statement: Mobile coverage gaps persist in rural Manawatū-Whanganui; approximately
  15-20% of rural land area lacks reliable cellular (3G or higher) coverage, particularly
  in Tararua, Rangitikei, and parts of Ruapehu. Farms, small communities (Taihape,
  Ohakune, Taumarunui), and state highways have dead zones causing emergency communication
  delays. Telecommunications companies cite low population density and profitability
  challenges as barriers to investment. Community-led and council-funded tower projects
  are emerging but are slow and underfunded. Digital access constraints limit agri-tech
  adoption, remote healthcare, and youth employment in rural areas.
