id: claim.manawatu_whanganui.infrastructure.infrastructure_placeholder
statement: Manawatū-Whanganui's core infrastructure (roading, water, wastewater, energy)
  faces significant renewal demands. Many rural water schemes operate with aging assets
  (30-50 years old); pipe breaks and water loss are common. Palmerston North's stormwater
  network is near capacity; climate change (increased rainfall intensity) threatens
  flooding. Wastewater treatment plants in regional towns (Whanganui, Feilding, Levin)
  require upgrades. Energy transition (local renewable generation, EV charging infrastructure)
  is beginning but coordination is weak. Council budgets are constrained; infrastructure
  funding gaps total approximately NZ$300-400 million over the next 10 years.
