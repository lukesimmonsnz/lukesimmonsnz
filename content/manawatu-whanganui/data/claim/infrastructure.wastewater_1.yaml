id: claim.manawatu_whanganui.infrastructure.wastewater_1
statement: Wastewater treatment in Manawatū-Whanganui is managed by territorial authorities;
  systems vary from modern treatment plants (Palmerston North) to aging systems (Whanganui,
  small rural towns). Palmerston North's treatment plant (Riverside) processes approx.
  35,000 m3/day; compliance with environmental discharge standards is generally met
  but margins are tight during wet weather. Whanganui's plant operates at 70-75% capacity;
  upgrades are planned (2025-2030). Rural schemes often use on-site or small community
  systems; approximately 20-25% of rural properties rely on septic tanks or poorly
  maintained systems, with occasional contamination of groundwater.
