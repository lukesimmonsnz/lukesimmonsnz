id: claim.manawatu_whanganui.infrastructure.wastewater_2
statement: Wastewater nutrient discharge (nitrogen, phosphorus) from treatment plants
  contributes to Manawatū River and tributary degradation. Palmerston North's plant
  discharges approximately 50-80 tonnes of nitrogen annually. Whanganui plant discharge
  similarly contributes to downstream impacts. Three Waters Reform (2024 proposal)
  seeks to centralize wastewater governance and increase investment in nutrient-removal
  upgrades. Costs are substantial (estimated NZ$150-200 million across the region);
  council budgets cannot sustain this alone. Central government co-funding is essential
  to meet environmental standards and support river restoration goals.
