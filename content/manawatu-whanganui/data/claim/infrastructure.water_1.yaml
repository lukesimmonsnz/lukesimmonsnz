id: claim.manawatu_whanganui.infrastructure.water_1
statement: Urban water supply in Manawatū-Whanganui relies on river abstraction (Manawatū
  River for Palmerston North, Whanganui River for Whanganui city) and some groundwater.
  Palmerston North abstracts approximately 45,000-50,000 m3/day; demand peaks at approx.
  55,000 m3/day in summer. Water losses through pipe leakage are approximately 18-22%
  (above national average 15%). Storage reservoirs are limited; drought risk under
  climate change is significant. Water pricing has increased (average household now
  NZ$800-900/year), affecting affordability for low-income households. Horizons' One
  Plan includes water demand management and efficiency targets.
