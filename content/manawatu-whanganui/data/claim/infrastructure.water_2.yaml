id: claim.manawatu_whanganui.infrastructure.water_2
statement: Rural water supply in Manawatū-Whanganui is highly fragmented; approximately
  45-50% of rural communities rely on small local schemes with limited treatment and
  storage. These systems are vulnerable to contamination (boil-water notices are common)
  and drought. Upgrade and consolidation of rural water schemes is a priority; estimated
  investment is NZ$80-120 million over 10 years. Whanganui District and smaller councils
  are coordinating scheme upgrades with central government support (Three Waters Reform).
  Challenges include funding, affordability for rural users, and water availability
  under climate stress in hill-country areas.
