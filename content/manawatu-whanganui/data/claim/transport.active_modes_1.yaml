id: claim.manawatu_whanganui.transport.active_modes_1
statement: 'Active transport (walking, cycling) usage in Manawatū-Whanganui is limited;
  approximately 8-10% of commute trips are active (below national 12-15%). Palmerston
  North has invested in cycle lanes and pedestrian infrastructure; the city targets
  12-15% mode share by 2030. Whanganui and rural areas have minimal cycle infrastructure.
  Weather (high rainfall, wind), terrain, and distance to work/school limit active
  mode adoption. Equity gaps exist: lower-income households are more likely to walk
  but face unsafe conditions; children''s independent mobility is constrained by traffic
  speeds and road design. Cycling and walking initiatives focus on school routes and
  urban centres.'
