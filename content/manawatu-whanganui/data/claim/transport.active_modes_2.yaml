id: claim.manawatu_whanganui.transport.active_modes_2
statement: Safe routes to schools initiative in Manawatū-Whanganui has improved walking
  and cycling infrastructure around 8-10 primary and secondary schools in Palmerston
  North and Whanganui. Traffic calming, crossing improvements, and footpath repairs
  have enabled modest increases in child active transport (4% to 6% of school trips).
  However, rural school students remain car-dependent; school bus services are limited
  and require long travel times. Winter weather and darkness (June-August) further
  suppress active mode use. Sustained investment in infrastructure maintenance and
  behaviour change campaigns is needed to increase active transport contribution to
  regional carbon reduction and health goals.
