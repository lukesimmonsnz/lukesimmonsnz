id: claim.manawatu_whanganui.transport.connectivity_placeholder
statement: Regional connectivity in Manawatū-Whanganui relies primarily on road networks
  (SH1, SH2, SH3, SH56, SH57). SH1 passes through Palmerston North and Levin, connecting
  to Auckland (3 hours) and Wellington (2.5 hours). Rail connections (Wairarapa Line,
  Wellington-Hamilton route) link Palmerston North to other regions but passenger
  service is limited (daily Metlink service to Wellington, plus Scenic Great Northern
  Limited services). Bus services (Horizons, local contractors) provide regional connections
  but are declining in frequency. Road freight is dominant (98% of goods); rail carries
  minimal freight. Transport investment is highly vehicle-focused, limiting travel
  options for carless populations.
