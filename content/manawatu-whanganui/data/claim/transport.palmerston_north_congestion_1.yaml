id: claim.manawatu_whanganui.transport.palmerston_north_congestion_1
statement: Palmerston North experiences increasing traffic congestion, particularly
  at peak hours (7-9 am, 4-6 pm) on main arterials (SH1 northbound/southbound, Range
  Road, Church Street). Congestion at the Freyberg Road/SH1 intersection averages
  8-12 minute delays during peak hours; freight routing adds to congestion. Population
  growth (2.5-3% p.a.) is outpacing road capacity and public transport. Traffic modelling
  suggests congestion will worsen 20-30% by 2035 without intervention (increased PT,
  demand management, roading upgrades). Freight volumes are projected to grow 25-30%
  over the next decade as Palmerston North's logistics hub role expands.
