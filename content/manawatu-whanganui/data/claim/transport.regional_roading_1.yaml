id: claim.manawatu_whanganui.transport.regional_roading_1
statement: Regional roading in Manawatū-Whanganui is aging; approximately 35-40% of
  local roads are in fair or poor condition (NZTA classification). Rural roads (Rangitikei,
  Tararua, Ruapehu) experience higher maintenance costs due to topography, weather
  exposure, and isolated communities. Road user charges and fuel excise tax generate
  insufficient revenue to meet renewal demand; councils face maintenance backlogs
  (estimated 5-7 years) and deferred upgrades. Heavy freight volumes (dairy, sheep,
  grain) accelerate pavement wear. Intersection safety on SH1 and rural state highways
  remains a concern; fatal and serious injury crashes average 12-15 per year regionally,
  above per-capita national rates.
