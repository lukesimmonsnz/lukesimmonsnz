id: claim.manawatu_whanganui.transport.regional_roading_2
statement: Rural road safety in Manawatū-Whanganui reflects risk factors including
  high speeds, poor visibility (curves, weather), limited passing lanes, and driver
  fatigue (long commutes). SH3 (Ohakune to Waiouru section), SH1 (Rangitikei section),
  and Tararua rural roads experience elevated crash rates. Māori and rural community
  death rates from transport accidents are significantly elevated; approximately 18-22%
  of regional transport fatalities involve Māori, despite representing approx. 10-12%
  of regional population. Speed management, road maintenance, and driver education
  initiatives (Vision Zero programs) are underway but underfunded relative to scale
  of problem. Terrain and weather (alpine passes, winter snow/ice) make some routes
  inherently high-risk.
