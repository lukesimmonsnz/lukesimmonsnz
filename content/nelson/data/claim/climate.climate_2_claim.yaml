id: claim.nelson.climate.climate_2_claim
statement: Nelson region faces elevated climate risk due to geographic exposure and
  infrastructure vulnerability. Mean temperature increased 1.1°C 2000-2022 relative
  to 1970-1999 baseline; annual rainfall variability increased 12% over the same period,
  with intensified summer droughts and extreme weather events becoming more frequent,
  stressing water, agriculture, and infrastructure systems.
