id: claim.nelson.climate.climate_3_claim
statement: Nelson region was severely affected by the January 2022 Nelson-Tasman wildfires,
  with approximately 2,200 hectares burned in the Pigeon Valley and Moutere Hills
  area — New Zealand's most significant wildfire event in the modern record, displacing
  over 2,000 residents. Wildfire risk is accelerating due to longer fire seasons,
  drier vegetation, and increased ignition sources; fire modelling indicates a 40%
  increase in high-fire-danger days by 2050.
value: 2200
unit: hectares burned (Nelson portion, 2022)
