id: claim.nelson.climate.climate_4_claim
statement: Nelson-Tasman water availability is under sustained pressure. The Waimea
  Plains aquifer supplies 70% of municipal and agricultural water; summer restrictions
  are now standard (last five years all had seasonal restrictions July-February).
  Maitai Dam yield has declined 8-12% relative to design assumptions due to climate-altered
  snowmelt and rainfall patterns; demand is projected to exceed sustainable yield
  by 2035 without demand reduction.
