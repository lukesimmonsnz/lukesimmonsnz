id: claim.nelson.climate.climate_risk_claim
statement: Nelson city is exposed to sea level rise and coastal inundation. Port Nelson
  and the central city lie 0–1.5 m above mean high water spring tide. MBIE climate
  projections estimate 0.75 m mean sea level rise by 2100 under RCP 4.5 scenario;
  combined with storm surge and subsidence risk from the Waimea Fault zone, routine
  high-tide flooding of port infrastructure and CBD fringe zones is likely by 2055–2070.
value: 0.75
