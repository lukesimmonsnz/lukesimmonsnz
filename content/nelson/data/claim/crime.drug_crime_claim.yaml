id: claim.nelson.crime.drug_crime_claim
statement: Drug-related offending in Nelson has increased 18% 2019-2023, with methamphetamine
  availability and use becoming the primary driver of acquisitive crime. NZ Police
  data shows 340+ drug-related offences recorded in Nelson district in 2023, with
  synthetic drugs (methamphetamine, fentanyl derivatives) comprising 62% of seizures.
  Retail supply networks are increasingly active in outer suburbs.
