id: claim.nelson.crime.family_violence_claim
statement: Family violence is the most prevalent form of criminal harm in Nelson-Tasman
  district. NZ Police recorded 1,240 family violence notifications in Nelson city
  and district 2023, representing 34% of all serious offences reported. Incident frequency
  has grown 7% year-on-year; intimate partner violence and child abuse cases each
  comprise approximately 40% of notifications, with barriers to reporting (isolation
  in rural areas, economic dependency) limiting identification of cases.
