id: claim.nelson.crime.youth_offending_claim
statement: Youth offending in Nelson is concentrated in ages 14-19, with 680+ youth
  offences recorded 2023 (ages 10-24 category). Vehicle crime, burglary, and disorder
  offences are primary categories. School disengagement is a known precursor; MOE
  data shows 8.2% absenteeism rate in Nelson secondary schools vs. 6.1% national average.
  Maori and Pacific youth are disproportionately represented, comprising 44% of youth
  offenders despite representing 22% of the youth population.
