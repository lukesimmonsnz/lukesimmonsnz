id: claim.nelson.economy.economic_2_claim
statement: Port Nelson is New Zealand's largest commercial fishing port by volume,
  handling approximately 25% of the nation's total fish catch and landing 130,000–160,000
  tonnes annually. The port directly employs 1,200+ workers in fishing operations,
  processing, and logistics; export revenue is $620–750 million annually. However,
  marine stock sustainability pressures and quota reductions have constrained catch
  projections, reducing growth prospects.
