id: claim.nelson.economy.economic_3_claim
statement: Nelson-Tasman horticulture sector generates $280–320 million in annual
  revenue from apples, kiwifruit, and pipfruit production on approximately 8,900 hectares.
  Employment in primary production (horticulture, viticulture, aquaculture) is 2,100+
  FTE. Rising input costs (labour, water, pest management due to climate stress),
  water availability constraints, and labour shortages limit expansion; grower incomes
  have been flat or declining 2019-2024 in real terms.
