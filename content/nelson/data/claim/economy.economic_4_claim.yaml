id: claim.nelson.economy.economic_4_claim
statement: Tourism is a major economic driver, contributing $180–210 million to regional
  GDP and supporting approximately 3,200 FTE jobs (hospitality, accommodation, attractions,
  transport). Nelson's brand (sunshine capital, arts and crafts, outdoor recreation,
  wine) draws 1.2–1.5 million visitor nights annually. However, labour shortages in
  hospitality, seasonal volatility, and post-COVID revenue recovery have constrained
  sector expansion; capacity utilization averages 68% outside summer months.
