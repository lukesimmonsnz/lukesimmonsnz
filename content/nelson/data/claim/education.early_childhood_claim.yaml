id: claim.nelson.education.early_childhood_claim
statement: Early childhood education (ECE) access in Nelson-Tasman is constrained
  by cost and availability. Licensed ECE centres serve approximately 3,100 children
  (ages 0-5), but 28% of eligible children are not in any formal ECE. Full-time fees
  at community centres average $185–210/week, representing 16–19% of median household
  income for low-income families vs. 6–7% for above-median earners. Waitlists are
  common in peak seasons, limiting parental workforce participation.
