id: claim.nelson.environment.coastal_environment_claim
statement: 'Tasman Bay and Nelson''s coastal environments are under stress from cumulative
  pressures: eutrophication from land runoff, sedimentation from deforestation and
  pastoral use, and harvesting pressure on rock lobster and other shellfish. Macroalgal
  blooms have increased in frequency and duration; seagrass beds have receded by 15–20%
  over the last 15 years. Port Nelson operations generate noise and light pollution
  affecting marine mammals (seals, dolphins) in the inner harbour.'
