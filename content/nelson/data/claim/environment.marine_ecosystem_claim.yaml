id: claim.nelson.environment.marine_ecosystem_claim
statement: The marine ecosystem around Port Nelson is shaped by high-volume fishing
  extraction. Approximately 130,000–160,000 tonnes of fish and seafood are landed
  annually; bycatch and discard practices affect ecosystem composition. Rock lobster
  catch has declined 22% 2015-2023; snapper stocks remain under pressure. Aquaculture
  expansion (salmon, mussel farms) in Port Nelson and Golden Bay is managed under
  strict spatial planning but creates localized impacts on benthic habitat and water
  quality.
