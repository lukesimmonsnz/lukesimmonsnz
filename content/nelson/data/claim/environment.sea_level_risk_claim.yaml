id: claim.nelson.environment.sea_level_risk_claim
statement: Sea level rise poses cumulative risk to Nelson coastal infrastructure.
  MBIE climate projections estimate 0.75 m mean sea level rise by 2100 under RCP 4.5
  mitigation scenario; worst-case RCP 8.5 projects 1.2 m rise. Combined with storm
  surge (historical spring tides + 1 m surge common), Port Nelson entrance and CBD
  fringe (0–1.5 m elevation) face routine inundation by 2055–2070. Groundwater salinization
  is already measurable in wells within 2 km of coast.
value: 0.75
