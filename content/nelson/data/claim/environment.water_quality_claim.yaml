id: claim.nelson.environment.water_quality_claim
statement: Maitai River water quality has declined over the last decade due to increased
  sedimentation from forestry operations, pastoral runoff, and urban stormwater. Nitrate
  concentrations have increased 28% 2010-2023; pathogenic bacteria (E. coli) exceed
  safe swimming thresholds on 12–15 days per summer season. The Maitai is a key recreation
  asset and primary water source; water treatment costs have increased 14% to manage
  contamination. Waimea River shows similar pressures.
