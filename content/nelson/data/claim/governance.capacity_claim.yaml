id: claim.nelson.governance.capacity_claim
statement: Nelson City Council faces significant governance capacity constraints.
  The organisation manages a budget of $220+ million for a population of 55,000 residents
  but operates with staffing levels 8–12% below functional requirements for planning,
  resource management, and infrastructure delivery. Senior leadership turnover is
  high (40% change 2019-2024); vacancy rates in specialist roles (hydrogeologist,
  infrastructure engineer, transport planner) are chronic. Institutional knowledge
  loss and project delays are documented impacts.
