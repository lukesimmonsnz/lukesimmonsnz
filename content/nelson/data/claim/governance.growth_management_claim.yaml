id: claim.nelson.governance.growth_management_claim
statement: Rapid lifestyle-driven population growth (forecast +1.8% p.a. 2023-2038)
  is outpacing infrastructure and planning capacity. Nelson's urban boundaries are
  constrained by the Moutere and Waimea faults, coastal hazard zones, and conservation
  areas; buildable land supply is limited to ~800 hectares over 15 years. Housing
  intensification policies in the District Plan are contested; feasibility of intensification
  is constrained by heritage character overlays and narrow lot patterns. Growth management
  frameworks exist but enforcement is weak relative to development pressure.
value: 1.8
