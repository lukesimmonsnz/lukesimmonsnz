id: claim.nelson.housing.infrastructure_cost_claim
statement: 'Infrastructure cost barriers to housing development are material in Nelson.
  New subdivision development is constrained by high per-lot infrastructure costs:
  water reticulation extension averages $35,000–50,000/lot (vs. $15,000–25,000 nationally
  due to geographic dispersion and aging Maitai Dam dependency); wastewater treatment
  augmentation costs $28,000–42,000/lot; stormwater and roading add another $20,000–35,000/lot.
  Total greenfield development cost is $83,000–127,000/lot before land cost, pushing
  minimum lot values above $180,000 and new-build price points above $800,000.'
