id: claim.nelson.housing.land_supply_claim
statement: Buildable land supply in Nelson is constrained by natural and planning
  boundaries. Approximately 800 hectares of zoned residential and mixed-use land are
  available for development over 15 years (medium growth scenario); however, ~220
  hectares are encumbered by heritage overlays, flood risk zones, or cultural heritage
  sites that limit developability. Current take-up is 45–55 hectares/year; at this
  rate, competitive supply pressure will intensify 2026 onward. Tasman District has
  marginally more supply (950 hectares) but weaker demand; coordination is weak.
value: 800
