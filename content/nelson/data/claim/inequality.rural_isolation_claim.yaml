id: claim.nelson.inequality.rural_isolation_claim
statement: Rural isolation in Nelson-Tasman is a significant driver of service access
  inequality, particularly in Golden Bay. Golden Bay (population ~2,500, centred on
  Takaka) is approximately 105 km by road from Nelson city, requiring a crossing of
  Takaka Hill (a narrow, winding mountain pass) with seasonal closure risk and no
  public transport connection. Healthcare access requires travel to Nelson (approximately
  90 minutes); secondary education requires boarding or distance learning; broadband
  coverage in rural Nelson-Tasman is 78% versus 96% in urban areas; rural income levels
  run 12-18% below urban average, and youth out-migration is chronic.
value: 105
