id: claim.nelson.infrastructure.infrastructure_claim
statement: Nelson's core infrastructure faces cumulative deferred maintenance and
  capacity constraints. Three Waters (water, wastewater, stormwater) assets require
  $180–220 million in maintenance and renewal over 10 years; current budget allocation
  is $120 million, creating a backlog. Stormwater management is undersized for climate-altered
  rainfall intensity; three flood events in 2021-2023 caused $8–12 million in damage.
  Wastewater treatment plant at Bells Island requires $35–45 million upgrade by 2028.
  Roading network maintenance backlog is $45 million; SH6 and SH60 are under-resourced
  for growing traffic. Asset management systems are incomplete; condition data are
  fragmented across systems.
