id: claim.nelson.transport.connectivity_claim
statement: Nelson's regional connectivity is constrained by the absence of rail and
  limited air capacity. The region relies on State Highway 6 (to Blenheim/Marlborough
  and south) and SH60 (to Tasman); both are single-lane in sections, creating bottlenecks
  during peak travel and poor resilience to closures. No direct rail service to Wellington
  or Christchurch exists; long-distance coach services (Intercity, regional operators)
  provide 2–3 daily services, with journey times 5–7 hours. Nelson Airport handles
  ~280,000 passengers annually (primarily domestic); international routes are limited
  to seasonal charters. Road transport dominance creates cost, emissions, and resilience
  vulnerabilities.
