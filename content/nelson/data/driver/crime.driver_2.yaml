name: Methamphetamine supply network and treatment-capacity gap
description: National methamphetamine supply has reached saturation in Nelson retail markets while local addiction-treatment capacity is configured for moderate caseloads. The gap between supply intensity and treatment throughput is the proximate driver of drug-related and acquisitive offending.
