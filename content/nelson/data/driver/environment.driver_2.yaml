name: Cumulative land-use and discharge pressure on shared catchments
description: Forestry harvest cycles, pastoral nutrient loss, urban stormwater, and direct port-related discharges combine in the Maitai, Waimea, and Tasman Bay receiving environments. Individual consents do not capture the cumulative load; cross-jurisdictional coordination is partial.
