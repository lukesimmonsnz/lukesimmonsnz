id: driver.nelson.health.driver_2
name: Demographic ageing and concentrated deprivation
description: Nelson's age structure skews older than the national average, raising chronic-disease prevalence and demand on primary and secondary care. Concentrated deprivation in particular suburbs compounds the age effect through accumulated lifestyle exposures.
