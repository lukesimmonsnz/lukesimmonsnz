narrative:
- heading: A multi-hazard climate envelope
  body: Nelson's small size and concentrated valley geography mean a single weather pattern can stress water supply, fire risk, and stormwater systems at once. The August 2022 storm produced concentrated rainfall and slips across the Maitai and Brook catchments and damaged hundreds of properties, while just months earlier the region had been managing through a long summer drought. Climate change is projected to widen this swing between extremes.
- heading: Adaptation gap and institutional load
  body: Adaptation planning is led by Nelson City Council and Tasman District Council, with statutory obligations under the Climate Change Response Act and the National Adaptation Plan. Capital renewals for stormwater and three-waters infrastructure already lag the maintenance baseline; additional adaptation investment competes against deferred maintenance and growth-driven capacity upgrades within the same constrained rates base (claim.nelson.climate.climate_2_claim).
