id: problem.nelson.climate.climate_risk
title: Compounding climate risk in the Nelson basin
theme: climate-adaptation
section: climate
subpage: climate_risk
parent: null
order: 1
updated: '2026-04-26'
summary: 'Nelson sits at the confluence of several climate-amplified hazards: elevated wildfire risk in dry summer hill country, rainfall-runoff flooding in the Maitai and Brook catchments, and creeping coastal inundation around Port Nelson. Mean annual temperature has risen about 1.1 degrees C since the 1970-1999 baseline, and rainfall variability is intensifying, stressing water, agriculture, and infrastructure systems simultaneously.'
