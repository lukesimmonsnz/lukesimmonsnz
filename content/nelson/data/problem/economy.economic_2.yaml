id: problem.nelson.economy.economic_2
title: Port Nelson and the seafood cluster
theme: economy
section: economy
subpage: economic_2
parent: economic_structure
order: 2
updated: '2026-04-26'
summary: Port Nelson is New Zealand's largest commercial fishing port by volume, handling roughly 25 percent of national landings and between 130,000 and 160,000 tonnes annually. The port directly employs over 1,200 workers in fishing, processing, and logistics, with annual export revenue of $620-750 million. Stock-sustainability pressures and quota reductions are constraining catch growth.
