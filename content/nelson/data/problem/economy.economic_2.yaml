narrative:
- heading: An industry-anchor port
  body: Port Nelson and the surrounding seafood cluster are the dominant single anchor of Nelson's tradable economy (claim.nelson.economy.economic_2_claim). Sealord, Talley's, United Fisheries, and a tier of smaller processors employ directly and through a thick network of marine engineering, vessel maintenance, and logistics suppliers.
- heading: Stock, quota, and climate constraints
  body: The Quota Management System and ongoing stock assessments have already tightened catch limits in several Nelson-landed fisheries; rock-lobster catch has fallen around 22 percent since 2015. Marine heatwaves and shifting species ranges add a climate-risk overlay that is not yet fully priced into long-run capital investment in the cluster.
