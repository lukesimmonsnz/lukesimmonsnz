  feedback_loops:
  - 'Input-cost-accommodation feedback: rising input costs push growers to accept tighter margins; thin margins discourage capital investment in worker accommodation, deepening the labour bottleneck.'
narrative:
- heading: Anchor crops and structural margin compression
  body: 'The Tasman district and Nelson rural fringe host one of New Zealand''s densest fruit-growing regions, anchored by apples (particularly the Heretaunga / Motueka growing belt) and supported by hops, kiwifruit, and emerging crops (claim.nelson.economy.economic_3_claim). Margin compression is real: input costs have outpaced farmgate prices for several seasons.'
- heading: Labour and water as the binding constraints
  body: Seasonal labour comes mainly through Recognised Seasonal Employer (RSE) workers and working-holiday visa holders, with grower-supplied accommodation an increasingly binding bottleneck. Water reliability through the Waimea Community Dam improves the irrigation outlook but does not remove the longer-run climate risk to yields and pest pressure.
