id: problem.nelson.economy.economic_3
title: Horticulture under input-cost and water pressure
theme: economy
section: economy
subpage: economic_3
parent: economic_structure
order: 3
updated: '2026-04-26'
summary: Nelson-Tasman horticulture (apples, kiwifruit, pipfruit, hops) generates around $280-320 million in annual revenue across roughly 8,900 hectares and supports more than 2,100 FTE in primary production. Rising input costs (labour, water, pest management), water-availability constraints, and seasonal-labour shortages have left grower incomes flat or declining in real terms since 2019.
manifests_in:
- nelson
systems_model:
  state_variables:
  - horticulture_revenue_nzd_m
  - hectares_in_production
  - rse_seasonal_workers
  inputs:
  - water_allocation
  - labour_visa_settings
  - international_fruit_price
  constraints:
  - seasonal_accommodation_capacity
