narrative:
- heading: Headline gap and its composition
  body: Nelson's overall NCEA achievement sits modestly below the national average, but the more important pattern is the internal gap between high- and low-decile schools (claim.nelson.education.achievement_claim). The gap maps closely onto household income and accumulated material deprivation rather than onto school quality alone.
- heading: Pathway after Year 13
  body: Even where Level 2 is achieved, post-school pathways are thin. Only about 32 percent of Nelson secondary leavers progress directly to tertiary education, against around 48 percent nationally; many leave for university in Wellington or further south. The result is structural out-migration of the most-qualified school leavers and weak in-region labour-market signal back to schools about pathway value.
