id: problem.nelson.education.achievement
title: NCEA achievement gap by decile and ethnicity
theme: education
section: education
subpage: achievement
parent: null
order: 1
updated: '2026-04-26'
summary: 'About 72 percent of Nelson secondary students achieve NCEA Level 2 or above, against approximately 78 percent nationally. Within that headline are large gaps: Maori students achieve at 58 percent against 80 percent for Pakeha, and decile 1-3 schools achieve at 64 percent against 82 percent at decile 9-10. Transitions to tertiary or trades remain below optimal.'
