id: problem.nelson.education.secondary
title: Secondary engagement and the chronic absentee tail
theme: education
section: education
subpage: secondary
parent: achievement
order: 3
updated: '2026-04-26'
summary: Chronic absenteeism (10 percent or more absence) affects about 8.2 percent of Nelson secondary students against around 6.1 percent nationally. Suspension and stand-down rates are elevated (4.8 per 1,000 students against 3.9 nationally), with disproportionate impact on Maori and Pacific students. Early leaving before Year 12 completion remains a persistent pattern, particularly in outer suburbs and rural areas.
