  feedback_loops:
  - 'Absenteeism-attainment feedback: chronic absenteeism drives attainment loss, which raises stand-down rates, which deepen disengagement, accelerating the slide out of secondary school.'
narrative:
- heading: The disengagement tail
  body: The bulk of Nelson secondary students are well engaged, but a tail of around one-in-twelve are chronically absent and at high risk of leaving without Level 2 (claim.nelson.education.secondary_claim). The same cohort shows up in youth-justice and mental-health caseloads, indicating shared underlying drivers rather than three separate problems.
- heading: Wraparound supply vs need
  body: Alternative-education places, attendance-officer capacity, and youth-mental-health navigation are funded intermittently and well below need. Schools carry the residual load through pastoral teams that are themselves under workforce pressure.
