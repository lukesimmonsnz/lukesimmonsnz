narrative:
- heading: Extraction and trophic structure
  body: Sustained high extraction across multiple species reshapes trophic structure rather than simply reducing target-species biomass (claim.nelson.environment.marine_ecosystem_claim). Recovery rates are slow even after quota cuts, because habitat (kelp, scallop, seagrass beds) takes longer to rebuild than fish biomass.
- heading: Aquaculture as substitution, not solution
  body: Mussel farming is a relatively low-impact production system, but salmon farming in particular has localised nitrogen and benthic effects. Aquaculture relieves pressure on wild stocks only at high industry scale, and siting decisions are politically contested in Golden Bay and Tasman Bay.
