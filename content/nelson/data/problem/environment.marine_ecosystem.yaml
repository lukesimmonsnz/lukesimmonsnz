id: problem.nelson.environment.marine_ecosystem
title: Fishing pressure and aquaculture footprint in Tasman Bay
theme: environment
section: environment
subpage: marine_ecosystem
parent: coastal_environment
order: 4
updated: '2026-04-26'
summary: The marine ecosystem around Port Nelson is shaped by high-volume extraction. Around 130,000-160,000 tonnes of fish and seafood are landed annually; rock-lobster catch has fallen 22 percent between 2015 and 2023 and snapper stocks remain under pressure. Aquaculture expansion (salmon, mussels) in Tasman and Golden Bay creates localised impacts on benthic habitat and water quality even within spatial-planning constraints.
