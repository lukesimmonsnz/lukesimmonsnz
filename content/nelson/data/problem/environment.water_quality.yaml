id: problem.nelson.environment.water_quality
title: Maitai and Waimea river water-quality decline
theme: environment
section: environment
subpage: water_quality
parent: coastal_environment
order: 3
updated: '2026-04-26'
summary: Maitai River water quality has declined over the last decade due to forestry sedimentation, pastoral runoff, and urban stormwater. Nitrate concentrations have risen about 28 percent between 2010 and 2023, and pathogenic bacteria exceed safe-swimming thresholds on 12-15 days per summer. The Maitai is also a primary water source; treatment costs have risen around 14 percent.
manifests_in:
- nelson
systems_model:
  state_variables:
  - nitrate_concentration_mg_per_l
  - summer_e_coli_exceedance_days
  - annual_treatment_cost_nzd
  inputs:
  - forestry_harvest_intensity
  - pastoral_n_loss
  - urban_stormwater_load
  constraints:
  - regulatory_fragmentation
  - monitoring_density
  feedback_loops:
  - 'Quality-cost feedback: declining raw-water quality raises treatment cost, but the residual contamination still constrains recreation and ecological function, so total social cost compounds even as drinking water remains safe.'
narrative:
- heading: Drinking water and recreation in the same catchment
  body: 'The Maitai is unusual in that it serves both as Nelson''s primary recreational waterway and as a key drinking-water source via the Maitai Dam (claim.nelson.environment.water_quality_claim). Pressure on either function shows up immediately in the other: summer E. coli excursions reduce swimming days at the same time treatment plants raise chlorine and coagulant doses.'
- heading: Source-attribution and policy lever
  body: Forestry harvest cycles, pastoral land-use intensity, and urban stormwater each contribute meaningful loads, but the policy levers sit across separate regulators -- Nelson City Council (urban), Tasman District Council (pastoral), and central forestry rules. Coordinated catchment-scale management is improving but lags the rate of decline.
