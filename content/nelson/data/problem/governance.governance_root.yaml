narrative:
- heading: Two councils, one functional region
  body: Nelson is a unitary authority and Tasman is a unitary authority; together they cover a single labour market, single hospital catchment, and one shared water-and-horticulture economy (claim.nelson.governance.governance_root_claim). Coordination on water, transport, and growth happens through joint committees rather than a single statutory decision-maker.
- heading: Capital pipeline against rates capacity
  body: Three-waters renewal, climate adaptation, and growth-driven infrastructure all compete in the same long-term plan. Ratepayer capacity to fund all three at once is limited; borrowing headroom is constrained by debt-to-revenue covenants. The political economy of which projects get deferred is increasingly difficult.
