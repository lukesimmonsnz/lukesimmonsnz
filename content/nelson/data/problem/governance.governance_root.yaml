id: problem.nelson.governance.governance_root
title: Fragmented unitary jurisdiction and growth-funding gap
theme: governance
section: governance
subpage: governance_root
parent: null
order: 1
updated: '2026-04-26'
summary: Nelson governance carries three structural strains at once. Nelson City Council and Tasman District Council are separate authorities with overlapping service areas (water, transport, regional development), creating coordination friction. Combined operational spending is around $320 million, with capital needs over the coming decade approaching $420 million against a constrained ratepayer base. Treaty partnership engagement with mana whenua is improving but resourced asymmetrically.
