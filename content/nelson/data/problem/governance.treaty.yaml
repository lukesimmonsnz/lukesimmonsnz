narrative:
- heading: Framework in place, capacity short
  body: The 2023 framework is structurally sound and represents a step forward from earlier consultation-only arrangements (claim.nelson.governance.treaty_claim). Practical implementation lives or dies on iwi capacity to engage across many simultaneous council workstreams, which is presently thin.
- heading: The eight-iwi reality of Te Tau Ihu
  body: Te Tau Ihu involves eight iwi with overlapping rohe, each with separate post-settlement governance entities and limited shared technical staff. Partnership processes designed for a single mana-whenua entity create real engagement load that is rarely budgeted alongside the council process it accompanies.
