id: problem.nelson.governance.treaty
title: Treaty partnership, under-resourced co-governance
theme: governance
section: governance
subpage: treaty
parent: governance_root
order: 3
updated: '2026-04-26'
summary: The Nelson Tasman Iwi Partnership Framework (2023) recognises mana whenua rights of the Te Tau Ihu iwi (including Ngati Koata, Ngati Rarua, Ngati Tama ki Te Tau Ihu, and Te Atiawa o Te Waka-a-Maui) and establishes joint decision-making on resource management, cultural heritage, and urban development. Dedicated iwi-liaison staffing is around 3 FTE across both councils, and iwi-led research and monitoring capacity remains limited.
