id: problem.nelson.health.mental_health
title: Sharply rising mental-health demand
theme: health
section: health
subpage: mental_health
parent: health_outcomes
order: 2
updated: '2026-04-26'
summary: About 28 percent of Nelson residents report symptoms of depression or anxiety against around 20 percent nationally, with primary-care presentations up 34 percent between 2019 and 2023. Specialist mental-health waiting times average 12-14 weeks; crisis-line volumes rose 42 percent year-on-year in 2022-2023. Youth (18-24) anxiety symptom prevalence is around 38 percent, and the age-standardised suicide rate of 16.2 per 100,000 is well above the national 12.8.
manifests_in:
- nelson
systems_model:
  state_variables:
