narrative:
- heading: Demand growth and capacity wall
  body: Nelson's mental-health system was already running at capacity before COVID and has absorbed a step-change in demand since (claim.nelson.health.mental_health_claim). The waitlist for specialist assessment is now the binding operational constraint, with primary care effectively holding crisis cases that would historically have moved into specialist care.
- heading: Suicide rate and youth pressure
  body: An age-standardised suicide rate well above national average is a serious regional pattern, concentrated in younger cohorts and in deprivation-affected areas. Youth mental health intersects with school disengagement and alcohol-and-drug use; isolated rural settings amplify exposure.
