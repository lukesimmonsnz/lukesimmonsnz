id: problem.nelson.inequality.rental_affordability_gap
title: Rental affordability gap between income quintiles
theme: inequality
section: inequality
subpage: rental_affordability_gap
parent: inequality_root
order: 3
updated: '2026-04-26'
summary: In Nelson, lowest-income households (Q1, median around $22,800) pay 38-52 percent of income on rent; Q2 households (median around $35,200) pay 28-36 percent; Q3+ households (median above $55,000) pay 18-22 percent. Median rent of around $510 per week is unaffordable at market rates for households earning under $30,000 without housing assistance. Community and state housing covers about 8 percent of rental demand; waitlists number 240+ households with average wait around 18 months.
manifests_in:
- nelson
systems_model:
  state_variables:
  - q1_rent_to_income_ratio
  - social_housing_waitlist_n
  - social_housing_share_of_stock
  inputs:
  - accommodation_supplement
  - kainga_ora_pipeline
  - community_housing_funding
  constraints:
  - build_pipeline_capacity
  - land_availability
  feedback_loops:
  - 'Subsidy-rent feedback: accommodation supplement increases recipients'' rent capacity in a tight market, raising the price floor and partially offsetting the subsidy''s net affordability gain.'
narrative:
- heading: Affordability, not just supply
  body: Even at Nelson's tight overall vacancy rate, the binding issue for the bottom quintile is unit price, not unit availability (claim.nelson.inequality.rental_affordability_gap_claim). Accommodation Supplement and Income-Related Rent Subsidies stretch the bottom quintile's rent capacity to part of the way, but the social-housing waitlist absorbs the residual.
- heading: Social-housing supply gap
  body: Public and community housing in Nelson covers only around 8 percent of rental demand. Where this share is higher in comparable regions (around 12-15 percent), the same private-market price pressure produces less downstream child poverty and family-violence escalation.
