id: problem.nelson.infrastructure.infrastructure
title: Cumulative deferred maintenance across core infrastructure
theme: infrastructure
section: infrastructure
subpage: infrastructure
parent: null
order: 1
updated: '2026-04-26'
summary: Nelson's core infrastructure carries a cumulative deferred-maintenance and capacity-renewal load. Three Waters assets require around $180-220 million in maintenance and renewal over 10 years against a current allocation of about $120 million. Stormwater is undersized for climate-altered rainfall (three events 2021-2023 caused $8-12 million in damage). The Bells Island wastewater plant requires a $35-45 million upgrade by 2028, and the roading backlog is around $45 million.
