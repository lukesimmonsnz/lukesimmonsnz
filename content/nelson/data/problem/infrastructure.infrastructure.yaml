  feedback_loops:
  - 'Backlog-event feedback: deferred renewal raises failure probability, and each failure event consumes both response budget and political will, leaving less capacity for forward renewal.'
narrative:
- heading: Backlog versus capacity
  body: Each individual asset class is under pressure; cumulatively the renewal backlog is substantially larger than the council can fund out of rates alone (claim.nelson.infrastructure.infrastructure_claim). Asset-management systems are incomplete, so the headline numbers are themselves uncertain.
- heading: Climate amplification
  body: Stormwater capacity designed for pre-2000 rainfall intensity is repeatedly exceeded by current events. Renewal is therefore not a one-for-one replacement of ageing pipe but an upsizing programme, which carries a different cost curve.
