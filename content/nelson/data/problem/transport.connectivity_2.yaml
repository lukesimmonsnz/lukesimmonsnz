id: problem.nelson.transport.connectivity_2
title: Nelson Airport capacity and runway constraints
theme: transport
section: transport
subpage: connectivity_2
parent: connectivity
order: 2
updated: '2026-04-26'
summary: Nelson Airport handles around 280,000 passengers per year and is operating at 68-72 percent of terminal capacity. Terminal infrastructure is adequate to 450,000-500,000 passengers under medium-growth scenarios, but runway and taxiway systems may need augmentation by 2035. The 2,100 m runway constrains aircraft types for direct long-haul; international service is limited to seasonal charters. Cargo handling is around 8 percent of revenue.
manifests_in:
- nelson
systems_model:
  state_variables:
  - annual_passengers
  - terminal_capacity_utilisation_pct
  - runway_length_m
  inputs:
  - airline_route_decisions
  - airport_capex
  constraints:
