  - airspace_limits
  - boundary_land_availability
  feedback_loops:
  - 'Route-runway feedback: without longer runway, larger aircraft are not feasible; without larger aircraft, the route economics that justify runway extension do not materialise.'
narrative:
- heading: Capacity headroom plus a runway floor
  body: 'Terminal capacity is the easier of Nelson Airport''s constraints to relieve (claim.nelson.transport.connectivity_2_claim). The structural ceiling is the runway: at 2,100 m, the airport cannot host larger narrow-body aircraft on direct trans-Tasman or trans-Pacific service without an extension that is geographically and politically difficult.'
- heading: Commercial uncertainty for expansion
  body: Without an international long-haul route or deeper domestic-market share, expansion economics are uncertain. Airline-route subsidies have been politically contested in comparable regions and are not currently in Nelson's operating model.
