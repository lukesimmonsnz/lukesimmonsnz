id: problem.nelson.transport.connectivity_3
title: State-highway closure exposure on SH6 and SH60
theme: transport
section: transport
subpage: connectivity_3
parent: connectivity
order: 3
updated: '2026-04-26'
summary: SH6 is the sole north-south road route, with sections between Nelson and Blenheim (notably the Whangamoa and Rai saddles) prone to closure from slip, snow, and accident. SH60 to Tasman traverses unstable terrain east of Ruby Bay and has had 4-week closures in the last decade. Alternative routes add more than 90 minutes. Climate change is projected to increase closure frequency and duration, with 2-4 major disruptions annually projected by 2050.
manifests_in:
- nelson
systems_model:
  state_variables:
  - sh6_annual_closure_hours
  - sh60_annual_closure_hours
  - alt_route_detour_minutes
  inputs:
  - nzta_resilience_capex
  - climate_event_frequency
  constraints:
  - topography
