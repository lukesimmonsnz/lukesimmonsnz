  feedback_loops:
  - 'Closure-investment feedback: each closure event raises political pressure for resilience investment, but rebuild-to-original is faster than upgrade, so the same vulnerability is repeatedly restored rather than fixed.'
narrative:
- heading: Single-corridor risk
  body: The road network has the same single-corridor character as Wellington's coastal SH1, but without the rail backup (claim.nelson.transport.connectivity_3_claim). A single closure event can isolate Nelson from the ferry terminus in Picton and from the Christchurch supply chain simultaneously.
- heading: Resilience investment lag
  body: Specific resilience projects (slip-prone section stabilisation, alternative-route formalisation) sit on the Waka Kotahi pipeline but compete against higher-volume metro projects. Climate-altered closure frequency is starting to shift that calculus, but slowly.
