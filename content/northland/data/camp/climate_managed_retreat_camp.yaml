id: camp.northland.climate.managed_retreat_camp
name: Managed retreat and coastal risk planning
theme: climate-adaptation
core_claim: Planned relocation of at-risk coastal communities and infrastructure is
  necessary given the pace of sea-level rise and storm intensification.
flagship_moves:
- Develop a Northland coastal managed retreat framework
- Establish a Crown fund for voluntary buyout of high-risk coastal properties
- Restrict new development in coastal inundation zones under district plans
tensions:
- Managed retreat is politically and socially highly contested
- Māori land and wāhi tapu in coastal zones require specific cultural frameworks
- Compensation costs for buyouts are fiscally significant
interventions:
- description: Develop a Northland coastal managed retreat framework
  state_variable: climate_pressure_index
  expected_sign: +
addresses:
- problem.northland.climate.northland_climate
- problem.northland.climate.coastal_flooding
- problem.northland.climate.drought_risk
- problem.northland.climate.cyclone_exposure
applicable_in:
- northland
tensions_with: []
