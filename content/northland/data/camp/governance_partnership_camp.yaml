id: camp.northland.governance.partnership_camp
name: Māori co-governance and Treaty-based partnership
theme: governance
core_claim: Establishing genuine Treaty-based co-governance arrangements with Northland
  iwi improves legitimacy and local capacity.
flagship_moves:
- Establish joint iwi-council committees with decision-making authority
- Fund iwi-led resource management and environmental governance
- Negotiate shared services arrangements between councils and iwi entities
tensions:
- Co-governance requires deep institutional change and capability investment
- Political resistance from non-Māori ratepayers to shared authority
- Defining the scope and limits of co-governance is contested
interventions:
- description: Establish joint iwi-council committees with decision-making authority
  state_variable: governance_pressure_index
  expected_sign: +
addresses:
- problem.northland.governance.northland_governance_capacity
- problem.northland.governance.council_capacity
- problem.northland.governance.coordination_deficit
- problem.northland.governance.maori_representation
applicable_in:
- northland
tensions_with: []
