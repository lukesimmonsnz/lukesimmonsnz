id: camp.northland.transport.demand_responsive_camp
name: Demand-responsive and subsidised rural transport
theme: transport
core_claim: On-demand and subsidised transport services can address rural isolation
  where fixed-route services are uneconomic.
flagship_moves:
- Fund on-demand minibus services for rural communities
- Subsidise community car-share programmes for Māori communities
- Integrate transport subsidies with social service provision
tensions:
- Requires sustained operational subsidy with no commercial pathway
- Workforce and vehicle availability constraints in remote areas
- Political resistance to recurring transport operating expenditure
interventions:
- description: Fund on-demand minibus services for rural communities
  state_variable: transport_pressure_index
  expected_sign: +
addresses:
- problem.northland.transport.northland_transport_isolation
- problem.northland.transport.rural_road_quality
- problem.northland.transport.public_transport_gap
- problem.northland.transport.freight_connectivity
applicable_in:
- northland
tensions_with: []
