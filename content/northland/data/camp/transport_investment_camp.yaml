id: camp.northland.transport.investment_camp
name: State Highway and rural road investment
theme: transport
core_claim: Targeted central government investment in Northland's state highway network
  and rural roads is the primary lever for reducing transport disadvantage.
flagship_moves:
- Accelerate four-laning of State Highway 1 north of Whangarei
- Increase NZTA co-investment in unsealed road upgrades
- Establish a Northland Transport Infrastructure Fund
tensions:
- Fiscal pressure limits scale of investment available
- Induced demand from road investment may not improve mode share
- Climate risk to coastal highways increases long-run maintenance costs
interventions:
- description: Accelerate four-laning of State Highway 1 north of Whangarei
  state_variable: transport_pressure_index
  expected_sign: +
addresses:
- problem.northland.transport.northland_transport_isolation
- problem.northland.transport.rural_road_quality
- problem.northland.transport.public_transport_gap
- problem.northland.transport.freight_connectivity
applicable_in:
- northland
tensions_with: []
