id: claim.northland.climate.coastal_flooding_claim1
statement: Northland's extensive coastline (Bay of Islands, Baylys Beach, 1,600+ km)
  faces increased coastal flooding frequency from sea-level rise (0.3-0.5m by 2100,
  RCP 6.0) and storm surge intensification. Bay of Islands and Whangarei havens are
  particularly vulnerable to inundation during 1-in-100-year storm events combined
  with elevated tide stages.
