id: claim.northland.climate.cyclone_exposure_claim1
statement: Northland experiences elevated cyclone exposure compared to national average,
  with tropical cyclones affecting the region 0.5-1.5 times per decade on average.
  The region's geographic isolation (no rail connections south of Whangārei) and aging
  transport infrastructure increase vulnerability to cyclone-induced isolation and
  infrastructure damage.
