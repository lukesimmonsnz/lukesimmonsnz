id: claim.northland.climate.drought_risk_claim1
statement: Northland faces increased drought frequency under climate projections,
  with dry years shifting from 1-in-6 year to 1-in-4 year recurrence intervals by
  2070. Pastoral farming (dominant land use) and rural water supplies face greater
  reliability pressures, particularly affecting Kaipara district and Far North communities.
