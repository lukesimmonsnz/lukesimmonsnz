id: claim.northland.climate.northland_climate_claim1
statement: Climate change impacts in Northland include increased temperatures, altered
  precipitation patterns, sea-level rise, and intensified extreme weather events.
  These changes threaten agriculture, water supply, infrastructure, and human health,
  requiring proactive adaptation and mitigation strategies across all sectors.
