id: claim.northland.climate.northland_climate_claim2
statement: 'Kauri dieback (Phytophthora agathidicida) thrives in warmer, wetter conditions;
  climate projections suggest expanded suitable habitat range for pathogen in Northland
  hill country. Compounding threat: increasing rainfall intensity saturates soils
  and facilitates spore dispersal; warmer winters reduce pathogen dormancy pressure.
  Combined climate-biosecurity stress on native forest recovery unprecedented; management
  strategies (assisted migration, genetic screening) remain experimental.'
