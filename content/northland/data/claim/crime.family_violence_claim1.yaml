id: claim.northland.crime.family_violence_claim1
statement: Recorded crime in Northland includes family violence, drug-related offenses,
  and property crime. Police response in rural areas faces geographic delays; family
  violence notifications have increased 20-30% since 2015, reflecting stress from
  economic contraction and geographic isolation.
