id: claim.northland.economy.business_investment_claim1
statement: Business investment in Northland (capital expenditure per capita) is 40-50%
  below national average. Private investment hesitant due to perceived economic slowdown;
  public infrastructure investment underfunded. Small-to-medium enterprises (50-70%
  of regional employment) face financing barriers; bank lending risk premium higher
  for Northland businesses than Auckland.
