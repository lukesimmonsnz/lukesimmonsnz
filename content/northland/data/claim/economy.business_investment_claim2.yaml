id: claim.northland.economy.business_investment_claim2
statement: Small-to-medium enterprises (50-70% of regional employment) face financing
  barriers; bank lending risk premium higher for Northland than Auckland. Business
  failure rate 15-20% above national average (RBA/MBIE data). Seasonal tourism volatility
  (peak December-February) forces small operators to hold larger cash buffers; agricultural
  commodity exposure (dairy payout, cattle prices) constrains reinvestment.
