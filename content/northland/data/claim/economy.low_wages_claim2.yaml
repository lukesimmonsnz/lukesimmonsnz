id: claim.northland.economy.low_wages_claim2
statement: Part-time and seasonal employment concentrated in tourism and horticulture;
  full-time permanent roles scarce. Precarious employment limits access to mortgages,
  rental security; work-life instability documented among fruit pickers, hospitality
  workers, forestry contractors. Occupational health and safety violations more prevalent
  in low-wage sectors.
