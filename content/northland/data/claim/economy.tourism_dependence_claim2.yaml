id: claim.northland.economy.tourism_dependence_claim2
statement: 'Bay of Islands-Kerikeri region contributes ~40% of Northland tourism revenue
  (DOC visitor statistics); seasonal volatility (90% of visitors December-February)
  creates employment instability for tour operators, hospitality workers, accommodation
  staff. Cyclone exposure and international travel disruption (COVID-19 precedent)
  cause rapid revenue collapse. Tourism infrastructure aging: carpark facilities,
  visitor centers, walking track maintenance underfunded relative to peak-season demand
  (~500k annual visits Bay of Islands). Maori tourism enterprises (hangi operations,
  cultural tours) underrepresented; capital constraints limit expansion.'
