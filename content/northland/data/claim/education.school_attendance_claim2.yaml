id: claim.northland.education.school_attendance_claim2
statement: Mobile rangatahi population (seasonal workers' families in horticulture,
  forestry) experience mid-year school changes and instability. Kura operate on different
  term calendars; integration gaps for students moving between schools. School leavers
  at 15-16 (legally and illegally) contribute to youth NEET. Early intervention pathways
  limited for at-risk students.
