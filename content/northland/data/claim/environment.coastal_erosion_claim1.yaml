id: claim.northland.environment.coastal_erosion_claim1
statement: 'Kauri dieback (Phytophthora agathidicida) is Northland''s primary biosecurity
  threat to native forest. Waipoua Forest (Tāne Mahuta, Te Mātua Ngahere) under strict
  protocols: boardwalks mandatory at key sites, vehicle/boot-washing stations mandatory,
  some tracks permanently closed. No cure currently available; treatment focused on
  biosecurity containment (soil hygiene, quarantine). Spread mechanism: soil on footwear,
  vehicles, animals.'
