id: claim.northland.environment.kauri_dieback_claim1
statement: 'Native bush covers ~10% of Northland (NRC estimate); brown kiwi (Northland
  kiwi, Apteryx mantelli) depends on pest-control programmes (Backyard Kiwi, Kiwi
  Coast initiatives). Population estimates: 15,000–20,000 individuals remaining. Predation
  by stoats, rats, possums remains primary threat despite intensive control. NZ fairy
  tern (tara iti, Sternula nereis davisae) critically endangered; only ~50 breeding
  pairs nationwide, nesting Northland beaches (Baylys Beach, Mangawhai).'
