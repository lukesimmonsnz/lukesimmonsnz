id: claim.northland.environment.kauri_dieback_claim2
statement: Blue penguin (Spheniscus minor) colonies at Mangawhai Heads and Whangārei
  Heads remain vulnerable to pet cats, possums, and light pollution. Tapu Te Ranga
  Trust and Tawharanui Regional Park manage refuge areas; nesting habitat restoration
  (rat control, fencing) ongoing. Estuarine habitats (Hokianga, Kaipara, Bay of Islands
  mangrove zones) provide nursery grounds for snapper, flounder; sediment and nutrient
  loading threatens recruitment.
