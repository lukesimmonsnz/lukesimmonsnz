id: claim.northland.environment.northland_environment_pressures_claim1
statement: Terrestrial invasive species (possums, rats, stoats, feral cats) and aquatic
  invasives (didymo in rivers, unwanted freshwater fish) compete with native species.
  Wilding pine (Pinus contorta) expands across Northland hill country; eradication
  cost-prohibitive for large landscapes. Community biosecurity initiatives (Northland
  Regional Council, DOC, tangata whenua agencies) manage prioritized areas but resource-constrained.
