id: claim.northland.environment.northland_environment_pressures_claim2
statement: 'Peatland and wetland loss: Northland''s historical wetlands (Kai Iwi Lakes
  area, North Head dunes, Hokianga lowlands) have contracted 70–90% since 1900 (drainage
  for agriculture). Remaining wetlands face ongoing hydrological stress (summer drying,
  vegetation conversion). Ecological value of remaining wetlands recognized in biodiversity
  action plans; restoration initiatives (land acquisition, hydrological restoration)
  underfunded relative to degradation rate.'
