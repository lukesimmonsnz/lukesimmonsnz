id: claim.northland.governance.council_capacity_claim1
statement: Northland council capacity is severely constrained; three territorial authorities
  struggle with chronic workforce shortages and skill gaps in technical areas (transport,
  infrastructure, environmental management). Far North District Council operates with
  largest area and lowest rates base; significant infrastructure liability relative
  to revenue. Staff turnover in planning and engineering exceeds 30% annually.
