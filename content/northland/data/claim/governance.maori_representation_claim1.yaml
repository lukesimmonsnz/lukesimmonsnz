id: claim.northland.governance.maori_representation_claim1
statement: Māori representation in Northland governance is under-proportioned relative
  to population (~35-40%). Te Kāhui o Māui (Northland iwi collective) engagement with
  NRC and TAs is formal but not substantive; co-governance models limited. Ngāpuhi
  (largest iwi, 125,000 members, majority live outside Far North) Treaty settlement
  remains unsettled as of 2025; claim directly impacts regional governance relationships.
