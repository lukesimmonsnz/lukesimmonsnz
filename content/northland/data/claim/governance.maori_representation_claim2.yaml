id: claim.northland.governance.maori_representation_claim2
statement: Northland has significant proportion of Māori-led service providers and
  kaupapa Māori organizations (Whānau Ora, health, education). Iwi economic development
  initiatives (aquaculture, tourism, forestry) operate largely outside formal council
  structures. Co-investment models between government agencies and iwi are under-developed;
  historical Crown-iwi relationships remain tense.
