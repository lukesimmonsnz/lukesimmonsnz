id: claim.northland.health.maori_health_gap_claim1
statement: Northland's high deprivation, stress, smoking prevalence, and limited access to preventive health
  drive excess mortality from diabetes, cardiovascular disease, respiratory illness, and cancer. A 7-9 year life expectancy
  gap reflects these structural health determinants. Māori communities in Northland experience these disadvantages at higher rates.
  Kaupapa Māori health providers (Hatea-a-Rangi, Hauora Hokianga) provide culturally affirming care but are chronically
  underfunded relative to regional population health need.
