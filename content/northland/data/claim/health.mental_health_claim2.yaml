id: claim.northland.health.mental_health_claim2
statement: Mental health and addiction service waitlists in Northland exceed 6-12
  months for community services. Suicide rates in Far North among highest in NZ; Māori
  youth suicide rate 5-7x higher. Whānau-based and kaupapa Māori counselling services
  operate below capacity; Crown funding inadequate. Methamphetamine and alcohol addiction
  strains mental health system.
