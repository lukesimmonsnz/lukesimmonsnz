id: claim.northland.health.northland_health_inequity_claim1
statement: Northland has critical shortage of GPs, dentists, and mental health professionals.
  Dental care access poor in Far North; patient-to-dentist ratio 5x+ urban areas.
  Whangārei Hospital waiting times for elective surgery (orthopaedics, urology) exceed
  12-18 months nationally. Community health centre closures in small towns force reliance
  on hospital emergency departments.
