id: claim.northland.housing.homelessness_claim2
statement: Hidden homelessness (living with multiple families, in vehicles, overcrowded
  rentals) likely exceeds absolute homelessness in Northland by 5-10x. Far North whānau
  double up to share rent; "couch-surfing" among young adults in Whangārei is common
  de facto homelessness. Domestic violence survivors often cycle through temporary
  shelter → motel → family → back to insecure rental due to insufficient specialist
  housing.
