id: claim.northland.housing.land_supply_claim1
statement: Residential land supply is constrained in Whangārei and surrounding suburbs;
  developable land either unaffordable or tied up in speculative holdings. Far North
  (Kaitāia, Kerikeri, Bay of Islands) has land supply but limited development due
  to financing barriers and small local market demand. Growth in Whangārei CBD requires
  infill; greenfield options limited by council planning restrictions.
