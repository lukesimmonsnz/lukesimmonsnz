id: claim.northland.inequality.child_poverty_claim1
statement: Child poverty rates in Northland exceed national average by 15-25%; Kāinga
  Ora emergency housing waitlist per capita among highest in NZ. Motel usage for emergency
  housing (families, single parents) in Whangārei and Kaitāia is chronic; inadequate
  housing stock forces whānau into unsuitable temporary accommodation. Children in
  emergency housing face health risks (mould, overcrowding, inadequate heating).
