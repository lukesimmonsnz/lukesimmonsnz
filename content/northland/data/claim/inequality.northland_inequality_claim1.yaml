id: claim.northland.inequality.northland_inequality_claim1
statement: Northland has highest concentration of deprived communities in NZ outside
  major metros. Far North District consistently ranks in NZDep decile 9-10 (most deprived);
  Kaikohe, Rawene, Kawakawa, Kaitāia record very high deprivation. Structural inequality
  rooted in historical land dispossession, limited economic opportunity, and persistent
  Crown underinvestment in social services. Whānau income falls 20-30% below national.
