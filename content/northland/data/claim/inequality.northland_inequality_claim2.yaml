id: claim.northland.inequality.northland_inequality_claim2
statement: Digital divide in Northland correlates with deprivation; Far North has
  lowest broadband access (15-20% lacking reliable connection) and highest digital
  exclusion. Rural Northland households lack laptops, internet connectivity necessary
  for online banking, government services, and work. School-child digital device ownership
  skews by school decile; lower-decile schools have higher rates of students without
  home devices.
