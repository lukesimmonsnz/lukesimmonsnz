id: claim.northland.inequality.rural_deprivation_claim1
statement: Rural Far North faces extreme service isolation and deprivation. Towns
  like Rawene, Kawakawa, Te Hapua, Mitimiti lack access to tertiary healthcare, supermarkets,
  banking, and reliable public transport. Commuting to Whangārei or Auckland costs
  time and money; essential journey burdens fall heaviest on low-income whānau. Rural
  property ownership costs (maintenance, rates, insurance) suppress household savings.
