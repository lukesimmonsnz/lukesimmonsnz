id: claim.northland.infrastructure.digital_divide_claim2
statement: 'Rural Broadband Initiative (RBI) deployment reached Far North communities
  2015–2020; satellite (Starlink) uptake accelerating in remote areas (cost NZD 100–150/month).
  4G coverage gaps persist: Hokianga (west coast), western Far North (Mangonui-Kaitāia),
  eastern Cape. Digital inclusion programme (MSD/DIA funding) targets digital literacy
  in rural seniors (60+); broadband speed in remote areas averages 5–10 Mbps vs. urban
  standard 50+ Mbps, constraining remote work adoption and telehealth uptake.'
