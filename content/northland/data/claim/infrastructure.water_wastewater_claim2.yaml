id: claim.northland.infrastructure.water_wastewater_claim2
statement: 'Northland water service providers (Watercare regional, ~15 community schemes)
  face treatment and supply reliability challenges: boil-water notices endemic in
  rural Far North (Ministry of Health data shows Northland highest per-capita notices
  nationally, 15–20 notices/year across region). Infrastructure investment: estimated
  NZD 150–200M needed over 10 years for rural scheme upgrades, treatment plant replacements,
  pipe renewals. Three Waters reform (central government co-funding) creates opportunity;
  delays to national framework (2024 decision deferred) slow rural scheme progress.'
