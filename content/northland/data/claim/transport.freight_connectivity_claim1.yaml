id: claim.northland.transport.freight_connectivity_claim1
statement: SH1 (primary spine north-south through Whangārei-Pūhoi corridor) carries
  60-70% of regional freight. Pūhoi-Warkworth expressway opened 2021 reduced Auckland-Whangārei
  travel by ~20 min. Warkworth-Wellsford section not yet funded. Northland Rail (Otiria-Whangārei
  freight only) operates intermittently; Marsden Point log spur handles export volumes
  but aging infrastructure limits capacity.
