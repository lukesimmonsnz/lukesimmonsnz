id: claim.northland.transport.freight_connectivity_claim2
statement: Road freight dominates regional logistics; heavy reliance on SH1 creates
  vulnerability to closure (flooding, accidents). No alternative north-south routing.
  Far North regional council manages ~8,500 km roading network (highest km-per-ratepayer
  ratio nationally); unsealed roads (40%) require continuous maintenance. Limited
  interregional bus services (Auckland-Whangārei-Far North) operate with subsidy;
  passenger rail patronage recovery remains political impasse.
