id: claim.northland.transport.northland_transport_isolation_claim1
statement: Geographic isolation from Auckland (185 km, 2.5–3 hr drive) constrains
  economic integration. Bay of Islands area (Kerikeri, Russell) relies on Kerikeri
  Airport (Air NZ tourist service) and vehicle ferry across Hokianga Harbour (South
  Head-North Head, ~10 min, replaces 90 km detour). Hokianga ferry critical for Rawene,
  Opononi, Ōmāpere communities; limited operating hours 7 am–9 pm reflect funding
  constraints.
