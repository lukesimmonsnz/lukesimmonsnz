id: claim.northland.transport.rural_road_quality_claim1
statement: 'Far North District Council (FNDC) manages ~5,000 km sealed roading and
  ~3,500 km unsealed roading; unsealed network (40%) is nationally high ratio. Kauri
  dieback biosecurity controls restrict vehicle access to Waipoua Forest tracks (mandatory
  foot-washing stations). Flood damage annual repair cost $20–40M (SH1 closures, local
  road slips). SH1 safety concerns: narrow passing lanes, steep grades near Brynderwyn
  Hills.'
