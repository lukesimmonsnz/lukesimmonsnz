narrative:
- heading: Scale and distribution
  body: Housing affordability has deteriorated significantly in Northland's main urban centres, particularly Whangārei, where median multiples have reached unsustainable levels relative to regional incomes.
- heading: Supply-demand imbalance
  body: Population movement toward Northland has outpaced residential development, constrained by infrastructure servicing, geographic limits, and planning rules.
