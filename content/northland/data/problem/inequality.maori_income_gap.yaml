  - policy_intervention
  - external_shock
  constraints:
  - fiscal_capacity
  feedback_loops:
  - 'Feedback: deteriorating maori income gap conditions reinforce systemic disadvantage.'
narrative:
- heading: Scale and distribution
  body: Northland exhibits the lowest median household income of any NZ region, with employment rates and incomes
    substantially below national averages across high-deprivation communities. Geographic isolation from major labour markets,
    limited economic diversification beyond primary industry, and high seasonal work variability are the primary structural drivers.
    Māori communities are disproportionately concentrated in these low-income geographies.
- heading: Key drivers
  body: The primary drivers of māori income and employment gap are structural and systemic, requiring
    both investment and institutional reform.
