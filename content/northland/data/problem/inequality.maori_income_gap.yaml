id: problem.northland.inequality.maori_income_gap
title: Māori income and employment gap
theme: inequality
section: inequality
subpage: maori-income-gap
parent: problem.northland.inequality.northland_inequality
order: 2
updated: '2026-04-26'
summary: Northland has the lowest median household income of any New Zealand region. Employment rates
  and median incomes in high-deprivation communities are substantially below national averages, reflecting
  geographic isolation from major labour markets, limited diversification beyond primary industry, and
  high seasonal variability in available work.
manifests_in:
- northland
