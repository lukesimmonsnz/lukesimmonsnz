updated: '2026-04-26'
summary: Northland exhibits New Zealand's deepest regional socioeconomic disparities, driven by geographic
  isolation from major economic centres, an economy concentrated in primary industries with limited diversification,
  and decades of underinvestment in infrastructure, health services, and education relative to need.
