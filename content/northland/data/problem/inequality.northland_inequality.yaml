narrative:
- heading: Regional context
  body: Socioeconomic inequality in Te Tai Tokerau is a defining challenge for Te Tai Tokerau, reflecting
    both structural disadvantage and underinvestment relative to national averages.
- heading: System dynamics
  body: Northland exhibits New Zealand's deepest regional socioeconomic disparities, driven by geographic
    isolation, limited economic diversification, and chronic underinvestment in infrastructure and services.
    These structural conditions fall disproportionately on communities in the Far North where Māori whānau
    are heavily concentrated.
