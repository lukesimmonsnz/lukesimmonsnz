id: pattern.climate.agricultural_climate_exposure
title: Agricultural sector climate exposure and adaptation pressure
theme: climate-adaptation
summary: New Zealand's primary sector faces intensifying climate exposure through
  drought, flood, and temperature change that threatens production systems, water
  availability, and farm viability across all primary-dominated regions.
