narrative:
- heading: Exposure profile
  body: Pastoral farming in Canterbury and Southland faces increasing drought frequency.
    Horticulture in Hawke's Bay and Gisborne faces cyclone and flood risk. Dairy in
    Waikato faces both drought and water allocation pressure. Each primary sector
    has a distinct but intensifying climate exposure profile.
- heading: Adaptation pathway
  body: Farm-level adaptation — irrigation efficiency, crop diversification, soil
    carbon, insurance — can manage some risk, but the upper bound of adaptation without
    transformation is below the projected climate trajectory. Systemic farm system
    change — including emissions pricing — is necessary for long-run sector viability.
