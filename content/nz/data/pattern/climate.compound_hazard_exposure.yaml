id: pattern.climate.compound_hazard_exposure
title: Compound climate and seismic hazard exposure
theme: climate-adaptation
summary: New Zealand's unique position on tectonic plate boundaries combined with
  Southern Ocean weather systems produces compound hazard exposure — earthquake, flood,
  storm, sea-level rise — that is greater than the sum of individual risks.
