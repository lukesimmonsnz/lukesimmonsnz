narrative:
- heading: Compound risk
  body: A major Alpine Fault earthquake could disrupt the national economy for months.
    Combined with sea-level rise accelerating coastal erosion, increasing storm intensity,
    and drought frequency, New Zealand's physical environment presents compound rather
    than sequential hazards that standard risk assessment tools underweight.
- heading: Infrastructure exposure
  body: 'Infrastructure designed and costed for single-hazard scenarios is typically
    under-built for compound events. Cyclone Gabrielle demonstrated this: roads, bridges,
    and stormwater infrastructure built to flood standards were overwhelmed by the
    combination of cyclone intensity and saturated catchments.'
