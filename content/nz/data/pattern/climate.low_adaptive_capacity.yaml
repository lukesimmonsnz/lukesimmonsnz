- claim.manawatu_whanganui.health.chronic_disease_1
narrative:
- heading: Double burden
  body: 'Climate risk and economic capacity are inversely correlated in New Zealand''s
    regions: Northland, Gisborne, and the West Coast face high physical exposure (coastal
    flooding, cyclone, erosion) while having limited fiscal capacity for adaptation
    infrastructure. This is the opposite of the distribution required for effective
    adaptation.'
- heading: Crown transfer required
  body: Market and local government mechanisms cannot close the gap between climate
    exposure and adaptive capacity in disadvantaged regions. Climate adaptation financing
    — analogous to the Cyclone Gabrielle Recovery Fund — needs to be structural and
    anticipatory rather than reactive.
