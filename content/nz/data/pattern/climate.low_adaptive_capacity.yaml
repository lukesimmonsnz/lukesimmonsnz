id: pattern.climate.low_adaptive_capacity
title: Low adaptive capacity in economically disadvantaged regions
theme: climate-adaptation
summary: 'Regions with high climate exposure and low economic capacity face a double
  burden: the most physically exposed communities are least able to fund adaptation,
  whether through private investment or local government infrastructure.'
manifests_in:
- northland
- gisborne
- west-coast
- taranaki
- southland
- hawkes-bay
- manawatu-whanganui
