id: pattern.crime.deprivation_crime_correlation
title: Deprivation-crime concentration correlation
theme: crime
summary: Crime rates are consistently highest in the most deprived geographic areas
  across all New Zealand regions, confirming the social determinants of crime as the
  primary structural predictor.
manifests_in:
- auckland
- wellington
- northland
- waikato
- gisborne
- manawatu-whanganui
- canterbury
