narrative:
- heading: Pattern strength
  body: The correlation between NZDep decile and crime victimisation rate is robust
    across all crime categories and all regions. Decile 10 areas have crime rates
    3–5× those of decile 1 areas in comparable urban settings.
- heading: Policy implication
  body: The strength of the deprivation-crime correlation implies that crime reduction
    is, to a significant degree, downstream of inequality reduction. Enforcement-heavy
    approaches without addressing social determinants are likely to achieve redistribution
    of crime rather than aggregate reduction.
