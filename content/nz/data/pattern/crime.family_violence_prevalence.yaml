narrative:
- heading: National pattern
  body: 'Police respond to a family violence call every four minutes nationally. The
    pattern is concentrated but not contained in high-deprivation communities: elevated
    rates appear across socioeconomic spectra. Māori are overrepresented as both victims
    and perpetrators, reflecting the same structural disadvantage that drives other
    inequality dimensions.'
- heading: Prevention gap
  body: Family violence spending in New Zealand is heavily weighted toward crisis
    response (police, courts, emergency housing) and lightly weighted toward prevention
    and primary intervention. This allocation reflects political economy — crisis
    response produces visible outputs — rather than evidence about where intervention
    is most effective.
