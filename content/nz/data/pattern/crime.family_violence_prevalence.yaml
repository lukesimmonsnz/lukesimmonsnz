id: pattern.crime.family_violence_prevalence
title: Family violence as the dominant community safety challenge
theme: crime
summary: Family violence is the most prevalent and socially costly form of crime in
  New Zealand across all regions, with call rates and hospitalisation highest in high-deprivation
  areas, but present at elevated levels everywhere.
