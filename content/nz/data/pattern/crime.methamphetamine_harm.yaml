narrative:
- heading: Supply network geography
  body: Methamphetamine supply reaches all regions, including remote rural communities.
    Distribution networks operate through existing social connections rather than
    requiring urban proximity. Supply-side disruption through enforcement has produced
    limited sustained reduction in availability.
- heading: Demand and harm
  body: Methamphetamine use drives property crime, family violence, and acute psychiatric
    presentations across all regions. The harm profile is similar whether the region
    is urban or rural; treatment and harm reduction capacity is not.
