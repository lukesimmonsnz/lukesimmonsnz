id: pattern.crime.methamphetamine_harm
title: Methamphetamine harm as cross-regional public health and crime challenge
theme: crime
summary: Methamphetamine is the dominant illicit drug driving property crime, family
  violence, and acute mental health presentations across all New Zealand regions,
  with supply networks serving even remote communities.
manifests_in:
- northland
- auckland
- waikato
- bay-of-plenty
- gisborne
- wellington
- canterbury
- otago
- southland
