id: pattern.economy.ageing_workforce_shortage
title: Ageing population, contracting workforce, rising demand
theme: economy
summary: >
  New Zealand's median age is projected to rise from 38 (2023) to
  around 43 by 2048, with the 65+ share rising from ~16% to 23-25%.
  The same demographic shift increases demand on the health, aged-care,
  and superannuation systems while reducing the working-age share that
  funds and staffs them. The mismatch is a structural macroeconomic
  pressure, not a cyclical labour market issue.
