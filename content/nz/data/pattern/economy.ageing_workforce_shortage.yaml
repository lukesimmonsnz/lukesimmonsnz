narrative:
- heading: The double bind
  body: >
    Ageing is both a demand shock (more health, aged-care, and
    superannuation services per capita) and a supply shock (fewer
    working-age people relative to dependants, and a workforce
    losing senior staff faster than it can replace them). The two
    sides reinforce each other, particularly in the health system,
    where the workforce that delivers ageing-driven care is itself
    ageing out. The scale is set by demographic projections that
    have low forecast variance over a 25-year horizon.
- heading: Regional unevenness
  body: >
    The aged share of population is projected to be highest in the
    same regions that are losing working-age population — West Coast,
    Tasman, Marlborough, parts of Northland and Hawke's Bay — so the
    workforce-to-demand ratio deteriorates fastest where it is
    already worst. Auckland's relative youth (sustained by net
    migration) shifts the national mean but does not compensate for
    regional concentration.
- heading: Migration as a partial offset
  body: >
    Net migration to New Zealand is the lever that most directly
    moves the working-age share. Sustained net inflows of working-age
    migrants slow but do not reverse the ageing trend; the projected
    ageing happens under all reasonable migration variants. Migration
    policy is therefore a margin-shifter, not a structural solution,
    and creates parallel pressure on housing supply (see the housing
    affordability pattern) and infrastructure capacity.
