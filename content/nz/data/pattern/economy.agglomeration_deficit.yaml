narrative:
- heading: Agglomeration mechanisms
  body: 'Firms in larger labour markets benefit from: easier recruitment of specialised
    workers, proximity to customers and suppliers, knowledge spillovers between co-located
    firms, and shared infrastructure. These benefits are largely absent outside Auckland
    and Wellington.'
- heading: Policy implication
  body: Regional economic development cannot easily replicate agglomeration effects.
    Policies that strengthen the Auckland-region connection for smaller centres —
    transport, digital infrastructure, talent pipelines — may be more effective than
    trying to build alternative agglomeration from scratch.
