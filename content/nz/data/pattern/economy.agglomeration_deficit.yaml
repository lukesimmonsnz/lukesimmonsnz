id: pattern.economy.agglomeration_deficit
title: Agglomeration deficit outside the main centres
theme: economy
summary: 'New Zealand''s economic geography is highly concentrated in Auckland and
  Wellington: most regions lack the labour market depth, supply chain density, and
  knowledge spillovers that enable higher-productivity economic activity.'
manifests_in:
- northland
- gisborne
- west-coast
- taranaki
- nelson
- tasman
- marlborough
- southland
