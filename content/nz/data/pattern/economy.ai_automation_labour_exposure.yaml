id: pattern.economy.ai_automation_labour_exposure
title: AI and automation exposure in the New Zealand labour market
theme: economy
summary: >
  Around 10% of New Zealand jobs are at high risk of automation under
  the OECD's task-based assessment, with a further ~25% likely to
  undergo significant change. Generative AI extends the exposure
  upward into cognitive and clerical work that earlier waves of
  automation left untouched. The exposure is uneven across regions
  and demographics — concentrated in routine clerical, transport,
  manufacturing, and parts of the public sector — and the country
  has no settled adjustment policy for it.
