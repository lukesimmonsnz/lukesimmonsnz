id: pattern.economy.ai_productivity_capture_asymmetry
title: AI productivity gains are likely to be captured asymmetrically
theme: economy
summary: >
  New Zealand's productivity gap with the OECD frontier is a long-tail
  problem: a small group of frontier firms operate near the international
  frontier while the median firm lags far behind, with within-industry
  dispersion larger than in most OECD comparators. AI tooling is most
  effective when complemented by data, capital, and managerial capacity
  — all of which are concentrated in the frontier tier. Without
  diffusion mechanisms, AI sharpens the gap rather than closing it.
