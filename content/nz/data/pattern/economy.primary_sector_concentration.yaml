narrative:
- heading: Sector structure
  body: 'Primary sector concentration is not inherently a problem: New Zealand comparative
    advantage in pastoral and horticultural production is real. But sectors with low
    labour productivity set a ceiling on wages that constrains regional incomes and
    makes retention of skilled labour difficult.'
- heading: Transition pathway
  body: Value-added processing, technology services, and knowledge-economy expansion
    are often proposed as diversification pathways. Each requires investment in workforce
    capability, digital infrastructure, and market access that most primary-dominated
    regions cannot self-fund.
