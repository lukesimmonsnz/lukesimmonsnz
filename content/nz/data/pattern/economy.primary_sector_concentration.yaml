id: pattern.economy.primary_sector_concentration
title: Primary sector concentration and productivity limits
theme: economy
summary: Most New Zealand regions outside Auckland and Wellington have economies heavily
  concentrated in primary industries — pastoral farming, horticulture, forestry, aquaculture
  — with relatively low labour productivity and limited wage growth.
