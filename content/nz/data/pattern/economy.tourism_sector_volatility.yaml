id: pattern.economy.tourism_sector_volatility
title: Tourism sector concentration and COVID vulnerability
theme: economy
summary: Regions highly dependent on international tourism experienced severe economic
  shock during COVID-19 and face structural vulnerability to future demand shocks
  from health events, currency movements, or climate-related disruption.
manifests_in:
- otago
- west-coast
- nelson
- tasman
- gisborne
- northland
- marlborough
