narrative:
- heading: COVID shock
  body: The COVID-19 border closure reduced international visitor arrivals by 99%
    and devastated internationally-dependent tourism economies in Queenstown, Rotorua,
    the West Coast, and smaller regions. The shock exposed the risks of a single-sector
    concentration strategy.
- heading: Structural vulnerability
  body: Beyond COVID, international tourism demand is sensitive to exchange rates,
    air connectivity, and increasingly to the climate credentials of long-haul travel.
    Regions that have not diversified from tourism dependence remain exposed to these
    structural trends.
