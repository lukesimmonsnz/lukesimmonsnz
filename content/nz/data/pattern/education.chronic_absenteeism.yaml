id: pattern.education.chronic_absenteeism
title: Chronic school absenteeism as a systemic challenge
theme: education
summary: School attendance rates have declined significantly across New Zealand regions
  post-COVID, with chronic absenteeism highest in high-deprivation areas and schools
  serving Māori and Pasifika students.
