narrative:
- heading: Post-COVID escalation
  body: Attendance rates that were already lower in high-deprivation schools declined
    sharply during COVID-19 and have not recovered. Nationally, regular attendance
    (90%+ of days) has fallen from ~70% to ~55% in many regions.
- heading: Compounding effects
  body: Chronic absenteeism predicts NCEA non-completion, reduced lifetime earnings,
    and increased welfare dependence. Its concentration in already-disadvantaged communities
    deepens inequality and reduces the return on educational investment.
