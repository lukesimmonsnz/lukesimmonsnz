id: pattern.education.ece_access_barrier
title: Early childhood education access barriers in low-income communities
theme: education
summary: Participation in early childhood education is lower in high-deprivation communities
  across all regions, driven by cost, supply gaps, and cultural fit — with long-run
  consequences for school readiness and achievement.
