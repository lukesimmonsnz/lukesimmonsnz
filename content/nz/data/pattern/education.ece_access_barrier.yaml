narrative:
- heading: Access gap
  body: '20 hours'' free ECE is nominally universal but in practice inaccessible to
    many families in low-income communities: no local supply, full-fee topping-up
    beyond 20 hours, transport costs, and culturally inappropriate services all reduce
    effective participation.'
- heading: Downstream effects
  body: 'ECE participation is one of the strongest predictors of school readiness
    and long-run educational outcomes. The access gap therefore front-loads inequality:
    children from low-income families enter school less prepared, and the gap compounds
    through schooling.'
