narrative:
- heading: Persistent gap
  body: 'The Māori–non-Māori NCEA Level 2 gap has persisted at 10–20 percentage points
    for decades despite targeted programmes. It is present in every region and is
    not fully explained by socioeconomic differences: a gap remains after controlling
    for deprivation.'
- heading: Structural explanation
  body: Mainstream schooling was designed around and for a Pākehā cultural context.
    Curriculum, pedagogy, and institutional culture create barriers for Māori students
    that are distinct from socioeconomic barriers. Kura kaupapa consistently produce
    higher Māori achievement outcomes, which is direct evidence for the cultural fit
    hypothesis.
