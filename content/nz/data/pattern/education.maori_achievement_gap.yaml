id: pattern.education.maori_achievement_gap
title: Māori educational achievement gap
theme: education
summary: Māori students achieve NCEA and higher qualifications at significantly lower
  rates than non-Māori in every region, reflecting systemic barriers in curriculum,
  pedagogy, and the relationship between mainstream schooling and Māori culture.
manifests_in:
- northland
- auckland
- waikato
- gisborne
- bay-of-plenty
