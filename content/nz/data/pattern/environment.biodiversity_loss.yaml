narrative:
- heading: National pattern
  body: New Zealand has one of the world's highest proportions of threatened and endangered
    species. Despite Predator Free 2050 ambitions, habitat fragmentation and predator
    pressure continue to reduce populations of native birds, lizards, and invertebrates
    across all regions.
- heading: Land use interaction
  body: Urban expansion, pastoral intensification, and plantation forestry each reduce
    or degrade native habitat. The cumulative effect across land-use boundaries exceeds
    what any single region's protection effort can offset.
