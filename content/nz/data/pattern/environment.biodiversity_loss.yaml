id: pattern.environment.biodiversity_loss
title: Biodiversity loss and habitat fragmentation
theme: environment
summary: Native biodiversity is declining across all regions from the combined effects
  of habitat fragmentation, invasive predators, land-use change, and climate-driven
  range shifts.
manifests_in:
- northland
- auckland
- waikato
- bay-of-plenty
- gisborne
- hawkes-bay
- wellington
- canterbury
- otago
- southland
