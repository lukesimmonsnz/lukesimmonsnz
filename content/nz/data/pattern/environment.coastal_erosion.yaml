narrative:
- heading: Physical process
  body: Even under conservative sea-level rise scenarios, storm surge superimposed
    on a higher baseline produces significantly greater erosion and inundation frequency.
    New Zealand's long coastline relative to land area means coastal exposure is disproportionate.
- heading: Managed retreat imperative
  body: Many coastal communities cannot be permanently protected against a 1m+ sea-level
    rise scenario. The national coastal policy gap — no formal managed retreat framework
    — means regions are making inconsistent decisions about protection versus retreat
    with little Crown support.
