id: pattern.environment.coastal_erosion
title: Coastal erosion and shoreline retreat
theme: environment
summary: Sea-level rise and storm intensification are accelerating coastal erosion
  around New Zealand's extensive coastline, threatening low-lying communities, Māori
  coastal land, and infrastructure.
manifests_in:
- northland
- bay-of-plenty
- gisborne
- hawkes-bay
- wellington
- tasman
- marlborough
- southland
