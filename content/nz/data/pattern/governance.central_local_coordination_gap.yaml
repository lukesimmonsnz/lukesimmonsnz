narrative:
- heading: Devolution without capacity
  body: 'New Zealand has devolved significant regulatory and service responsibilities
    to local government while constraining rate rises and without matching fiscal
    transfer. The result is a two-tier system: large urban councils with capacity,
    and small provincial councils without it.'
- heading: Crisis as forcing function
  body: 'Coordination gaps are most visible during crises: the COVID response, Cyclone
    Gabrielle recovery, and three-waters reform all exposed the limits of councils''
    independent capacity and the absence of a systematic Crown-council co-governance
    framework.'
