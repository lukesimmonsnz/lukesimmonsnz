id: pattern.governance.central_local_coordination_gap
title: Central-local government coordination gap
theme: governance
summary: 'The gap between central government direction and local government delivery
  capacity produces inconsistent outcomes across regions: well-resourced councils
  achieve compliance and innovation; under-resourced ones fall further behind.'
