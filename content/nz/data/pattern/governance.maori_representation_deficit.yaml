narrative:
- heading: Representation gap
  body: In regions where Māori are 20–40% of the population, elected council membership
    is typically 5–15% Māori. Māori wards — enabled nationally after the 2021 Māori
    Wards and Māori Constituencies Act — create direct representation pathways but
    do not address under-representation in staff and management.
- heading: Treaty obligation
  body: Article 2 of Te Tiriti o Waitangi establishes Crown obligations to protect
    rangatiratanga. Local government decision-making on resource management, infrastructure,
    and development directly affects Māori property and cultural interests. Under-representation
    in these processes is therefore a Treaty compliance issue, not merely a diversity
    issue.
