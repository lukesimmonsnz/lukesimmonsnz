id: pattern.governance.maori_representation_deficit
title: Māori under-representation in local government
theme: governance
summary: Māori are systematically under-represented on councils and in senior local
  government roles across all regions relative to their population share, with Māori
  wards providing partial but incomplete redress.
manifests_in:
- northland
- auckland
- waikato
- bay-of-plenty
- gisborne
- hawkes-bay
- wellington
- manawatu-whanganui
