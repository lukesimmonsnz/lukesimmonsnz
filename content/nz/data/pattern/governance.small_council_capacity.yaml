id: pattern.governance.small_council_capacity
title: Small council strategic and technical capacity gap
theme: governance
summary: New Zealand's smallest territorial authorities lack the technical expertise,
  financial capacity, and institutional memory to effectively manage complex regulatory
  environments, infrastructure investment, and long-horizon strategic planning.
