narrative:
- heading: Structural gap
  body: Councils with small rates bases struggle to attract and retain specialists
    in planning, engineering, finance, and environmental management. The gap between
    what the Resource Management Act and Local Government Act require and what small
    councils can deliver is systemic.
- heading: Amalgamation tension
  body: Amalgamation and shared services are the conventional responses. Both generate
    political resistance from communities valuing local representation. The tension
    between efficiency (fewer, larger councils) and legitimacy (many, smaller ones)
    is unresolved in New Zealand local government policy.
