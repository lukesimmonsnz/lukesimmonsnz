id: pattern.health.maori_health_outcome_gap
title: Māori health outcome gap across all regions
theme: health
summary: Māori experience significantly worse health outcomes than non-Māori across
  all regions and all major disease categories, driven by social determinants, access
  barriers, and institutional racism in health services.
