narrative:
- heading: Life expectancy gap
  body: Māori life expectancy is 7+ years below non-Māori nationally, with the gap
    present in every region. Cardiovascular disease, diabetes, and mental health account
    for the majority of excess mortality and morbidity. The gap has persisted despite
    decades of targeted health programmes.
- heading: Access and institutional barriers
  body: Access barriers — geographic, financial, cultural — interact with institutional
    racism in mainstream health services to reduce Māori health-seeking behaviour
    and service quality. Kaupapa Māori providers consistently outperform mainstream
    services on Māori health outcomes in evaluation studies.
