id: pattern.health.rural_primary_care_gap
title: Rural primary care access gap
theme: health
summary: Rural New Zealanders across all regions face significant barriers to primary
  care access — distance, cost, workforce vacancies — that result in delayed presentation,
  higher acute care use, and worse outcomes for preventable conditions.
manifests_in:
- northland
- gisborne
- taranaki
- west-coast
- southland
- otago
- marlborough
- nelson
