- claim.otago.governance.governance_prevalence
narrative:
- heading: Access pattern
  body: Distance-to-GP and cost-to-GP are the two strongest predictors of delayed
    presentation for rural New Zealanders. In remote areas, both barriers operate
    simultaneously, and after-hours care may require a 1–2 hour drive to the nearest
    emergency department.
- heading: Telehealth partial solution
  body: Telehealth expanded during COVID-19 and addresses some access barriers, particularly
    for mental health and chronic disease monitoring. It does not substitute for physical
    examination, procedural care, or the trust relationships that underpin primary
    care quality.
