id: pattern.health.workforce_shortage
title: Health workforce shortage as a cross-regional structural constraint
theme: health
summary: New Zealand faces a structural health workforce deficit — GPs, nurses, specialists,
  and allied health — concentrated in rural and provincial regions but present as
  a constraint across the system.
