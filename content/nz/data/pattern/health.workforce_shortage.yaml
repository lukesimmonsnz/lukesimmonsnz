narrative:
- heading: Structural shortage
  body: New Zealand trains insufficient health professionals relative to its population
    and geography. Rural and provincial regions compete poorly for graduates who have
    accumulated debt and seek urban lifestyle. The shortage is structural, not cyclical,
    and is not addressable by individual incentive packages alone.
- heading: Workforce pipeline
  body: International recruitment fills gaps in the short term but does not build
    domestic capability. Māori and Pasifika workforce development — with culturally
    competent care as a co-benefit — is both an equity imperative and a structural
    solution to workforce in underserved communities.
