id: pattern.housing.affordability_deterioration
title: Housing affordability deterioration across urban and peri-urban regions
theme: housing
summary: Median house price-to-income multiples have risen to structurally unaffordable
  levels across New Zealand's urban regions, driven by supply constraints, low interest
  rates, and investor demand outpacing income growth.
