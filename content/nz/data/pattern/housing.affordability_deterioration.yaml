narrative:
- heading: Scale
  body: Housing affordability has deteriorated in every urban and peri-urban region.
    Median multiples of 7–10× annual income are now common outside Auckland, compared
    with the international benchmark of 3× considered affordable.
- heading: Structural drivers
  body: Supply-side constraints — restrictive zoning, infrastructure funding gaps,
    and planning delays — interact with demand-side factors including migration, investment,
    and historically low real interest rates to produce persistent affordability decline.
