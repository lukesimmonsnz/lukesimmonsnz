narrative:
- heading: The infrastructure bottleneck
  body: Councils with small ratepayer bases cannot front-fund the infrastructure necessary
    to open new residential land. Even where zoning permits growth, the absence of
    reticulated water, wastewater, and roads prevents development.
- heading: Policy implications
  body: Central government co-investment in infrastructure — rather than solely planning
    reform — is therefore necessary to unlock supply in most non-Auckland regions.
    The RMA reform agenda addresses only one of two binding constraints.
