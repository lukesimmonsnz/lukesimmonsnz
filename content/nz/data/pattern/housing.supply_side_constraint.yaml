id: pattern.housing.supply_side_constraint
title: Infrastructure funding gap as primary supply constraint
theme: housing
summary: Across regions, the binding constraint on new housing supply is not zoning
  alone but the cost and availability of three-waters and roading infrastructure,
  which smaller councils cannot fund at the scale required.
