id: pattern.inequality.child_poverty_concentration
title: Child poverty concentration in high-deprivation areas
theme: inequality
summary: Child poverty rates are highly concentrated in high-deprivation communities
  across all regions, with persistent geographic clustering that reproduces across
  generations.
