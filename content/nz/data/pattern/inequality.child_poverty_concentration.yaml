narrative:
- heading: Pattern
  body: 'Child poverty is not randomly distributed: it clusters in specific suburbs
    and towns with high Māori and Pasifika populations, limited employment, poor housing,
    and weak social infrastructure. The geographic pattern is consistent across all
    urban regions.'
- heading: Intergenerational lock-in
  body: Child poverty predicts educational underachievement, health disparities, and
    constrained employment, which perpetuate poverty into the next generation. The
    persistence of geographic poverty clusters across decades confirms that market
    mechanisms alone do not dissolve them.
