narrative:
- heading: Cross-regional consistency
  body: The Māori–non-Māori socioeconomic gap appears in every dataset and every region.
    In northland and Gisborne, where Māori are 30–50% of the population, the gap shapes
    regional aggregate statistics. In Auckland and Wellington, it is visible in intra-urban
    geographic patterns.
- heading: Structural explanation
  body: The gap predates contemporary policy choices. Treaty-era confiscation and
    alienation of Māori land removed the capital base for intergenerational wealth
    accumulation. The gap cannot be explained by individual-level factors alone and
    does not close through market mechanisms without structural intervention.
