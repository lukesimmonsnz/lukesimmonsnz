id: pattern.inequality.maori_socioeconomic_gap
title: Māori socioeconomic gap across all regions
theme: inequality
summary: Māori experience persistently lower median incomes, higher unemployment,
  lower homeownership, and worse health outcomes than non-Māori in every New Zealand
  region, reflecting structural colonial dispossession.
manifests_in:
- northland
- auckland
- waikato
- bay-of-plenty
- gisborne
- hawkes-bay
- manawatu-whanganui
- wellington
