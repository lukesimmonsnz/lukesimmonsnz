id: pattern.inequality.regional_income_divergence
title: Regional income divergence from national median
theme: inequality
summary: Per-capita income and median wage levels in most New Zealand regions diverge
  significantly from the Auckland and Wellington metropolitan medians, reflecting
  agglomeration effects and limited high-productivity sector presence outside the
  main centres.
manifests_in:
- northland
- gisborne
- west-coast
- taranaki
- marlborough
- nelson
- tasman
- southland
