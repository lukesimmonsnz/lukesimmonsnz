narrative:
- heading: Divergence pattern
  body: Regional median wages in Northland, Gisborne, and the West Coast are 15–25%
    below the national median. The gap reflects both sector composition (primary industries,
    low-productivity services) and the limited agglomeration benefits available in
    small labour markets.
- heading: Policy responses
  body: Regional development policy has repeatedly attempted to address income divergence
    through targeted investment and industry development. Sustained closing of the
    gap requires either raising productivity in existing sectors or developing new
    ones — both difficult without sustained Crown co-investment.
