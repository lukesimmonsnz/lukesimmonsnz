id: pattern.inequality.rural_population_decline
title: Rural and small-region population decline
theme: inequality
summary: >
  Stats NZ subnational projections show working-age population decline
  over 2023-2048 in several rural and small-population regions —
  including West Coast, Gisborne, parts of Manawatu-Whanganui, and
  Southland — while metropolitan regions (Auckland, Wellington,
  Canterbury) continue to grow. The divergence concentrates fiscal
  capacity, labour markets, and amenities in the larger centres and
  hollows out the demographic base of provincial New Zealand.
manifests_in:
- west-coast
