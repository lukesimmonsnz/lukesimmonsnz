narrative:
- heading: Pattern
  body: Despite successive rural broadband initiatives, significant gaps in coverage
    persist wherever population density is below the commercial viability threshold
    for private investment. Remote communities remain served by satellite or no service.
- heading: Economic and social cost
  body: 'Digital exclusion amplifies geographic disadvantage: it restricts access
    to telehealth, remote employment, online education, and government services, compounding
    the effects of transport isolation.'
