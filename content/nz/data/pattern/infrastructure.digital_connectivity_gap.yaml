id: pattern.infrastructure.digital_connectivity_gap
title: Digital connectivity gap in rural and remote areas
theme: infrastructure
summary: Rural broadband coverage and mobile connectivity remain inadequate across
  Northland, Gisborne, West Coast, and other sparsely populated regions, limiting
  remote work, health access, and economic participation.
manifests_in:
- northland
- gisborne
- west-coast
- taranaki
- southland
- marlborough
claim_ids:
