id: pattern.transport.freight_infrastructure_gap
title: Freight infrastructure gap constraining regional export sectors
theme: transport
summary: Regional export industries face logistics constraints from inadequate port,
  rail, and road freight infrastructure that raises unit costs and limits competitive
  access to Auckland and international ports.
