narrative:
- heading: Pattern
  body: Regions dependent on primary exports — forestry, horticulture, aquaculture,
    pastoral farming — face higher unit logistics costs than equivalent producers
    in larger centres. This reflects both distance and underinvestment in regional
    port and rail infrastructure.
- heading: Policy gap
  body: Freight infrastructure investment in New Zealand has concentrated on the main
    trunk corridor and urban networks. Regional freight hubs and the coastal shipping
    alternative are underinvested relative to their economic case.
