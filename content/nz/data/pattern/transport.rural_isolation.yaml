id: pattern.transport.rural_isolation
title: Rural transport isolation and access inequity
theme: transport
summary: Rural and remote communities across New Zealand face severe transport isolation
  — poor road quality, zero public transport, and long distances to services — creating
  compounding social and economic disadvantage.
manifests_in:
- northland
- gisborne
- west-coast
- southland
- taranaki
- hawkes-bay
- manawatu-whanganui
claim_ids:
