id: claim.otago.education.achievement_prevalence
statement: Educational achievement disparities in Otago are significant, with NCEA
  Level 2 attainment in provincial areas (Oamaru, Alexandra, Cromwell) averaging 70-75%
  compared to Dunedin (85%+). Regional universities (University of Otago, Otago Polytechnic)
  struggle to retain graduates, with 60%+ of tertiary graduates leaving the region
  within 5 years.
