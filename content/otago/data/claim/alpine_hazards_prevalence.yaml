id: claim.otago.climate.alpine_hazards_prevalence
statement: Alpine and high-altitude infrastructure in Otago—Coronet Peak and The Remarkables
  ski fields, SH8 Lindis Pass, and mountain tourism facilities—face accelerating climate
  risk. NIWA modelling (RCP8.5 scenario) projects reliable ski season shortening by
  2050; Lindis Pass altitude and winter ice closures (currently 10-15 days/year) expected
  to increase 20-30% by 2050.
