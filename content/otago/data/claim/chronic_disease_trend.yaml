id: claim.otago.health.chronic_disease_trend
statement: 'Chronic disease burden is rising: aging population (Dunedin/Clutha/Waitaki);
  Type 2 diabetes incidence up 2-3% annually; CVD mortality in rural Otago (Waitaki,
