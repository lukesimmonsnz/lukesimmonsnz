id: claim.otago.climate.coastal_dunedin_prevalence
statement: Coastal Dunedin faces compound sea-level rise and storm surge risk. Otago
  Harbour infrastructure (Port Chalmers, Port Otago container terminal, breakwater,
  log-handling facilities) sits in high-tide zones vulnerable to inundation. Otago
  Peninsula—yellow-eyed penguin (hoiho) critical habitat and residential areas—faces
  saltwater intrusion and increased coastal erosion; Catlins coastal settlements (Kaka
  Point, Owaka) similarly at-risk.
