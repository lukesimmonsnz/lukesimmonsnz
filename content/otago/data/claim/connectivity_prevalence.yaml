id: claim.otago.transport.connectivity_prevalence
statement: 'Regional connectivity in Otago is constrained by geography and distance:
  SH1 spine (Dunedin-Balclutha-Invercargill, 3.5 hours Dunedin-Invercargill) critical
  for freight/passenger; SH8 (Dunedin-Cromwell-Wanaka, 2.5 hours one-way) critical
  for Central Otago access; SH6 Frankton congestion (Queenstown-Wanaka link) a bottleneck.
  InterCity regional bus service connects major centres; Dunedin ORC bus network is
  urban-focused; rural areas (South Otago, Waitaki) transit-dependent. Air access
  via Dunedin Airport (domestic, limited international) and Queenstown Airport (domestic,
  Australia, Singapore).'
