id: claim.otago.transport.connectivity_trend
statement: 'Regional connectivity is improving marginally: SH1/SH8 maintenance ongoing
  but capacity not growing; Frankton congestion worsening with Queenstown tourism/population
  growth (weekend/holiday peaks); bus services stable (ORC Dunedin) to declining (rural
  InterCity reductions); Dunedin Airport recovering (1.2M passengers pre-COVID, 80-90%
  recovery 2023); Queenstown Airport capacity-constrained (expansion proposal contested).
  Dunedin-Queenstown direct flight service limited; most connections via Auckland/Christchurch.'
