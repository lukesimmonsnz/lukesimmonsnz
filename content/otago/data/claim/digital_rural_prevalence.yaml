id: claim.otago.infrastructure.digital_rural_prevalence
statement: 'Rural Otago digital infrastructure is mixed: Dunedin/Queenstown have fiber
  and 5G coverage; rural areas (Cromwell, Arrowtown, South Otago) have fiber rollout
  underway (Crown Fibre Initiative); remote Catlins (Kaka Point, Owaka) remain broadband-limited
  (fixed wireless, satellite fallback options). Digital divide in older demographic
  (low adoption); agriculture and small business increasingly dependent on connectivity;
  distance learning feasibility varies widely by location.'
