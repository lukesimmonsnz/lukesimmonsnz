id: claim.otago.infrastructure.digital_rural_trend
statement: 'Rural digital infrastructure improving gradually: Crown Fibre Initiative
  expanding (Wanaka, Central Otago, parts of Waitaki); 5G network expansion into secondary
  centres (Arrowtown, Cromwell); rural broadband speed and reliability improving but
  pockets of poor service remain (Catlins, far South Otago). Uptake lagging in older
  demographic; cost barriers (equipment, plans) for some rural households; agricultural
  precision farming demand driving enterprise-level fiber demand.'
