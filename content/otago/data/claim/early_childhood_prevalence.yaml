id: claim.otago.education.early_childhood_prevalence
statement: 'Early childhood education (ECE) access in Otago is mixed: Dunedin (high
  student population) has dense ECE networks; Queenstown / Central Otago growth areas
  (Cromwell, Wanaka) facing capacity shortages; rural areas (Oamaru, Balclutha) limited
  provider diversity. Aotearoa Education Outcomes Framework targets (80% 3-4 year
  participation) not uniformly met; cost barriers in rural/tourist-economy areas where
  parents juggle multiple part-time roles.'
