id: claim.otago.crime.family_violence_prevalence
statement: Family violence call rates in rural Otago (Clutha, Waitaki districts) are
  elevated; geographic isolation and limited victim service access (Balclutha, Oamaru,
  small towns 60-150km from Dunedin support services) compound response challenges.
  Police Family Harm data shows rates in South Otago ~15-20% above national average;
  housing instability and economic stress in farming/rural communities contribute.
