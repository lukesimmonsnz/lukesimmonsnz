id: claim.otago.environment.freshwater_stress_prevalence
statement: 'Freshwater systems in Otago are stressed by irrigation demand, dairy and
  wine production, and population growth: Clutha/Mata-au River (NZ''s highest-flow
  river) heavily allocated (Clyde, Roxburgh hydro dams generate ~30% of NZ electricity);
  Lake Dunstan (Cromwell Gorge) stores irrigation water; Wakatipu (Queenstown), Wanaka,
  Hawea, and high-country lakes face competing demands (irrigation, power generation,
  recreation). ORC Water Plan under review; allocation sustainability questioned.'
