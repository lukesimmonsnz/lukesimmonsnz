id: claim.otago.governance.governance_prevalence
statement: Otago governance spans local councils (Dunedin City, Queenstown Lakes DC,
  Waitaki DC, Clutha DC), Otago Regional Council (ORC), and statutory Māori representatives
  (Te Rūnanga o Ngāi Tahu). DCC manages large EPB stock and stadium debt (Forsyth
  Barr, opened 2011); QLDC fastest-growing NZ district; ORC manages water allocation
  and regional transport (bus Dunedin). Ngāi Tahu / Kāi Tahu mana whenua across most
  of Otago; 2013 Treaty settlement major; Ngāi Tahu Holdings significant South Island
  commercial entity.
