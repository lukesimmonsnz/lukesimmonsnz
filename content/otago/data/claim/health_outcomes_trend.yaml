id: claim.otago.health.health_outcomes_trend
statement: Health service accessibility in rural Otago (Central Otago, Oamaru, Southland
  border) faces GP shortages and specialist service gaps. Southern DHB operates on
  constrained budgets, with nursing vacancies at 12-15% and reliance on locum doctors
  in provincial centers, delaying elective surgery and specialist consultations.
