id: claim.otago.inequality.inequality_trend
statement: 'Otago inequality is accelerating: Queenstown median-multiple growth outpacing
  wage growth; Dunedin wage stagnation in service sectors (hospitality, retail) while
  housing costs rise; rural primary sector employment declining (mechanization, consolidation);
  Māori and Pasifika graduate retention very low (leave region at higher rates seeking
  better opportunity); gender wage gaps widening in tourism/hospitality; intergenerational
  mobility constrained in low-income households.'
