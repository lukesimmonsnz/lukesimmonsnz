id: claim.otago.infrastructure.infrastructure_trend
statement: 'Infrastructure deficits accumulating: Dunedin water main breaks increasing
  (2-3 per month, aging cast iron pipes); Queenstown growth outpacing three waters
  capacity (development consents now conditional on infrastructure funding); Dunedin
  Hospital rebuild ($2.3B+) consuming public capital (other assets deferred); road
  maintenance backlogs on secondary routes (rural Clutha, Waitaki); Forsyth Barr Stadium
  debt servicing limiting DCC capital for other priorities; earthquake-prone building
  (EPB) compliance costs rising in Dunedin CBD.'
