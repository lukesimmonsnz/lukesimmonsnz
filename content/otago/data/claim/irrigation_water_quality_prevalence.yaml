id: claim.otago.environment.irrigation_water_quality_prevalence
statement: Irrigation water quality in Central Otago (Cromwell-Bannockburn-Gibbston
  zones) is affected by dairy runoff from Clutha catchment and horticultural chemical
  use. Pesticide and nutrient load in Clutha and tributary systems monitored by ORC;
  wine region (Pinot Noir vineyards) uses tillage and cover crops (lower chemical
  load than arable); some irrigation return flows degrade water quality in receiving
  streams. Edendale Fonterra milk supply depends on Clutha water quality.
