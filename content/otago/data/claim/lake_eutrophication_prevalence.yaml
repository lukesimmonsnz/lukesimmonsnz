id: claim.otago.environment.lake_eutrophication_prevalence
statement: High-country lakes in Otago—Wanaka, Hawea, Dunstan, Wakatipu—show moderate
  eutrophication pressure from catchment runoff and recreational use. Lake Dunstan
  (Cromwell Gorge, irrigation storage) and Lake Wakatipu (Queenstown) face summer
  algal blooms in some years; nutrient-sensitive zones identified by regional council.
  Recreational boat traffic and holiday home development intensifying stress; Wanaka
  catchment (wine/stone fruit) showing elevated nutrient signals.
