statement: Dunedin Hospital governance is under Te Whatu Ora Southern (formerly Southern
  DHB → Health NZ restructure). Rebuild project ($2.3B+ mid-2024) spans new Acute
  Services Building and Outpatient Services Building (completion 2029-2030); project
  governance involves joint steering committees (Health NZ, QLDC, Dunedin City Council).
  Regional hospital serves South Island population ~500,000 (Otago, Southland, parts
  of Canterbury).
