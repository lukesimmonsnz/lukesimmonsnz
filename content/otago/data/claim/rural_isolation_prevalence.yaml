id: claim.otago.inequality.rural_isolation_prevalence
statement: Rural isolation in Otago is pronounced in South Otago (Balclutha, Kaka
  Point, Catlins) and Waitaki (Oamaru, Palmerston, small towns). Distance to specialist
  services (hospital, mental health, education) ranges 60-180 km; transport costs
  high; social isolation (single-industry towns, demographic decline); community services
  (libraries, pools, youth programmes) minimal. Broadband coverage improving but rural
  digital divide persists; loneliness and mental health challenges elevated.
