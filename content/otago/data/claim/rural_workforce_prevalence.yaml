id: claim.otago.health.rural_workforce_prevalence
statement: 'Rural health workforce in Otago is strained: Oamaru (Waitaki), Balclutha
  (Clutha), small centres have locum-dependent GPs; nursing shortages acute; allied
  health (physio, mental health, dental) sparse or absent in small towns (>60km travel
  to Dunedin). Rural practice sustainability challenged by low patient volumes, aging
  practitioners, and insufficient accommodation/schools for new staff. Telemedicine
  adoption partial; specialist access requires travel/hospitalization.'
