id: claim.otago.health.rural_workforce_trend
statement: 'Rural health workforce is shrinking: Oamaru GPs aging and retiring without
  replacement pipeline; Balclutha and outlying areas (Kaka Point, Owaka, Catlins)
  experiencing healthcare ''deserts'' (no resident GP, nearest 60+ km away); nursing
  and allied health recruitment impossible without subsidized housing/support; emergency
  response times 45-90 min in remote zones; Dunedin Hospital rebuild creating city-focused
  employment opportunities, drawing rural talent inward.'
