id: claim.otago.economy.tourism_queenstown_prevalence
statement: 'Queenstown-Lakes tourism is a dominant economic force: 2M+ annual visitors
  (pre-COVID, recovering); adventure sector (bungy, jet-boat, heli-skiing), lake/mountain
  recreation, wine trail (Central Otago), and hospitality generate $2.5-3B spend.
  Visitor industry employs 25,000+ directly and indirectly; accommodation shortage
  (3,500+ Airbnb listings competing with long-term stock) and worker housing crisis
  endemic. Visitor season (Dec-Mar) dominates economic activity; winter ski season
  (Jun-Aug) secondary spike.'
