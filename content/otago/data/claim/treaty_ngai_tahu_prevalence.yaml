id: claim.otago.governance.treaty_ngai_tahu_prevalence
statement: Ngāi Tahu / Kāi Tahu are mana whenua across Otago and most of South Island;
  2013 Ngāi Tahu (Te Ture Whenua) Act ratified major Treaty settlement (largest historical
  acreage in modern settlements). Te Rūnanga o Ngāi Tahu (statutory authority) manages
  iwi affairs; Ngāi Tahu Holdings (commercial entity) operates tourism (Milford Sound,
  Dart River), farming, forestry, and real estate (~$3B+ portfolio). Co-governance
  agreements emerging in resource management, health, education.
