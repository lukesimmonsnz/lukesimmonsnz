id: claim.otago.crime.youth_offending_prevalence
statement: Youth offending in Otago is concentrated in Dunedin (student/young adult
  demographics) and Queenstown (visitor and seasonal worker town attracting 18-35
  age cohort). North Dunedin flat-party culture and Queenstown hospitality worker
  population drive assaults and disorder; rural youth offending lower but property
  crime (theft from farms, vehicles) present in Clutha/Waitaki.
