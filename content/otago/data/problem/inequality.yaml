narrative:
- heading: Overview
  body: Queenstown's extreme wealth concentration (median multiple >15×) contrasts sharply with Dunedin deprivation
    and rural Clutha/Waitaki isolation. Worker conditions in tourism and agriculture are poor with low wages and limited
    worker housing. A significant gender pay gap persists across the region. Ngāi Tahu iwi commercial assets create some
    counterweight through iwi employment, but income and homeownership gaps persist for Māori workers outside iwi sectors.
