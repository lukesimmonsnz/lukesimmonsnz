updated: '2026-04-26'
summary: Queenstown's extreme wealth concentration contrasts starkly with Dunedin deprivation and rural
  Central Otago isolation. Worker conditions in tourism and seasonal agriculture are poor; income inequality
  within the region is among the highest in New Zealand, driven by the dual structure of high-wage property
  and corporate tourism and low-wage seasonal service work. A significant gender pay gap persists across
  the region.
