id: claim.southland.education.achievement_trend
statement: Educational achievement in Southland lags national averages, with NCEA
  Level 2 attainment at 72% (Invercargill) and 68% in rural districts. University
  attendance rates are 45-50% of school leavers, with limited local tertiary options
  forcing young people to relocate to Dunedin, Christchurch, or Auckland.
