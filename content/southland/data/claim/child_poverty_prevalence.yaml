id: claim.southland.inequality.child_poverty_prevalence
statement: Child poverty in Southland shows concentration in specific areas. Invercargill
  East (NZDep score 8-10) has high child poverty prevalence; Gore and Winton show
  elevated disadvantage. Rural poverty rates difficult to measure but concentrated
  in remote farming communities. Family income vulnerability linked to agricultural
  commodity dependence and seasonal employment.
