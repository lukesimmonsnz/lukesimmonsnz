id: claim.southland.health.chronic_disease_trend
statement: Chronic disease prevalence in Southland is rising. Obesity rates increasing
  particularly in young adults; Type 2 diabetes age of onset decreasing; cardiovascular
  mortality remaining elevated. Lifestyle factors (high alcohol consumption, smoking
  prevalence 18-22% vs national 13%), limited physical activity infrastructure (rural
  areas), and high-sodium processed food availability contribute. Health promotion
  investment limited.
