id: claim.southland.inequality.deprivation_trend
statement: Deprivation in Southland is sustained by limited economic diversification.
  Smelter job uncertainty affects Bluff families; agricultural commodity exposure
  creates rural income instability. Migrant worker exploitation (RSE workers, Pasifika
  seasonal workers) documented but enforcement capacity limited. Brain drain accelerates
  deprivation in smaller towns (Gore, Winton).
