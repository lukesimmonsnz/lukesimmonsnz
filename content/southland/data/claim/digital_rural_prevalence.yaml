id: claim.southland.infrastructure.digital_rural_prevalence
statement: Digital infrastructure in rural Southland lags urban provision. Broadband
  coverage <95% in Catlins, Mataura Valley, western Te Anau; 4G mobile spotty in remote
  areas. Business and education hampered; telehealth/remote work capacity constrained.
  UFB (Ultra-Fast Broadband) rollout prioritized city areas; rural deployment extends
  through 2025-2026.
