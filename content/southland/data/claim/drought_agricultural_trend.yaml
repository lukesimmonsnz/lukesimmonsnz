id: claim.southland.climate.drought_agricultural_trend
statement: Agricultural drought events in Southland are projected to increase in frequency
  and severity. Climate models suggest dry summer events shifting from 1-in-10 year
  to 1-in-5 year recurrence. Irrigation development on Southland Plains limited by
  Waiau and Oreti River water availability constraints; farm-level adaptation (fodder
  storage, supplementary irrigation) requires capital investment.
