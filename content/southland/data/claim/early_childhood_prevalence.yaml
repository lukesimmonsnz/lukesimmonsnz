id: claim.southland.education.early_childhood_prevalence
statement: Early childhood education (ECE) accessibility in Southland is limited in
  rural areas. Invercargill has adequate licensed ECE providers (~12); rural and coastal
  areas (Te Anau, Orepuki, Catlins, Bluff) have sparse provision. Cost barriers and
  workforce shortages affect availability; low-income families face access constraints.
