id: claim.southland.economy.economic_diversification_prevalence
statement: Southland's economy is narrowly dependent on primary industries. Dairy
  (Fonterra Edendale, Mataura Valley Milk), pastoral farming, and Tiwai Point Aluminium
  Smelter collectively represent >65% of regional employment. Limited secondary/tertiary
  sectors; tourism (Fiordland) is underdeveloped relative to pre-COVID potential.
  Manufacturing and professional services underrepresented.
