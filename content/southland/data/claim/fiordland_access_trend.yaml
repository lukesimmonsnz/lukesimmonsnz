id: claim.southland.transport.fiordland_access_trend
statement: 'Fiordland access infrastructure under pressure. Visitor numbers recovering
  post-COVID; Milford Road capacity at peak during peak season (December-February).
  Homer Tunnel: 60-year-old single-lane tunnel; replacement discussed but cost (~$1B)
  prohibitive. DOC maintenance adequate but not growth-oriented. Te Anau accommodation
  capacity limiting visitor growth. Helicopter/small plane access alternative but
  expensive.'
