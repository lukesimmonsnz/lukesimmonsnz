id: claim.southland.environment.fiordland_ecosystem_prevalence
statement: Fiordland ecosystem (Fiordland National Park 1.26M ha, Te Wāhipounamu UNESCO
  World Heritage) represents NZ's largest undisturbed wilderness. Rainforest (Milford
  Sound avg 7,000mm/year), alpine habitat, marine fjord ecosystem; endemic species
  (kea, yellow-eyed penguin, Fiordland crested penguin, marine mammals). Visitor pressure
  (~700,000 pre-COVID annually) creates infrastructure/conservation tension.
