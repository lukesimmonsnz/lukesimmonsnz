id: claim.southland.environment.fiordland_ecosystem_trend
statement: Fiordland ecosystem faces climate change and tourism pressure. Visitor
  recovery post-COVID to ~65% of pre-pandemic levels; infrastructure capacity (Milford
  Road, Te Anau accommodation) limiting growth. DOC funding constraints affecting
  track/hut maintenance. Pest control (stoats, rats) ongoing; marine invasive species
  risk from shipping. Rainfall intensification threatens infrastructure resilience.
