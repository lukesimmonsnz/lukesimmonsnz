id: claim.southland.environment.freshwater_degradation_trend
statement: Freshwater degradation in Southland is progressive. Dairy farm nitrogen
  excretion increasing; riparian strip adoption slow; municipal wastewater treatment
  (Invercargill) upgraded but small town systems aging. Southland Water and Land Plan
  2022 targets phased improvement; industry adoption of best practice (nutrient budgets,
  rotational grazing) variable. Agricultural lobby resists stringent limits.
