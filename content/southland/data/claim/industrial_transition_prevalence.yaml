id: claim.southland.economy.industrial_transition_prevalence
statement: Industrial transition in Southland is primarily Tiwai-centric. Smelter
  uncertainty (closure threats 2012, 2020-21) creates regional economic anxiety. ~1,000
  direct jobs + ~2,000 indirect; power supply (850 MW Manapouri) inextricably linked.
  No alternative large-scale industrial base; downstream processing (freezing works,
  dairy) dependent on agricultural input supply.
