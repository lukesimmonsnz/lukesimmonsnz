id: claim.southland.infrastructure.infrastructure_prevalence
statement: Infrastructure in Southland faces multiple aging assets and renewal pressures.
  Invercargill water (Waihōpai River source), wastewater (ocean outfall), electricity
  distribution, roading network, and airport facilities all aging. ILT Stadium Southland
  redevelopment underway; civic precinct investment planned. Rural water schemes (Gore,
  Winton, Mataura) aging; septic systems prevalent. Three Waters reform creates uncertainty
  for funding pathways.
