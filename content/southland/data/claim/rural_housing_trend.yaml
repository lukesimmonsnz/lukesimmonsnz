id: claim.southland.housing.rural_housing_trend
statement: Housing affordability is relatively stable in Southland compared to national
  trends, with median house prices in Invercargill at $320-350K. However, rental market
  pressure has increased, with vacancy rates below 2% and rental stress affecting
  essential services workers (nurses, teachers, farm laborers).
