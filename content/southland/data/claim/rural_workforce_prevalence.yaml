id: claim.southland.health.rural_workforce_prevalence
statement: Rural health workforce shortage in Southland is severe. GP vacancies in
  Gore, Winton, Te Anau, Riverton; locum dependence high; nursing vacancies above
  15% at Southland Hospital. Specialist services (cardiologists, oncologists, surgeons)
  require Dunedin travel (3+ hours). Rural midwifery services limited; home birth
  access restricted. Dental services (fluoride Invercargill, mobile clinics rural
  areas) insufficient for demand.
