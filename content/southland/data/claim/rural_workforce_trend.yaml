id: claim.southland.health.rural_workforce_trend
statement: Rural health workforce in Southland faces structural depletion. GP retirements
  without replacement; new graduates preferring urban centers; visa dependence on
  temporary migrant doctors unsustainable. Hospital nursing shortages driving shift-work
  burnout and turnover. Locum rates rising (incentive insufficient to attract permanent
  staff). Broadband infrastructure enables telehealth potential but implementation
  patchy. Training pipeline (Otago University medical school intakes) below regional
  need.
