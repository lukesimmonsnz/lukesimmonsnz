id: claim.southland.crime.safety_prevalence
statement: Crime safety in Southland shows regional variation. Invercargill CBD has
  elevated property crime and assault rates; methamphetamine supply driving property
  offences (burglary, shoplifting). Rural areas face stock theft and vehicle crime;
  Stewart Island faces isolation-related response delays. Southland Police district
  staffing at ~240 FTE for ~97,000 residents.
