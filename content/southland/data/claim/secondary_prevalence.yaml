id: claim.southland.education.secondary_prevalence
statement: Secondary education in Southland is concentrated in Invercargill. Southland
  Boys' College, Southland Girls' College, and James Hargest College (combined ~1,200
  students) dominate; smaller provincial secondary schools (Gore High School, Winton
  Secondary) serve <200 students each. Limited specialist programme breadth outside
  Invercargill.
