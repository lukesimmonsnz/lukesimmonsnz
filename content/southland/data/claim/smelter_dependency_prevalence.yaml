id: claim.southland.economy.smelter_dependency_prevalence
statement: Southland's economic dependency on Tiwai Point Aluminium Smelter is substantial
  and entrenched. NZAS operates 850 MW Manapouri hydroelectric station supply contract;
  smelter represents ~1,000 direct jobs (~1% regional employment) and ~2,000 indirect
  jobs in logistics, power generation, and services. Rio Tinto (79.4%) + Sumitomo
  (20.6%) ownership; strategic closure decisions made offshore.
