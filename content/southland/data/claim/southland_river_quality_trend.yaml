id: claim.southland.environment.southland_river_quality_trend
statement: Southland river quality improvement is slow despite regulatory efforts.
  Southland Water and Land Plan 2022 sets 2030 nitrogen reduction targets; uptake
  of riparian planting and nutrient management practices variable. Climate change
  (summer drying, high-flow events) adds stress. Indigenous species recovery (lamprey,
  native fish) hampered by habitat degradation. Recreational use (fishing, water sports)
  increasingly constrained by quality concerns.
