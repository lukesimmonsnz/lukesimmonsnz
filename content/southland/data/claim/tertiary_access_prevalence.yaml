id: claim.southland.education.tertiary_access_prevalence
statement: Tertiary education access in Southland is constrained by lack of local
  university provision. Southern Institute of Technology (now Te Pūkenga Southland
  campus) offers trades/vocational training; no undergraduate degree pathways locally.
  University study requires relocation to Dunedin (Otago University), Christchurch,
  or Auckland; financial and social barriers limit participation.
