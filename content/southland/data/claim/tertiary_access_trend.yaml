id: claim.southland.education.tertiary_access_trend
statement: Tertiary participation in Southland shows declining local pathways. SIT's
  historic Zero Fees Scheme (pre-Te Pūkenga merger) attracted national students; post-merger
  model less distinctive. Otago Polytechnic/Te Pūkenga integration completed; Invercargill
  campus now primarily Level 4+ qualifications. Young people pursuing degree study
  largely depart region; retention post-graduation low.
