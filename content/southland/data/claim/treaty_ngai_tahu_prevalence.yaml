id: claim.southland.governance.treaty_ngai_tahu_prevalence
statement: Treaty settlement implementation in Southland reflects Ngai Tahu (Kai Tahu)
  mana whenua. Southland (Murihiku) is Ngai Tahu rohe; iwi comprises three runanga
  (Invercargill, Waihopai, Hokonui). Co-governance partnership with Environment Southland
  joint committee established; freshwater planning increasingly iwi-led. Murihiku
  Regeneration programme (economic development, cultural, health, education) advancing.
