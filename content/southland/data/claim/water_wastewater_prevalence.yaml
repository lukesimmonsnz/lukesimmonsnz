id: claim.southland.infrastructure.water_wastewater_prevalence
statement: 'Water and wastewater systems in Southland face renewal pressures. Invercargill:
  water supply (Waihōpai River); treatment works aging (constructed 1960s); storage
  capacity adequate. Wastewater: central treatment plant; ocean outfall discharge.
