id: claim.southland.crime.youth_offending_prevalence
statement: Youth offending in Southland shows concentration in Gore and Winton. Youth
  justice referrals from secondary schools in smaller towns exceed Invercargill rates
  on per-capita basis. Limited youth employment/activity programmes outside Invercargill;
  rural youth service gaps documented. Substance misuse (alcohol, cannabis, methamphetamine)
  associated with offending.
