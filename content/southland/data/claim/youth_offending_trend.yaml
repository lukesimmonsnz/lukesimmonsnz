id: claim.southland.crime.youth_offending_trend
statement: Youth offending in Southland shows persistent structural drivers. Rural
  youth unemployment above regional average; limited post-school pathways in Gore
  and Winton contribute. Digital exclusion (limited broadband in remote areas) restricts
  opportunity access. Intervention services (counselling, skill-building) concentrated
  in Invercargill; rural youth access barriers.
