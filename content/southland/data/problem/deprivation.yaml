summary: Invercargill East and rural Southland have high deprivation scores and elevated child poverty
  rates. A significant gender pay gap persists across the region. Income and employment outcomes in the
  most affected communities reflect occupational concentration in primary industry, limited access to
  higher-wage employment, and geographic remoteness from tertiary education and training infrastructure.
