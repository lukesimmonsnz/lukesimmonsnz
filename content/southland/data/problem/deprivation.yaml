narrative:
- heading: Overview
  body: Invercargill East and rural Southland record high deprivation scores with elevated child poverty.
    The gender pay gap in primary-industry-dominated employment is above national average. Workers in freezing works,
    dairy, and service industries face concentrated housing and income stress. Māori, Pacific, and migrant worker
    populations are disproportionately represented in these low-wage sectors.
