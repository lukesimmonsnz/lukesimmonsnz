id: claim.taranaki.climate.agricultural_emissions_01
statement: Taranaki dairy and pastoral farming (>80% of agricultural production) generates
  ~1.2% of NZ's total agricultural emissions. He Waka Eka Noa commitments require
  sector-wide methane reduction, with Taranaki's high per-capita dairy farming intensity
  (highest income region per capita) making transition economically significant.
