id: claim.taranaki.climate.climate_emissions_01
statement: Taranaki's industrial emissions from oil and gas operations (Methanex,
  Todd Energy, OMV) historically represented 5-8% of NZ's greenhouse gas inventory.
  The region accounts for ~4-5% of NZ's total emissions, dominated by energy sector
  processing and fugitive methane from natural gas extraction.
