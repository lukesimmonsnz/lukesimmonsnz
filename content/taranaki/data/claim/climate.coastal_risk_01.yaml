id: claim.taranaki.climate.coastal_risk_01
statement: Taranaki's 115km coastline faces sea-level rise projections of 0.5-1.2m
  by 2100 (RCP 6.0), combined with increased storminess and wave heights. Coastal
  settlements (New Plymouth, Opunake) and agricultural land in coastal plains face
  progressive inundation and saltwater intrusion risks affecting dairy and horticulture.
