id: claim.taranaki.climate.industrial_emissions_01
statement: Industrial emissions in Taranaki are dominated by energy processing (Methanex
  methanol production, natural gas processing by Todd and OMV). These operations account
  for ~2.5-3% of NZ's industrial emissions and are energy-intensive facilities dependent
  on fossil fuel feedstock and local electricity from thermal plants.
