id: claim.taranaki.crime.drug_crime_01
statement: Methamphetamine availability in Taranaki has increased substantially since
  2015, linked to rural isolation and economic transitions from agricultural contraction.
  Rural areas and small provincial towns (Stratford, Eltham) have experienced elevated
  methamphetamine-related crime, including property crime and family violence associated
  with supply networks.
