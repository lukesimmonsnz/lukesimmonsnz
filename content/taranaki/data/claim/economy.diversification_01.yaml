id: claim.taranaki.economy.diversification_01
statement: Taranaki's economy remains heavily concentrated in dairy (35-40% of primary
  sector output) and oil/gas (8-12% of regional GDP as of 2022). Economic diversification
  efforts toward horticulture (kiwifruit, apples), specialty crops, and renewable
  energy remain limited by regional transport isolation and capital constraints.
