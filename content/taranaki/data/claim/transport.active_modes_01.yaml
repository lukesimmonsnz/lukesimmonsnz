id: claim.taranaki.transport.active_modes_01
statement: Active transport (walking and cycling) accounts for 8-15% of commute journeys
  in Taranaki, significantly below urban best practice of 30-35%. Limited cycling
  infrastructure and geographic sprawl require private vehicle dependence for most
  residents, constraining environmental and health benefits.
