summary: 'Taranaki housing is more affordable than national average median multiples (~5.2 vs 6.5 nationally), but housing stock quality varies. New Plymouth urban pressure is rising. Oil and gas sector wage dependence creates local housing affordability paradox: good wages but volatile employment.'
