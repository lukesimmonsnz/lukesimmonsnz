narrative:
  - heading: Affordability
    body: 'Taranaki median multiple is approximately 5.2 (2024), below the national average of 6.8. However, housing stock quality and performance standards lag, with many older properties requiring insulation and heating upgrades.'
  - heading: Employment Volatility
    body: 'Oil and gas sector workers earn $130-150k annually during boom periods, supporting housing debt. Downturns leave workers vulnerable to mortgage stress.'
