id: problem.taranaki.inequality.ethnic_gap
title: Ethnic income and health gaps
theme: inequality
section: inequality
subpage: ethnic_gap
parent: problem.taranaki.inequality.deprivation
order: 2
updated: '2026-04-26'
summary: Taranaki has a structural income gap between high-deprivation communities and the regional average;
  median income in the most affected communities is approximately 28% below the regional average, reflecting
  occupational concentration in lower-wage roles and limited upward mobility pathways. Health outcome
  disparities are concentrated in the same communities, reflecting the interaction of income, housing
  quality, and healthcare access.
