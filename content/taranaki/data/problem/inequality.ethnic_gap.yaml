narrative:
- heading: Income and health disparities in Taranaki
  body: Taranaki's primary-sector economy (oil and gas, dairy) generates above-average regional incomes,
    but these are unevenly distributed. Workers in lower-wage agricultural and processing roles earn substantially less,
    and communities with higher concentrations of lower-wage workers experience worse health outcomes.
    A significant 28% median household income gap reflects occupational and geographic stratification.
