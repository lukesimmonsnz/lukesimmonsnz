id: camp.tasman.infrastructure.camp_2
name: 'Response: Camp 2'
theme: infrastructure
core_claim: A response strategy addressing infrastructure challenges.
flagship_moves:
- Prioritise three-waters infrastructure renewal in Tasman urban centres
- Establish a multi-year capital works programme for wastewater and stormwater upgrades
- Apply for central government infrastructure co-funding to supplement council rates
tensions:
- Infrastructure renewal requires significant capital expenditure that strains small
  council budgets.
- Prioritising upgrades may delay other community investment needs.
addresses:
- problem.tasman.infrastructure.infrastructure
- problem.tasman.infrastructure.infrastructure_3
- problem.tasman.infrastructure.infrastructure_4
interventions:
- description: Accelerate infrastructure renewal investment in Tasman
  state_variable: infrastructure_condition_index
  expected_sign: +
- description: Prioritise water and wastewater upgrades
  state_variable: service_coverage
  expected_sign: +
applicable_in:
- tasman
tensions_with: []
