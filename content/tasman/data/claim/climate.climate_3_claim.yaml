id: claim.tasman.climate.climate_3_claim
statement: The January 2022 Nelson-Tasman wildfires burned across the Pigeon Valley
  and Moutere Hills area straddling the Nelson-Tasman boundary, with the Tasman portion
  accounting for the majority of the approximately 2,200-hectare total burn area.
  Hotter, drier summers are increasing wildfire frequency; Tasman District Council
  emergency management plans now flag October-April as high-risk season.
