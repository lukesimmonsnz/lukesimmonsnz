id: claim.tasman.crime.youth_offending_claim
statement: Police youth offending statistics (2023) indicate 156 youth offenders (aged
  10-16) in Tasman, with 68% engaging in repeat offending within 12 months. Limited
  youth diversion and mentoring programs in Golden Bay and rural areas contribute
  to higher reoffending rates compared to Richmond/Motueka.
