id: claim.tasman.economy.economic_structure_claim
statement: 'Tasman''s economy rests on four primary pillars: horticulture (22% of
  regional GDP), hops and viticulture (8%), tourism and recreation (11%), and aquaculture/forestry
  (6%). Manufacturing and services comprise 45%; unemployment stands at 3.1% (2023),
  below national average of 3.8%.'
