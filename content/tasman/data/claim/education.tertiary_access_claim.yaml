id: claim.tasman.education.tertiary_access_claim
statement: Only 28% of Tasman school leavers progress directly to tertiary study (2023),
  below national rate of 46%. Nearest university campuses (Massey Albany, University
  of Canterbury) are 3+ hours away; cost of relocation excludes lower-income families
  from study pathways.
