id: claim.tasman.environment.coastal_environment_claim
statement: Waimea Inlet is a nationally significant estuarine habitat supporting 34
  wading bird species and threatened native fish (redfin bully, giant kokopu). Aquaculture
  runoff, horticultural nutrient leachate, and stormwater from Richmond and Motueka
  have raised sediment and nutrient loads; ecological health rated "poor" in 2023
  TDC monitoring.
