id: claim.tasman.environment.water_quality_claim
statement: Waimea Aquifer Study (2023) reports nitrate concentrations in shallow monitoring
  wells averaging 4.2 mg/L (safe drinking water <11.3 mg/L) but rising 0.3 mg/L annually.
  Horticultural intensification and high stocking density are primary drivers; TDC
  is piloting nutrient management zones in Waimea Plains.
