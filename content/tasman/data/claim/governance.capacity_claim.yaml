id: claim.tasman.governance.capacity_claim
statement: Tasman District Council operates with annual budget NZD 287 million (2024)
  and 380 FTE staff. Three-waters reform and climate adaptation planning have strained
  capacity; infrastructure maintenance backlog estimated NZD 42 million (2024). Recruitment
  and retention of specialist engineers and planners remains a challenge.
