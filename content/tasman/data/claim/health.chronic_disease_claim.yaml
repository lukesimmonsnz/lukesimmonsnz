id: claim.tasman.health.chronic_disease_claim
statement: Health NZ Tasman (2023) reports Type 2 diabetes prevalence at 6.8% (age
  15+), above national average of 5.9%. Cardiovascular disease mortality is 18% above
  national age-standardised rate. Obesity prevalence stands at 32%, linked to socioeconomic
  deprivation in Motueka and rural farming communities.
