id: claim.tasman.health.health_outcomes_claim
statement: Health NZ Tasman (2023) shows life expectancy at birth is 80.2 years (national
  average 81.1). Māori life expectancy is 76.3 years, a 3.9-year gap. Avoidable mortality
  is 15% higher than national benchmark, driven by delays in accessing specialist
  services from Golden Bay and Murchison.
