id: claim.tasman.health.mental_health_claim
statement: Health NZ Tasman (2023) documents mental health service utilisation at
  8.2% of population, vs national average 9.1%. However, referral wait times exceed
  8 weeks in Golden Bay; rural isolation and limited counsellor availability are barriers.
  Suicide rate stands at 16.4 per 100,000, above national rate of 15.1.
