id: claim.tasman.health.workforce_claim
statement: Health NZ Tasman faces shortage of GPs, nurses, and allied health professionals.
  Ratio of GPs to population is 1:2,200 (national 1:1,800). Rural location, lower
  pay than Auckland/Wellington, and lack of professional development opportunities
  drive outmigration of health professionals; locum coverage is increasingly relied
  upon.
