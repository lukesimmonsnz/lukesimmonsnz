id: claim.tasman.housing.affordability_claim
statement: Tasman Housing Demand and Lifestyle Migration (2024) documents median house
  price rise 68% (2016-2022), from NZD 385,000 to NZD 647,000. Median household income
  is NZD 87,400; price-to-income ratio stands at 7.4, above the 5.0 affordability
  threshold. First-home buyers squeezed out of Richmond and Motueka markets.
