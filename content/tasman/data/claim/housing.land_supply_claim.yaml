id: claim.tasman.housing.land_supply_claim
statement: Residential zoned land inventory in Richmond/Motueka stands at 1,850 hectares;
  current absorption rate is 18 hectares/year, yielding 103-year supply. However,
  land prices (NZD 1.2–1.8 million/hectare in Richmond CBD zones) and development
  costs deter greenfield construction; infill development is constrained by heritage
  overlays and stormwater capacity.
