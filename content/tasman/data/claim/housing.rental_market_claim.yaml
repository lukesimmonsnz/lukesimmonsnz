id: claim.tasman.housing.rental_market_claim
statement: Rental market in Tasman is extremely tight; vacancy rate hovers near 1%
  (2023). Median rent for a three-bedroom property is NZD 420/week in Motueka and
  Richmond, consuming 35-40% of median income for sole earners. Golden Bay has almost
  no rental stock; waitlists extend 3+ months.
