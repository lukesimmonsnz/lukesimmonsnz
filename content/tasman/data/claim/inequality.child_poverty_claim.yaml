id: claim.tasman.inequality.child_poverty_claim
statement: Census income data (2023) indicates 21% of children in Tasman live in low-income
  households (below 60% of median income). Motueka and rural farm areas have higher
  child poverty rates (26%) vs Richmond (18%). Limited accessible early intervention
  services; health disparities begin in childhood.
