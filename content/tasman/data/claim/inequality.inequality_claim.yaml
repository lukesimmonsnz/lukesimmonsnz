id: claim.tasman.inequality.inequality_claim
statement: Census income distribution (2023) shows Gini coefficient for Tasman at
  0.38, above national average of 0.35. Top 20% of earners command 38% of total income;
  bottom 20% earn 8%. Lifestyle migration influx has widened the income gap; newcomers
  from Auckland/Wellington bring capital while displacing lower-income locals.
