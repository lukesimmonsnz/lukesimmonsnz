id: claim.tasman.inequality.rental_affordability_gap_claim
statement: Rental affordability gap in Tasman widened significantly 2016–2023. Median
  rent increased 54% while median income rose 22%. Sole-income households earning
  under NZD 50,000/year spend 45-50% of gross income on rent; two-income families
  spend 25-30%. Temporary and part-time workers bear highest burden.
