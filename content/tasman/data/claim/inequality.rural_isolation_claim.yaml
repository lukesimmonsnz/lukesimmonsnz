id: claim.tasman.inequality.rural_isolation_claim
statement: Golden Bay is geographically isolated, accessible only via SH60 over Takaka
  Hill (45-minute drive to nearest supermarket in Motueka). Population 3,200; limited
  services (one medical practice, one secondary school, no tertiary). Rental/purchase
  prices lower than Richmond but incomes average 12% below regional median, creating
  relative poverty despite lower housing costs.
