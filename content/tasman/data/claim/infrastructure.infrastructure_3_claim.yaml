id: claim.tasman.infrastructure.infrastructure_3_claim
statement: Digital connectivity in Golden Bay lags regional average; only 76% of properties
  have access to fixed broadband (>30 Mbps), vs regional average of 88%. Rural blocks
  and properties beyond 5km from Motueka/Richmond rely on satellite or cellular. Crown
  investment in Rural Broadband Initiative Phase 2 will extend fibre to Takaka by
  2026.
