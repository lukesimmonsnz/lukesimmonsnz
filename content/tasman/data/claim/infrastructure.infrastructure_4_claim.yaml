id: claim.tasman.infrastructure.infrastructure_4_claim
statement: Takaka Hill (SH60 to Golden Bay) is prone to slips, washouts, and fog;
  12 major closures occurred 2018-2023, isolating Golden Bay for 2-5 days per event.
  Waka Kotahi is upgrading drainage and installing real-time hazard monitoring; resilience
  work is scheduled 2024-2026 at NZD 18 million investment.
