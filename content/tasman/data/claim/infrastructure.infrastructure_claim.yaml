id: claim.tasman.infrastructure.infrastructure_claim
statement: Tasman's three-waters infrastructure (water supply, wastewater, stormwater)
  is aging; asset life expectancy maps show 38% of pipes exceed design life. Three-waters
  reform mandates regional aggregation by 2026; TDC is merging with Nelson City Council
  and Marlborough District Council to form Te Hoiere Three Waters Entity, serving
  350,000 residents.
