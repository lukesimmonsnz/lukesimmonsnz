id: claim.tasman.transport.connectivity_2_claim
statement: 'Golden Bay transport isolation is acute: SH60 over Takaka Hill is the
  sole vehicular access route, approximately 105 km and 90 minutes from Takaka to
  Nelson. Motueka (45 minutes from Takaka) provides community health services only;
  the nearest hospital with emergency and maternity capacity is Nelson Hospital. Golden
  Bay Shuttle (local bus) runs three days per week; school bus services are reduced
  during holidays. Medical emergencies typically require helicopter evacuation (estimated
  cost NZD 4,500-6,000).'
value: 90
unit: minutes from Takaka (Golden Bay) to Nelson Hospital
