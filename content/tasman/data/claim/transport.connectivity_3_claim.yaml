id: claim.tasman.transport.connectivity_3_claim
statement: Motueka and Richmond town centres have developed around car-dependent sprawl;
  public transport modal share is 2%, bicycle/pedestrian 4%, private vehicle 92%.
  SH6 bisects Richmond town centre, creating air quality and safety issues. TDC is
  planning bus-rapid-transit corridor (Richmond-Motueka, 20-minute service frequency)
  with NZD 85 million central funding commitment (2025-2028).
