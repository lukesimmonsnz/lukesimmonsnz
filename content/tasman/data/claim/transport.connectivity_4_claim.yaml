id: claim.tasman.transport.connectivity_4_claim
statement: Active transport (walking, cycling) infrastructure in Tasman is fragmented.
  Richmond and Motueka have some dedicated cycleways (18 km total); suburban schools
  have <30% active commute rates. TDC is implementing "Last Kilometre Plan" (2024-2027)
  to build 45 km of urban cycleways and footpaths, targeting 35% active commute rate
  by 2030.
