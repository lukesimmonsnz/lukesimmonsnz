id: claim.tasman.transport.connectivity_claim
statement: Tasman has no rail service; SH6 (Nelson-Richmond) and SH60 (Richmond-Motueka-Takaka)
  are primary state highways serving 38,000 daily vehicle movements. Bus services
  (InterCity, local shuttles) operate limited routes; frequency is 1-2 services/day
  on main corridors. No commercial air service; Motueka airfield is private charter
  only.
