description: "Composite index of freshwater quality based on physicochemical and biological\
  \ parameters including E. coli counts, nitrate concentration, dissolved reactive\
  \ phosphorus, clarity (visual clarity / turbidity), and macroinvertebrate community\
  \ index (MCI). Rated on a 0\u2013100 scale: >80 excellent, 60\u201380 good, 40\u2013\
  60 fair, <40 poor. Used by Auckland Council and MfE for state of environment reporting.\
  \ P5' triggers on cross-region WQI comparison claims.\n"
