id: problem.tasman.climate.climate_3
title: Wildfire risk on the Pigeon Valley / Moutere axis
theme: climate-adaptation
section: climate
subpage: climate_3
parent: climate_risk
order: 3
updated: '2026-04-26'
summary: The January 2022 Nelson-Tasman wildfires burned across Pigeon Valley and the Moutere Hills straddling the
  Nelson-Tasman boundary, with the Tasman portion accounting for the majority of the approximately 2,200-hectare
  combined burn area. Hotter, drier summers are increasing wildfire frequency; Tasman District Council emergency-management
  plans now flag October-April as the high-risk season.
