  feedback_loops:
  - Lifestyle-block subdivision in fire-prone interface zones raises future evacuation and asset-protection costs,
    which compete with prevention budgets.
narrative:
- heading: A regional wildfire is now in living memory
  body: The 2022 Pigeon Valley / Moutere event is no longer a hypothetical risk — it has happened and informs the
    regional risk picture. Plantation forestry, dryland pasture, and the wildland-urban interface around lifestyle
    blocks are all in the exposure envelope (claim.tasman.climate.climate_3_claim).
- heading: A six-month season
  body: Treating October to April as the high-risk season is a six-month window — half the year. That changes how
    building, vegetation, access, and water-supply for firefighting are planned, and how rural-residential subdivision
    is consented.
