id: problem.tasman.crime.youth_offending
title: High youth-reoffending rate in service-thin areas
theme: crime
section: crime
subpage: youth_offending
parent: safety
order: 3
updated: '2026-04-26'
summary: NZ Police data identify around 156 youth offenders aged 10-16 in Tasman in 2023, with approximately 68
  percent re-offending within 12 months. Limited youth diversion and mentoring in Golden Bay and rural areas contributes
  to higher re-offending compared with Richmond and Motueka.
manifests_in:
- tasman
systems_model:
  state_variables:
  - youth_offender_count
  - 12_month_reoffending_rate
  inputs:
  - diversion_programme_coverage
  - mentoring_capacity
  constraints:
  - rural_programme_economics
  - specialist_workforce_supply
  feedback_loops:
  - Reoffending trajectories solidify between ages 14-17; each year of inadequate diversion raises the long-run
    cost of intervention disproportionately.
narrative:
- heading: Reoffending tracks programme availability
  body: The Tasman youth-offender cohort is small enough that diversion programmes can plausibly cover it — except
    where geography and staffing thin out coverage. Mohua and rural blocks have meaningfully fewer diversion-programme
    options than Richmond (claim.tasman.crime.youth_offending_claim).
- heading: Small numbers, large per-case stakes
  body: Because the cohort is small, individual youth-justice trajectories are highly visible to community and services.
    Each successful diversion has outsized population-level effect; each missed one feeds the long-tail crime statistics.
claim_ids:
- claim.tasman.crime.youth_offending_claim
status: draft
time_horizons:
- decade
