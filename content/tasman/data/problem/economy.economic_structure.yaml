id: problem.tasman.economy.economic_structure
title: Narrow but high-value primary-sector base
theme: economy
section: economy
subpage: economic_structure
parent: null
order: 1
updated: '2026-04-26'
summary: Tasman's economy rests on horticulture (around 22 percent of regional GDP), hops and viticulture (around
  8 percent), tourism and recreation (around 11 percent), and aquaculture and forestry (around 6 percent), with
  manufacturing and services making up the remaining 45 percent. Headline unemployment is around 3.1 percent, below
  the national 3.8 percent.
manifests_in:
- tasman
systems_model:
  state_variables:
  - primary_sector_gdp_share
  - regional_unemployment_rate
  inputs:
  - rse_worker_intake
  - primary_processing_investment
  constraints:
  - land_and_water_allocation_limits
  - single_export_corridor_dependence
  feedback_loops:
  - Primary-sector concentration raises regional exposure to commodity-price and biosecurity shocks, which periodically
    depresses investment in diversification.
narrative:
- heading: A primary-sector economy with secondary support
  body: 'Tasman''s GDP is concentrated in a small number of land- and water-using industries: apples, kiwifruit,
    cherries, hops, wine, salmon, and tourism. Manufacturing largely exists to process the primary outputs (juice,
    packing, brewing, wine, smoked fish) (claim.tasman.economy.economic_structure_claim).'
- heading: Low headline unemployment is partly a labour-supply story
  body: The 3.1 percent unemployment rate reflects a tight regional labour market in which horticulture and hospitality
    cannot find enough seasonal workers locally and depend on Recognised Seasonal Employer (RSE) and working-holiday
    inflows. The ratio is good news on the supply side and a constraint on the demand side.
