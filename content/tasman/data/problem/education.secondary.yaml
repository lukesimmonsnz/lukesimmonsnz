  - rural_dispersion
  feedback_loops:
  - Long commutes lower extracurricular and tertiary-prep participation, which reduces the school's capacity to
    lift attainment, which reduces parental confidence in the local option.
narrative:
- heading: Choice set of effectively two
  body: For a district of around 55,000 people, two secondary providers means most students have no realistic alternative
    if the local school does not suit them. That has consequences for subject offerings, special-needs provision,
    and the resilience of results to staff turnover (claim.tasman.education.secondary_claim).
- heading: Commute as a cost on attainment
  body: Mohua students attending Motueka High School lose 90 minutes a day to a bus over the Takaka Hill — time
    not available for homework, extracurricular activity, or part-time work. This is a structural factor behind
    the regional NCEA-Level-3 gap, not a function of teaching quality.
