id: problem.tasman.education.secondary
title: Two secondary schools serving a long region
theme: education
section: education
subpage: secondary
parent: achievement
order: 3
updated: '2026-04-26'
summary: Tasman has two state secondary schools — Motueka High School (around 560 students) and Takaka Area School
  (around 320 students). NCEA Level 3 pass rates average 72 percent against a national 76 percent, and Golden Bay
  students attending Motueka face 45-plus minutes of daily commute each way.
manifests_in:
- tasman
systems_model:
  state_variables:
  - ncea_l3_pass_rate
  - average_daily_school_commute_minutes
  inputs:
  - secondary_school_staffing
  - subject_breadth_offering
  constraints:
