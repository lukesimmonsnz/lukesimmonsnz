id: problem.tasman.environment.sea_level_risk
title: Sea-level rise exposure of Richmond and Motueka
theme: environment
section: environment
subpage: sea_level_risk
parent: coastal_environment
order: 2
updated: '2026-04-26'
summary: Sea-level rise projections for Tasman through to 2100 span 0.5-1.2 metres across IPCC RCP4.5-RCP8.5 scenarios.
  The Richmond and Motueka central business districts both sit within one kilometre of the coast; Tasman District
  Council has begun coastal hazard mapping and early discussion of managed-retreat zones for the Waimea Inlet wetland
  margin.
