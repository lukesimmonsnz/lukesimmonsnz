narrative:
- heading: Two CBDs in the exposure zone
  body: Richmond and Motueka are not just rural settlements — they are the regional service centres. Their CBDs
    and the road, water, and wastewater networks underneath them are within the projected sea-level-rise envelope
    on a generation-to-century horizon (claim.tasman.environment.sea_level_risk_claim).
- heading: Managed retreat as an early-conversation problem
  body: Managed-retreat planning at Waimea Inlet is at the early-conversation stage. The decisions being framed
    now — what to defend, what to relocate, what to allow to transition to wetland — are difficult precisely because
    the timing is uncertain, the costs are large, and the property-rights questions are unsettled.
