id: problem.tasman.governance.capacity
title: Council capacity strained by reform and renewals
theme: governance
section: governance
subpage: capacity
parent: governance
order: 4
updated: '2026-04-26'
summary: Tasman District Council operates with an annual budget of around NZD 287 million and 380 FTE staff. Three-waters
  reform and climate-adaptation planning are absorbing significant share of capacity; the infrastructure-maintenance
  backlog is estimated at NZD 42 million. Recruitment and retention of specialist engineers and planners remain
  persistent challenges.
