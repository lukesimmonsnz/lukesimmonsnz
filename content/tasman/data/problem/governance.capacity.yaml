  feedback_loops:
  - Capacity gaps slow consenting and project delivery, which raises rates pressure for fewer outputs, which weakens
    public confidence in capacity-building investment.
narrative:
- heading: Reform overlays on existing renewal load
  body: Three-waters reform, RMA reform, and climate-adaptation planning each impose new process and engagement
    burdens on a council whose existing renewal pipeline is already underweight to its asset base (claim.tasman.governance.capacity_claim).
- heading: Specialist labour is the binding constraint
  body: Engineers, planners, and asset-management specialists are scarce nationally and scarcer in regional councils
    that cannot match metro-council salaries. The capacity ceiling is set by who can be hired and retained, not
    by the headline budget figure.
