updated: '2026-04-26'
summary: 'Tasman District Council comprises 11 elected members — a mayor and 10 councillors — representing three
  constituencies: Motueka, Richmond, and Golden Bay. Two iwi advisors sit on committees, and the 2023 Tasman Iwi
  Partnership Framework commits council to joint decision-making on resource consents for culturally significant
  sites.'
