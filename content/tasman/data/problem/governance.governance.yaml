  feedback_loops:
  - Heavy portfolio load on individual councillors raises the experience cost of turnover, which discourages contested
    elections, which entrenches incumbency.
narrative:
- heading: Unitary authority, three-way representation
  body: As a unitary authority, Tasman District Council carries both regional-council and territorial-authority
    functions. The 11-member structure spreads decision-making across the three constituencies, but with only 10
    councillors plus mayor, individual councillors carry significant portfolio load (claim.tasman.governance.governance_claim).
- heading: Iwi voice is structured but not voting
  body: The 2023 Iwi Partnership Framework formalises a joint-decision-making path for resource consents on culturally
    significant sites. Iwi advisors sit on committees but do not vote in chamber. The shape of co-governance evolution
    is one of the open political questions for the next council term.
