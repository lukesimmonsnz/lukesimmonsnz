narrative:
- heading: Four iwi, multiple partnership instruments
  body: Co-governance in Tasman is not a single relationship but a layered set of instruments — Treaty settlements,
    deeds of partnership, resource-consent advisory structures, and project-specific co-design (claim.tasman.governance.treaty_claim).
- heading: Operationalisation as the live problem
  body: The high-level instruments exist; the question is how they translate into day-to-day decisions on water
    allocation, coastal management, and reserve-land disposal. Operational practice is uneven across portfolios
    and depends heavily on individual officer relationships.
