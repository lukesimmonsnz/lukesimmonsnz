summary: Te Ātiawa o Te Waka-a-Māui, Ngāti Koata, Ngāti Rārua, and Ngāti Tama ki Te Tau Ihu hold mana whenua across
  Tasman. The 2022 Deed of Partnership for Kahurangi National Park establishes joint decision-making on conservation;
  Waimea Inlet restoration involves iwi in freshwater and estuarine ecology planning.
