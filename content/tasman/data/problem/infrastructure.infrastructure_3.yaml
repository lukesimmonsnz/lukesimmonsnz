  - topographic_line_of_sight_limits
  feedback_loops:
  - Lower rural connectivity reduces remote-work in-migration, which keeps population density low, which keeps last-mile
    economics marginal.
narrative:
- heading: The connectivity gap is also a service gap
  body: Telehealth, online tertiary study, remote work, and digital banking all assume a stable fixed connection.
    Where the only option is satellite or marginal cellular, those services are de facto unavailable (claim.tasman.infrastructure.infrastructure_3_claim).
- heading: Coverage is not the same as capacity
  body: Even where fibre will reach Takaka by 2026, the last-mile economics for properties outside the township
    and on outlying farms remain marginal. Rural Broadband Phase 2 improves the median, not the worst case, and
    the worst-case properties are precisely the ones already most isolated by road and health geography.
