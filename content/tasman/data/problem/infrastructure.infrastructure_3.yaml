id: problem.tasman.infrastructure.infrastructure_3
title: Rural broadband gap, especially in Mohua
theme: infrastructure
section: infrastructure
subpage: infrastructure_3
parent: infrastructure
order: 3
updated: '2026-04-26'
summary: Around 76 percent of Golden Bay properties have access to fixed broadband at 30 Mbps or above, against
  a regional average of about 88 percent. Rural blocks beyond five kilometres of Motueka or Richmond rely on satellite
  or cellular. The Crown's Rural Broadband Initiative Phase 2 is expected to extend fibre to Takaka by 2026.
manifests_in:
- tasman
systems_model:
  state_variables:
