id: problem.tasman.transport.connectivity_4
title: Fragmented active-transport network
theme: transport
section: transport
subpage: connectivity_4
parent: connectivity
order: 4
updated: '2026-04-26'
summary: Tasman has roughly 18 km of dedicated cycleway, mostly in Richmond and Motueka, but the network is discontinuous
  and does not connect schools, employment centres, or rural villages. Tasman District Council's Last Kilometre
  Plan (2024-2027) aims to add 45 km of urban cycleway and footpath and lift the active-commute share to 35 percent
  by 2030.
