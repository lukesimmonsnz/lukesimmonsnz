narrative:
- heading: A network of fragments
  body: 'The 18 km of existing cycleway in Tasman is a series of fragments: short rail-trail links, recreational
    waterfront paths, and a few protected lanes. Suburban schools report active-commute rates below 30 percent,
    partly because parents do not consider the network safe between home and school gate (claim.tasman.transport.connectivity_4_claim).'
- heading: Connection is the binding constraint
  body: Building the missing links — particularly between residential growth areas and town centres — is what unlocks
    modal shift. The Last Kilometre Plan targets that gap, but delivery depends on co-funding from Waka Kotahi and
    on land negotiations with horticultural blocks that abut planned alignments.
