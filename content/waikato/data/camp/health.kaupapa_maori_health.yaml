id: camp.waikato.health.kaupapa_maori_health
name: Kaupapa Māori health service expansion
theme: health
core_claim: Expanding kaupapa Māori health providers and community health workers
  reduces inequity through culturally appropriate care.
flagship_moves:
- Fund 15 additional Māori health providers in the Waikato region
- Expand community health workers in high-deprivation areas
- Integrate whānau ora into primary care pathways
tensions:
- Kaupapa Māori health requires sustained workforce development pipeline
- Integration with mainstream health system requires institutional change
interventions:
- description: Fund 15 additional Māori health providers in the Waikato region
