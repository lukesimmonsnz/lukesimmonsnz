id: claim.waikato.climate.agri_emissions_45pct_regional
statement: Waikato's dairy sector (>60% of regional agricultural output) faces He
  Waka Eka Noa climate commitments and consumer market pressure to reduce agricultural
  methane emissions. The region is responsible for ~3.5% of NZ's total methane and
  ~7% of agricultural emissions, making sector transition critical to national climate
  targets.
