id: claim.waikato.crime.drug_crime_methamphetamine
statement: Methamphetamine supply and distribution networks are active across Waikato
  urban and rural areas. Hamilton has seen elevated crystal meth seizures and demand-related
  property crime. Gang networks including Mongrel Mob, King Cobras, and Black Power
  control supply chains; law enforcement reports increasing use among younger cohorts
  in Huntly and south Hamilton deprivation zones.
