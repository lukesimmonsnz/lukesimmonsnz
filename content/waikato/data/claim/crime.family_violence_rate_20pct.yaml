id: claim.waikato.crime.family_violence_rate_20pct
statement: Family violence in Waikato is concentrated in high-deprivation areas; Hamilton
  south (Frankton and Nawton) records significantly elevated FV call-out rates relative
  to population. Waikato DHB established specialist FV court liaison services; police
  report barriers to disclosure among Māori and rural communities. Housing instability
  and overcrowding amplify risk.
