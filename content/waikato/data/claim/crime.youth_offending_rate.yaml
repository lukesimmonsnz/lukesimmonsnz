id: claim.waikato.crime.youth_offending_rate
statement: Youth offending in Waikato is elevated in Huntly and south Hamilton. Limited
  youth diversion services and community programs constrain early intervention; NZDF
  participation and apprenticeship pathways are underutilized among at-risk youth.
  Correlation with school disengagement and parental gang involvement is documented
  in regional surveys.
