id: claim.waikato.economy.agri_gdp_share_28pct
statement: Waikato economy is heavily dependent on dairy agribusiness. Approximately
  1.2 to 1.4 million dairy cattle and approximately 1700 farms generate approximately
  28% of regional GDP. Fonterra operates three major processing plants at Morrinsville,
  Hautapu, and Te Rapa. Commodity price volatility such as the 2016-2017 dairy collapse
  creates cyclical income stress for farm families and service towns.
