id: claim.waikato.economy.tech_employment_6pct
statement: Technology sector employment in Waikato is approximately 6% of workforce,
  significantly below Auckland at 16% and Wellington at 18%. The Waikato lacks a concentrated
  tech hub outside Hamilton CBD; most tech roles are in software services and digital
  marketing for agricultural businesses. Ruakura Superhub and logistics development
  may create tech-adjacent jobs but do not replace high-skill digital employment.
