id: claim.waikato.wage_gap_12pct
statement: Waikato median household income lags Auckland and Wellington by approximately
  12%. Farm worker wages and retail and hospitality roles in Hamilton and Cambridge
  drive the average down. Geographic wage disparity is steepest in South Waikato including
  Tokoroa and Putāruru, where post-mining-decline service economy offers limited career
  progression.
