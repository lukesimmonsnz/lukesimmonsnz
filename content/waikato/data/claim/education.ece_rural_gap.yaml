id: claim.waikato.education.ece_rural_gap
statement: Rural early childhood education participation in Waikato (South Waikato
  and Waitomo districts) is lower than Hamilton urban average, driven by cost of 8
  to 12K annually versus Hamilton 6 to 8K average and limited ECE center density outside
  major towns. Takaka and small rural communities have zero licensed ECE options;
  families travel 30-45 minutes to nearest center.
