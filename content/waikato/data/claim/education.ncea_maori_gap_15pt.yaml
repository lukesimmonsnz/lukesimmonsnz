id: claim.waikato.education.ncea_maori_gap_15pt
statement: Waikato schools in Hamilton South and South Waikato experience lower NCEA Level 2 pass rates
  (64% in affected schools versus 81% regional average). These schools face higher suspension and stand-down rates;
  structural barriers include limited resources, teacher shortages, and higher student deprivation. Māori students
  are disproportionately enrolled in these lower-performing schools. Waikato-Tainui and other iwi-partnered kura
  offer te reo medium education providing alternative pathways.
