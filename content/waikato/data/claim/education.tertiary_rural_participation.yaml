id: claim.waikato.education.tertiary_rural_participation
statement: Tertiary participation from provincial Waikato (South Waikato, Waitomo,
  Coromandel hinterland) is 38-42% versus Hamilton 50% plus. Cost of 20 to 25K annually
  and limited local pathways drive students to Auckland or Wellington, creating brain-drain
  from smaller towns. University of Waikato and Wintec offer Hamilton-based options
  but lack South Waikato satellite campuses.
