id: claim.waikato.education.waikato_education_inequity_root
statement: Waikato's rural schools face persistent teacher recruitment and retention challenges; tertiary participation
  in provincial areas (38-42%) is substantially below urban centres (48%). Geographic isolation from higher education and
  limited tertiary access in South Waikato and rural areas produce structural barriers. Students in these geographies
  achieve NCEA Level 2 at lower rates (15-20 percentage points below regional average). Māori and Pasifika students are
  disproportionately concentrated in these lower-resourced rural and provincial areas.
