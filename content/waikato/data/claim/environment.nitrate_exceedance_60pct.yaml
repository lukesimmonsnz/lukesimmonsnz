id: claim.waikato.environment.nitrate_exceedance_60pct
statement: Nitrate levels in Waikato and Waipā rivers exceed WHO drinking water guidelines
  of 11.3 mg/L NO3 in approximately 60% of monitored sites. Agricultural nitrogen
  leaching from intensive dairy farming is the primary source. Waikato Regional Council
  regional plan targets 10-year decline; recent compliance remains below target. Groundwater
  beneath the Waikato Plains shows legacy nitrate from decades of pastoral farming.
