id: claim.waikato.environment.peat_subsidence_rate
statement: Peat soils in the central Waikato plains are subsiding at approximately
  1-3 cm annually due to drainage and oxidation. The Waikato Lowlands peat dome, formerly
  5m plus deep, is now 2-3m in many areas. Subsidence increases flood risk, alters
  water table dynamics, and reduces agricultural viability. Waikato-Tainui and WRC
  funded restoration pilots on remnant peat areas near Hamilton.
