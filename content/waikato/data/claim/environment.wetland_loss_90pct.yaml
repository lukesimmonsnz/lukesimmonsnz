id: claim.waikato.environment.wetland_loss_90pct
statement: Waikato wetlands have declined approximately 90% since 1840 due to agricultural
  drainage and land conversion. The Waikato Lowlands originally hosted extensive wetland
  complexes; surviving remnants at Whangamarino and Kopuatai are now DOC-managed reserves.
  Peat bog loss in the central Waikato plains reduced carbon sequestration capacity
  and increased flood severity.
