id: claim.waikato.governance.co_governance_capacity
statement: 'Waikato-Tainui co-governance through the Waikato River Authority represents
  a nationally significant model: 50% Waikato Regional Council and 50% Waikato-Tainui
  under the 2010 Settlement Act. However, WRA budget constraints and staffing gaps
  limit implementation of comprehensive river management and cultural restoration.
  Te Awa Tupua (Whanganui River personhood) precedent was not applied to Waikato despite
  iwi advocacy.'
