id: claim.waikato.governance.plan_inconsistency
statement: 'Waikato Regional Plan, Hamilton City Council Long-Term Plan, and district
  plans across seven local authorities show inconsistencies on key issues. Freshwater
  targets diverge: WRC aims for 10-year nitrate decline while some territorial authorities
  resist dairying restrictions. Transport investment priorities conflict between SH1,
  rail, and active modes funding. Climate adaptation mechanisms are uncoordinated.
  Lack of unified governance framework impedes regional response.'
