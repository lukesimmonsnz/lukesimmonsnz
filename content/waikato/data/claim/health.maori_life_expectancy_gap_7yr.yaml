id: claim.waikato.health.maori_life_expectancy_gap_7yr
statement: Excess mortality in Waikato's primary-industry workforce from cardiovascular disease,
  respiratory illness, and diabetes reflects occupational exposure (dairy farming, forestry), health service access barriers,
  and socioeconomic stress. A 7-year life expectancy gap (71 versus 78 years) separates affected communities. Waikato Māori
  are disproportionately concentrated in these high-exposure and low-access health geographies. Waikato DHB Midlands Hauora
  partnership addresses equity but faces chronic underfunding relative to population health need.
