id: claim.waikato.health.mental_health_waitlist
statement: Waikato DHB mental health services face wait times of 8-12 weeks for non-urgent
  referrals. Rural practitioners in Coromandel and South Waikato report difficulty
  accessing specialist support for complex cases; telepsychiatry via Waikato Hospital
  partially addresses rural access. Community mental health services in Huntly and
  south Hamilton are under-resourced relative to deprivation levels.
