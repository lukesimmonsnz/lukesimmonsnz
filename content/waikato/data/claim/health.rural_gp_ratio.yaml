id: claim.waikato.health.rural_gp_ratio
statement: Rural GP supply in Waikato South is critically low. Tokoroa (pop 18K) and
  Putāruru have one GP practice each serving wider districts; rural GPs are approximately
  5 years older on average than urban peers with limited locum cover for leave. Thames
  Hospital serves Coromandel Peninsula but recruitment is difficult; rural practitioners
  report burnout from on-call rotations and small-town social pressure.
