id: claim.waikato.housing.greenfield_expansion
statement: Hamilton urban area is expanding greenfield boundaries rapidly to accommodate
  growth of 170K population at approximately 3% annually. Peacocke development in
  south Hamilton plans 9000+ homes and new subdivisions around Cambridge and Matamata
  are intensifying infrastructure demand. Developer-led sprawl strains three waters
  networks; transit-oriented development remains limited. Waikato District greenfield
  expansion is driven by commuter demand for cheaper land.
