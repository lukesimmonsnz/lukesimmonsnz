id: claim.waikato.housing.median_multiple_8x
statement: Hamilton median house price of approximately 750K in 2023-2024 is now 8
  times median household income (approximately 92K), up from 6.2 times in 2015. Cambridge
  and commuter suburbs including Te Awamutu, Matamata, and Ngaruawahia are experiencing
  rapid price growth of 8-12% annually. First-time buyer participation has collapsed
  with 80% of buyers being investors or upsizers. Kāinga Ora social housing supply
  is insufficient.
