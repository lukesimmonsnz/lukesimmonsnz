id: claim.waikato.inequality.child_poverty_25pct
statement: Child poverty in Waikato is estimated at approximately 25% in high-deprivation
  areas (Huntly, south Hamilton, South Waikato towns). After-housing costs push Māori
  and Pasifika families into poverty despite employment. Limited after-school care,
  sports access, and digital device access widen disadvantage. Huntly post-coal-transition
  poverty is structural; limited economic alternatives for families.
