id: claim.waikato.inequality.rural_deprivation_rate
statement: Rural deprivation in South Waikato (Tokoroa and Putāruru) and Huntly remains
  persistently high post-mining decline. Farm worker families in intensive dairying
  regions live in substandard rural housing with limited service access. Coromandel
  Peninsula coastal poverty pockets are masked by wealthy lifestyle enclave data;
  permanent service workers struggle with holiday-home inflated property costs and
  seasonal employment precarity.
