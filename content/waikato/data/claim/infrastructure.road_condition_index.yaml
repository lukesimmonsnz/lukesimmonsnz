id: claim.waikato.infrastructure.road_condition_index
statement: Waikato roading network maintenance backlog is significant. Rural sealed
  roads in South Waikato and Waitomo show accelerated wear from agricultural use (heavy
  machinery, stock trucks); Waikato Regional Council estimates approximately 150 million
  dollars deferred maintenance. SH3/SH1 intersection delay funding creates bottleneck;
  regional corridors serving tourism and export logistics are congested during peak
  hours.
