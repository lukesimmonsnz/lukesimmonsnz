id: claim.waikato.infrastructure.rural_broadband_gap
statement: Rural broadband coverage in Waikato beyond Hamilton metro remains below
  urban speeds. South Waikato and Coromandel hinterland have limited fibre; wireless-only
  coverage has reliability issues. AgResearch and DairyNZ leverage broadband for precision
  agriculture, but farm broadband gaps constrain adoption of monitoring technology.
  Rural economic development and remote work are limited by connectivity.
