id: claim.waikato.infrastructure.three_waters_backlog
statement: Hamilton water supply and wastewater systems face significant renewal backlog.
  The Waikato River abstraction supplies approximately 170K residents; aging pipe
  network has high leakage of 17-22% non-revenue water. Wastewater treatment at Ruakura
  requires capacity expansion to serve Peacocke growth. Three Waters Reform (now Local
  Water Done Well) created transition costs; small TAs struggle with asset replacement
  funding.
