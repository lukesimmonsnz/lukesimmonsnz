id: claim.waikato.transport.active_mode_share_4
statement: Low cycling and walking mode share in Waikato reflects inadequate infrastructure
  investment and sprawling development patterns. Protected cycleways are limited to
  Hamilton CBD; rural communities lack safe networks; investment in cycling infrastructure
  could increase mode share from 5% to 12-15%.
