id: driver.waikato.health.socioeconomic_determinants
name: Socioeconomic determinants of health
description: Poverty, poor housing, and unemployment create the social conditions underpinning poor health
  outcomes in Waikato's high-deprivation communities. These structural drivers operate through reduced
  preventive care access, overcrowded housing increasing infectious disease transmission, and income constraints
  limiting nutritional quality and the ability to manage chronic conditions effectively.
theme: health
consensus: consensus
category: demographic
timescale: long
scope: regional
