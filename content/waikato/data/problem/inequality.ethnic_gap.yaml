updated: '2026-04-26'
summary: Waikato has a significant income inequality gap; median household income in high-deprivation
  communities is approximately 30% below the regional average. This reflects structural occupational concentration,
  limited tertiary access in rural areas, and the downstream effects of exclusion from property wealth
  accumulation over the post-war growth period.
