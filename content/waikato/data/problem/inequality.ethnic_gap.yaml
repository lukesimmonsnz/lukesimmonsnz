narrative:
- heading: Income and wealth disparities in Waikato
  body: Waikato's labour market produces significant income stratification; workers in Hamilton's professional
    and management sectors earn substantially more than those in South Waikato's processing, agricultural, and logistics roles.
    A 30% median income gap between lower-wage and higher-wage occupational clusters compounds with geographic factors in
    Huntly and Tokoroa, where post-industrial unemployment persists. Māori workers are disproportionately concentrated
    in these lower-wage geographies and occupations.
