id: camp.wellington.health.digital_health_access
name: Digital and Telehealth Access
theme: health
core_claim: Telehealth and digital health tools can extend primary care reach to under-served Wellington communities without
  requiring physical infrastructure.
flagship_moves:
- Universal telehealth option for all GP appointments
- Digital health navigator roles in high-deprivation communities
- Free data for health app access on mobile plans
tensions:
- Digital health exacerbates inequity for those without devices or literacy
- Telehealth is inappropriate for many presentations requiring physical examination
addresses:
- problem.wellington.health.system_access
interventions:
- description: Fund digital health navigator roles in 5 high-deprivation Wellington communities
  state_variable: digital_health_engagement_rate
  expected_sign: +
applicable_in:
- wellington
tensions_with: []
