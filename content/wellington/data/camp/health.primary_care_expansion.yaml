id: camp.wellington.health.primary_care_expansion
name: Primary Care Capacity Expansion
theme: health
core_claim: Expanding GP and nurse-led primary care capacity in under-served Wellington areas reduces ED pressure and improves
  chronic disease management.
flagship_moves:
- Establish urgent care hubs in Porirua and Hutt Valley
- Increase Very High Needs funding for practices in high-deprivation areas
- Nurse practitioners as first-contact providers with full prescribing rights
tensions:
- GP workforce shortage limits supply-side expansion regardless of funding
- Urgent care hubs without continuity of care risk fragmentation
addresses:
- problem.wellington.health.system_access
- problem.wellington.health.chronic_disease
interventions:
- description: Open 3 new urgent care hubs in Porirua, Lower Hutt, and Wainuiomata co-located with community health workers
  state_variable: primary_care_access_rate
  expected_sign: +
applicable_in:
- wellington
tensions_with: []
