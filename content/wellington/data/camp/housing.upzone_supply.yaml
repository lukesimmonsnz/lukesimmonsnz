id: camp.wellington.housing.upzone_supply
name: Upzoning and Intensification
theme: housing
core_claim: Removing zoning restrictions and enabling medium-density development across Wellington's urban areas is the primary
  lever to improve affordability.
flagship_moves:
- Implement NPS-UD density requirements across all Wellington territorial authorities
- Permit six-storey residential buildings within 800m of rapid transit stops
- Remove minimum car-parking requirements citywide
tensions:
- Intensification in fault-zone and liquefaction-prone land raises safety risks
- Infrastructure capacity (water, wastewater) constrains achievable density in many suburbs
- Heritage character areas create political resistance to blanket upzoning
addresses:
- problem.wellington.housing.affordability
- problem.wellington.housing.land_supply
interventions:
- description: Rezone residential land within 1km of Wellington CBD and Johnsonville/Porirua centres to allow 6-storey mixed-use
  state_variable: zoned_capacity
  constraint_relaxed: height_limit
  expected_sign: +
- description: Mandate development contributions schedule that front-funds infrastructure upgrades for upzoned areas
  state_variable: infrastructure_capacity
  expected_sign: +
applicable_in:
- wellington
tensions_with: []
