id: camp.wellington.infrastructure.accelerated_pipe_renewal
name: Accelerated Water Pipe Renewal
theme: infrastructure
core_claim: Wellington Water's renewal backlog must be eliminated within 20 years; current funding is insufficient and must
  be supplemented by Crown grants.
flagship_moves:
- Double annual renewal rate from ~55km to ~110km per year
- Prioritise asbestos-cement pipes over 60 years old in Porirua and Hutt Valley
- Crown grant programme for infrastructure in high-deprivation areas
tensions:
- Accelerated programme requires significant rate increases across all Wellington councils
- Construction workforce capacity limits achievable annual renewal rate
addresses:
- problem.wellington.infrastructure.water_resilience
interventions:
- description: Increase Wellington Water's annual capital renewal allocation to $120M (from ~$60M current)
  state_variable: pipe_condition_index
  constraint_relaxed: renewal_funding_gap
  expected_sign: +
applicable_in:
- wellington
tensions_with: []
