id: claim.wellington.climate.sea_level_projection_petone
statement: Wellington's Petone Foreshore — a low-lying reclaimed coastal area in Lower
  Hutt — is projected to experience increasing flood and storm surge frequency under
  medium sea-level rise scenarios (0.4–0.7 m by 2100), threatening road, rail, and
  residential assets on the foreshore.
