id: claim.wellington.climate.tree_canopy_heat_mitigation
statement: Urban tree canopy provides the most cost-effective mitigation of urban
  heat island effects in Wellington's climate, but canopy is being lost faster than
  it is being replaced in many inner suburbs due to development pressure and insufficient
  regulatory protections for established trees.
