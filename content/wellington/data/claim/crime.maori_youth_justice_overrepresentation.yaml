id: claim.wellington.crime.maori_youth_justice_overrepresentation
statement: Wellington's youth justice system serves high shares of young people from
  concentrated high-deprivation areas, particularly Porirua and southern Hutt Valley.
  Youth justice referrals concentrate in these high-poverty neighborhoods where structural
  drivers — school disengagement, limited entry-level employment, rental precarity
  — are most acute. Māori and Pacific youth are overrepresented in the system due
  to their demographic concentration in these high-deprivation communities and their
  exposure to these structural drivers.
