statement: Wellington business confidence declined significantly in 2024, following
  public sector restructuring and reduced government investment. As the nation's capital
  with ~30% public sector employment, Wellington's business confidence indices are
  sensitive to central government budget cycles and policy changes affecting departmental
  locations and headcount.
