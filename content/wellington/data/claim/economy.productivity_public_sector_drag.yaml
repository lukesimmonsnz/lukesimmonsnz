id: claim.wellington.economy.productivity_public_sector_drag
statement: The high share of public sector employment in Wellington's economy contributes
  to measured productivity stagnation, because government services are measured at
  input cost rather than market value — understating real economic output but inflating
  the apparent productivity gap relative to private-sector-dominated cities.
