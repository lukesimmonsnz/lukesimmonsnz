id: claim.wellington.economy.skills_displacement_public_sector
statement: The skills displaced by Wellington's 2024 public sector restructuring do
  not map cleanly onto the private sector's demand profile, creating a structural
  mismatch that slows labour market reabsorption and increases the risk of sustained
  out-migration of skilled workers.
