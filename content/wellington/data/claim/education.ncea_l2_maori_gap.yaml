id: claim.wellington.education.ncea_l2_maori_gap
statement: NCEA Level 2 attainment in Wellington shows a pronounced school-deprivation
  gradient. Students in low-decile schools in high-deprivation areas (particularly
  Porirua, Hutt Valley, and Wainuiomata) achieve Level 2 at lower rates than those
  in higher-decile catchments. This reflects unequal school funding, higher teacher
  turnover in disadvantaged schools, and concentration of students from low-income
  families who face barriers to completion. Māori students are concentrated in low-decile
  schools and thus experience these completion gaps at disproportionate rates.
value: 74
unit: percent NCEA Level 2 attainment (Māori)
