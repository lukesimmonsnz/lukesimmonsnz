id: claim.wellington.education.neet_rate_wellington
statement: The proportion of 15–24-year-olds not in employment, education, or training
  (NEET) is substantially higher in Porirua and Hutt Valley than in Wellington City,
  reflecting school disengagement, limited local employment options, and inadequate
  secondary-to-employment transition support.
