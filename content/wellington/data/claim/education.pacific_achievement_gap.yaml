id: claim.wellington.education.pacific_achievement_gap
statement: Students in Porirua schools — where socioeconomic disadvantage, linguistic
  diversity, and school-community fit challenges are concentrated — face NCEA Level
  2 achievement gaps compounded by financial barriers, school resourcing differentials,
  and insufficient pastoral support for students managing employment and family responsibilities
  alongside study.
