id: claim.wellington.environment.coastal_erosion_rate
statement: Several Wellington coastal sections including parts of Lyall Bay beach
  and the Kāpiti Coast are experiencing measurable erosion rates that will be accelerated
  by sea-level rise, with storm-surge overtopping events at Petone Foreshore projected
  to increase in frequency over the coming decades.
