id: claim.wellington.environment.pest_free_progress
statement: Zealandia/Karori Wildlife Sanctuary has established a predator-free urban
  zone supporting breeding populations of kākā, kiwi, tuatara, and kākāriki, with
  kākā now ranging freely across much of suburban Wellington — demonstrating the viability
  of urban predator eradication at small-to-medium scale.
