id: claim.wellington.environment.urban_stream_degradation
statement: Many Wellington urban streams were piped or channelised during mid-twentieth
  century urban development, eliminating natural filtering, buffering, and habitat
  functions; daylighting and ecological restoration is technically feasible but costly
  in built-up areas.
