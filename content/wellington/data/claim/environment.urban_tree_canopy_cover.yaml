id: claim.wellington.environment.urban_tree_canopy_cover
statement: Wellington's urban tree canopy coverage varies significantly across neighbourhoods,
  with lower-income and higher-density inner suburbs having lower canopy cover than
  affluent hillside suburbs, and infill development removing canopy at a faster rate
  than replacement planting in some zones.
