id: claim.wellington.governance.ceo_turnover_wcc
statement: Wellington City Council experienced rapid CEO turnover in the 2020-2024
  period, including interim appointments during major infrastructure project transitions
  including the Town Hall earthquake-strengthening, the Let's Get Wellington Moving
  transport programme, and central city recovery from COVID-19. Sustained leadership
  instability has complicated delivery of long-duration capital programmes requiring
  consistent executive commitment.
