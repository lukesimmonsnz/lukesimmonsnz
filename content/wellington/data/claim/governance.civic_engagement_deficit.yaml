id: claim.wellington.governance.civic_engagement_deficit
statement: Survey data indicates that a substantial share of Wellington residents
  cannot name their local councillors, do not follow council proceedings, and do not
  believe their participation meaningfully affects council decisions — a civic engagement
  deficit that undermines the accountability function of local democracy.
