id: claim.wellington.governance.ngati_toa_settlement_scope
statement: The Ngāti Toa Rangatira Treaty settlement (enacted 2014) established significant
  rights and interests across the greater Wellington region, including co-governance
  and cultural redress provisions for the Kāpiti and Marlborough coasts and surrounding
  marine areas, with implementation ongoing.
