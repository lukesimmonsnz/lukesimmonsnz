id: claim.wellington.housing.greenfield_constraint_topography
statement: Wellington City Council identified that 60% of city land area has slopes
  exceeding 15 degrees, severely constraining greenfield housing expansion. Steep
  topography forces densification on flat central and eastern suburbs, increasing
  reliance on infill housing and intensification around transport corridors to meet
  affordability pressures.
value: 60
unit: percent of land area with slope >15 degrees
