id: claim.wellington.housing.median_multiple_2023
statement: Wellington's median house price to median household income ratio (median
  multiple) was approximately 8.7 in 2023, placing it in the severely unaffordable
  band by Demographia's international measure and substantially above the 3.0 threshold
  considered affordable. A median-income household would require nearly nine years
  of gross income to purchase a median-priced dwelling.
