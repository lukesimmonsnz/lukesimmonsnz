id: claim.wellington.housing.seismic_retrofit_cost_barrier
statement: Seismic retrofit costs for pre-1976 unreinforced masonry residential buildings
  in Wellington often exceed the post-retrofit market value of the building, creating
  a financial barrier that deters compliance and suppresses residential redevelopment
  in earthquake-prone zones.
