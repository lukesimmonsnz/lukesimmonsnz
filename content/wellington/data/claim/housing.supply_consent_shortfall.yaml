id: claim.wellington.housing.supply_consent_shortfall
statement: Wellington's annual residential building consent volumes have consistently
  fallen short of the dwelling additions needed to keep pace with household formation,
  with the consent pipeline constrained by topographic complexity, earthquake-prone
  building compliance costs, and limited development-ready flat land.
