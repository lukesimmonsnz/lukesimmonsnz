id: claim.wellington.housing.zoned_capacity_deficit
statement: Wellington City's modelled zoned residential capacity under the NPS-UD
  upzoning overstates practically deliverable housing supply because a significant
  share of zoned capacity sits on sites constrained by earthquake-prone building obligations,
  geotechnical complexity, or inadequate infrastructure reticulation.
