id: claim.wellington.inequality.deprivation_geographic_concentration
statement: 'Deprivation in Wellington is not randomly distributed: high-deprivation
  meshblocks are concentrated in Porirua City and specific Hutt Valley sub-areas,
  with these communities sharing limited access to high-wage employment, lower school
  performance, and reduced public service quality relative to affluent Wellington
  suburbs.'
