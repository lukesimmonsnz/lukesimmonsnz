id: claim.wellington.inequality.maori_homeownership_gap
statement: Homeownership in Wellington's high-deprivation communities — primarily
  Porirua and southern Hutt Valley — is approximately 40% compared to 65% in lower-deprivation
  areas. This gap reflects current affordability barriers — particularly deposit requirements
  relative to income — and the long-run effects of historical exclusion from the mid-twentieth-century
  property wealth accumulation period for communities that did not participate in
  it.
