id: claim.wellington.inequality.pacific_income_gap
statement: Households in Wellington's high-deprivation communities — primarily Porirua
  and southern Hutt Valley — earn substantially below the regional median income,
  concentrated in lower-wage service, retail, and hospitality employment with limited
  access to the high-wage government and professional roles that dominate Wellington's
  employment base.
