id: claim.wellington.infrastructure.centreport_kaikoura_damage
statement: The November 2016 Kaikōura earthquake (Mw 7.8) caused significant liquefaction
  damage to CentrePort Wellington on reclaimed harbour land, resulting in estimated
  losses exceeding NZD 280 million and demonstrating the acute seismic vulnerability
  of Wellington's port infrastructure.
