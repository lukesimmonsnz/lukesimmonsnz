id: claim.wellington.infrastructure.digital_inclusion_gap
statement: In high-deprivation areas of Porirua and Hutt Valley, the primary barriers
  to digital inclusion are affordability of broadband plans and device access, not
  infrastructure availability — indicating that infrastructure investment alone is
  insufficient to close the digital divide.
