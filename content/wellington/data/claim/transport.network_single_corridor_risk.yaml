id: claim.wellington.transport.network_single_corridor_risk
statement: Wellington's primary transport corridor — along the coastal SH1 and through
  the Terrace and Mt Victoria tunnels — forms a single failure point for road and
  rail travel; a major earthquake on the Wellington Fault is modelled to close this
  corridor simultaneously for an extended period.
