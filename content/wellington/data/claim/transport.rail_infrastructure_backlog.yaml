id: claim.wellington.transport.rail_infrastructure_backlog
statement: Wellington's suburban rail network carries a significant deferred maintenance
  backlog estimated at $150-200M, with aging stations and rolling stock. Rail reliability
  declined 5-10% over 2018-2023; capital renewal and electrification projects face
  funding constraints and delivery delays affecting commuter accessibility.
