id: claim.wellington.transport.rail_patronage_recovery
statement: Wellington's suburban rail network had recovered approximately 85% of pre-COVID
  patronage levels by 2022-2023, with recovery uneven across lines. The Hutt Valley
  and Kapiti lines recovered faster than the Johnsonville and Melling lines, and peak-period
  services remained below 2019 baselines due to persistent hybrid-work patterns among
  government employees who form the majority of commuter demand.
