statement: Wellington's Mt Victoria Tunnel (opened 1931) and Terrace Tunnel (opened
  1974) carry the majority of vehicle traffic between the CBD and the eastern suburbs
  and Hutt Valley corridor; the Mt Victoria Tunnel is over 90 years old and both have
  no alternative alignment in the event of closure.
