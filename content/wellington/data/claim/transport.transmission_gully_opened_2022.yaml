id: claim.wellington.transport.transmission_gully_opened_2022
statement: Transmission Gully motorway opened in March 2022 as a tolled inland alternative
  to the coastal SH1 between Mackays Crossing and Linden, providing route redundancy
  for the northern Wellington corridor but not resolving congestion through the inner-city
  tunnel bottlenecks.
