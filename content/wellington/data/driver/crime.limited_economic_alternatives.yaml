id: driver.wellington.crime.limited_economic_alternatives
name: Limited legitimate economic alternatives in Porirua
description: High unemployment and low-wage employment in Porirua reduce the opportunity cost of gang involvement, making
  gang-organised drug markets an economically rational choice for young men with limited legitimate alternatives.
