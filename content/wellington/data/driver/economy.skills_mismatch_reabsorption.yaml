id: driver.wellington.economy.skills_mismatch_reabsorption
name: Skills mismatch impeding reabsorption of displaced workers
description: Public sector skills (policy analysis, programme management, regulatory roles) do not map directly to private
  sector demand in Wellington, making displaced government workers difficult to reabsorb into the local economy at comparable
  wages.
