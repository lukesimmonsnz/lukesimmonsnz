id: driver.wellington.governance.postal_voting_accessibility
name: Postal voting accessibility limitations
description: Wellington's postal voting system creates friction for younger voters and those without stable postal addresses
  — particularly renters in high-deprivation areas — systematically underrepresenting these groups in local election results.
