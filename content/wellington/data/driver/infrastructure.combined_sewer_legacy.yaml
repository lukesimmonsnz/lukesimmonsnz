id: driver.wellington.infrastructure.combined_sewer_legacy
name: Combined stormwater-wastewater sewer network
description: Wellington's inner-city sewer network combines stormwater and wastewater in a single pipe, producing mandatory
  overflows into the harbour during rainfall events. Separating the network is highly costly in built-up areas.
theme: infrastructure
consensus: consensus
category: physical
timescale: long
scope: regional
