id: problem.wellington.crime.family_violence
title: Family violence prevalence in Wellington
theme: crime
section: crime
subpage: family-violence
parent: problem.wellington.crime.victimisation
order: 2
updated: '2026-04-26'
summary: Family violence is the most prevalent form of serious crime in Wellington, with high call volumes to police in Porirua
  and parts of Hutt Valley. Housing stress, economic hardship, alcohol and drug use, and a system that historically underresponds
  are the dominant drivers. Intergenerational transmission of family violence is a major policy concern.
manifests_in:
- wellington
systems_model:
  state_variables:
  - fv_police_call_rate
  - repeat_fv_incident_rate
  inputs:
  - housing_stress_level
  - substance_use_prevalence
  constraints:
  - police_response_capacity
  - family_court_throughput
  feedback_loops:
  - 'Intergenerational transmission: children exposed to family violence are at elevated risk of perpetrating or experiencing
    violence in adulthood, sustaining community-level prevalence.'
narrative:
- heading: Police call volumes
  body: Wellington Police District responds to family harm call-outs at a rate substantially above the national average in
    Porirua sub-areas, reflecting both elevated incidence and a community that has been encouraged to report (claim.wellington.crime.fv_police_call_rate).
- heading: Housing stress and violence nexus
  body: Wellington research consistently finds elevated family violence in households under acute housing cost stress — overcrowded,
    insecure, or unaffordable housing — indicating that the housing affordability crisis directly compounds family violence
    incidence (claim.wellington.crime.fv_housing_stress_link).
claim_ids:
- claim.wellington.crime.fv_police_call_rate
- claim.wellington.crime.fv_housing_stress_link
status: draft
