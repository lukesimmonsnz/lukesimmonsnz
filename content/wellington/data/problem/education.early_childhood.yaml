  - ece_quality_rating_distribution
  inputs:
  - ece_subsidy_level
  - provider_supply_in_low_income_areas
  constraints:
  - cost_per_hour_relative_to_income
  - transport_access_to_ece
  feedback_loops:
  - 'Quality-demand feedback: low-quality ECE services in high-deprivation areas fail to demonstrate the
    learning value that would increase demand and political priority for quality improvement.'
narrative:
- heading: Participation gap in Porirua
  body: ECE participation rates in Porirua are approximately 10 percentage points below Wellington City,
    reflecting a combination of cost barriers, limited provider supply, and cultural mismatch for Māori
    and Pacific families (claim.wellington.education.ece_participation_porirua).
- heading: Quality variation
  body: ECE quality ratings — as assessed under the Education Review Office framework — show systematic
    variation across Wellington, with lower-income communities more likely to be served by services rated
    as needing development (claim.wellington.education.ece_quality_distribution).
