id: problem.wellington.education.early_childhood
title: ECE access and quality gaps in Wellington
theme: education
section: education
subpage: early-childhood
parent: problem.wellington.education.achievement
order: 2
updated: '2026-04-26'
summary: ECE participation rates in Porirua and Hutt Valley are below the Wellington average, and quality
  varies substantially between lower-income and higher-income communities. Cost, physical access, and
  the availability of community-responsive provision are the primary barriers for families in high-deprivation
  areas.
manifests_in:
- wellington
