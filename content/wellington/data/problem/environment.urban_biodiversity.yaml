  feedback_loops:
  - 'Predator rebound loop: cessation of community predator control in any neighbourhood allows rat and possum populations
    to rebound within months, reversing gains.'
narrative:
- heading: Zealandia success and its limits
  body: Zealandia has demonstrated that a fenced urban sanctuary can support breeding populations of kākā, kiwi, and tuatara
    in a city environment. Kākā now range freely across much of suburban Wellington. However, this success is confined to
    areas near the sanctuary perimeter; the broader urban matrix remains heavily predator-affected (claim.wellington.environment.pest_free_progress).
- heading: Canopy and urban greening gaps
  body: Wellington's urban tree canopy coverage varies significantly across neighbourhoods, with lower-income and higher-density
    areas having less canopy than affluent hillside suburbs. Loss of urban canopy through infill development is occurring
    faster than replacement planting in some zones (claim.wellington.environment.urban_tree_canopy_cover).
