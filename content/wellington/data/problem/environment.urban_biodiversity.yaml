id: problem.wellington.environment.urban_biodiversity
title: Urban biodiversity pressures in Wellington
theme: environment
section: environment
subpage: urban-biodiversity
parent: problem.wellington.environment.harbour_health
order: 2
updated: '2026-04-26'
summary: Wellington hosts nationally significant urban biodiversity including the Zealandia/Karori wildlife sanctuary, but
  urban expansion, predator pressure, and habitat fragmentation continue to threaten indigenous species and ecosystem connectivity
  across the wider city. The success of Zealandia demonstrates what is achievable but also highlights how much of the urban
  landscape remains hostile to native biodiversity.
manifests_in:
- wellington
systems_model:
  state_variables:
  - urban_tree_canopy_pct
  - predator_tracking_tunnel_density
  inputs:
  - pest_control_investment
  - urban_greening_policy
  constraints:
