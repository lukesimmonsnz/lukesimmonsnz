id: problem.wellington.governance.treaty_co_governance
title: Treaty co-governance implementation in Wellington
theme: governance
section: governance
subpage: treaty-co-governance
parent: problem.wellington.governance.local_govt_reform
order: 3
updated: '2026-04-26'
summary: Wellington is the rohe of several iwi — principally Ngāti Toa Rangatira, Te Ātiawa, and Taranaki Whānui — whose Treaty
  rights and interests are relevant to environmental management, resource consenting, and cultural heritage. Co-governance
  arrangements are at varying stages of maturity across the Wellington region and are contested in parts of the public discourse.
