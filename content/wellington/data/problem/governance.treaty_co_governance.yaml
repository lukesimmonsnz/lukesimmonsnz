narrative:
- heading: Ngāti Toa settlement and scope
  body: The Ngāti Toa Rangatira Treaty settlement (2014) established significant rights and interests across the greater Wellington
    region, including co-governance of parts of the Kāpiti and Marlborough coasts and cultural redress provisions. Implementation
    is ongoing (claim.wellington.governance.ngati_toa_settlement_scope).
- heading: Te Ātiawa and partnership arrangements
  body: Te Ātiawa ki Whanganui-a-Tara has Treaty interests in Wellington Harbour and surrounding areas, and partnership arrangements
    with Wellington City Council and Greater Wellington are evolving in the context of the Whaitua freshwater process and
    resource management reform (claim.wellington.governance.te_atiawa_partnership_arrangements).
