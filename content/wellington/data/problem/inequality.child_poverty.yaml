id: problem.wellington.inequality.child_poverty
title: Child poverty in high-deprivation Wellington communities
theme: inequality
section: inequality
subpage: child-poverty
parent: problem.wellington.inequality.geographic_deprivation
order: 2
updated: '2026-04-26'
summary: Child poverty rates in Porirua and parts of Hutt Valley are substantially above Wellington City averages and are
  driven by housing cost burden, low-wage employment, and precarious work. Housing costs are the single largest driver of
  material hardship among families with children in these communities.
manifests_in:
- wellington
systems_model:
  state_variables:
  - child_poverty_rate
  - material_hardship_index
  inputs:
  - housing_cost_burden
  - benefit_income_level
  constraints:
  - low_wage_employment_structure
  - childcare_cost_and_availability
  feedback_loops:
  - 'Housing-poverty spiral: high housing costs leave families insufficient residual income for food, healthcare, and education;
    this deepens poverty outcomes that in turn limit future earnings.'
narrative:
- heading: Child poverty rates in Porirua
  body: Child poverty rates in Porirua's high-deprivation areas substantially exceed the Wellington City average, with material
    hardship measures indicating that a significant proportion of children lack adequate food, warm clothing, or access to
    healthcare in any given year (claim.wellington.inequality.child_poverty_rate_porirua).
- heading: Housing cost as primary driver
  body: Housing cost burden — the proportion of household income consumed by rent — is the primary driver of material hardship
    among low-income families in Wellington, directly linking the housing affordability crisis to child welfare outcomes (claim.wellington.inequality.housing_stress_child_poverty_link).
