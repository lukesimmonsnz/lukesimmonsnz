  feedback_loops:
  - 'Induced demand loop: road capacity additions attract additional vehicle trips, partially or fully absorbing congestion
    relief within 5–10 years.'
narrative:
- heading: Transmission Gully and residual congestion
  body: Transmission Gully opened in 2022 as the major highway investment of the past decade, providing an inland alternative
    to the coastal SH1 north of Wellington. Initial congestion relief on the northern corridor has been measurable but the
    inner-city network — particularly the Terrace and Mt Victoria tunnels — remains severely congested (claim.wellington.transport.transmission_gully_opened_2022).
- heading: Congestion costs
  body: Wellington's travel time index on key morning-peak corridors is among the highest in New Zealand relative to city
    size, reflecting the geometric constraint imposed by the harbour and hills (claim.wellington.transport.state_highway_congestion_index).
