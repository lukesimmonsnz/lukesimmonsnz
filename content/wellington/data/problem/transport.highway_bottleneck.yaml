id: problem.wellington.transport.highway_bottleneck
title: State highway congestion and single-point failures in Wellington
theme: transport
section: transport
subpage: highway-bottleneck
parent: problem.wellington.transport.network_resilience
order: 3
updated: '2026-04-26'
summary: Wellington's state highway network carries volumes far exceeding its design capacity on key urban sections. Transmission
  Gully (opened 2022) has provided partial relief on the northern corridor but has not resolved congestion in the inner city
  and Hutt Valley, where tunnels and narrow corridors remain binding constraints.
manifests_in:
- wellington
