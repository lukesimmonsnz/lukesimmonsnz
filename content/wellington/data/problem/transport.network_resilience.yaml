id: problem.wellington.transport.network_resilience
title: Fragile single-corridor transport network in Wellington
theme: transport
section: transport
subpage: network-resilience
parent: null
order: 1
updated: '2026-04-26'
summary: 'Wellington''s transport network is structurally fragile: a single coastal corridor carries the dominant share of
  freight, passenger rail, and road traffic. A major seismic event, infrastructure failure, or weather event on this corridor
  leaves the region with no viable alternative route. The Cook Strait ferry dependency amplifies this single-point-of-failure
  characteristic at the national scale.'
manifests_in:
- wellington
