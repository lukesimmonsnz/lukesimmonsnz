  state_variables:
  - network_redundancy_score
  - corridor_daily_vehicle_km
  inputs:
  - infrastructure_investment
  - seismic_event_probability
  constraints:
  - geographic_corridor_constraint
  - tunnel_age_and_condition
  feedback_loops:
  - 'Disruption-cost feedback: periodic closures (weather, incidents) demonstrate the fragility, increasing public pressure
    for redundancy investment but not generating consistent long-term funding.'
narrative:
- heading: The single-corridor problem
  body: Wellington's main transport corridor runs through the Terrace Tunnel and along the Hutt Road — a narrow coastal strip
    vulnerable to landslip, flooding, and fault rupture. The Terrace Tunnel and Mt Victoria Tunnel, both over 100 years old,
    form irreplaceable bottlenecks with no alternative alignment (claim.wellington.transport.rail_tunnel_age).
- heading: Network fragility and resilience
  body: A major Wellington Fault rupture would likely close SH1, the Terrace Tunnel, and the rail network simultaneously,
    severing overland connection to the Hutt Valley and Kāpiti Coast for an extended period (claim.wellington.transport.network_single_corridor_risk).
