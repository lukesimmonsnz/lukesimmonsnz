id: camp.west_coast.education.tertiary_pathways_and_vocation
name: Tertiary Pathways and Vocational Training
theme: education
core_claim: West Coast lacks local tertiary provision; building vocational training
  pipelines for trades, mining transition skills, and conservation management supports
  economic diversification.
flagship_moves:
- Establish West Coast trades training hub in Greymouth linked to Ara Institute
- Fund NZ Conservation Corps programme creating pathways for rangatahi into conservation
  work
- Expand WEL Networks digital skills programme
tensions:
- Small regional population limits viability of local tertiary provision
- Brain drain accelerates when local youth acquire qualifications and leave for larger
  centres
addresses:
- problem.west_coast.education.achievement
- problem.west_coast.education.secondary
- problem.west_coast.education.tertiary_access
interventions:
- description: Establish West Coast Vocational Training Hub in Greymouth
  state_variable: regional_qualification_attainment
  expected_sign: +
applicable_in:
- west-coast
tensions_with: []
