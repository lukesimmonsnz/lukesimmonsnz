id: claim.west_coast.climate.climate_2_claim
statement: West Coast receives highest rainfall in New Zealand, with 5,000-10,000
  mm annually in the ranges. This sustained precipitation drives chronic flooding
  across Greymouth, Hokitika, and Westport, with documented major events in 2021 and
  2022 inundating over 600 homes. Flood risk is amplified by terrain and river dynamics.
