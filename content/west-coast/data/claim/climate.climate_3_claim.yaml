id: claim.west_coast.climate.climate_3_claim
statement: Franz Josef and Fox Glaciers have retreated dramatically since 1980, losing
  more than 30 percent of their volume. Both glaciers remain major tourism attractions
  drawing 500,000+ annual visitors. Continued glacier retreat threatens the economic
  viability of glacier-dependent tourism operations and scenic value.
