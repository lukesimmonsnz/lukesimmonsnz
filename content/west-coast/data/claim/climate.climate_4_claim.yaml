id: claim.west_coast.climate.climate_4_claim
statement: The Alpine Fault, which transects the West Coast region, carries approximately
  30 percent probability of a magnitude-8+ earthquake within the next 50 years. Such
  an event would cause catastrophic damage to infrastructure, housing, and lifeline
  routes including State Highway 6, which is the only road connecting the region to
  the rest of New Zealand.
value: 30
unit: percent probability M8+ in 50 years
