id: claim.west_coast.climate.climate_risk_claim
statement: Westport experienced major flood events in July 2021 and February 2022,
  together inundating over 600 homes and displacing residents. Post-flood recovery
  has been slow; rental stock depletion and insurance withdrawals continue to drive
  depopulation. Council is now planning managed retreat and relocation of some residential
  and commercial zones to higher ground.
