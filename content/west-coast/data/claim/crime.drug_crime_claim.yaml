id: claim.west_coast.crime.drug_crime_claim
statement: Drug-related offences in the West Coast region occur at elevated rates
  relative to national averages, with synthesis crimes (methamphetamine) concentrated
  in declining towns experiencing economic transition from coal mining closure. Limited
  police presence and geographic isolation complicate enforcement and harm-reduction
  outreach.
