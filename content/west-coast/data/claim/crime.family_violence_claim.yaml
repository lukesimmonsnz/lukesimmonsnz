id: claim.west_coast.crime.family_violence_claim
statement: Family violence incidents in West Coast communities are elevated in economically
  stressed areas, particularly in Buller and Grey districts where coal mining job
  losses have driven income collapse and increased alcohol and substance use. Social
  isolation in small towns limits access to support services and perpetuates cycles
  of harm.
