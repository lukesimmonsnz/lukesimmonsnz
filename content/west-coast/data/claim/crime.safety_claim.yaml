id: claim.west_coast.crime.safety_claim
statement: Violent and property crimes in West Coast towns are reported at levels
  above New Zealand urban averages in Greymouth and Westport, correlating with depopulation,
  economic decline, and reduced police resourcing. Perceived lack of safety contributes
  to further youth out-migration and business closure.
