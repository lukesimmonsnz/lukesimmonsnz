id: claim.west_coast.crime.youth_offending_claim
statement: Youth offending in West Coast regions correlates with limited educational
  and employment pathways, school closures in smaller towns, and lack of structured
  youth services. Greymouth, Hokitika, and Westport have experienced disproportionate
  youth crime relative to their population as young people lack positive engagement
  opportunities.
