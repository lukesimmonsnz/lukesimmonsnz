id: claim.west_coast.economy.economic_2_claim
statement: Stockton coal mine in Buller district remains operational but faces long-term
  closure pressure from global coal transition policy and thermal coal demand decline.
  The mine employs approximately 300-400 workers. Closure would eliminate a core employer
  in Westport and Buller, requiring managed economic transition and worker reskilling
  support.
