id: claim.west_coast.economy.economic_3_claim
statement: Glacier and Department of Conservation tourism generates approximately
  500,000 annual visitor arrivals to Franz Josef and Fox Glacier regions, supporting
  accommodation, retail, and guide services. This sector represents a critical but
  climate-vulnerable component of West Coast regional economy, as glacier retreat
  threatens the primary attraction sustaining tourism employment and local business
  viability.
