id: claim.west_coast.economy.economic_4_claim
statement: Dairy farming and dairy processing remain significant in northern West
  Coast (Buller and parts of Grey), while forestry operations (both native and plantation)
  are distributed across the region. Together these primary sectors employ 800+ workers
  and generate $150-200 million in regional revenue. Both sectors face resilience
  challenges from flooding and access constraints.
