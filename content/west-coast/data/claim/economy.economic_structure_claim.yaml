id: claim.west_coast.economy.economic_structure_claim
statement: West Coast economy is heavily dependent on extractive and primary sectors
  (coal, dairy, forestry, tourism). The 1,000+ job losses from Solid Energy collapse
  (2015-2018) demonstrated regional economic vulnerability. Current portfolio lacks
  diversification into high-wage services or knowledge sectors. Transition from coal
  and climate-vulnerable tourism requires investment in alternative employment anchors.
value: 1000
unit: jobs lost (Solid Energy 2015-2018)
time_period: 2015-2024
