id: claim.west_coast.education.achievement_claim
statement: West Coast student achievement (NCEA levels) falls below national averages
  in mathematics and English, with particular gaps in small rural schools. School
  closures and staff recruitment difficulty in remote towns limit curriculum breadth
  and academic support. Student participation in tertiary education is approximately
  20 percentage points below national average.
