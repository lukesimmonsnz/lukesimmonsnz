id: claim.west_coast.education.early_childhood_claim
statement: Early childhood education access in West Coast is fragmented across three
  territorial authorities with variable service quality. Centres in smaller towns
  (Westport, Hokitika) face staffing challenges and enrolment pressure from population
  decline. Māori-medium ECE options are limited, affecting whānau engagement with
  early intervention.
