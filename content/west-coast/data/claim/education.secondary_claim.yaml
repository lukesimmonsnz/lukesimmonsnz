id: claim.west_coast.education.secondary_claim
statement: Secondary schools in West Coast (Greymouth High, Westport High, Hokitika
  High and Arahura) face declining rolls from out-migration, with Westport High School
  enrolment down 40 percent since 2010. Staff retention is difficult; subject offering
  is constrained. Several smaller communities lack secondary facilities and send students
  to larger towns, creating transport and boarding challenges.
