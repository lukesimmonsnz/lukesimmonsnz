id: claim.west_coast.education.tertiary_access_claim
statement: Tertiary education access is severely constrained. No university campus
  exists on West Coast; nearest options are Christchurch (4+ hours south) or Dunedin
  (8+ hours). Distance learning and online study are prevalent but limited by digital
  infrastructure gaps in rural areas. Polytechnic places are limited. Young people
  pursuing tertiary education typically out-migrate and do not return.
