id: claim.west_coast.environment.coastal_environment_claim
statement: West Coast coast experiences accelerating erosion from sea level rise and
  increased storm surge frequency. Westport, Greymouth, and Hokitika seafronts face
  inundation and infrastructure damage risk. Coastal wetlands and estuaries have been
  degraded by historical mining and logging. Recovery of native coastal vegetation
  and tidal flat ecosystems is ongoing but threatened by continued development pressure
  and climate change.
