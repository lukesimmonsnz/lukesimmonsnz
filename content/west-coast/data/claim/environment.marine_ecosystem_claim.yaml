id: claim.west_coast.environment.marine_ecosystem_claim
statement: West Coast marine ecosystems (Tasman Sea and fiordland approaches) support
  demersal fish stocks, crayfish, and shellfish harvesting. Overfishing pressure and
  warming ocean temperatures are reducing catch-per-unit-effort in traditional fishing
  grounds. Marine protected area coverage remains limited. Māori customary harvest
  rights and commercial fishing coexist with variable compliance and equity outcomes.
