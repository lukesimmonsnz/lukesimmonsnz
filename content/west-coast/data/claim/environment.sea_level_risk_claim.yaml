id: claim.west_coast.environment.sea_level_risk_claim
statement: Sea level on New Zealand's West Coast has risen approximately 1.6 mm per
  year over the past century, with projections of 0.5-1.0 m by 2100. West Coast settlements
  at sea level (Westport, Greymouth, Hokitika) face inundation and saltwater intrusion
  into freshwater aquifers. Combined with Alpine Fault risk and high rainfall flooding,
  coastal communities face compounded climate and seismic hazards.
value: 1.6
