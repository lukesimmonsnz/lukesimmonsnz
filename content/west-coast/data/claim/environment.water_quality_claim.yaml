id: claim.west_coast.environment.water_quality_claim
statement: West Coast river and stream water quality is degraded by acid mine drainage
  from historical coal mining, with pH levels in Buller waterways dropping below 6.0
  in some catchments. Ongoing coal operations continue to contribute dissolved metals
  and sulfates. Native fish populations are reduced; macroinvertebrate diversity is
  impaired. Remediation efforts are ongoing but funding is limited.
value: 6.0
unit: pH threshold (impaired)
time_period: 2010-2024
