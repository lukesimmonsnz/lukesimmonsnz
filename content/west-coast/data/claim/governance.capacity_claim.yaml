id: claim.west_coast.governance.capacity_claim
statement: West Coast Regional Council and three territorial authorities (Buller,
  Grey, Westland DC) collectively lack technical capacity for complex long-term infrastructure
  planning, climate adaptation, and managed retreat implementation. Staff turnover
  is high; expertise in resilience planning is sparse. Reliance on external consultants
  and central government support is significant but inconsistent.
