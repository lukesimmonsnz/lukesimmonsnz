id: claim.west_coast.governance.governance_claim
statement: West Coast governance is fragmented across West Coast Regional Council
  and three separate territorial authorities (Buller, Grey, Westland DC), each with
  independent planning and service delivery functions. This fragmentation complicates
  coordinated responses to regional challenges (flooding, economic transition, population
  decline). Service delivery duplication and coordination costs are high relative
  to small regional population (32,000).
