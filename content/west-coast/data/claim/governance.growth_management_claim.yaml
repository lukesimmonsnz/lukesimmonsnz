id: claim.west_coast.governance.growth_management_claim
statement: Westport Council is implementing managed retreat policy following 2021
  and 2022 catastrophic floods. Residential and commercial properties in flood-prone
  zones are targeted for voluntary acquisition and relocation to higher ground. Council
  faces resource constraints and community resistance. Property owners face loss of
  equity as insurance withdraws and land values collapse in inundated areas.
