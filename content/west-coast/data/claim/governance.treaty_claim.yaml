id: claim.west_coast.governance.treaty_claim
statement: Ngāi Tahu Poutini holds mana whenua over West Coast and Fiordland regions.
  Treaty settlement included significant South Island land holdings and fisheries
  rights. West Coast Regional Council co-governance framework (2023) formalizes Ngāi
  Tahu Poutini voice in resource management and long-term planning. However, capacity
  for full co-governance implementation remains contested and resourced inadequately.
