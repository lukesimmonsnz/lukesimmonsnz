id: claim.west_coast.health.chronic_disease_claim
statement: Chronic disease prevalence (diabetes, cardiovascular disease, chronic respiratory
  disease) in West Coast is elevated relative to national average, driven by high
  smoking rates, obesity prevalence, and socioeconomic stress. Ageing population and
  limited specialist services restrict disease management options. Primary care capacity
  is insufficient for preventive screening and chronic disease management programs.
