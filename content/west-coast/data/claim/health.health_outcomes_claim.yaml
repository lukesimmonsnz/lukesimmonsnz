id: claim.west_coast.health.health_outcomes_claim
statement: 'West Coast health outcomes rank among the worst in the South Island and
  below New Zealand national average across all major indicators: life expectancy,
  infant mortality, hospitalization rates for preventable conditions, and self-reported
  health status. Māori health outcomes are particularly poor. Underlying drivers include
  poverty, workforce shortages, geographic isolation, and lifestyle risk factors.'
