id: claim.west_coast.health.mental_health_claim
statement: Mental health presentation and hospital admission rates in West Coast are
  elevated, driven by economic stress from mining job losses, geographic isolation,
  weak social networks in declining towns, and substance abuse. Suicide rates exceed
  national average. Mental health service capacity (counsellors, psychiatrists, crisis
  teams) is severely constrained. Waitlists exceed 12 months for specialist assessment.
