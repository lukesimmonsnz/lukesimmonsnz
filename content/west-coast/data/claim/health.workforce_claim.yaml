id: claim.west_coast.health.workforce_claim
statement: Grey Base Hospital (Greymouth) and West Coast primary care face acute workforce
  shortages. Approximately 40 percent of GP and nursing positions are unfilled or
  covered by locums. Specialist services are severely limited; cardiology, oncology,
  and many surgical services require referral to Christchurch (200+ km away). Recruitment
  and retention are difficult due to professional isolation, limited partner employment,
  and geographic constraints.
value: 40
unit: percent unfilled GP/nursing positions
