id: claim.west_coast.housing.affordability_claim
statement: West Coast house prices are among the lowest in New Zealand (median ~$280,000
  in Westport, ~$320,000 in Greymouth), yet local median household income is only
  $52,000 annually. Price-to-income ratio exceeds 5:1, making homeownership unaffordable
  for local workers. Post-flood insurance withdrawal has collapsed property values
  further, trapping owners in negative equity.
