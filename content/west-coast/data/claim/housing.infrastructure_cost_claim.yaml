id: claim.west_coast.housing.infrastructure_cost_claim
statement: West Coast territorial authorities face disproportionately high water,
  wastewater, and stormwater infrastructure costs per capita due to dispersed population
  and aging pipe networks. Westport post-flood infrastructure repairs are estimated
  at $50+ million. Climate resilience upgrades (flood defence, water treatment) add
  further costs. Per-capita infrastructure burden limits funding for preventive maintenance
  and new capacity.
value: 50
unit: million NZD (Westport post-flood repairs estimated)
time_period: 2021-2024
