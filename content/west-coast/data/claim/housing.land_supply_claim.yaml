id: claim.west_coast.housing.land_supply_claim
statement: West Coast towns contain numerous abandoned and derelict properties, particularly
  in Westport, Hokitika, and Greymouth. Estimated 200+ unoccupied or severely dilapidated
  residential and commercial buildings exist across the region. Many owners are absent
  or deceased; titles are complex. Despite apparent land supply, productive housing
  stock is constrained by building condition, environmental hazard (flooding, mine
  drainage), and very low property values limiting renovation investment.
value: 200
unit: abandoned/derelict buildings (estimated)
time_period: 2015-2024
