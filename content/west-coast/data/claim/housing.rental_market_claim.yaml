id: claim.west_coast.housing.rental_market_claim
statement: Post-2021 and 2022 floods, Westport rental stock was depleted as landlords
  sold or abandoned properties. Rents for remaining units have increased 20-30 percent
  while quality has declined. Rental affordability crisis emerged for low-income residents
  and workers. Council emergency accommodation support has been extended multiple
  times; permanent solutions remain elusive. Rental market recovery is slow due to
  insurance withdrawal and property insurance cost spikes.
value: 25
unit: percent rental increase post-flood (estimated)
