id: claim.west_coast.inequality.child_poverty_claim
statement: Child poverty (living below 50% median household income) in West Coast
  exceeds national average, with estimated 25-30 percent of children in low-income
  households. Buller and Grey districts are particularly affected. School breakfast
  programs and food insecurity referrals have doubled since 2016. Limited childcare
  affordability restricts parental employment participation and intergenerational
  mobility.
value: 27
unit: percent children in poverty (estimated)
