id: claim.west_coast.inequality.inequality_claim
statement: 'Income inequality in West Coast is elevated in mining-dependent communities
  (Westport, Buller). The 2015-2018 Solid Energy collapse created binary income distribution:
  miners and service workers with high wages (now absent) versus those in remaining
  low-wage sectors (retail, tourism, aged care). Median household income ($52,000)
  masks high variance. Gini coefficient for West Coast exceeds national average.'
