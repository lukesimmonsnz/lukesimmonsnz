id: claim.west_coast.inequality.rental_affordability_gap_claim
statement: 'Rental affordability gap in West Coast is severe: median gross household
  income is $52,000; median rent for a 2-bedroom in Westport or Greymouth is approximately
  $280/week ($14,560 annually), consuming 28 percent of gross income. For households
  below median (40th percentile), rent-to-income ratio exceeds 40 percent, leaving
  insufficient funds for food, heating, transport, and health expenses.'
value: 28
unit: percent rent-to-income (median household)
