id: claim.west_coast.inequality.rural_isolation_claim
statement: 'Remote settlements on West Coast (Haast, Ross, Reefton, Karamea) experience
  severe service deprivation: no medical clinic, limited school choice, 1-4 hours
  to nearest GP or hospital, minimal broadband. Population in these settlements is
  <500 each; services are uneconomic to operate locally. Geographic isolation perpetuates
  poverty and limits economic opportunity. Young people out-migrate; aging in place
  creates care dependencies difficult to meet.'
