id: claim.west_coast.infrastructure.infrastructure_2_claim
statement: State Highway 6 is the only road connecting West Coast to the rest of New
  Zealand. It experiences frequent closures from flooding (average 5-10 days/year),
  slips, and rockfall, particularly around Haast Pass and South Westland. Recent major
  closures occurred May 2022 (12 days), July 2023 (8 days). Road is single-lane in
  many sections; alternate route does not exist. Road maintenance budget is inadequate
  for climate resilience. Closure impacts economy directly (tourism isolation, freight
  delays).
value: 8
