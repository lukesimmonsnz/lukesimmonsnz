id: claim.west_coast.infrastructure.infrastructure_3_claim
statement: Digital infrastructure (broadband internet) coverage in West Coast is poor.
  Rural and remote areas have <10 Mbps download speeds; some valleys lack any broadband
  access. Mobile phone coverage has significant blackspots, particularly in Haast,
  Karamea, and inland river valleys. Government subsidized broadband programs (such
  as Rural Broadband Initiative extension) have improved urban coverage but rural
  gaps remain. Distance learning for students and telework for residents are constrained.
