id: claim.west_coast.infrastructure.infrastructure_4_claim
statement: Westport water and wastewater systems were severely damaged in 2021-2022
  floods. Post-flood repairs (estimated $50+ million) include treatment plant upgrades,
  pipe network relocation to higher ground, and stormwater system redesign. Grey District
  and Westland District also face aging water infrastructure and constrained renewal
  budgets. Climate adaptation upgrades (redundancy, flood resistance) will require
  $200+ million across three territorial authorities over 20 years.
