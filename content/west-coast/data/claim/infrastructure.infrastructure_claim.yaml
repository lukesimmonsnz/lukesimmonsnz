id: claim.west_coast.infrastructure.infrastructure_claim
statement: 'West Coast infrastructure faces convergent hazards: flooding (5,000-10,000
  mm rainfall annually), Alpine Fault seismic risk (M8+ 30% in 50 years), and sea
  level rise (1.6 mm/year, accelerating). Combined flood and earthquake insurance
  withdrawal has left many property owners self-insuring. Infrastructure resilience
  investment is underfunded relative to hazard exposure. Managed retreat and relocation
  of critical services are necessary but politically contested.'
value: 30
unit: percent Alpine Fault M8+ probability (50-year window)
time_period: 2020-2070
