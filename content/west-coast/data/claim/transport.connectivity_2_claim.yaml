id: claim.west_coast.transport.connectivity_2_claim
statement: Haast Pass (State Highway 6) is the only road connection between West Coast
  and Otago/Southland regions. The pass experiences frequent closures from avalanche
  risk, rockfall, and slips (average 3-5 days/year closed). Winter conditions are
  severe. Alternate route via Gore-Greymouth is 4+ hours longer. Haast Pass closure
  isolates West Coast economically and socially from the south. Infrastructure resilience
  and alternate route options are critically needed but underfunded.
value: 4
