id: claim.west_coast.transport.connectivity_3_claim
statement: 'Westport and Greymouth face internal transport challenges: hilly terrain,
  weather exposure, aging road stock, and limited public transport. No urban bus service;
  private vehicle dependence is high. For residents without personal vehicles, mobility
  is severely constrained. School transport costs are high. Aging population faces
  safety concerns crossing busy roads (SH6 passes through both towns). Active transport
  (walking, cycling) is limited by terrain and weather. Transport disadvantage compounds
  economic and social isolation.'
