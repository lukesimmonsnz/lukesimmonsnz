id: claim.west_coast.transport.connectivity_4_claim
statement: Active transport infrastructure (walking and cycling pathways, separated
  cycleways) is minimal across West Coast towns. Greymouth and Westport have partial
  sidewalk networks in central business districts but lack safe cycling routes. Weather
  (wind, rain) and hilly terrain limit active transport appeal. Schools and services
  are dispersed; walking distances exceed safe limits for young children. Car dependence
  perpetuates air pollution, inactivity, and transport costs for low-income households.
  Regional transport strategy lacks active transport funding.
