id: claim.west_coast.transport.connectivity_claim
statement: West Coast has no rail service (closed 1987) and limited passenger bus
  service. State Highway 6 is the only road to the region; no alternate routes exist.
  Internal connectivity between Westport, Greymouth, and Hokitika depends on roads
  through challenging terrain. Isolation is acute for settlements south of Haast (only
  access via SH6). Air services are limited to occasional scenic flights and emergency/medical
  transport. Supply chains and tourism depend critically on road access.
