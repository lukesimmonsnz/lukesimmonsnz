name: Aging population and rural deprivation profile
description: The West Coast has an older population profile than the national average and a deprivation profile shaped by
  mining-decline income shocks, rural isolation and historical disadvantage. The combination produces high prevalence of multi-morbidity
  and elevated mental-health load.
