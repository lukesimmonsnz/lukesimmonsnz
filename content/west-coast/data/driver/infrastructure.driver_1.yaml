name: Compounded hazard envelope (flood, fault, sea)
description: The West Coast carries unusually high simultaneous exposure to riverine flooding, Alpine Fault seismic rupture
  and sea-level rise. Infrastructure resilience design has to reason about the joint distribution of these hazards rather
  than each in isolation.
