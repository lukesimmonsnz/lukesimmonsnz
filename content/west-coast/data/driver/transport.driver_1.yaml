id: driver.west_coast.transport.driver_1
name: Single-corridor geographic constraint
description: The West Coast is connected to the rest of New Zealand by a single state-highway corridor (SH6) and two alpine
  passes (Haast and Arthur's), with no rail and no inland alternative. This geography is the master constraint that shapes
  every other transport problem in the region.
