  - Long recurrence intervals depress political urgency between events, so resilience capex is chronically underprovided relative
    to the modelled hazard, while a single rupture would impose decades of recovery cost on a small region.
narrative:
- heading: Probabilistic but structural
  body: GNS Science assessments place the conditional probability of an Mw 8+ Alpine Fault rupture in the next 50 years at
    roughly 30 percent (claim.west_coast.climate.climate_4_claim). The fault runs for several hundred kilometres along the
    spine of the West Coast and recurrence-interval evidence places the region squarely inside the expected window.
- heading: AF8 lifelines and the SH6 exposure
  body: The AF8 (Alpine Fault Magnitude 8) regional response programme assumes simultaneous failure of SH6 and SH73 in multiple
    places, with restoration measured in months rather than days. Planning for post-event isolation — pre-positioned supplies,
    sea-based resupply, and air-bridge protocols — is now an explicit lifelines-sector function.
