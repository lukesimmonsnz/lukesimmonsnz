id: problem.west_coast.climate.climate_4
title: Alpine Fault rupture risk and lifeline-route exposure
theme: climate-adaptation
section: climate
subpage: climate_4
parent: climate_risk
order: 4
updated: '2026-04-26'
summary: The Alpine Fault transects the West Coast and carries roughly a 30 percent probability of a magnitude-8-plus earthquake
  within the next 50 years. Such an event would cause widespread structural damage, sever SH6 in multiple places, and isolate
  communities that already depend on a single road lifeline.
