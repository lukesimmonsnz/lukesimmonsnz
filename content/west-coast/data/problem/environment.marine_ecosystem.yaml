  feedback_loops:
  - Stock declines tighten quota and harvest rules, which load disproportionate cost onto small operators and recreational
    and customary fishers — building political resistance to the science-driven settings the stocks need to recover.
narrative:
- heading: Inshore stocks and warming water
  body: Inshore demersal stocks, paua and crayfish along the Tasman Sea coast face the combined pressure of historical fishing
    intensity and ocean warming (claim.west_coast.environment.marine_ecosystem_claim). Catch-per-unit-effort has declined
    in several traditional grounds, and quota allocations have not always tracked stock condition.
- heading: Customary, commercial and recreational
  body: Ngāi Tahu mana moana includes formal customary harvest rights and a commercial role through fisheries settlement.
    Reconciling customary harvest, commercial quota and recreational fishing in specific bays — Jackson Bay, Karamea, the
    Hokitika and Grey river-mouths — is an ongoing co-governance question.
