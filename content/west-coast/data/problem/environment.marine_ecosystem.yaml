id: problem.west_coast.environment.marine_ecosystem
title: Tasman Sea fisheries and customary harvest
theme: environment
section: environment
subpage: marine_ecosystem
parent: coastal_environment
order: 4
updated: '2026-04-26'
summary: West Coast inshore fisheries (Tasman Sea hoki, hāpuku, blue cod, paua and crayfish) are pressured by warming waters
  and by historical fishing intensity. Marine protected area coverage is limited, and Ngāi Tahu customary harvest sits alongside
  commercial and recreational use with variable equity outcomes.
