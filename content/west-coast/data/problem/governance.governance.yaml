id: problem.west_coast.governance.governance
title: Four councils for thirty-two thousand people
theme: governance
section: governance
subpage: governance
parent: null
order: 1
updated: '2026-04-26'
summary: West Coast governance is split across one regional council and three territorial authorities — Buller, Grey and Westland
  — each with separate planning, infrastructure and regulatory functions. For a regional population of around 32,000, this
  fragmentation imposes heavy coordination costs and complicates a unified response to regional challenges.
manifests_in:
- west-coast
