  feedback_loops:
  - Fragmentation raises coordination cost on every regional issue, which strengthens the case for shared services or amalgamation,
    but each consolidation step also raises identity and accountability concerns that have so far blocked structural change.
narrative:
- heading: A four-council region
  body: West Coast Regional Council coexists with Buller, Grey and Westland district councils, each running its own planning,
    three-waters, roading (where not state-highway) and consenting function (claim.west_coast.governance.governance_claim).
    Total elected members and senior staff across the four bodies are large relative to population.
- heading: Coordination versus consolidation
  body: Regional challenges — flood response, climate adaptation, transition planning, three-waters — all require cross-boundary
    coordination that the existing structure makes slow. Local government reform debates have raised consolidation as one
    option; community attachment to district identity is the principal counter-argument.
