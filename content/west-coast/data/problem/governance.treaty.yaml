  - Where co-governance is well-resourced on both sides, joint decisions accumulate institutional learning; where it is under-resourced,
    partnership formality outruns substance and trust erodes, slowing the next round of devolution.
narrative:
- heading: Settled iwi, mana whenua across the region
  body: Unlike many North Island regions, Ngāi Tahu's Treaty settlement is established, and the rūnanga Makaawhio and Ngāti
    Waewae have clearly defined takiwā across the West Coast (claim.west_coast.governance.treaty_claim). The Pounamu Vesting
    Act 1997 returned ownership and management of pounamu (greenstone) to Ngāi Tahu specifically.
- heading: Co-governance in resource management
  body: Co-governance arrangements over freshwater, coastal management and conservation land are at varying stages of implementation
    across the four councils. Effective co-governance requires iwi-side technical capacity that Ngāi Tahu has built more strongly
    than most iwi, but resourcing of the partnership at a council scale remains uneven.
