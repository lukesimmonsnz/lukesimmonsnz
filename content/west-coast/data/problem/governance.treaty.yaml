id: problem.west_coast.governance.treaty
title: Ngāi Tahu mana whenua and West Coast co-governance
theme: governance
section: governance
subpage: treaty
parent: governance
order: 3
updated: '2026-04-26'
summary: Te Rūnanga o Ngāi Tahu and its papatipu rūnanga — Te Rūnanga o Makaawhio (south Westland) and Te Rūnanga o Ngāti
  Waewae (north of the Arahura) — hold mana whenua across the West Coast. Co-governance frameworks with WCRC and the territorial
  authorities have advanced but are not yet fully resourced.
