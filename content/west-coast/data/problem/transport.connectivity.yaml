id: problem.west_coast.transport.connectivity
title: West Coast's single-corridor isolation from the national network
theme: transport
section: transport
subpage: connectivity
parent: null
order: 1
updated: '2026-04-26'
summary: West Coast's transport connectivity to the rest of New Zealand depends on a single state highway corridor (SH6),
  with no rail (closed 1987) and only a thin scheduled bus and air service overlay. Internal movement between Westport, Greymouth
  and Hokitika depends on the same vulnerable road, exposing supply chains, health referrals and tourism to any closure event.
manifests_in:
- west-coast
systems_model:
  state_variables:
  - sh6_open_days_per_year
  - rail_freight_alternatives
  - regional_passenger_seat_capacity
  inputs:
  - waka_kotahi_maintenance_budget
  - regional_aviation_subsidy
  constraints:
  - alpine_geographic_corridor
