  feedback_loops:
  - Out-migration weakens the patronage and freight base that would justify route redundancy investment, which in turn deepens
    isolation and accelerates further out-migration.
narrative:
- heading: One road, no rail, sparse air
  body: SH6 is the only road link from the West Coast to the rest of the country, and the rail line that once ran from Greymouth
    to Christchurch closed to passengers in 1987 (claim.west_coast.transport.connectivity_claim). Scheduled intercity bus
    services are infrequent, and air travel is limited to small turboprop services and emergency medical flights. Settlements
    south of Haast can only be reached by SH6, with no inland alternative.
- heading: Brittle supply and emergency response
  body: Because freight, supermarket restocking, fuel deliveries, hospital transfers and tourism arrivals all depend on the
    same corridor, even short closures cascade through the regional economy. The structural absence of an alternate alignment
    means that resilience must be bought through hardening rather than redundancy.
