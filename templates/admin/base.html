<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Admin{% endblock %} — Aotearoa corpus dashboard</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    :root {
      --fg: #1a1a1a; --bg: #fafafa; --accent: #205493;
      --warn: #b58900; --err: #b22222; --ok: #2c7a2c; --muted: #666;
      --rule: #ddd; --code-bg: #f0f0f0;
    }
    body { font: 15px/1.5 system-ui, sans-serif; color: var(--fg);
           background: var(--bg); margin: 0; padding: 0; }
    header { background: #222; color: #fff; padding: .6em 1.2em; }
    header a { color: #fff; text-decoration: none; margin-right: 1em; }
    header a:hover { text-decoration: underline; }
    main { max-width: 1100px; margin: 0 auto; padding: 1.4em 1.2em 4em; }
    h1 { font-size: 1.6em; margin-top: 0; }
    h2 { font-size: 1.2em; border-bottom: 1px solid var(--rule); padding-bottom: .2em; }
    a { color: var(--accent); }
    table { border-collapse: collapse; width: 100%; margin: 1em 0; }
    th, td { border-bottom: 1px solid var(--rule); padding: .35em .6em; text-align: left; vertical-align: top; }
    th { background: #eee; font-weight: 600; }
    .grid { display: grid; gap: .4em; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
    .card { padding: .6em .8em; background: #fff; border: 1px solid var(--rule); border-radius: 4px; }
    .card a { font-weight: 600; }
    .badge { display: inline-block; padding: .05em .5em; border-radius: 9px;
             font-size: .8em; background: var(--code-bg); color: var(--muted); }
    .banner { padding: .7em 1em; border-radius: 4px; margin: 1em 0; }
    .banner.ok   { background: #e7f4e7; border: 1px solid var(--ok);   color: var(--ok); }
    .banner.warn { background: #fdf6e3; border: 1px solid var(--warn); color: var(--warn); }
    .banner.err  { background: #fbebeb; border: 1px solid var(--err);  color: var(--err); }
    code, pre { font-family: ui-monospace, SFMono-Regular, monospace; background: var(--code-bg); }
    pre { padding: .8em; overflow: auto; border-radius: 4px; }
    label { display: block; font-weight: 600; margin: 1em 0 .2em; }
    input[type=text], input[type=number], input[type=date], select, textarea {
      width: 100%; box-sizing: border-box; padding: .35em .5em;
      border: 1px solid var(--rule); border-radius: 3px; font-family: inherit;
    }
    textarea { min-height: 6em; font-family: ui-monospace, SFMono-Regular, monospace; font-size: .9em; }
    .req { color: var(--err); }
    .hint { color: var(--muted); font-size: .85em; margin: .15em 0 0; }
    .toolbar { display: flex; gap: .6em; flex-wrap: wrap; align-items: center; margin: .8em 0; }
    button { padding: .4em 1em; background: var(--accent); color: #fff;
             border: 0; border-radius: 3px; cursor: pointer; font-size: 1em; }
    button.secondary { background: #888; }
    .crumbs { color: var(--muted); margin-bottom: .8em; }
    .crumbs a { color: var(--muted); }
  </style>
</head>
<body>
<header>
  <a href="{{ url_for('admin.home') }}"><strong>⌂ Admin</strong></a>
  <a href="/">Public site →</a>
  <span style="float:right; color:#aaa; font-size:.85em;">localhost only · per-save commit</span>
</header>
<main>
{% block content %}{% endblock %}
</main>
</body>
</html>
